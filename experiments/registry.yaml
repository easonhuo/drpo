governance_changes:
- id: GOV-EXP-ARTIFACT-01
  status: active
  effective_date: '2026-06-25'
  purpose: Prevent loss of formal experiment outputs in ephemeral runtimes and require durable delivery before completion claims.
  incident_note: A temporary C-U1 E3/E4 run produced ephemeral files but no durable artifact; the run cannot be used as new formal evidence.
- id: GOV-EXP-ARTIFACT-02
  status: active
  effective_date: '2026-06-25'
  supersedes_operational_details_of: GOV-EXP-ARTIFACT-01
  purpose: Bind every formal attempt to an immutable clean commit, verify and publish artifacts atomically, and prevent Countdown-scale checkpoints or symbolic links from inflating the main recovery package.
  scientific_status_change: false

- id: GOV-EXP-ARTIFACT-03
  status: active
  effective_date: '2026-06-25'
  supersedes_operational_details_of: GOV-EXP-ARTIFACT-02
  purpose: Preserve prior valid packages during replacement, capture command-start and supervisor failures, bind recovery artifacts to the launch commit, enforce final evidence completeness, make persistent-local checkpoint indexing the default, and require explicit versioned sidecars only.
  scientific_status_change: false
