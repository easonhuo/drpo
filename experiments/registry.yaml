schema_version: 2

project:
  name: drpo
  repository: easonhuo/drpo
  default_branch: main
  research_source_of_truth: docs/handoff.md

allowed_statuses:
  - analytically_proven
  - long_run_validated
  - finite_step_validated
  - pilot
  - not_run
  - rejected
  - superseded

rules:
  document_before_experiment: true
  require_code_commit_for_formal_results: true
  require_paired_seeds_when_applicable: true
  require_terminal_state_audit_for_dynamics: true
  preserve_failed_runs: true
  require_supervised_run_in_ephemeral_environment: true
  require_heartbeat_for_formal_runs: true
  require_durable_artifact_before_completed_claim: true
  require_stage_package_before_next_formal_experiment: true
  preserve_partial_results_on_failure: true
  chat_history_is_not_experiment_evidence: true
  require_authoritative_commit_resolution: true
  require_clean_worktree_for_formal_runs: true
  capture_launch_snapshot_for_dirty_pilots: true
  require_end_provenance_check: true
  require_internal_package_verification: true
  require_atomic_package_publish: true
  lightweight_failed_package_default: true
  forbid_following_result_symlinks: true
  require_pre_registered_artifact_budget_for_large_models: true
  require_shared_hardened_entrypoint_implementation: true
  forbid_legacy_protocol_fallback: true
  require_pre_delivery_clean_checkout_validation: true
  require_authoritative_exact_base_source: true
  forbid_synthetic_or_web_reconstructed_base: true
  require_merge_equivalent_pre_delivery_test: true
  preserve_git_executable_modes_in_update_patches: true

experiments:
  - id: EXT-C-E8-V4
    environment: EXT-C
    name: countdown_base_first_transformer_external_validation
    status: not_run
    claim: >-
      Test whether the fixed-negative-advantage near/far remoteness mechanism
      identified in D-U1 transfers to a shared-parameter Transformer, and whether
      controlled negative advantages improve held-out structural generalization
      relative to positive-only and uncontrolled negative updates.
    role: external_validity
    does_not_replace:
      - D-U1
      - D-Diag
    code_entrypoint: src/drpo/countdown_qwen_arena_onefile.py
    primary_model: Qwen Instruct 0.5B
    initialization:
      protocol: base_first
      base_gate:
        greedy_verifier_success_min: 0.15
        valid_rate_min: 0.80
      fallback: minimal_sft_only_if_base_gate_fails
      sft_gate:
        greedy_verifier_success_min: 0.15
    data:
      task: four-number Countdown arithmetic
      train_validation_test_split: disjoint_canonical_operator_tree_signatures
      positive_support: training_structures_only
      negative_reward: 0
      fixed_negative_advantage: -1.0
      near_far_matching:
        surprisal_gap_min: 0.5
        token_length_difference_max: 2
        tree_depth_difference_max: 1
        value_error_ratio_max: 4.0
    mechanism_probe:
      matched_pairs_min: 16
      default_pairs: 32
      metrics:
        - token_surprisal
        - direct_logit_score_norm
        - trainable_adapter_gradient_norm
        - target_surprisal_delta_after_equal_negative_updates
        - correct_answer_collateral_surprisal_delta
    methods:
      - positive_only
      - controlled_negative
      - uncontrolled_negative
    pairing:
      shared_initial_adapter: true
      shared_offline_data: true
      shared_training_seed: true
      shared_evaluation_seed: true
    primary_metrics:
      - greedy_verifier_success
      - pass_at_k
      - valid_rate
      - greedy_unseen_structure_success
      - pass_at_k_unseen_structure
    reporting_separation:
      - task_performance
      - support_or_structure_coverage
      - nan_inf_numerical_failure
    model_scaling:
      qwen_3b: conditional_replication
      qwen_7b: optional
    artifact_budget:
      main_package_hard_limit_mib: 25
      single_file_main_limit_mib: 10
      max_retained_checkpoints_per_method: 2
      checkpoint_roles:
        - best
        - latest
      save_foundation_model_weights: false
      save_optimizer_state_by_default: false
      large_checkpoint_delivery: sidecar
    formal_run_status: not_run
    execution:
      state: registered
      run_id: null
      last_heartbeat_utc: null
      process_exit_code: null
    evidence:
      raw_complete: false
      terminal_audited: false
      package_created: false
      package_filename: null
      package_sha256: null
      delivered_to_user: false
      applied_commit: null

allowed_execution_states:
  - registered
  - running
  - raw_complete
  - terminal_audited
  - packaged
  - delivered
  - applied_to_repository

artifact_protocol:
  governance_id: GOV-EXP-ARTIFACT-01
  hardening_governance_id: GOV-EXP-ARTIFACT-02
  document: docs/formal_experiment_artifact_protocol.md
  guard_entrypoint: scripts/run_experiment_guard_hardened.py
  package_entrypoint: scripts/package_experiment_hardened.py
  verify_entrypoint: scripts/verify_experiment_package_hardened.py
  default_checkpoint_every_formal_seeds: 5
  checkpoint_required_for_expected_runtime_minutes_at_least: 30
  final_package_warning_mib: 25
  main_package_hard_limit_mib: 25
  max_single_main_file_mib: 10
  failed_package_mode: lightweight_evidence
  large_file_delivery: sidecar
  symlink_policy: never_follow
  require_clean_worktree_for_formal_runs: true
  allow_dirty_only_for_explicit_pilot: true
  require_launch_snapshot_for_dirty_pilot: true
  require_end_provenance_check: true
  require_internal_verification_before_atomic_publish: true
  public_entrypoints_fail_closed: true
  pre_delivery_validation:
    require_clean_checkout: true
    preserve_executable_modes: true
    run_bundle_test_commands: true
    run_git_diff_check: true
    verify_final_zip_checksums: true
    require_authoritative_exact_sha_checkout: true
    forbid_web_snippet_or_manual_base_reconstruction: true
    run_merge_equivalent_apply_path: true
  commit_resolution_priority:
    - git_ls_remote_origin_main
    - local_git_rev_parse_head
    - explicit_expected_full_sha
  completion_requires:
    - terminal_audited
    - packaged
    - delivered
  repository_closure_requires: applied_to_repository
  required_update_files:
    - update.patch
    - BASE_COMMIT.txt
    - CHANGE_SUMMARY.md
    - TEST_COMMANDS.sh
    - modified_files/
  required_final_result_files:
    - RUN_COMPLETE.json
    - TERMINAL_AUDIT.json_or_terminal_audit.json
    - run_manifest.json
    - SHA256SUMS.txt

governance_changes:
  - id: GOV-EXP-ARTIFACT-01
    status: active
    effective_date: '2026-06-25'
    purpose: >-
      Prevent loss of formal experiment outputs in ephemeral runtimes and
      require durable delivery before completion claims.
    incident_note: >-
      A temporary C-U1 E3/E4 run produced ephemeral files but no durable
      artifact; the run cannot be used as new formal evidence.
  - id: GOV-EXP-ARTIFACT-02
    status: active
    effective_date: '2026-06-25'
    supersedes_operational_details_of: GOV-EXP-ARTIFACT-01
    purpose: >-
      Bind every formal attempt to an immutable clean commit, verify and publish
      artifacts atomically, and prevent Countdown-scale checkpoints or symbolic
      links from inflating the main recovery package.
    scientific_status_change: false
