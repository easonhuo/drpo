schema_version: 2
project:
  name: drpo
  repository: easonhuo/drpo
  default_branch: main
  research_source_of_truth: docs/handoff.md
allowed_statuses:
- analytically_proven
- long_run_validated
- finite_step_validated
- pilot
- not_run
- rejected
- superseded
rules:
  document_before_experiment: true
  require_code_commit_for_formal_results: true
  require_paired_seeds_when_applicable: true
  require_terminal_state_audit_for_dynamics: true
  preserve_failed_runs: true
  require_supervised_run_in_ephemeral_environment: true
  require_heartbeat_for_formal_runs: true
  require_durable_artifact_before_completed_claim: true
  require_stage_package_before_next_formal_experiment: true
  preserve_partial_results_on_failure: true
  chat_history_is_not_experiment_evidence: true
  require_authoritative_commit_resolution: true
  require_clean_worktree_for_formal_runs: true
  capture_launch_snapshot_for_dirty_pilots: true
  require_end_provenance_check: true
  require_internal_package_verification: true
  require_isolated_base_index_for_apply_check: true
  require_atomic_package_publish: true
  lightweight_failed_package_default: true
  forbid_following_result_symlinks: true
  require_pre_registered_artifact_budget_for_large_models: true
  require_shared_hardened_entrypoint_implementation: true
  forbid_legacy_protocol_fallback: true
  require_pre_delivery_clean_checkout_validation: true
  require_authoritative_exact_base_source: true
  forbid_synthetic_or_web_reconstructed_base: true
  require_merge_equivalent_pre_delivery_test: true
  preserve_git_executable_modes_in_update_patches: true
  require_separate_raw_gradient_and_optimizer_update_norm: true
  forbid_variance_expansion_claim_from_sgd_overshoot: true
  preserve_previous_valid_artifact_until_candidate_verified: true
  require_failed_package_on_command_start_failure: true
  require_new_or_empty_output_root: true
  bind_recovery_artifacts_to_launch_commit: true
  require_final_manifest_audit_and_logs: true
  default_large_file_storage: persistent_local_index
  sidecar_default_enabled: false
  require_explicit_sidecar_file_selection: true
  require_explicit_sidecar_purpose: true
  forbid_sidecar_overwrite: true
  forbid_foundation_model_weight_copy: true
  index_checkpoint_state_regardless_of_file_size: true
  require_formal_source_availability_preflight: true
  require_automated_source_acquisition_attempts_before_user_upload: true
  user_upload_not_required_when_exact_source_acquired_automatically: true
  manual_source_transfer_last_resort: complete_git_bundle_or_verified_source_capsule_only
  forbid_requesting_plain_source_zip_for_formal_run: true
  forbid_requesting_ad_hoc_source_files: true
  browser_only_source_is_not_formal_checkout: true
  plain_source_archive_is_not_commit_bound_checkout: true
  require_commit_object_for_formal_run: true
  formal_run_requires_explicit_commit_or_authoritative_origin_match: true
  require_source_files_present_at_launch_commit_before_start: true
  validate_experiment_id_before_filesystem_use: true
  reject_root_or_parent_symlink_paths: true
  reject_runtime_paths_overlapping_tracked_files: true
  require_identity_match_for_all_result_package_kinds: true
  preserve_small_numpy_raw_evidence: true
  detect_result_mutation_during_packaging: true
  reject_unknown_package_kind_and_malformed_manifest: true
  escalate_stale_process_after_grace: true
  capture_supervisor_setup_and_end_provenance_failures: true
  require_exact_sidecar_manifest_payload_inventory: true
  require_positive_artifact_size_and_count_limits: true
  require_three_phase_base_freshness_check: true
  require_base_freshness_ledger: true
  require_session_self_discovery_of_remote_advances: true
  user_supplied_sha_is_not_authoritative_when_official_channel_available: true
  shell_dns_failure_alone_does_not_justify_user_upload: true
  allow_verified_official_full_sha_archive_for_code_delivery: true
  archive_capsule_not_automatic_formal_run_authority: true
formal_execution_channel:
  schema_version: 1
  policy_id: GOV-FORMAL-ENTRYPOINT-01
  channel_id: hardened-v1
  registration_base_commit: 75d8d98575b086f00ab9348da9df2316a4078863
  guard_entrypoint: scripts/run_experiment_guard_hardened.py
  package_entrypoint: scripts/package_experiment_hardened.py
  verify_entrypoint: scripts/verify_experiment_package_hardened.py
  hardened_core: scripts/artifact_protocol_hardened.py
  artifact_protocol: docs/formal_experiment_artifact_protocol.md
  validator_entrypoint: scripts/validate_formal_execution_channel.py
  allowed_execution_classes: [formal, pilot, historical_formal, superseded]
  default_artifact_budget:
    main_package_hard_limit_mib: 25
    single_file_main_limit_mib: 10
    large_file_storage: persistent_local_index
    sidecar_default_enabled: false
  formal_requirements:
    require_explicit_execution_class: true
    require_canonical_channel_ref: true
    require_guarded_launch: true
    require_canonical_artifact_owner: true
    forbid_new_runner_archive_writes: true
    fail_closed_on_missing_core: true
  legacy_runner_archive_exceptions:
  - exception_id: CU1-RECOVERY-CHECKPOINT-LEGACY-01
    entrypoint: src/drpo/drpo_cu1_e1_e4_oneclick.py
    allowed_experiment_ids: [C-U1-E4-CONV-01]
    scope: recovery_checkpoint_only
    rationale: >-
      The pre-Stage-2 C-U1 runner writes per-five-seed recovery checkpoint ZIPs.
      Final/raw-complete experiment artifacts remain owned by the canonical hardened
      guard and packager. New formal entrypoints may not copy this exception.
    no_new_entrypoints: true
