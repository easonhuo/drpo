      theorem_or_equation_refs: []
      appendix_bindings: []
      allowed_conclusions: [the method targets a measurable resource-information tradeoff]
      forbidden_conclusions: [the method is universally optimal]
      reviewer_objection: The motivation could be satisfied by a fixed heuristic.
