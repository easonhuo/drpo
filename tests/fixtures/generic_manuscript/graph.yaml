    title: Motivation and gap
    claim: Battery-aware query scheduling should adapt acquisition frequency to uncertainty without violating device budgets.
    reader_question: Why is a new scheduling rule needed when fixed-rate sensing is simple?
    role: Establish the practical tradeoff and the paper contribution.
