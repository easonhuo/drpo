    must_include: [distributed sensors, battery budget, uncertainty, fixed-rate limitation]
    blueprint:
      topic_sentence: Distributed sensing systems must decide when another measurement is worth its energy cost.
      sentence_plan:
        - role: deployment_context
          instruction: Introduce intermittent sensing deployments and their resource constraints.
          anchors: [distributed sensing, energy]
        - role: resource_motivation
          instruction: Explain why acquisition frequency affects both information quality and battery life.
          anchors: [measurement quality, battery]
        - role: unresolved_tradeoff
