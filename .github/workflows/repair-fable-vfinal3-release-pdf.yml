name: Repair Fable VFINAL3 release PDF

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'dev/paper-fable-vfinal3-release-repair'
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: '1784815980'
      FORCE_SOURCE_DATE: '1'
      TZ: UTC
      HEAD_BRANCH: dev/paper-fable-vfinal3-release-repair
    steps:
      - name: Run exact release repair
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github.raw+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.github/repair-fable-vfinal3-release.sh?ref=${HEAD_BRANCH}" \
            -o /tmp/repair.sh
          bash /tmp/repair.sh
