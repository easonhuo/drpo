name: ReplayAB Post-fix C06 Calibration

on:
  push:
    branches:
      - exec/candidate01-postfix-c06-calibration-01
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: replayab-postfix-c06-calibration
  cancel-in-progress: false

jobs:
  c06-real-pair:
    if: github.event_name != 'pull_request' || github.head_ref == 'exec/candidate01-postfix-c06-calibration-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run C06 opposite-order real pairs
        shell: bash
        run: |
          set -euo pipefail
          TOOLCHAIN=2ba5dbf18cf1ce986abe9e8d011cbf72deff1698
          CONTRACT="$GITHUB_WORKSPACE/tests/fixtures/workflow_replay/candidate01_c1/c06_stale_main_contract.yaml"
          PACKET="$GITHUB_WORKSPACE/tests/fixtures/workflow_replay/candidate01_c1/c06_stale_main_packet.yaml"
          OUTPUT=/tmp/replayab-postfix-c06
          git cat-file -e "${TOOLCHAIN}^{commit}"
          git worktree add --detach /tmp/replayab-toolchain "$TOOLCHAIN"
          python /tmp/replayab-toolchain/scripts/run_workflow_replay.py real-pair \
            --contract "$CONTRACT" \
            --case-packet "$PACKET" \
            --source-repo "$GITHUB_WORKSPACE" \
            --output-root "$OUTPUT" \
            --backend-id github-actions-ubuntu24-py311-local-git-v1 \
            --json | tee /tmp/replayab-postfix-c06-result.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/replayab-postfix-c06-result.json').read_text())
          assert payload['status'] == 'PASS', payload
          assert payload['state'] == 'C1_LIVENESS_READY', payload
          assert payload['case_id'] == 'C06-STALE-MAIN', payload
          assert payload['run_count'] == 4, payload
          assert payload['pair_count'] == 2, payload
          assert len(payload['pairs']) == 2, payload
          assert all(pair['equivalent'] is True for pair in payload['pairs']), payload
          PY
          cp /tmp/replayab-postfix-c06-result.json "$OUTPUT/WORKFLOW_RESULT.json"
          tar -C /tmp -czf "$GITHUB_WORKSPACE/replayab-postfix-c06-calibration.tar.gz" replayab-postfix-c06

      - name: Upload C06 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replayab-postfix-c06-calibration-${{ github.run_id }}
          path: replayab-postfix-c06-calibration.tar.gz
          if-no-files-found: error
          retention-days: 14
