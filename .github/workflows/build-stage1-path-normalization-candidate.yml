name: Build Stage 1 path-normalization candidate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: stage1-path-normalization-candidate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install repository dependencies
        run: python -m pip install -e ".[dev]"

      - name: Generate exact maintenance candidate
        shell: bash
        run: |
          set -o pipefail
          python scripts/build_stage1_path_normalization_candidate_temp.py \
            2>&1 | tee stage1_path_normalization_generation.log

      - name: Validate exact maintenance candidate
        shell: bash
        run: |
          set -euo pipefail
          {
            python -m py_compile tools/drpo-update/test_selection.py tests/test_update_test_selector_hidden_paths.py
            python -m pytest -q tests/test_update_test_selector.py tests/test_update_test_selector_hidden_paths.py tests/test_governance_pipeline_stage_status.py
            python scripts/validate_governance_pipeline_stage_status.py --repo-root .
            python -m compileall -q src scripts tools tests
            bash -n tools/drpo-update/drpo-update tools/drpo-update/install.sh
            python scripts/validate_formal_execution_channel.py --repo-root .
            python scripts/validate_governance_rule_inventory.py --repo-root .
            python scripts/validate_governance_pipeline_stage_status.py --repo-root .
            python -m pytest -q
            ruff check .
          } 2>&1 | tee stage1_path_normalization_validation.log

      - name: Package candidate files
        if: always()
        shell: bash
        run: |
          mkdir -p candidate-files/tools/drpo-update
          mkdir -p candidate-files/tests
          mkdir -p candidate-files/docs/governance_stage_authorizations
          mkdir -p candidate-files/docs/scopes
          cp tools/drpo-update/test_selection.py candidate-files/tools/drpo-update/test_selection.py
          cp tests/test_update_test_selector_hidden_paths.py candidate-files/tests/ 2>/dev/null || true
          cp docs/governance_pipeline_stage_status.yaml candidate-files/docs/governance_pipeline_stage_status.yaml
          cp docs/governance_stage_authorizations/GOV-STAGE1-PATH-NORMALIZATION-BUGFIX-2026-07-10.yaml candidate-files/docs/governance_stage_authorizations/ 2>/dev/null || true
          cp docs/scopes/GOV-STAGE1-PATH-NORMALIZATION-BUGFIX-01.md candidate-files/docs/scopes/ 2>/dev/null || true
          cp stage1_path_normalization_candidate.json candidate-files/ 2>/dev/null || true
          cp stage1_path_normalization_generation.log candidate-files/ 2>/dev/null || true
          cp stage1_path_normalization_validation.log candidate-files/ 2>/dev/null || true
          find candidate-files -type f -print0 | sort -z | xargs -0 sha256sum > candidate-files/SHA256SUMS

      - name: Upload exact candidate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-path-normalization-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: candidate-files
          retention-days: 7
          if-no-files-found: error
