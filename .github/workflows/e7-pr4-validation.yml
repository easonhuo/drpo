name: E7 PR4 validation

on:
  pull_request:
    branches:
      - dev/e7-canonical-shortlist-1m
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          mkdir -p validation_logs

      - id: compile
        name: Compile Python sources
        continue-on-error: true
        run: |
          set -o pipefail
          python -m compileall -q src scripts tests 2>&1 | tee validation_logs/compileall.log

      - id: ruff
        name: Ruff
        continue-on-error: true
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee validation_logs/ruff.log

      - id: targeted
        name: Targeted E7 shortlist tests
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -q tests/test_e7_canonical_shortlist_1m.py tests/test_e7_canonical_shortlist_1m_runner.py 2>&1 | tee validation_logs/targeted_pytest.log

      - id: full
        name: Full pytest
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee validation_logs/full_pytest.log

      - id: authority
        name: Handoff authority
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/handoff_authority.py verify --repo-root . 2>&1 | tee validation_logs/handoff_authority.log

      - id: governance
        name: Governance stage validator
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/validate_governance_pipeline_stage_status.py --repo-root . 2>&1 | tee validation_logs/governance_stage.log

      - id: formal
        name: Formal execution channel validator
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/validate_formal_execution_channel.py --repo-root . 2>&1 | tee validation_logs/formal_execution_channel.log

      - id: stage4a
        name: Stage 4A current-state acceptance
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/run_stage4a_acceptance.py --repo-root . --skip-fault-injection --json 2>&1 | tee validation_logs/stage4a.log

      - name: Record gate outcomes
        if: always()
        run: |
          cat > validation_logs/outcomes.txt <<'EOF'
          compile=${{ steps.compile.outcome }}
          ruff=${{ steps.ruff.outcome }}
          targeted=${{ steps.targeted.outcome }}
          full=${{ steps.full.outcome }}
          authority=${{ steps.authority.outcome }}
          governance=${{ steps.governance.outcome }}
          formal=${{ steps.formal.outcome }}
          stage4a=${{ steps.stage4a.outcome }}
          EOF

      - name: Create exact Git bundle
        if: always()
        run: git bundle create validation_logs/drpo-e7-pr4-validation.bundle --all

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drpo-e7-pr4-validation-evidence
          path: validation_logs
          if-no-files-found: error
          retention-days: 3

      - name: Fail on unsuccessful gate
        if: always()
        run: |
          test '${{ steps.compile.outcome }}' = success
          test '${{ steps.ruff.outcome }}' = success
          test '${{ steps.targeted.outcome }}' = success
          test '${{ steps.full.outcome }}' = success
          test '${{ steps.authority.outcome }}' = success
          test '${{ steps.governance.outcome }}' = success
          test '${{ steps.formal.outcome }}' = success
          test '${{ steps.stage4a.outcome }}' = success
