name: E7 PR4 validation

on:
  pull_request:
    branches:
      - dev/e7-canonical-shortlist-1m
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Compile Python sources
        run: python -m compileall -q src scripts tests

      - name: Ruff
        run: ruff check .

      - name: Targeted E7 shortlist tests
        run: pytest -q tests/test_e7_canonical_shortlist_1m.py tests/test_e7_canonical_shortlist_1m_runner.py

      - name: Full pytest
        run: pytest -q

      - name: Handoff authority
        run: python scripts/handoff_authority.py verify --repo-root .

      - name: Governance stage validator
        run: python scripts/validate_governance_pipeline_stage_status.py --repo-root .

      - name: Formal execution channel validator
        run: python scripts/validate_formal_execution_channel.py --repo-root .

      - name: Stage 4A current-state acceptance
        run: python scripts/run_stage4a_acceptance.py --repo-root . --skip-fault-injection --json

      - name: Create exact Git bundle
        if: always()
        run: git bundle create drpo-e7-pr4-validation.bundle --all

      - name: Upload exact checkout bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drpo-e7-pr4-validation-bundle
          path: drpo-e7-pr4-validation.bundle
          if-no-files-found: error
          retention-days: 3
