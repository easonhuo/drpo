name: Switch historical Arm-A to PR119

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  switch:
    if: github.head_ref == 'exec/candidate01-historical-pr114-arm-a-01'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exec/candidate01-historical-pr114-arm-a-01
          fetch-depth: 0
      - name: Replace PR124 probe coordinates with PR119
        run: |
          set -euo pipefail
          TARGET=.github/workflows/candidate01-historical-pr114-arm-a.yml
          grep -q 'C01-PR124-HISTORICAL-ARM-A' "$TARGET" || exit 0
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/candidate01-historical-pr114-arm-a.yml')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'Candidate01 historical PR124 Arm-A': 'Candidate01 historical PR119 Arm-A',
              'candidate01-historical-pr124-arm-a': 'candidate01-historical-pr119-arm-a',
              'b65882993eaf674390989bb9082be2b79f1f1e44': '2f677f4b00954ea71d0efa7def552a1ea3daa565',
              '48c40034c2445c11b36f0cba6e22fb2042a1b457': '4bdc1fa80bafd997b6358c51a83f5e57dd77ed16',
              'c01_pr124_historical_arm_a_packet.yaml': 'c01_pr119_historical_arm_a_packet.yaml',
              'C01-PR124-HISTORICAL-ARM-A': 'C01-PR119-HISTORICAL-ARM-A',
              'pr124-historical-arm-a-control-plane-split': 'pr119-historical-arm-a-control-plane-split',
              'replayab-pr124-historical-arm-a': 'replayab-pr119-historical-arm-a',
              'run_id="c" * 64': 'run_id="d" * 64',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected token: {old}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'DRPO Replay Executor'
          git config user.email 'drpo-replay@local.invalid'
          git add "$TARGET"
          git diff --cached --check
          git commit -m 'Run PR119 historical Arm-A validation'
          git push origin HEAD:exec/candidate01-historical-pr114-arm-a-01
