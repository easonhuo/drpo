name: Paper Code Integrate Audited Main

on:
  pull_request:
    types: [synchronize]
    paths:
      - "docs/paper_code_reference/INTEGRATION_FRESHNESS_AUDIT_20260720.md"
      - ".github/workflows/paper-code-integrate-main.yml"

permissions:
  contents: write

concurrency:
  group: paper-code-integrate-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  integrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_MAIN: cd3271f844bcaf2550beb6247451dd3104258d0b
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Merge audited main without rewriting paper code
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EVENT_HEAD"
          branch_head="$EVENT_HEAD"

          git fetch --no-tags origin main
          resolved_main=$(git rev-parse origin/main)
          if [ "$resolved_main" != "$EXPECTED_MAIN" ]; then
            echo "main moved: expected $EXPECTED_MAIN, resolved $resolved_main" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-ff "$EXPECTED_MAIN" \
            -m "PAPER-CODE-VALIDATION-01 integrate audited main $EXPECTED_MAIN"

          rm .github/workflows/paper-code-integrate-main.yml
          git add -u .github/workflows/paper-code-integrate-main.yml
          git commit --amend --no-edit

          parents=$(git show -s --format=%P HEAD)
          first_parent=${parents%% *}
          second_parent=${parents##* }
          if [ "$first_parent" != "$branch_head" ] || [ "$second_parent" != "$EXPECTED_MAIN" ]; then
            echo "unexpected merge parents: $parents" >&2
            exit 1
          fi

          if ! git diff --exit-code "$branch_head" HEAD -- \
            paper_code \
            docs/paper_code_reference \
            .github/workflows/paper-code-validation.yml
          then
            echo "main integration changed the protected paper-code task tree" >&2
            exit 1
          fi

          for path in \
            AGENTS.md \
            docs/handoff.md \
            experiments/registry.yaml \
            docs/governance_pipeline_stage_status.yaml \
            docs/governance_rule_inventory.yaml
          do
            head_blob=$(git rev-parse "HEAD:${path}")
            main_blob=$(git rev-parse "${EXPECTED_MAIN}:${path}")
            if [ "$head_blob" != "$main_blob" ]; then
              echo "authority path differs from audited main: $path" >&2
              exit 1
            fi
          done

          test -z "$(git status --porcelain)"
          git push origin "HEAD:${HEAD_REF}"
