                  "src/drpo/countdown_e8_alpha1_c_scan_trainer.py",
                  "src/drpo/countdown_e8_alpha1_c_scan_runtime.py",
              ],
              "operator_entrypoint": "scripts/run_countdown_e8_oracle_offline_v2_alpha1_c_scan_auto_one_click.sh",
              "autotune_entrypoint": "scripts/run_countdown_e8_oracle_offline_v2_alpha1_c_scan_auto.py",
              "config_path": "configs/countdown_e8_oracle_offline_v2_alpha1_c_scan_0p5b.yaml",
              "protocol_document": "docs/experiments/E8_V2_ALPHA1_C_SCAN_PILOT.md",
              "scope_document": "docs/scopes/EXT-C-E8-ORACLE-OFFLINE-V2-ALPHA1-C-SCAN-0.5B-01.md",
              "model": {
                  "identity": "Qwen2.5-0.5B-Instruct",
                  "initialization": "pretrained_base_plus_fresh_lora",
                  "parameterization": "lora",
              },
              "bank": {
                  "source_experiment": "EXT-C-E8-ORACLE-OFFLINE-BANK-V2-0.5B-01",
                  "frozen_during_training": True,
                  "use_all_first_occurrence_unique_negatives": True,
