          marker = "development_experiment_registrations:\n"
          if current_registry.count(marker) != 1:
              raise SystemExit("registry insertion marker is not unique")
          registry_after = current_registry.replace(marker, entity_text + marker, 1)
          yaml.safe_load(registry_after)
          REGISTRY_PATH.write_text(registry_after, encoding="utf-8")

          block = (
              "- **Countdown E8 alpha=1 high-`c` one-parameter scan "
              "（`EXT-C-E8-ORACLE-OFFLINE-V2-ALPHA1-C-SCAN-0.5B-01`）：**"
              "登记为已启动但尚无终态结果的 development pilot，是前序 62-cell alpha-by-c "
              "网格的非破坏性 successor。实验在同一 frozen E8 V2 bank、Qwen2.5-0.5B、"
              "fresh LoRA 和 validation-only 协议下，固定 `d=-stopgrad(sequence_mean_logprob)`、"
              "`u=d/2`、`w=alpha*exp(-c*u^2)`，比较 Positive-only、前序最佳 "
