                  "report_pass_at_64": True,
                  "report_valid_rate": True,
                  "compare_terminal_and_late_window": True,
              },
              "runtime": {
                  "candidate_gpus": 8,
                  "parallel_cells_per_gpu": 2,
                  "maximum_concurrent_cells": 16,
                  "expected_full_waves": 2,
                  "representative_liveness_steps": 2,
                  "liveness_required_before_sweep": True,
                  "identity_checked_resume": True,
                  "scientific_matrix_changed_by_runtime_selection": False,
              },
              "exclusions": [
                  "current_bank_argmin_argmax_selection",
                  "near_far_binary_mixture",
                  "negative_scale_calibration",
                  "initialization_gradient_rms_matching",
                  "sbrc",
                  "hybrid",
                  "entropy_bonus",
                  "sft_initialization",
                  "on_policy_sampling",
                  "replay_refresh",
                  "test_split_access",
              ],
              "reporting_separation": [
                  "task_performance",
                  "valid_rate_structure_proxy_not_formal_support_audit",
                  "nan_inf_numerical_failure",
              ],
              "interpretation_limits": [
                  "external_validity_only",
                  "no_controlled_mechanism_claim",
                  "no_formal_method_ranking",
                  "no_convergence_or_steady_state_claim",
                  "no_state_distribution_ood_generalization_claim",
                  "countdown_does_not_replace_cu1_or_du1",
                  "four_development_seeds_are_not_confirmatory_seeds",
              ],
              "execution": {
                  "state": "running",
                  "run_id": "server_run_started_user_reported",
                  "server_start_reported": True,
                  "registration_state_at_launch": "dev_code_first_unregistered",
                  "authoritative_registration_during_run": True,
                  "last_heartbeat_utc": None,
                  "process_exit_code": None,
              },
              "evidence": {
                  "code_committed": True,
                  "focused_tests_passed": True,
                  "real_server_liveness_completed": "reported_by_running_state_not_yet_delivered",
                  "run_started": True,
