          rendered = shadow.render(base_handoff, operations)
          shadow.verify_history_preservation(base_handoff, rendered.text, operations)

          evidence_paths = [
              "experiments/registry.yaml",
              DELTA_PATH.as_posix(),
              PROTOCOL_PATH.as_posix(),
              SCOPE_PATH.as_posix(),
              "configs/countdown_e8_oracle_offline_v2_alpha1_c_scan_0p5b.yaml",
              "src/drpo/countdown_e8_alpha1_c_scan_common.py",
              "src/drpo/countdown_e8_alpha1_c_scan_trainer.py",
              "src/drpo/countdown_e8_alpha1_c_scan_runtime.py",
              "scripts/run_countdown_e8_oracle_offline_v2_alpha1_c_scan_auto.py",
              "scripts/run_countdown_e8_oracle_offline_v2_alpha1_c_scan_auto_one_click.sh",
              "tests/test_countdown_e8_oracle_offline_v2_alpha1_c_scan.py",
          ]
          delta = {
              "schema_version": 3,
              "update_id": UPDATE_ID,
              "mode": "authoritative",
              "base": {
                  "commit": BASE,
                  "handoff_sha256": shadow.sha256_text(base_handoff),
                  "registry_sha256": shadow.sha256_text(base_registry),
              },
              "renderer_version": 1,
              "operations": operations,
              "registry": {
                  "mode": "expected_after",
                  "exact_base_after_sha256": shadow.sha256_text(registry_after),
                  "changes": [
                      {
                          "change_id": "add-e8-alpha1-c-scan-running-pilot",
                          "kind": "add_entity",
                          "entity_id": EXPERIMENT_ID,
                          "evidence": evidence_paths,
                      }
                  ],
              },
              "expected": {
                  "exact_base_candidate_sha256": shadow.sha256_text(rendered.text),
