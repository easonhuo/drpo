              + "` 在登记前启动；本登记不修改其 config、trainer、runtime 或 launcher，避免破坏"
              "正在运行 workdir 的 identity-checked resume。固定 1200 steps、每 100 steps "
              "Greedy/Pass@8、每 200 steps Pass@64，test split 禁止访问。该 Countdown 实验只承担"
              "external-validity tuning；不得预设 alpha 可以删除，也不得把四个 development seeds "
              "升级为正式方法排名、收敛、稳态、受控因果识别或 OOD 结论。终态必须分别报告任务性能、"
              "valid-rate 结构代理和 NaN/Inf 数值失败，并同时审计 terminal 与 800--1200 late window。"
          )
          operations = [
              {
                  "operation_id": "append-e8-alpha1-c-scan-running-pilot",
                  "op": "append_to_section",
                  "heading_path": [
                      "0. 研究与执行原则（每次新会话首先阅读）",
                      "0.1 当前执行门禁",
