          SCOPE_PATH = Path("docs/scopes/EXT-C-E8-ORACLE-OFFLINE-V2-ALPHA1-C-SCAN-0.5B-01.md")
          PROTOCOL_PATH = Path("docs/experiments/E8_V2_ALPHA1_C_SCAN_PILOT.md")

