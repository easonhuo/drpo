name: TEMP register E8 alpha1 c scan

on:
  push:
    branches:
      - dev/e8-alpha1-c-scan-pilot
    paths:
      - .github/workflows/temp-register-e8-alpha1-c-scan.yml

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-alpha1-c-scan-pilot
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install authority dependency
        run: python -m pip install --quiet pyyaml
      - name: Author and materialize registration
        shell: bash
        run: |
          set -euo pipefail
          BASE=4b4366991c305e6da9e5e91b0f333c17174ce96d
          LAUNCH_COMMIT=a54dc74b849561c15f6195336fca446ed36f0640
          BRANCH=dev/e8-alpha1-c-scan-pilot
          WORKFLOW=.github/workflows/temp-register-e8-alpha1-c-scan.yml
          UPDATE_ID=EXT-C-E8-V2-ALPHA1-C-SCAN-REGISTRATION-2026-07-14
          DELTA_DIR=docs/handoff_deltas/${UPDATE_ID}

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge-base --is-ancestor "${BASE}" HEAD
          git merge-base --is-ancestor "${LAUNCH_COMMIT}" HEAD

          python - <<'PY'
