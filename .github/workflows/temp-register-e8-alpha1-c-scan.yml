          UPDATE_ID = "EXT-C-E8-V2-ALPHA1-C-SCAN-REGISTRATION-2026-07-14"
          EXPERIMENT_ID = "EXT-C-E8-ORACLE-OFFLINE-V2-ALPHA1-C-SCAN-0.5B-01"
          DELTA_PATH = Path("docs/handoff_deltas") / UPDATE_ID / "HANDOFF_DELTA.yaml"
          REGISTRY_PATH = Path("experiments/registry.yaml")
