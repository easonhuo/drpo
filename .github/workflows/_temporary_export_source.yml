name: Temporary Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive checked-out source
        run: |
          tar --exclude=.git --exclude=.runspec_state --exclude=outputs -czf /tmp/drpo-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: temporary-drpo-source
          path: /tmp/drpo-source.tar.gz
          retention-days: 1
