name: Temporary Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Apply locally validated code patch once
        env:
          PATCH_B64_GZ: 
        run: |
          if ! git log -1 --pretty=%B | grep -q '\[auto-sync-code\]'; then
            printf '%s' "${PATCH_B64_GZ}" | base64 -d | gzip -d > /tmp/pr45-code.patch
            git apply --check /tmp/pr45-code.patch
            git apply /tmp/pr45-code.patch
            git config user.name "DRPO PR Sync"
            git config user.email "drpo-pr-sync@users.noreply.github.com"
            git add docs/experiments/EXT-H-E7-PPO-STABILITY-01_EXECUTION.md \
              scripts/run_e7_ppo_stability_pilot_auto.py \
              scripts/run_e7_ppo_stability_pilot_auto_one_click.sh \
              src/drpo/e7_ppo_runtime_autotune.py \
              tests/test_e7_ppo_stability_execution_flow.py
            git commit -m "EXT-H-E7-PPO-STABILITY-01 finalize empirical autotune [auto-sync-code]"
            git push origin HEAD:${GITHUB_HEAD_REF}
          fi
      - name: Archive exact checkout and Git history
        run: |
          tar --exclude=.git --exclude=.runspec_state --exclude=outputs -czf /tmp/drpo-source.tar.gz .
          git bundle create /tmp/drpo-history.bundle --all
      - uses: actions/upload-artifact@v4
        with:
          name: temporary-drpo-source
          path: |
            /tmp/drpo-source.tar.gz
            /tmp/drpo-history.bundle
          retention-days: 1
