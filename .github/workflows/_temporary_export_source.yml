name: Temporary Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Archive exact checkout and Git history
        run: |
          tar --exclude=.git --exclude=.runspec_state --exclude=outputs -czf /tmp/drpo-source.tar.gz .
          git bundle create /tmp/drpo-history.bundle --all
      - uses: actions/upload-artifact@v4
        with:
          name: temporary-drpo-source
          path: |
            /tmp/drpo-source.tar.gz
            /tmp/drpo-history.bundle
          retention-days: 1
