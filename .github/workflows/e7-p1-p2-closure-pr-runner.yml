name: Temporary E7 P1 P2 closure PR runner

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: e7-p1-p2-closure-pr-runner
  cancel-in-progress: false

jobs:
  materialize:
    if: github.head_ref == 'dev/ext-h-e7-sqexp-gae-p1-p2-result-closure-01'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/ext-h-e7-sqexp-gae-p1-p2-result-closure-01
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install --quiet -e '.[dev]'
      - name: Extract bootstrap scripts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          path = Path('.github/workflows/e7-p1-p2-result-closure-bootstrap.yml')
          data = yaml.safe_load(path.read_text(encoding='utf-8'))
          steps = data['jobs']['materialize']['steps']
          by_name = {step.get('name'): step.get('run') for step in steps}
          Path('/tmp/e7-author.sh').write_text(by_name['Author source transaction'], encoding='utf-8')
          Path('/tmp/e7-normalize.sh').write_text(by_name['Trusted normalization and publication'], encoding='utf-8')
          PY
          sed -i 's/test "$(git rev-parse HEAD^)" = "$BASE"/test "$(git merge-base "$BASE" HEAD)" = "$BASE"/' /tmp/e7-author.sh
          bash -n /tmp/e7-author.sh
          bash -n /tmp/e7-normalize.sh
      - name: Author source transaction
        shell: bash
        run: |
          rm -f .github/workflows/e7-p1-p2-closure-pr-runner.yml
          bash /tmp/e7-author.sh
      - name: Trusted normalization and publication
        shell: bash
        run: bash /tmp/e7-normalize.sh
