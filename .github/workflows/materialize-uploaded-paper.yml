name: Materialize and compile uploaded DRPO manuscript

on:
  pull_request:
    branches: [main]
    paths:
      - 'paper/upload_payload/chunk_*.txt'
      - '.github/workflows/materialize-uploaded-paper.yml'

permissions:
  contents: write

jobs:
  materialize-compile-push:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Materialize uploaded source, repair dangling references, and add missing bibliography
        shell: bash
        run: |
          set -euo pipefail
          test "$(find paper/upload_payload -maxdepth 1 -name 'chunk_*.txt' | wc -l)" -eq 8
          cat paper/upload_payload/chunk_*.txt | base64 --decode | gzip -dc > paper/overleaf/main_replacement.tex
          echo '4925e5559e6a6293ad75a1de2cf6165e4bd0a4a17728457ae88b627ae49bdcc1  paper/overleaf/main_replacement.tex' | sha256sum -c -
          python - <<'PY'
          from pathlib import Path

          path = Path('paper/overleaf/main_replacement.tex')
          text = path.read_text()
          replacements = {
              'As shown in Figure~\\ref{fig:controlled_tapers}, exponential tapering':
                  'As shown in Figure~\\ref{fig:taper_control_and_transfer}, exponential tapering',
              'Table~\\ref{tab:external_tapers} shows that DRPO preserves the benefit of':
                  'The external summary in Figure~\\ref{fig:taper_control_and_transfer} shows that DRPO preserves the benefit of',
              '    \\label{eq:empirical_negative_update_utility}\n\\end{equation}\nThe corresponding utility-optimal weight is':
                  '    \\label{eq:app_empirical_negative_update_utility}\n\\end{equation}\nThe corresponding utility-optimal weight is',
              '\\subsection{Proof of\nProposition~\\ref{prop:exp_vanishing_influence}}':
                  '\\subsection{Proof of Proposition 5.3}',
              'Its reconstruction parameters and direct-softmax\ninitial conditions are reported separately in\nAppendix~\\ref{app:du1_e5_diagnostic}.':
                  'Its reconstruction parameters and direct-softmax initial conditions are\nmaintained in the corresponding registered experiment specification.',
              'Dataset versions, transition counts, and preprocessing statistics are\nreported in Table~\\ref{tab:hopper_dataset_details}.baselines.':
                  'The exact dataset versions, transition counts, and preprocessing statistics\nfollow the frozen experiment configuration.',
              'Exact generation ranges, split sizes, and corpus statistics are reported\nin Table~\\ref{tab:countdown_dataset_details}.':
                  'Exact generation ranges, split sizes, and corpus statistics follow the\nfrozen experiment configuration.',
              'Appendix~\\ref{app:countdown_protocol}.':
                  'Appendix~\\ref{app:countdown_methods}.',
              'optimizer settings, training budgets, seeds, and evaluation frequencies\nare reported separately in\nAppendix~\\ref{app:implementation_details}.':
                  'optimizer settings, training budgets, seeds, and evaluation frequencies\nare reported in the protocol-specific subsections below.',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one occurrence, found {count}: {old!r}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
          echo '2f2473b033cf99074fa7f4e6d3b7571dc6a884e07104a4227b2292a3e641f209  paper/overleaf/main_replacement.tex' | sha256sum -c -
          cat > paper/overleaf/missing_references.bib <<'BIB'
          % References cited by the uploaded full-manuscript source but absent from the
          % legacy ICML bibliography. Metadata verified against the primary arXiv records.

          @article{zhu2025negative,
            title={The Surprising Effectiveness of Negative Reinforcement in {LLM} Reasoning},
            author={Zhu, Xinyu and Xia, Mengzhou and Wei, Zhepei and Chen, Wei-Lin and Chen, Danqi and Meng, Yu},
            journal={arXiv preprint arXiv:2506.01347},
            year={2025}
          }

          @article{song2025good,
            title={Good Actions Succeed, Bad Actions Generalize: A Case Study on Why {RL} Generalizes Better},
            author={Song, Meng},
            journal={arXiv preprint arXiv:2503.15693},
            year={2025}
          }
          BIB

      - name: Install TeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk poppler-utils texlive-latex-base texlive-latex-extra \
            texlive-fonts-recommended texlive-science

      - name: Compile and validate PDF
        id: compile
        continue-on-error: true
        working-directory: paper/overleaf
        shell: bash
        run: |
          set -o pipefail
          latexmk -pdf -interaction=nonstopmode -halt-on-error main_replacement.tex 2>&1 | tee /tmp/latexmk-output.log
          test -s main_replacement.pdf
          pdfinfo main_replacement.pdf | tee /tmp/pdfinfo.txt
          pdftotext main_replacement.pdf /tmp/main_replacement.txt
          grep -q 'Breaking the Curse of Repulsion' /tmp/main_replacement.txt
          if grep -E 'Citation .* undefined|There were undefined references|There were undefined citations' main_replacement.log; then
            echo 'Unresolved citations or references remain' >&2
            exit 1
          fi
          if grep -E 'multiply defined|LaTeX Error|Emergency stop|Fatal error' main_replacement.log; then
            echo 'Duplicate labels or fatal LaTeX diagnostics remain' >&2
            exit 1
          fi

      - name: Collect build diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p paper/build_diagnostics
          cp /tmp/latexmk-output.log paper/build_diagnostics/ 2>/dev/null || true
          cp /tmp/pdfinfo.txt paper/build_diagnostics/ 2>/dev/null || true
          cp paper/overleaf/main_replacement.log paper/build_diagnostics/ 2>/dev/null || true
          cp paper/overleaf/main_replacement.blg paper/build_diagnostics/ 2>/dev/null || true

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DRPO_PAPER_BUILD_DIAGNOSTICS
          path: paper/build_diagnostics
          if-no-files-found: warn
          retention-days: 7

      - name: Stop after compile failure
        if: steps.compile.outcome != 'success'
        run: exit 1

      - name: Stage verified release and clean temporary bootstrap files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p paper/releases
          cp paper/overleaf/main_replacement.pdf paper/releases/DRPO_REWRITTEN_DRAFT_20260714.pdf
          rm -f paper/upload_payload/main_replacement.tex.gz.b64
          rm -f paper/upload_payload/chunk_*.txt
          rmdir paper/upload_payload 2>/dev/null || true
          rm -rf paper/build_diagnostics
          rm -f .github/workflows/materialize-uploaded-paper.yml

      - name: Upload verified PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: DRPO_REWRITTEN_DRAFT_20260714
          path: paper/releases/DRPO_REWRITTEN_DRAFT_20260714.pdf
          if-no-files-found: error
          retention-days: 14

      - name: Commit verified manuscript source, references, and PDF to PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Update full DRPO manuscript, references, and compiled PDF'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
