name: ReplayAB R2 merged-main terminal audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'exec/replayab-r2-postmerge-audit-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cfe43571cd8c6d0909c61d36c4f6e4d07c2d2362
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff pyyaml

      - name: Verify exact merged-main identity
        run: |
          test "$(git rev-parse HEAD)" = "cfe43571cd8c6d0909c61d36c4f6e4d07c2d2362"
          test ! -e .github/workflows/replayab-r2-postmerge-audit.yml

      - name: Capture repository-wide pytest evidence
        run: |
          set +e
          python -m pytest -q -vv --maxfail=1 --junitxml=/tmp/full.xml > /tmp/full.log 2>&1
          code=$?
          echo "$code" > /tmp/full.exit
          echo "pytest_exit_code=$code"
          tail -n 250 /tmp/full.log
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: replayab-r2-postmerge-pytest-diagnostic-${{ github.run_id }}
          path: |
            /tmp/full.log
            /tmp/full.xml
            /tmp/full.exit

      - name: Enforce pytest outcome
        if: always()
        run: |
          code="$(cat /tmp/full.exit)"
          test "$code" = "0"
