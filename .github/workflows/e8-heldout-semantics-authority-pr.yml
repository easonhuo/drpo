name: E8 held-out semantics authority bootstrap

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - .github/workflows/e8-heldout-semantics-authority.yml
      - .github/workflows/e8-heldout-semantics-authority-pr.yml

permissions:
  contents: write

concurrency:
  group: e8-heldout-semantics-authority
  cancel-in-progress: false

jobs:
  materialize:
    if: github.head_ref == 'dev/e8-asymre-deltav-scan'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-asymre-deltav-scan
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bootstrap parser
        run: python -m pip install --upgrade pyyaml

      - name: Execute the one-time authority transaction
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import subprocess
          from pathlib import Path

          import yaml

          log_path = Path('/tmp/e8-heldout-authority-bootstrap.log')
          workflow = yaml.safe_load(
              Path('.github/workflows/e8-heldout-semantics-authority.yml').read_text(
                  encoding='utf-8'
              )
          )
          steps = workflow['jobs']['materialize']['steps']
          environment = dict(os.environ)
          env_path = Path(environment['GITHUB_ENV'])
          seen_env_lines = len(env_path.read_text(encoding='utf-8').splitlines()) if env_path.exists() else 0

          with log_path.open('w', encoding='utf-8') as log:
              for step in steps:
                  command = step.get('run')
                  if command is None:
                      continue
                  command = command.replace(
                      'git -C "$TARGET" rm -f .github/workflows/e8-heldout-semantics-authority.yml',
                      'git -C "$TARGET" rm -f '
                      '.github/workflows/e8-heldout-semantics-authority.yml '
                      '.github/workflows/e8-heldout-semantics-authority-pr.yml',
                  )
                  if step.get('name') == 'Test final integration commit':
                      command = '''
          set -euo pipefail
          TARGET=/tmp/drpo-e8-heldout-target
          python -m compileall -q "$TARGET/scripts" "$TARGET/src" "$TARGET/tests"
          PYTHONPATH="$TARGET/src" python -m pytest -q \
            "$TARGET/tests/test_handoff_authority.py" \
            "$TARGET/tests/test_governance_pipeline_stage_status.py"
          ruff check \
            "$TARGET/src/drpo/countdown_e8_alpha1_c_scan_trainer.py" \
            "$TARGET/src/drpo/countdown_e8_alpha1_highc_scan_common.py" \
            "$TARGET/src/drpo/countdown_e8_alpha1_highc_scan_runtime.py" \
            "$TARGET/tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py" \
            "$TARGET/tests/test_runspec_results_delivery.py"
          '''
                  step_environment = dict(environment)
                  for key, value in (step.get('env') or {}).items():
                      step_environment[str(key)] = str(value)
                  banner = f"\n=== {step.get('name', 'unnamed run step')} ===\n"
                  print(banner, end='', flush=True)
                  log.write(banner)
                  result = subprocess.run(
                      ['bash', '-euo', 'pipefail', '-c', command],
                      check=False,
                      env=step_environment,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                  )
                  print(result.stdout, end='', flush=True)
                  log.write(result.stdout)
                  log.flush()
                  if result.returncode != 0:
                      raise SystemExit(
                          f"Step failed ({result.returncode}): {step.get('name', 'unnamed run step')}"
                      )
                  if env_path.exists():
                      lines = env_path.read_text(encoding='utf-8').splitlines()
                      for line in lines[seen_env_lines:]:
                          if '=' not in line:
                              continue
                          key, value = line.split('=', 1)
                          environment[key] = value
                      seen_env_lines = len(lines)
          PY

      - name: Upload bootstrap log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e8-heldout-authority-bootstrap-log
          path: /tmp/e8-heldout-authority-bootstrap.log
          if-no-files-found: error
          retention-days: 7
