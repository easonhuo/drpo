name: Register E7 Stage A Once

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  register:
    if: github.head_ref == 'automation/register-e7-stage-a'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install registration dependencies
        run: python -m pip install --disable-pip-version-check pyyaml
      - name: Materialize and push registration
        id: materialize
        continue-on-error: true
        run: |
          set -o pipefail
          python .github/scripts/register_e7_stage_a.py 2>&1 | tee registration.log
      - name: Upload registration log
        uses: actions/upload-artifact@v4
        with:
          name: e7-stage-a-registration-log
          path: registration.log
          if-no-files-found: error
      - name: Propagate registration failure
        if: steps.materialize.outcome != 'success'
        run: exit 1
