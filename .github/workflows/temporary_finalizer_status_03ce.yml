name: Temporary finalizer status 03ce

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_finalizer_status_03ce.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Query finalizer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=03ce063fdd8f8aa42913a753716f7307b29feddb&per_page=100' | jq -r '.workflow_runs[] | [.id,.name,.status,(.conclusion // "null")] | @tsv' > docs/experiments/E8_FINALIZER_03CE_STATUS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_finalizer_status_03ce.yml
          git add docs/experiments/E8_FINALIZER_03CE_STATUS.txt
          git commit -m 'Record finalizer status at 03ce'
          git push origin HEAD:diag/e8-upgrade-log-20260720
