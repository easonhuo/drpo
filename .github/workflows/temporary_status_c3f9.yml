name: Temporary status c3f9

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_status_c3f9.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Query finalizer status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=c3f9dececb1e05227a17cee9436ce712c3cd8dc3&per_page=100' | jq -r '.workflow_runs[] | [.id,.name,.status,(.conclusion // "null")] | @tsv' > docs/experiments/E8_STATUS_C3F9.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_status_c3f9.yml
          git add docs/experiments/E8_STATUS_C3F9.txt
          git commit -m 'Record E8 finalizer status at c3f9'
          git push origin HEAD:diag/e8-upgrade-log-20260720
