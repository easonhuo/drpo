name: Code Change Budget Evaluator

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: code-change-budget-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ github.token }}
      STATUS_CONTEXT: drpo/code-change-budget
    steps:
      - name: Check out trusted base implementation
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch untrusted head as Git objects only
        run: git fetch --no-tags origin "$HEAD_SHA"

      - name: Collect pull-request inputs
        run: |
          jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH" > "$RUNNER_TEMP/pr-body.txt"
          gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/status" \
            > "$RUNNER_TEMP/statuses.json"

      - name: Evaluate cumulative Python change budget
        id: evaluate
        run: |
          set +e
          python scripts/validate_code_change_budget.py \
            --repo-root . \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --pr-body-file "$RUNNER_TEMP/pr-body.txt" \
            --status-json "$RUNNER_TEMP/statuses.json" \
            --report "$RUNNER_TEMP/code-change-budget.json"
          validator_status=$?
          set -e

          if [[ ! -s "$RUNNER_TEMP/code-change-budget.json" ]]; then
            echo '{"decision":"ERROR","error":"validator produced no report"}' \
              > "$RUNNER_TEMP/code-change-budget.json"
            validator_status=4
          fi

          decision="$(jq -r '.decision // "ERROR"' "$RUNNER_TEMP/code-change-budget.json")"
          churn="$(jq -r '.python_diff.churn // "unknown"' "$RUNNER_TEMP/code-change-budget.json")"
          case "$decision" in
            PASS_AUTOMATIC)
              state=success
              description="PASS: ${churn} Python churn lines; no structural Python change"
              ;;
            PASS_HUMAN_APPROVED)
              state=success
              description="PASS: exact-head human approval is present"
              ;;
            NEEDS_HUMAN_APPROVAL)
              state=failure
              description="BLOCKED: human approval required for this exact head and rationale"
              ;;
            REJECT_JUSTIFICATION)
              state=failure
              description="BLOCKED: large-change justification is incomplete or inconsistent"
              ;;
            *)
              state=error
              description="ERROR: code-change budget evaluator failed closed"
              ;;
          esac

          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state="$state" \
            -f context="$STATUS_CONTEXT" \
            -f description="$description" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          {
            echo "### Code change budget"
            echo
            echo "Required merge status: \`$STATUS_CONTEXT\`"
            echo
            echo '```json'
            cat "$RUNNER_TEMP/code-change-budget.json"
            echo '```'
            if [[ "$decision" == "NEEDS_HUMAN_APPROVAL" ]]; then
              echo
              echo "Run **Approve Large Code Change** manually with this PR number and exact head SHA:"
              echo
              echo "\`$HEAD_SHA\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$validator_status" -eq 4 || "$decision" == "ERROR" ]]; then
            exit 1
          fi
