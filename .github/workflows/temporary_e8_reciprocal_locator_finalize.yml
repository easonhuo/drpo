name: Temporary E8 reciprocal locator finalize

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_locator_finalize.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BRANCH: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
      BASE_SHA: dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3
      EXPECTED_PARENT: e9a8559fcd1cf64cab057dea545e71cf670e9e01
      DELTA_PATH: docs/handoff_deltas/EXT-C-E8-RECIPROCAL-JOINT-PILOT-CLOSURE-2026-07-20/HANDOFF_DELTA.yaml
      WORKFLOW_PATH: .github/workflows/temporary_e8_reciprocal_locator_finalize.yml
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Check finalize boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "$EXPECTED_PARENT"
          test "$(git diff-tree --no-commit-id --name-only -r HEAD)" = "$WORKFLOW_PATH"
          test "$(git merge-base "$BASE_SHA" HEAD)" = "$BASE_SHA"
          git diff --check "$BASE_SHA"...HEAD

      - name: Add immutable evidence locators and refresh delta intent
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          import yaml

          registry_path = Path('experiments/registry.yaml')
          delta_path = Path('docs/handoff_deltas/EXT-C-E8-RECIPROCAL-JOINT-PILOT-CLOSURE-2026-07-20/HANDOFF_DELTA.yaml')
          text = registry_path.read_text(encoding='utf-8')

          records = [
              {
                  'experiment_id': 'EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-RECIPROCAL-SHAPE-SCREEN-0.5B-01',
                  'run_id': 'E8_PAPER_ALIGNED_RECIPROCAL_SHAPE_SCREEN_20260719_01',
                  'source_commit': 'f99a9b1efdcc17d7e2bc5f5b08d110fd9d29d63f',
                  'results_commit': '8d04768273315ff6ab1bcbade9cbf5705952259a',
                  'manifest_sha256': '0242b70cf71fe0531bca0d26201c0b29bfc6537f964a52a06da978fbe5dda286',
              },
              {
                  'experiment_id': 'EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-RECIPROCAL-HIGH-LAMBDA-EXTENSION-0.5B-01',
                  'run_id': 'E8_PAPER_ALIGNED_RECIPROCAL_HIGH_LAMBDA_EXTENSION_20260719_01',
                  'source_commit': '356d878d26be1ad1b8bcf70d0908c9960e09f19f',
                  'results_commit': 'eca0eb0365f5660e0a49dff5d39c9bb5f5df0cdf',
                  'manifest_sha256': 'dc1feef96bf0bcc5cc0fe35f4eb5d3e506ec79cf50d782ac2622bdef1503b888',
              },
              {
                  'experiment_id': 'EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-RECIPROCAL-QUADRATIC-DENSE-LAMBDA-CURVE-0.5B-01',
                  'run_id': 'E8_PAPER_ALIGNED_RECIPROCAL_QUADRATIC_DENSE_LAMBDA_CURVE_20260719_01',
                  'source_commit': '7cc6d2daf787998283f733f4152114dced017316',
                  'results_commit': '69a81c6db3bdd90ed640d54eb5687870d2dba220',
                  'manifest_sha256': 'acbf0fd8aa9f29d56b4c05841c7e0dd174568d4f9a15e229475df7db9a642c3b',
              },
          ]

          for item in records:
              exp_marker = f"- id: {item['experiment_id']}\n"
              start = text.find(exp_marker)
              if start < 0:
                  raise SystemExit(f"missing registry entity {item['experiment_id']}")
              end = text.find('\n- id: ', start + len(exp_marker))
              if end < 0:
                  end = text.find('\ndevelopment_experiment_registrations:\n', start)
              if end < 0:
                  raise SystemExit(f"cannot locate end of {item['experiment_id']}")
              entity = text[start:end]
              if '  evidence_locator:\n' in entity:
                  raise SystemExit(f"evidence_locator already exists for {item['experiment_id']}")
              insertion_point = entity.find('  claim:')
              if insertion_point < 0:
                  raise SystemExit(f"claim field not found for {item['experiment_id']}")
              block = (
                  '  evidence_locator:\n'
                  '    schema_version: 1\n'
                  f"    primary_run_id: {item['run_id']}\n"
                  '    records:\n'
                  f"    - run_id: {item['run_id']}\n"
                  '      lane: e8\n'
                  f"      source_commit: {item['source_commit']}\n"
                  '      results_repository: easonhuo/drpo-results\n'
                  '      results_branch: ingest/e8\n'
                  f"      results_commit: {item['results_commit']}\n"
                  f"      result_path: runs/e8/{item['run_id']}\n"
                  f"      manifest_sha256: {item['manifest_sha256']}\n"
                  '      export_profile: manifest_text_v1\n'
              )
              entity = entity[:insertion_point] + block + entity[insertion_point:]
              text = text[:start] + entity + text[end:]

          parsed = yaml.safe_load(text)
          by_id = {entry['id']: entry for entry in parsed['experiments']}
          for item in records:
              locator = by_id[item['experiment_id']].get('evidence_locator')
              if not isinstance(locator, dict) or locator.get('primary_run_id') != item['run_id']:
                  raise SystemExit(f"locator verification failed for {item['experiment_id']}")
          registry_path.write_text(text, encoding='utf-8')

          delta = yaml.safe_load(delta_path.read_text(encoding='utf-8'))
          delta['registry']['exact_base_after_sha256'] = hashlib.sha256(text.encode('utf-8')).hexdigest()
          delta_path.write_text(
              yaml.safe_dump(delta, sort_keys=False, allow_unicode=True, width=120),
              encoding='utf-8',
          )
          PY

          python scripts/validate_evidence_locator.py \
            --repo-root . \
            --base "$BASE_SHA" \
            --head HEAD \
            --json || true
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm "$WORKFLOW_PATH"
          git add experiments/registry.yaml "$DELTA_PATH"
          git commit -m "Add E8 reciprocal evidence locators"

      - name: Trusted normalize and materialize refreshed closure
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_PATCH_COMMIT="$(git rev-parse HEAD)"
          git worktree add --detach /tmp/drpo-trusted-main "$BASE_SHA"
          python /tmp/drpo-trusted-main/scripts/handoff_authority.py validate-delta \
            --repo-root . \
            --delta "$DELTA_PATH" \
            --source-patch-commit "$SOURCE_PATCH_COMMIT" \
            --json
          python /tmp/drpo-trusted-main/scripts/handoff_authority.py normalize \
            --repo-root . \
            --trusted-repo-root /tmp/drpo-trusted-main \
            --current-before "$BASE_SHA" \
            --source-base "$BASE_SHA" \
            --source-patch-commit "$SOURCE_PATCH_COMMIT" \
            --json
          git add docs/handoff.md experiments/registry.yaml docs/handoff_deltas docs/handoff_shadow/stage4/minimal/generated docs/experiments
          git commit --amend --no-edit

      - name: Run exact final-tree gates
        shell: bash
        run: |
          set -euo pipefail
          FINAL_SHA="$(git rev-parse HEAD)"
          python scripts/validate_evidence_locator.py \
            --repo-root . \
            --base "$BASE_SHA" \
            --head "$FINAL_SHA" \
            --json
          python scripts/select_update_tests.py \
            --base "$BASE_SHA" \
            --head "$FINAL_SHA" \
            --mode auto \
            --json
          python -m compileall -q src scripts tools tests
          bash -n tools/drpo-update/drpo-update tools/drpo-update/install.sh
          python scripts/handoff_authority.py verify --repo-root .
          python scripts/validate_formal_execution_channel.py --repo-root .
          python scripts/validate_governance_rule_inventory.py --repo-root .
          python scripts/validate_governance_pipeline_stage_status.py --repo-root .
          python -m pytest -q
          ruff check .
          git diff --check "$BASE_SHA"...HEAD
          test -z "$(git status --porcelain)"
          test ! -e "$WORKFLOW_PATH"

      - name: Push final closure commit and record success
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FINAL_SHA="$(git rev-parse HEAD)"
          git push origin HEAD:"$BRANCH"
          body="E8 reciprocal closure finalization passed on \`$FINAL_SHA\`: all three immutable evidence locators, trusted-main normalization, Evidence Locator Gate, tiered-plan validation, compile, shell syntax, handoff authority, formal execution channel, governance inventory/stage, full pytest, and Ruff. Temporary workflow removed from the final tree."
          gh api "repos/$GITHUB_REPOSITORY/issues/174/comments" -f body="$body" >/dev/null
