name: Temporary Hopper replay snapshot audit patch

on:
  push:
    branches:
      - dev/ext-h-e7-hopper-replay-stab-hps-01
    paths:
      - '.github/workflows/tmp-patch-e7-hr-stab-runner.yml'

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Add exact snapshot-batch audit
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum scripts/run_e7_hopper_replay_stability_hps.sh | awk '{print $1}')" = "81bb8e2265e89e77bbf1d234bd24a694a6b93cf53a67a5fa8350ff21e8c3f31a"
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/run_e7_hopper_replay_stability_hps.sh')
          source = path.read_text(encoding='utf-8')
          old = '''        if int(optimizer.get("batch_size", -1)) != batch_size:\n            raise RuntimeError(f"batch audit failed for {branch_dir.name}")\n        row.update(\n'''
          new = '''        if int(optimizer.get("batch_size", -1)) != batch_size:\n            raise RuntimeError(f"batch audit failed for {branch_dir.name}")\n        if int(row["snapshot_refresh_interval"]) != batch_size:\n            raise RuntimeError(\n                f"trajectory-snapshot refresh interval mismatch for {branch_dir.name}"\n            )\n        if int(manifest.get("trajectory_snapshot_batch_size", -1)) != batch_size:\n            raise RuntimeError(\n                f"trajectory-snapshot batch provenance mismatch for {branch_dir.name}"\n            )\n        row.update(\n'''
          if source.count(old) != 1:
              raise SystemExit('expected exactly one snapshot audit insertion point')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
          test "$(sha256sum scripts/run_e7_hopper_replay_stability_hps.sh | awk '{print $1}')" = "6214f2de8d8cea56acc1cf4266eb687bc7913a456ccecd4cd254f6aa8a174343"
          test "$(git hash-object scripts/run_e7_hopper_replay_stability_hps.sh)" = "a046c18c082786b4f5c0e23b6b27770d04f3fef6"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/run_e7_hopper_replay_stability_hps.sh
          git commit -m "Audit Hopper replay trajectory snapshot batch"
      - name: Validate committed audited runner
        run: bash scripts/test_e7_hopper_replay_stability_hps.sh
      - name: Push audited runner
        run: git push origin HEAD:dev/ext-h-e7-hopper-replay-stab-hps-01
