name: TEMP fix Figure 1 visuals and canonical layout

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  fix-and-build:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'dev/paper-kdd2027-fig1-d4rl9-01'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install plotting and PDF audit dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y poppler-utils
          python -m pip install --disable-pip-version-check -q numpy pandas matplotlib ruff

      - name: Apply the approved visual correction only
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          plot_path = Path('scripts/figures/plot_figure1_external_gradient.py')
          text = plot_path.read_text(encoding='utf-8')
          replacements = [
              ('figsize=(7.25, 2.85),', 'figsize=(7.25, 2.95),'),
              (
                  'alpha=0.18,\n        linewidth=0,\n    )\n    axis.plot(',
                  'alpha=0.20,\n        linewidth=0,\n'
                  '        label="95% hierarchical bootstrap CI",\n    )\n    axis.plot(',
              ),
              (
                  'label="Gradient norm",\n    )\n'
                  '    axis.axhline(1.0, linestyle=":", linewidth=1.0)',
                  'label="D4RL-9 equal-weight mean",\n    )\n'
                  '    axis.axhline(1.0, linestyle="--", linewidth=1.0)',
              ),
              (
                  '+ rf"pair-matched $|A|$ far/near = {advantage_ratio:.3f}"',
                  '+ rf"original-pair $|A|$ far/near = {advantage_ratio:.3f}"',
              ),
              (
                  'axis.set_title("(a) D4RL locomotion aggregate", fontsize=11.1, pad=3)',
                  'axis.set_title("(a) D4RL Locomotion Aggregate", fontsize=11.1, pad=3)',
              ),
              (
                  'axis.set_ylabel("Relative magnitude", fontsize=9.7)',
                  'axis.set_ylabel("Relative gradient diagnostic", fontsize=9.4)',
              ),
              (
                  'axis.grid(axis="y", linestyle="--", linewidth=0.45, alpha=0.33)',
                  'axis.grid(True, linestyle="--", linewidth=0.45, alpha=0.33)',
              ),
              (
                  'axis.legend(fontsize=7.9, frameon=True, loc="lower right")',
                  'axis.legend(fontsize=7.4, frameon=False, loc="lower right")',
              ),
              (
                  'figure, axes = plt.subplots(3, 3, figsize=(10.5, 8.0))',
                  'figure, axes = plt.subplots(3, 3, figsize=(11.25, 8.35))',
              ),
              ('label=r"Relative $|A|$",', 'label=r"Original-pair relative $|A|$",'),
              ('axis.set_title(titles[dataset], fontsize=9.2, pad=3)',
               'axis.set_title(titles[dataset], fontsize=10.2, pad=5)'),
              ('axis.grid(axis="y", linestyle="--", linewidth=0.4, alpha=0.3)',
               'axis.grid(True, linestyle="--", linewidth=0.50, alpha=0.28)'),
              ('axis.tick_params(labelsize=7.2)', 'axis.tick_params(labelsize=8.0)'),
              ('rect=(0, 0, 1, 0.975), h_pad=1.0, w_pad=0.8',
               'rect=(0, 0, 1, 0.965), h_pad=1.05, w_pad=0.95'),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'plot replacement expected once, found {count}: {old[:80]}')
              text = text.replace(old, new, 1)

          marker = 'def plot_appendix(panels: pd.DataFrame, out: Path) -> None:'
          head, appendix = text.split(marker, 1)
          appendix_replacements = [
              ('alpha=0.18,', 'alpha=0.20,'),
              ('linewidth=1.75,', 'linewidth=2.15,'),
              ('markersize=3.4,', 'markersize=4.2,'),
              ('alpha=0.10,', 'alpha=0.11,'),
              ('linewidth=1.2,', 'linewidth=1.45,'),
              ('markersize=2.9,', 'markersize=3.5,'),
              ('fontsize=8.0)', 'fontsize=8.8)'),
              ('fontsize=8.0,\n        bbox_to_anchor', 'fontsize=9.0,\n        bbox_to_anchor'),
          ]
          for old, new in appendix_replacements:
              count = appendix.count(old)
              if count < 1:
                  raise SystemExit(f'appendix replacement not found: {old}')
              appendix = appendix.replace(old, new)
          plot_path.write_text(head + marker + appendix, encoding='utf-8')

          tex_paths = [
              Path('paper/kdd2027/main.tex'),
              Path('paper/kdd2027/source_locked.tex'),
              Path('paper/overleaf/main_replacement.tex'),
          ]
          caption_old = (
              'values are normalized to the near-field reference within seed and\n'
              '        dataset.'
          )
          caption_new = (
              'each far transition is normalized by its original matched near partner\n'
              '        within seed and dataset.'
          )
          appendix_old = (
              'distance. Values are normalized to the near-field reference within seed;\n'
              '    lines show 10-seed means'
          )
          appendix_new = (
              'distance. Each far transition is normalized by its original matched near\n'
              '    partner within seed; lines show 10-seed means'
          )
          for path in tex_paths:
              source = path.read_text(encoding='utf-8')
              for old, new in [(caption_old, caption_new), (appendix_old, appendix_new)]:
                  count = source.count(old)
                  if count != 1:
                      raise SystemExit(f'{path}: expected one caption match, found {count}')
                  source = source.replace(old, new, 1)
              path.write_text(source, encoding='utf-8')
          PY

      - name: Regenerate the main and appendix figures
        shell: bash
        run: |
          set -euo pipefail
          python scripts/figures/plot_figure1_external_gradient.py \
            --d4rl-main results/FIGURE1_EXTERNAL_GRADIENT_D4RL9/main_aggregate.csv \
            --d4rl-panels results/FIGURE1_EXTERNAL_GRADIENT_D4RL9/dataset_plot_data.csv \
            --d4rl-manifest results/FIGURE1_EXTERNAL_GRADIENT_D4RL9/MANIFEST.json \
            --countdown paper/kdd2027/figures/figure1_external_gradient_d4rl9_countdown_deciles.csv \
            --out paper/kdd2027/figures/figure1_external_gradient_d4rl9 \
            --appendix-out paper/kdd2027/figures/fig_app_d4rl9_gradient_panels
          cp paper/kdd2027/figures/figure1_external_gradient_d4rl9.pdf \
            paper/overleaf/figures/figure1_external_gradient_d4rl9.pdf
          cp paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.pdf \
            paper/overleaf/figures/fig_app_d4rl9_gradient_panels.pdf
          python -m py_compile scripts/figures/plot_figure1_external_gradient.py
          python -m ruff check --line-length 100 scripts/figures/plot_figure1_external_gradient.py

      - name: Compile with the canonical TeX Live 2025 toolchain
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: 2025
          os: debian
          run: |
            cd paper/kdd2027
            pdflatex --version | tee TEXLIVE_ENVIRONMENT.txt
            latexmk -C main.tex >/dev/null 2>&1 || true
            latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex
            test -s main.pdf
            grep -Fq 'TeX Live 2025' TEXLIVE_ENVIRONMENT.txt

      - name: Compare title-page wrapping with the canonical Stage-A release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/layout-audit /tmp/preview-renders
          pdftotext -bbox-layout -f 1 -l 1 \
            paper/releases/DRPO_KDD2027_STAGE_A.pdf /tmp/layout-audit/original.xml
          pdftotext -bbox-layout -f 1 -l 1 \
            paper/kdd2027/main.pdf /tmp/layout-audit/revised.xml
          python - <<'PY' | tee /tmp/layout-audit/ABSTRACT_LAYOUT_AUDIT.txt
          from pathlib import Path
          import xml.etree.ElementTree as ET

          def lines(path):
              root = ET.parse(path).getroot()
              rows = []
              for node in root.iter():
                  if not node.tag.endswith('line'):
                      continue
                  words = [
                      ''.join(word.itertext()).strip()
                      for word in node
                      if word.tag.endswith('word')
                  ]
                  text = ' '.join(word for word in words if word)
                  if not text:
                      continue
                  rows.append({
                      'text': text,
                      'x': float(node.attrib['xMin']),
                      'y': float(node.attrib['yMin']),
                  })
              return rows

          def abstract_count(path):
              rows = lines(path)
              heading = min(row['y'] for row in rows if row['text'] == 'Abstract')
              keywords = min(row['y'] for row in rows if row['text'] == 'Keywords')
              body = [
                  row for row in rows
                  if row['x'] < 310 and heading < row['y'] < keywords
              ]
              return len(body), [row['text'] for row in sorted(body, key=lambda row: row['y'])]

          original_count, original_lines = abstract_count('/tmp/layout-audit/original.xml')
          revised_count, revised_lines = abstract_count('/tmp/layout-audit/revised.xml')
          print(f'original_abstract_lines={original_count}')
          print(f'revised_abstract_lines={revised_count}')
          print(f'line_count_match={original_count == revised_count}')
          if original_count != revised_count:
              print('ORIGINAL:')
              print('\n'.join(original_lines))
              print('REVISED:')
              print('\n'.join(revised_lines))
              raise SystemExit('abstract wrapping differs from canonical release')
          PY
          pdfinfo paper/releases/DRPO_KDD2027_STAGE_A.pdf > /tmp/layout-audit/original_pdfinfo.txt
          pdfinfo paper/kdd2027/main.pdf > /tmp/layout-audit/revised_pdfinfo.txt
          pdffonts paper/releases/DRPO_KDD2027_STAGE_A.pdf > /tmp/layout-audit/original_pdffonts.txt
          pdffonts paper/kdd2027/main.pdf > /tmp/layout-audit/revised_pdffonts.txt
          pdftoppm -png -r 150 -f 1 -l 1 paper/kdd2027/main.pdf \
            /tmp/preview-renders/revised-page >/dev/null 2>&1
          pdftoppm -png -r 150 -f 1 -l 1 paper/releases/DRPO_KDD2027_STAGE_A.pdf \
            /tmp/preview-renders/original-page >/dev/null 2>&1
          python /home/runner/work/_temp/does-not-exist.py 2>/dev/null || true

      - name: Render every page and package the corrected preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/corrected-preview/renders
          pdftoppm -png -r 130 paper/kdd2027/main.pdf \
            /tmp/corrected-preview/renders/page >/dev/null 2>&1
          cp paper/kdd2027/main.pdf /tmp/corrected-preview/DRPO_KDD2027_Figure1_D4RL9_TL2025_preview.pdf
          cp paper/kdd2027/main.tex /tmp/corrected-preview/main.tex
          cp paper/kdd2027/figures/figure1_external_gradient_d4rl9.png \
            /tmp/corrected-preview/figure1_external_gradient_d4rl9.png
          cp paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.png \
            /tmp/corrected-preview/fig_app_d4rl9_gradient_panels.png
          cp /tmp/layout-audit/* /tmp/corrected-preview/

      - name: Commit only the corrected source and figure assets
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f .github/workflows/temp-fix-fig1-layout-tl2025.yml
          git add \
            paper/kdd2027/main.tex \
            paper/kdd2027/source_locked.tex \
            paper/overleaf/main_replacement.tex \
            scripts/figures/plot_figure1_external_gradient.py \
            paper/kdd2027/figures/figure1_external_gradient_d4rl9.pdf \
            paper/kdd2027/figures/figure1_external_gradient_d4rl9.png \
            paper/kdd2027/figures/figure1_external_gradient_d4rl9.svg \
            paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.pdf \
            paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.png \
            paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.svg \
            paper/overleaf/figures/figure1_external_gradient_d4rl9.pdf \
            paper/overleaf/figures/fig_app_d4rl9_gradient_panels.pdf
          git add -u .github/workflows/temp-fix-fig1-layout-tl2025.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'PAPER-FIG1-D4RL9: fix visuals and canonical TL2025 layout'
          git push origin "HEAD:${HEAD_BRANCH}"

      - uses: actions/upload-artifact@v4
        with:
          name: drpo-fig1-d4rl9-corrected-tl2025-preview
          path: /tmp/corrected-preview
          if-no-files-found: error
          retention-days: 14
