name: Temporary E8 status probe 2

on:
  push:
    branches:
      - diag/e8-reciprocal-finalizer-48a3e49
    paths:
      - .github/workflows/temporary_e8_status_probe_2.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-reciprocal-finalizer-48a3e49
      - name: Query target runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          {
            for sha in 47934ece325ab02a6cca835b8720521f4f158686 f0d173a2c26cbb8e89e64aee502150be49a6a890 ebe9fa70b26725ad1a8bc0e372714ca31c3a1a95; do
              echo "## $sha"
              gh api "repos/easonhuo/drpo/actions/runs?head_sha=$sha&per_page=100" | jq -r '.workflow_runs[] | [.id,.name,.status,(.conclusion // "null")] | @tsv'
            done
          } > docs/experiments/TEMP_E8_STATUS_PROBE_2.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_e8_status_probe_2.yml
          git add docs/experiments/TEMP_E8_STATUS_PROBE_2.txt
          git commit -m 'Record E8 workflow status probe'
          git push origin HEAD:diag/e8-reciprocal-finalizer-48a3e49
