name: Temporary probe c967 repair

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_probe_c967_repair.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Query temp-isolation repair status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=c9677a5525eb5e6ddb64f18ff34d0e7ae84bb5c2&per_page=100' | jq -r '.workflow_runs[] | [.id,.name,.status,(.conclusion // "null")] | @tsv' > docs/experiments/E8_C967_REPAIR_STATUS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_probe_c967_repair.yml
          git add docs/experiments/E8_C967_REPAIR_STATUS.txt
          git commit -m 'Record c967 temp-isolation repair status'
          git push origin HEAD:diag/e8-upgrade-log-20260720
