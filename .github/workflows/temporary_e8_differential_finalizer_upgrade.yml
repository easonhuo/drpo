name: Temporary E8 differential finalizer upgrade

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_differential_finalizer_upgrade.yml

permissions:
  contents: write

jobs:
  upgrade:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
      - name: Upgrade finalizer acceptance
        run: python tools/temporary_upgrade_e8_finalizer.py
      - name: Commit upgraded finalizer
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_e8_differential_finalizer_upgrade.yml
          git rm tools/temporary_upgrade_e8_finalizer.py
          git add .github/workflows/temporary_e8_reciprocal_current_main_finalize.yml
          git diff --check --cached
          git commit -m 'Gate reciprocal closure against exact main baseline'
          git push origin HEAD:dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
