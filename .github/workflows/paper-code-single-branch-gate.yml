name: PAPER-CODE-REFERENCE-01 Single Branch and Scope Gate

on:
  push: {}
  pull_request:
    branches:
      - dev/paper-code-reference-01

permissions:
  contents: write

concurrency:
  group: paper-code-reference-01-boundary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reject-derivative-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reject stacked or derivative pull requests
        env:
          CANONICAL_BRANCH: dev/paper-code-reference-01
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          echo "PAPER-CODE-REFERENCE-01 accepts no staging, stacked, temporary, repair, or replacement branches."
          echo "All changes must be committed directly to ${CANONICAL_BRANCH}."
          echo "Observed PR head: ${HEAD_BRANCH}"
          exit 1

  enforce-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      CANONICAL_BRANCH: dev/paper-code-reference-01
      LOCK_COMMIT: fd1eb6303a380cbedafde183115bb5b577630baa
      CURRENT_BRANCH: ${{ github.ref_name }}
      EVENT_BEFORE: ${{ github.event.before }}
      EVENT_AFTER: ${{ github.sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce single-branch and task-scope invariants
        run: |
          set -euo pipefail

          delete_branch() {
            local branch="$1"
            [ "${branch}" != "${CANONICAL_BRANCH}" ] || {
              echo "Refusing to delete canonical branch ${CANONICAL_BRANCH}" >&2
              exit 1
            }
            echo "Deleting forbidden PAPER-CODE-REFERENCE-01 derivative branch ${branch}"
            gh api --method DELETE \
              "/repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}"
          }

          validate_task_lock() {
            local contract="docs/paper_code_reference/TASK_EXECUTION_LOCK.yaml"
            local router="docs/paper_code_reference/AGENTS.md"

            test -s "${contract}"
            test -s "${router}"

            required_lines=(
              "claim: PAPER-CODE-REFERENCE-01"
              "canonical_branch: dev/paper-code-reference-01"
              "authorized_next_action: validate_existing_migration"
              "  migration: closed"
              "  active_phase: correctness_acceptance"
              "  remaining_gap_is_current_work: false"
              "  feature_development: false"
              "  resume_development: false"
              "  experiment_launch: false"
              "  real_stack_liveness: false"
              "  main_merge_or_rebase: false"
              "  branch_creation: false"
              "  replacement_pr: false"
              "  handoff_or_registry_write: false"
              "  documents_created_or_modified_in_current_session_may_expand_scope: false"
              "  backlog_or_remaining_gap_counts_as_authorization: false"
            )

            for line in "${required_lines[@]}"; do
              grep -Fxq "${line}" "${contract}" || {
                echo "Task execution lock is missing required invariant: ${line}" >&2
                exit 1
              }
            done
          }

          validate_canonical_push() {
            local before="${EVENT_BEFORE}"
            local after="${EVENT_AFTER}"
            local zero_sha="0000000000000000000000000000000000000000"

            validate_task_lock

            if [ "${before}" = "${zero_sha}" ]; then
              echo "Canonical branch creation is not permitted by this gate." >&2
              exit 1
            fi

            git cat-file -e "${before}^{commit}" 2>/dev/null || {
              echo "Could not resolve pre-push commit ${before}; refusing an unauditable update." >&2
              exit 1
            }
            git cat-file -e "${after}^{commit}" 2>/dev/null || {
              echo "Could not resolve post-push commit ${after}." >&2
              exit 1
            }

            if ! git merge-base --is-ancestor "${before}" "${after}"; then
              echo "Non-fast-forward update detected on ${CANONICAL_BRANCH}." >&2
              echo "Force updates require separate explicit user authorization and a gate change." >&2
              exit 1
            fi

            merge_commits="$(git rev-list --min-parents=2 "${before}..${after}")"
            if [ -n "${merge_commits}" ]; then
              echo "New merge commits are forbidden on ${CANONICAL_BRANCH}:" >&2
              echo "${merge_commits}" >&2
              exit 1
            fi

            mapfile -t changed_paths < <(git diff --name-only "${before}" "${after}")
            for path in "${changed_paths[@]}"; do
              case "${path}" in
                paper_code/*)
                  ;;
                docs/paper_code_reference/*)
                  ;;
                .github/workflows/paper-code-validation.yml)
                  ;;
                .github/workflows/paper-code-single-branch-gate.yml)
                  ;;
                *)
                  echo "Path outside PAPER-CODE-REFERENCE-01 write boundary: ${path}" >&2
                  exit 1
                  ;;
              esac
            done

            echo "Canonical push satisfies the task lock, no-merge rule, and path allowlist."
          }

          if [ "${CURRENT_BRANCH}" = "${CANONICAL_BRANCH}" ]; then
            validate_canonical_push

            mapfile -t branches < <(
              gh api --paginate "/repos/${GITHUB_REPOSITORY}/branches?per_page=100" \
                --jq '.[].name' \
                | grep -E '^dev/paper-code-reference-01(-|/)' \
                || true
            )

            if [ "${#branches[@]}" -eq 0 ]; then
              echo "No forbidden PAPER-CODE-REFERENCE-01 namespace branches found."
              exit 0
            fi

            printf '%s\n' "${branches[@]}" | sort -u | while IFS= read -r branch; do
              [ -n "${branch}" ] || continue
              delete_branch "${branch}"
            done
            exit 0
          fi

          if [ "${CURRENT_BRANCH}" = "main" ]; then
            echo "Default branch is outside this task-local gate."
            exit 0
          fi

          case "${CURRENT_BRANCH}" in
            dev/paper-code-reference-01-*|dev/paper-code-reference-01/*)
              delete_branch "${CURRENT_BRANCH}"
              exit 0
              ;;
          esac

          git fetch --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/heads/${CANONICAL_BRANCH}:refs/remotes/origin/${CANONICAL_BRANCH}"

          if git merge-base --is-ancestor "${LOCK_COMMIT}" origin/main; then
            echo "Lock commit is already in main; hidden-derivative ancestry deletion is inactive."
            exit 0
          fi

          if git merge-base --is-ancestor "${LOCK_COMMIT}" HEAD; then
            delete_branch "${CURRENT_BRANCH}"
            exit 0
          fi

          echo "Branch ${CURRENT_BRANCH} is unrelated to PAPER-CODE-REFERENCE-01; no action."
