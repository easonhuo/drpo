name: Assemble Countdown closure

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  assemble:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: dev/paper-code-reference-01
      - name: Assemble and verify archive
        shell: bash
        run: |
          set -euo pipefail
          cat .github/countdown_closure_chunks/part* > /tmp/countdown-closure.b64
          test "$(wc -c < /tmp/countdown-closure.b64)" -eq 34052
          base64 --decode /tmp/countdown-closure.b64 > /tmp/countdown-closure.tar.gz
          echo '40cc4613af60b993bd9da60aabaf1483a0ca60fe0ccb06072e4253e8e9ef0b7d  /tmp/countdown-closure.tar.gz' | sha256sum -c -
          mkdir -p /tmp/countdown-closure
          tar -xzf /tmp/countdown-closure.tar.gz -C /tmp/countdown-closure
          echo '72d334b944b9638cc07f7ff4a13df3dfad71568c1007024f7ecd37bdba0eeb21  /tmp/countdown-closure/countdown.py' | sha256sum -c -
          echo '222e9c23abe17ec5be8b7c30e004a68449a6c133e476f7de78adab70c8b22647  /tmp/countdown-closure/test_common.py' | sha256sum -c -
      - name: Install exact target files
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/countdown-closure/countdown.py paper_code/src/drpo_reference/experiments/countdown.py
          cp /tmp/countdown-closure/test_common.py paper_code/tests/test_common.py
          echo '72d334b944b9638cc07f7ff4a13df3dfad71568c1007024f7ecd37bdba0eeb21  paper_code/src/drpo_reference/experiments/countdown.py' | sha256sum -c -
          echo '222e9c23abe17ec5be8b7c30e004a68449a6c133e476f7de78adab70c8b22647  paper_code/tests/test_common.py' | sha256sum -c -
      - name: Commit closure and remove transport files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -r .github/countdown_closure_chunks
          git rm .github/countdown_closure_payload.b64
          git rm .github/workflows/apply_countdown_closure.yml
          git rm .github/workflows/trigger_countdown_closure.yml
          git rm .github/workflows/diagnose_apply_countdown_closure.yml
          git rm .github/workflows/install_countdown_closure.yml
          git rm .github/workflows/assemble_countdown_closure.yml
          git add paper_code/src/drpo_reference/experiments/countdown.py paper_code/tests/test_common.py
          git commit -m 'PAPER-CODE-REFERENCE-01 bind Countdown v79 result coordinate'
      - name: Push closure commit
        run: git push origin HEAD:dev/paper-code-reference-01
