name: Patch ReplayAB R2 materializer

on:
  pull_request:
    branches:
      - exec/replayab-r2-materialize-01

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'exec/replayab-r2-materializer-fix-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: exec/replayab-r2-materialize-01
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove destructive global indentation rewrite
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/replayab-r2-materialize.yml')
          text = path.read_text(encoding='utf-8')
          old = '          test_text = test_text.replace("          ", "")\n'
          new = '          test_text = test_text\n'
          if old not in text:
              raise SystemExit('materializer indentation rewrite not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check

      - name: Commit corrected materializer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/replayab-r2-materialize.yml
          git commit -m "Fix ReplayAB R2 materializer indentation"
          git push origin HEAD:exec/replayab-r2-materialize-01
