name: Temporary probe edbf finalizer

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_probe_edbf_finalizer.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Query edbf finalizer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=edbf7486a1876743cd4c5b278591343723d99881&per_page=100' | jq -r '.workflow_runs[] | [.id,.name,.status,(.conclusion // "null")] | @tsv' > docs/experiments/E8_EDBF_FINALIZER_STATUS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_probe_edbf_finalizer.yml
          git add docs/experiments/E8_EDBF_FINALIZER_STATUS.txt
          git commit -m 'Record edbf reciprocal finalizer status'
          git push origin HEAD:diag/e8-upgrade-log-20260720
