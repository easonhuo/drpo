name: PR Gate Observer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-gate-observer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  observe:
    name: Observe selected gates
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install repository dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run observe-only gate collector
        id: observer
        run: |
          output_dir="outputs/pr_gate_observer/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "output_dir=${output_dir}" >> "${GITHUB_OUTPUT}"
          python scripts/run_pr_gate_observer.py \
            --repo . \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --output-dir "${output_dir}"

      - name: Publish observer summary
        if: always()
        run: |
          output_dir="${{ steps.observer.outputs.output_dir }}"
          if [[ -n "${output_dir}" && -f "${output_dir}/gate_summary.md" ]]; then
            cat "${output_dir}/gate_summary.md" >> "${GITHUB_STEP_SUMMARY}"
          else
            {
              echo "# PR Gate Observer"
              echo
              echo "Observer summary was not produced. Inspect the workflow log for an infrastructure failure."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload observer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-observer-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.observer.outputs.output_dir }}
          retention-days: 14
          if-no-files-found: warn
