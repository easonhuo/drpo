name: Temporary E8 backlog recovery audit

on:
  push:
    branches:
      - dev/e8-completed-backlog-closure-01
    paths:
      - .github/workflows/temporary_e8_backlog_recovery_audit.yml

permissions:
  contents: write

jobs:
  recover:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-completed-backlog-closure-01
          fetch-depth: 0

      - name: Recover historical closure metadata
        shell: bash
        run: |
          set -u
          mkdir -p docs/experiments
          : > /tmp/recovery_diagnostics.txt
          git show origin/dev/e8-four-result-closure-authority-export:tools/tmp_e8_four_result_closure.patch.gz.b64 > /tmp/e8_patch.b64 2>> /tmp/recovery_diagnostics.txt
          show_rc=$?
          base64 --decode /tmp/e8_patch.b64 > /tmp/e8_patch.gz 2>> /tmp/recovery_diagnostics.txt
          base64_rc=$?
          gzip --decompress --stdout /tmp/e8_patch.gz > /tmp/e8.patch 2>> /tmp/recovery_diagnostics.txt
          gzip_rc=$?
          {
            echo '# E8 completed-backlog recovery audit'
            echo
            echo 'Provenance recovery record only; not a competing research master or scientific-status upgrade.'
            echo
            echo '## Recovery diagnostics'
            echo
            echo "- git-show exit: $show_rc"
            echo "- base64 exit: $base64_rc"
            echo "- gzip exit: $gzip_rc"
            if [ -s /tmp/e8.patch ]; then
              echo "- recovered bytes: $(wc -c < /tmp/e8.patch)"
              echo "- recovered SHA-256: $(sha256sum /tmp/e8.patch | awk '{print $1}')"
            fi
            echo
            echo '```text'
            cat /tmp/recovery_diagnostics.txt
            echo '```'
            echo
            echo '## File inventory'
            echo
            if [ -s /tmp/e8.patch ]; then grep '^diff --git ' /tmp/e8.patch || true; fi
            echo
            echo '## Experiment and evidence references'
            echo
            if [ -s /tmp/e8.patch ]; then grep -Ei 'EXT-C-E8|E8_[A-Z0-9_]+|results_commit|manifest_sha256|package_sha256|expected_cells|completed_cells|terminal_audit|numerical_failures|nan_inf' /tmp/e8.patch || true; fi
          } > docs/experiments/E8_COMPLETED_BACKLOG_RECOVERY_AUDIT.md

      - name: Publish recovery audit
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_e8_backlog_recovery_audit.yml
          git add docs/experiments/E8_COMPLETED_BACKLOG_RECOVERY_AUDIT.md
          git commit -m 'Recover E8 completed-result backlog provenance'
          git push origin HEAD:dev/e8-completed-backlog-closure-01
