name: Temporary E8 upgrade status probe

on:
  push:
    branches:
      - diag/e8-reciprocal-finalizer-48a3e49
    paths:
      - .github/workflows/temporary_upgrade_status_probe.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-reciprocal-finalizer-48a3e49
      - name: Record upgrade workflow status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=d8c8477384cce87ef2922f8d0d4d9ab4b74082ac&per_page=100' | \
            jq -r '.workflow_runs[] | [.id,.name,.status,(.conclusion // "null")] | @tsv' \
            > docs/experiments/TEMP_UPGRADE_STATUS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_upgrade_status_probe.yml
          git add docs/experiments/TEMP_UPGRADE_STATUS.txt
          git commit -m 'Record differential finalizer upgrade status'
          git push origin HEAD:diag/e8-reciprocal-finalizer-48a3e49
