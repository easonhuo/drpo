name: Bootstrap R2 health runtime-resource test fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/r2-health-runtime-resource-tests-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Materialize narrow test changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('tests/test_e7_measured_cpu_autotune.py'): [
                  (
                      '    result = autotune.revalidate_runtime(**revalidation_kwargs(tmp_path))\n'
                      '    assert result["selection"]["selected_workers"] == 2\n'
                      '    assert result["machine_snapshot"]["load_average_1m"] == 999.0\n',
                      '    result = autotune.revalidate_runtime(**revalidation_kwargs(tmp_path))\n'
                      '    record = json.loads(Path(result["revalidation"]["path"]).read_text())\n'
                      '    assert result["selection"]["selected_workers"] == 2\n'
                      '    assert record["current_machine_snapshot"]["load_average_1m"] == 999.0\n',
                  )
              ],
              Path('tests/test_e7_ppo_w0_runtime_autotune.py'): [
                  (
                      '    with pytest.raises(autotune.RuntimeResourceError, match="no concurrency"):\n',
                      '    with pytest.raises(\n'
                      '        autotune.RuntimeResourceError,\n'
                      '        match="no resource-valid concurrency candidate completed",\n'
                      '    ):\n',
                  )
              ],
              Path('tests/test_runtime_resource_acceptance.py'): [
                  ('    external.mkdir()\n', '    external.mkdir(exist_ok=True)\n'),
                  ('    model.mkdir()\n', '    model.mkdir(exist_ok=True)\n'),
              ],
          }
          for path, edits in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in edits:
                  if text.count(old) != 1:
                      raise SystemExit(f'replacement drift in {path}: {old!r}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff

      - name: Run focused runtime-resource regression
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_e7_measured_cpu_autotune.py \
            tests/test_e7_ppo_w0_runtime_autotune.py \
            tests/test_runtime_resource_acceptance.py \
            -q
          python -m ruff check \
            tests/test_e7_measured_cpu_autotune.py \
            tests/test_e7_ppo_w0_runtime_autotune.py \
            tests/test_runtime_resource_acceptance.py
          python -m compileall -q \
            tests/test_e7_measured_cpu_autotune.py \
            tests/test_e7_ppo_w0_runtime_autotune.py \
            tests/test_runtime_resource_acceptance.py

      - name: Publish clean candidate commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f maintenance.patch
          rm .github/workflows/bootstrap-r2-health-runtime-resource-tests.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize runtime-resource tests with current evidence schema'
          git push origin "HEAD:${HEAD_BRANCH}"
