name: Bootstrap R2 health Ruff cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'fix/r2-health-ruff-cleanup-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Remove exact unused symbols
        run: |
          python - <<'PY'
          from pathlib import Path

          edits = {
              Path('scripts/agent/runspec_lib.py'): [
                  ('import shutil\n', ''),
                  ('    lowered = path.lower()\n', ''),
              ],
              Path('scripts/agent/runspec_publish_git.py'): [
                  ('    read_yaml,\n', ''),
              ],
              Path('scripts/run_e7_ppo_w0_grid_pilot_auto.py'): [
                  (
                      'from drpo.e7_ppo_w0_runtime_autotune import revalidate_runtime, select_runtime\n',
                      'from drpo.e7_ppo_w0_runtime_autotune import select_runtime\n',
                  ),
              ],
              Path('src/drpo/runtime_resource_adapters.py'): [
                  ('    measure_command_peak_memory,\n', ''),
              ],
              Path('src/drpo/runtime_worker_admission_runner.py'): [
                  ('from pathlib import Path\n', ''),
              ],
              Path('tests/test_runtime_resource_adapters.py'): [
                  ('import json\n', ''),
              ],
          }
          for path, replacements in edits.items():
              text = path.read_text(encoding='utf-8')
              for old, new in replacements:
                  if text.count(old) != 1:
                      raise SystemExit(f'cleanup drift in {path}: {old!r}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff pyyaml

      - name: Run repository Ruff
        run: python -m ruff check .

      - name: Run Python compilation
        run: python -m compileall -q src scripts tests

      - name: Run focused regression
        run: |
          python -m pytest \
            tests/test_agent_runspec.py \
            tests/test_runspec_publish.py \
            tests/test_e7_measured_cpu_wrappers.py \
            tests/test_runtime_resource_adapters.py \
            tests/test_runtime_resource_acceptance.py \
            -q

      - name: Publish clean candidate
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/bootstrap-r2-health-ruff-cleanup.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Remove stale unused runtime and RunSpec imports'
          git push origin "HEAD:${HEAD_BRANCH}"
