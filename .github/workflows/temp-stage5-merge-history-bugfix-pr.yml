name: TEMP Stage5 merge-history bugfix on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/stage5-merge-integrated-delta-history'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/stage5-merge-integrated-delta-history
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Execute maintenance body
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml
          set +e
          python - <<'PY' > /tmp/stage5-bugfix.log 2>&1
          import subprocess
          import yaml

          with open('.github/workflows/temp-stage5-merge-history-bugfix.yml', encoding='utf-8') as handle:
              workflow = yaml.safe_load(handle)
          step = next(
              item
              for item in workflow['jobs']['apply']['steps']
              if item.get('name') == 'Apply authorized maintenance bugfix'
          )
          completed = subprocess.run(['bash', '-lc', step['run']], text=True)
          raise SystemExit(completed.returncode)
          PY
          status=$?
          set -e
          cat /tmp/stage5-bugfix.log
          if [[ "${status}" -ne 0 ]]; then
            cp /tmp/stage5-bugfix.log docs/STAGE5_MERGE_HISTORY_BUGFIX_FAILURE.log
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add docs/STAGE5_MERGE_HISTORY_BUGFIX_FAILURE.log
            git commit -m 'Capture Stage 5 merge-history bugfix failure' || true
            git push origin HEAD:fix/stage5-merge-integrated-delta-history
            exit "${status}"
          fi
