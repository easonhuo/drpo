name: TEMP Stage5 merge-history bugfix on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/stage5-merge-integrated-delta-history'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/stage5-merge-integrated-delta-history
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Execute maintenance body
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml
          python - <<'PY'
          import subprocess
          import yaml

          with open('.github/workflows/temp-stage5-merge-history-bugfix.yml', encoding='utf-8') as handle:
              workflow = yaml.safe_load(handle)
          step = next(
              item
              for item in workflow['jobs']['apply']['steps']
              if item.get('name') == 'Apply authorized maintenance bugfix'
          )
          subprocess.run(['bash', '-lc', step['run']], check=True)
          PY
