name: One-time Countdown release acceptance

on:
  push:
    branches:
      - dev/paper-code-reference-01
    paths:
      - .github/workflows/paper-code-countdown-release-acceptance.yml

permissions:
  contents: write

concurrency:
  group: paper-code-countdown-release-acceptance
  cancel-in-progress: false

jobs:
  apply-test-and-remove:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/paper-code-reference-01
          fetch-depth: 2
          persist-credentials: true

      - name: Guard approved branch and patch base
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "dev/paper-code-reference-01"
          test "$(git rev-parse HEAD^)" = "222b0a6676f9d18500c5173166d6e12ecda386d0"
          git apply --check docs/paper_code_reference/COUNTDOWN_RELEASE_ACCEPTANCE.patch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Apply verified repair
        run: git apply docs/paper_code_reference/COUNTDOWN_RELEASE_ACCEPTANCE.patch

      - name: Install focused validation dependencies
        run: python -m pip install -q -e 'paper_code[test]' ruff

      - name: Run focused acceptance gates
        run: |
          set -euo pipefail
          python -m py_compile \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_common.py
          python -m pytest -q paper_code/tests/test_common.py
          python -m pytest -q \
            paper_code/tests/test_cli.py::test_cli_dispatches_countdown_public_runner
          python -m ruff check --line-length 100 \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_common.py
          python -m ruff format --check --line-length 100 \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_common.py

      - name: Verify exact scope and remove temporary transport
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/paper-code-countdown-release-acceptance.yml \
            docs/paper_code_reference/COUNTDOWN_RELEASE_ACCEPTANCE.patch
          python - <<'PY'
          import subprocess

          expected = {
              ".github/workflows/paper-code-countdown-release-acceptance.yml",
              "docs/paper_code_reference/COUNTDOWN_RELEASE_ACCEPTANCE.patch",
              "paper_code/src/drpo_reference/experiments/countdown.py",
              "paper_code/tests/test_common.py",
          }
          actual = {
              line[3:]
              for line in subprocess.check_output(
                  ["git", "status", "--short"],
                  text=True,
              ).splitlines()
          }
          if actual != expected:
              raise SystemExit(f"unexpected changed paths: {sorted(actual)}")
          PY
          git diff --check

      - name: Commit verified repair to fixed branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "PAPER-CODE-VALIDATION-01 release Countdown models between phases"
          git push origin HEAD:dev/paper-code-reference-01
