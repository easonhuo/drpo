name: Paper Code Validation Dispatch Bridge

on:
  pull_request_target:
    types: [edited]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: >-
      github.event.pull_request.number == 149 &&
      github.event.pull_request.head.sha == '131d448c3b26e2d36969734d7d6cc715c695c9e6'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch exact-head validation
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 131d448c3b26e2d36969734d7d6cc715c695c9e6
        run: >-
          gh workflow run paper-code-validation.yml
          --repo "${{ github.repository }}"
          --ref main
          -f commit_sha="$TARGET_SHA"
