name: Paper Code Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - "paper_code/**"
      - "docs/paper_code_reference/**"
      - ".github/workflows/paper-code-validation.yml"
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Full commit SHA to validate"
        required: true
        type: string

permissions:
  contents: read
  statuses: write

concurrency:
  group: paper-code-validation-${{ github.event_name }}-${{ github.event.pull_request.number || inputs.commit_sha }}
  cancel-in-progress: true

env:
  SOURCE_COMMIT: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.commit_sha }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_COMMIT }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install exact-head dependencies
        run: python -m pip install -q -e 'paper_code[test]' ruff

      - name: Compile and test exact head
        run: |
          set -euo pipefail
          python -m compileall -q paper_code/src paper_code/tests
          python -m pytest -x -vv paper_code/tests
          python -m ruff check --line-length 100 paper_code/src paper_code/tests
          python -m ruff format --check --line-length 100 paper_code/src paper_code/tests

      - name: Check public entry points and D-U1 smoke
        run: |
          set -euo pipefail
          python -m drpo_reference --help
          python -m drpo_reference cu1 --help
          python -m drpo_reference du1 --help
          python -m drpo_reference hopper --help
          python -m drpo_reference d4rl --help
          python -m drpo_reference countdown --help
          output="$RUNNER_TEMP/du1-smoke"
          python -m drpo_reference du1 \
            --output "$output" \
            --device cpu \
            --workers 1 \
            --smoke
          test -s "$output/terminal_audit.json"
          test -s "$output/aggregate_summary.json"

      - name: Audit standalone source boundary
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          from pathlib import Path

          root = Path("paper_code")
          forbidden_suffixes = {
              ".bin", ".ckpt", ".h5", ".hdf5", ".pt", ".pth",
              ".safetensors", ".tar", ".tgz", ".zip",
          }
          forbidden_dirs = {"artifacts", "checkpoints", "outputs", "results"}
          for path in root.rglob("*"):
              assert not path.is_symlink(), path
              if path.is_file():
                  assert path.suffix.lower() not in forbidden_suffixes, path
                  assert not (set(path.parts) & forbidden_dirs), path

          source_root = root / "src" / "drpo_reference"
          for path in source_root.rglob("*.py"):
              tree = ast.parse(path.read_text(encoding="utf-8"))
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      names = [alias.name for alias in node.names]
                  elif isinstance(node, ast.ImportFrom):
                      names = [node.module or ""]
                  else:
                      continue
                  assert all(
                      name != "drpo" and not name.startswith("drpo.")
                      for name in names
                  ), (path, names)

          core = ast.parse(
              (source_root / "categorical" / "countdown.py").read_text(
                  encoding="utf-8"
              )
          )
          heavy = {"transformers", "peft", "bitsandbytes"}
          for node in ast.walk(core):
              if isinstance(node, ast.Import):
                  names = [alias.name.split(".", 1)[0] for alias in node.names]
              elif isinstance(node, ast.ImportFrom):
                  names = [(node.module or "").split(".", 1)[0]]
              else:
                  continue
              assert not (set(names) & heavy), names
          PY

      - name: Build and verify reviewer package
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import shutil
          from pathlib import Path

          source = Path("paper_code")
          root = Path("dist/drpo-reference-v0.1")
          shutil.rmtree(root.parent, ignore_errors=True)
          (root / "tests").mkdir(parents=True)
          shutil.copy2(source / "README.md", root / "README.md")
          shutil.copy2(source / "pyproject.toml", root / "pyproject.toml")
          shutil.copytree(source / "configs", root / "configs")
          shutil.copytree(source / "src", root / "src")
          tests = (
              "test_aggregate.py", "test_cli.py", "test_common.py",
              "test_controls.py", "test_countdown_release.py",
              "test_cu1_suite.py", "test_du1_cli.py",
              "test_du1_public.py", "test_events.py",
          )
          for name in tests:
              shutil.copy2(source / "tests" / name, root / "tests" / name)
          (root / "SOURCE_COMMIT.txt").write_text(
              os.environ["SOURCE_COMMIT"] + "\n", encoding="utf-8"
          )
          files = []
          for path in sorted(root.rglob("*")):
              if path.is_file():
                  payload = path.read_bytes()
                  files.append({
                      "path": path.relative_to(root).as_posix(),
                      "sha256": hashlib.sha256(payload).hexdigest(),
                      "size_bytes": len(payload),
                  })
          manifest = {
              "schema_version": 1,
              "source_commit": os.environ["SOURCE_COMMIT"],
              "file_count_excluding_manifest": len(files),
              "files": files,
          }
          (root / "PACKAGE_MANIFEST.json").write_text(
              json.dumps(manifest, indent=2) + "\n", encoding="utf-8"
          )
          shutil.make_archive(
              "dist/drpo-reference-v0.1",
              "zip",
              root_dir="dist",
              base_dir="drpo-reference-v0.1",
          )
          PY
          rm -rf extracted
          unzip -q dist/drpo-reference-v0.1.zip -d extracted
          cd extracted/drpo-reference-v0.1
          python -m pip install -q -e '.[test]' ruff
          python -m compileall -q src tests
          python -m pytest -x -vv tests
          python -m ruff check --line-length 100 src tests
          python -m ruff format --check --line-length 100 src tests

      - name: Upload exact-head package
        uses: actions/upload-artifact@v4
        with:
          name: drpo-reference-v0.1-${{ env.SOURCE_COMMIT }}
          path: dist/drpo-reference-v0.1.zip
          if-no-files-found: error
          retention-days: 30

  publish-status:
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Publish exact-head status
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.validate.result }}';
            const state = result === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.SOURCE_COMMIT,
              state,
              context: 'paper-code-validation/exact-head',
              description: state === 'success'
                ? 'Exact-head reviewer validation passed'
                : `Exact-head reviewer validation ${result}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
