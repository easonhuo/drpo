name: Temporary E8 reciprocal exact-head CI

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_exact_head_ci.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TARGET_SHA: 243109b38c7c2be654357682a27f5a159a13eac8
      BASE_SHA: dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3
      BRANCH: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 243109b38c7c2be654357682a27f5a159a13eac8
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Assert exact immutable target
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test -z "$(git ls-files '.github/workflows/temporary_e8_reciprocal*')"
          test "$(git merge-base "$BASE_SHA" "$TARGET_SHA")" = "$BASE_SHA"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Evidence locator gate
        run: |
          python scripts/validate_evidence_locator.py \
            --repo-root . \
            --base "$BASE_SHA" \
            --head "$TARGET_SHA" \
            --json

      - name: Tiered test plan
        run: |
          python scripts/select_update_tests.py \
            --base "$BASE_SHA" \
            --head "$TARGET_SHA" \
            --mode auto \
            --json

      - name: Python compile
        run: python -m compileall -q src scripts tools tests

      - name: Shell syntax
        run: bash -n tools/drpo-update/drpo-update tools/drpo-update/install.sh

      - name: Handoff authority
        run: python scripts/handoff_authority.py verify --repo-root .

      - name: Formal execution channel
        run: python scripts/validate_formal_execution_channel.py --repo-root .

      - name: Governance inventory
        run: python scripts/validate_governance_rule_inventory.py --repo-root .

      - name: Governance stage status
        run: python scripts/validate_governance_pipeline_stage_status.py --repo-root .

      - name: Full pytest
        run: python -m pytest -q

      - name: Ruff
        run: ruff check .

      - name: Record exact-head CI success
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          body="Exact-head closure CI passed on \`$TARGET_SHA\` (workflow run $GITHUB_RUN_ID): Evidence Locator, tiered-plan validation, Python compile, shell syntax, handoff authority, formal execution channel, governance inventory, governance stage status, full pytest, and Ruff. The temporary workflow commit is being removed by restoring the branch ref to the tested immutable target."
          gh api "repos/$GITHUB_REPOSITORY/issues/174/comments" -f body="$body" >/dev/null

      - name: Remove temporary workflow commit
        shell: bash
        run: |
          set -euo pipefail
          remote_head="$(git ls-remote origin "refs/heads/$BRANCH" | awk '{print $1}')"
          test "$remote_head" = "$GITHUB_SHA"
          git push \
            --force-with-lease="refs/heads/$BRANCH:$GITHUB_SHA" \
            origin \
            "$TARGET_SHA:refs/heads/$BRANCH"
