name: Temporary E8 reciprocal exact-head CI diagnostic

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_exact_head_ci.yml

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      PRIOR_SHA: 3f5bf0c0c89bc6530b9fc88e77dc5d5fecf504ee
      TARGET_SHA: 243109b38c7c2be654357682a27f5a159a13eac8
      TARGET_WORKFLOW: Temporary E8 reciprocal exact-head CI
      BRANCH: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    steps:
      - name: Diagnose prior exact-head run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          runs="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$PRIOR_SHA&per_page=100")"
          run_id="$(jq -r --arg name "$TARGET_WORKFLOW" '.workflow_runs[] | select(.name == $name and .event == "push") | .id' <<<"$runs" | head -n1)"
          if [[ -z "$run_id" ]]; then
            body="No push run named \`$TARGET_WORKFLOW\` was found for \`$PRIOR_SHA\`."
          else
            run="$(jq -r --argjson id "$run_id" '.workflow_runs[] | select(.id == $id)' <<<"$runs")"
            status="$(jq -r '.status' <<<"$run")"
            conclusion="$(jq -r '.conclusion // "null"' <<<"$run")"
            jobs="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100")"
            summary="$(jq -r '.jobs[] | "- job `" + .name + "`: " + .status + "/" + (.conclusion // "null") + "\n" + ((.steps // []) | map("  - `" + .name + "`: " + .status + "/" + (.conclusion // "null")) | join("\n"))' <<<"$jobs")"
            failed_job="$(jq -r '.jobs[] | select(.conclusion == "failure") | .id' <<<"$jobs" | head -n1)"
            detail=""
            if [[ -n "$failed_job" ]]; then
              gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$failed_job/logs" > /tmp/job.log
              detail="$(grep -nEi 'ERROR|Traceback|mismatch|forbid|invalid|failed|requires|exact_base|registry|authority|evidence' /tmp/job.log | tail -n 35 || true)"
            fi
            body="Exact-head CI diagnostic: run $run_id, status=$status, conclusion=$conclusion.\n\n$summary\n\nRelevant failure lines:\n\`\`\`text\n$detail\n\`\`\`"
          fi
          gh api "repos/$GITHUB_REPOSITORY/issues/174/comments" -f body="$body" >/dev/null

      - name: Remove diagnostic workflow commit
        shell: bash
        run: |
          set -euo pipefail
          remote_head="$(git ls-remote origin "refs/heads/$BRANCH" | awk '{print $1}')"
          test "$remote_head" = "$GITHUB_SHA"
          git push \
            --force-with-lease="refs/heads/$BRANCH:$GITHUB_SHA" \
            origin \
            "$TARGET_SHA:refs/heads/$BRANCH"
