name: Candidate01 historical compatibility bootstrap v5

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  build-and-push:
    if: github.head_ref == 'exec/candidate01-historical-compat-bootstrap-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Prepare exact source refs
        run: |
          set -euxo pipefail
          git fetch origin main dev/candidate01-c1-evidence-adapter-impl-01 dev/gov-replayab-control-plane-split-design-01 exec/candidate01-historical-compat-bootstrap-01
          test "$(git rev-parse origin/main)" = 85b0a68d77ed085a7f6e67771fb0f7672c43da09
          test "$(git rev-parse origin/dev/candidate01-c1-evidence-adapter-impl-01)" = b00a8108e192f1451550b43925a8dff95ca64fba
          test "$(git rev-parse origin/dev/gov-replayab-control-plane-split-design-01)" = c57248e71763c4266d8ad4e9497f92732ec836f0
          git config user.name 'DRPO Compatibility Builder'
          git config user.email 'drpo-compat@local.invalid'
          git checkout -B candidate-build origin/dev/candidate01-c1-evidence-adapter-impl-01
          git merge --no-edit origin/main
      - name: Copy and commit reviewed design
        run: |
          set -euxo pipefail
          DESIGN=docs/development_workflow_optimization/HISTORICAL_REPLAY_COMPATIBILITY_DESIGN.md
          git cat-file -e "origin/dev/gov-replayab-control-plane-split-design-01:${DESIGN}"
          git show "origin/dev/gov-replayab-control-plane-split-design-01:${DESIGN}" > "$DESIGN"
          test -s "$DESIGN"
          git add -- "$DESIGN"
          git diff --cached --check
          git commit -m 'Document historical replay compatibility boundary'
      - name: Decode and apply adapter patch
        run: |
          set -euxo pipefail
          git show origin/exec/candidate01-historical-compat-bootstrap-01:.github/workflows/candidate01-historical-compat-bootstrap.yml > /tmp/bootstrap.yml
          PATCH_GZ_B64="$(sed -n 's/^          PATCH_GZ_B64: //p' /tmp/bootstrap.yml)"
          test -n "$PATCH_GZ_B64"
          printf '%s' "$PATCH_GZ_B64" | base64 -d | gzip -d > /tmp/compat.patch
          git apply --check /tmp/compat.patch
          git apply /tmp/compat.patch
          git add scripts/run_workflow_replay.py tests/test_workflow_replay_execute.py
          git diff --cached --check
          git commit -m 'Separate historical replay data and control planes'
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Focused validation
        run: |
          set -euxo pipefail
          python -m py_compile scripts/run_workflow_replay.py tests/test_workflow_replay_execute.py
          python -m pytest tests/test_workflow_replay_execute.py -q
          python -m ruff check scripts/run_workflow_replay.py tests/test_workflow_replay_execute.py
          test -z "$(git status --porcelain=v1)"
      - name: Push exact Candidate 01 head
        run: git push origin HEAD:refs/heads/dev/candidate01-c1-evidence-adapter-impl-01
