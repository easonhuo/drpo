name: Temporary current-main acceptance baseline

on:
  push:
    branches:
      - diag/current-main-baseline-20260720
    paths:
      - .github/workflows/temporary_current_main_baseline.yml

permissions:
  contents: write

jobs:
  baseline:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/current-main-baseline-20260720
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Capture exact baseline
        shell: bash
        run: |
          set +e
          python -m pytest -q > /tmp/pytest.log 2>&1
          pytest_rc=$?
          ruff check . > /tmp/ruff.log 2>&1
          ruff_rc=$?
          python scripts/validate_formal_execution_channel.py --repo-root . --json > /tmp/formal.json 2>&1
          formal_rc=$?
          set -e
          mkdir -p docs/experiments
          python - "$pytest_rc" "$ruff_rc" "$formal_rc" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          pytest_rc, ruff_rc, formal_rc = map(int, sys.argv[1:])
          pytest_text = Path('/tmp/pytest.log').read_text(encoding='utf-8', errors='replace')
          ruff_text = Path('/tmp/ruff.log').read_text(encoding='utf-8', errors='replace')
          formal_text = Path('/tmp/formal.json').read_text(encoding='utf-8', errors='replace')
          failed_nodes = []
          for line in pytest_text.splitlines():
              match = re.match(r'FAILED\s+(\S+)', line)
              if match:
                  failed_nodes.append(match.group(1))
          payload = {
              'schema_version': 1,
              'base_commit': '4b718e7439cf78a04f4affa1987ac15582d702d1',
              'pytest_exit_code': pytest_rc,
              'pytest_failed_nodes': failed_nodes,
              'pytest_failure_count': len(failed_nodes),
              'pytest_tail': pytest_text.splitlines()[-120:],
              'ruff_exit_code': ruff_rc,
              'ruff_tail': ruff_text.splitlines()[-120:],
              'formal_validator_exit_code': formal_rc,
              'formal_validator_output': formal_text,
          }
          Path('docs/experiments/CURRENT_MAIN_ACCEPTANCE_BASELINE.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
      - name: Publish baseline and remove workflow
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_current_main_baseline.yml
          git add docs/experiments/CURRENT_MAIN_ACCEPTANCE_BASELINE.json
          git commit -m 'Record exact current-main acceptance baseline'
          git push origin HEAD:diag/current-main-baseline-20260720
