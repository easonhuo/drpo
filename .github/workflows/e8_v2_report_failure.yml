name: E8 V2 integration diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/e8-oracle-v2-pilot
          fetch-depth: 0

      - name: Repair integration verification order
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/repair_e8_integration.py <<'PATCHPY'
          from pathlib import Path

          path = Path('.github/workflows/e8_v2_integrate.yml')
          text = path.read_text()

          marker = '      - name: Upload integration diagnostics\n'
          commit_step = '''      - name: Commit normalized handoff
        shell: bash
        run: |
          set -euo pipefail
          git add docs/handoff.md docs/handoff_deltas/$UPDATE_ID/MATERIALIZATION_REPORT.json docs/handoff_shadow/stage4/minimal/generated
          git diff --cached --check
          git commit -m 'Materialize E8 v2 pilot registration on current main'

'''
          if '      - name: Commit normalized handoff\n' not in text:
              if marker not in text:
                  raise SystemExit('upload-diagnostics marker not found')
              text = text.replace(marker, commit_step + marker, 1)

          old_final = '''      - name: Commit normalization and push ready branch
        shell: bash
        run: |
          set -euo pipefail
          git add docs/handoff.md docs/handoff_deltas/$UPDATE_ID/MATERIALIZATION_REPORT.json docs/handoff_shadow/stage4/minimal/generated
          git diff --cached --check
          git commit -m 'Materialize E8 v2 pilot registration on current main'
          test "$(git rev-parse origin/main)" = "$BASE_SHA"
          git push origin "$OUT_BRANCH"
'''
          new_final = '''      - name: Push ready branch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "$BASE_SHA"
          git push origin "$OUT_BRANCH"
'''
          if old_final in text:
              text = text.replace(old_final, new_final, 1)
          elif '      - name: Push ready branch\n' not in text:
              raise SystemExit('final push block not found')

          path.write_text(text)
          PATCHPY

          python /tmp/repair_e8_integration.py
          if ! git diff --quiet; then
            git config user.name drpo-integration-bot
            git config user.email drpo-integration-bot@users.noreply.github.com
            git add .github/workflows/e8_v2_integrate.yml
            git commit -m 'Commit E8 materialization before authority verification'
            git push origin HEAD:integration/e8-oracle-v2-pilot
          fi

      - name: Wait for integration run
        run: sleep 150

      - name: Capture latest integration failure log
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$HEAD_SHA&event=pull_request&per_page=30" --jq '.workflow_runs[] | select(.name == "E8 V2 pilot integration") | .id' | head -n1)"
          test -n "$run_id"
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed > e8_v2_failed.log 2>&1 || \
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log > e8_v2_failed.log 2>&1 || true
          test -s e8_v2_failed.log

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: e8-v2-failed-log-${{ github.run_id }}
          path: e8_v2_failed.log
          if-no-files-found: error
          retention-days: 7
