name: E8 V2 integration diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for integration run
        run: sleep 150

      - name: Capture latest integration failure log
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$HEAD_SHA&event=pull_request&per_page=30" --jq '.workflow_runs[] | select(.name == "E8 V2 pilot integration") | .id' | head -n1)"
          test -n "$run_id"
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed > e8_v2_failed.log 2>&1 || \
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log > e8_v2_failed.log 2>&1 || true
          test -s e8_v2_failed.log

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: e8-v2-failed-log-${{ github.run_id }}
          path: e8_v2_failed.log
          if-no-files-found: error
          retention-days: 7
