name: E8 V2 integration diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/e8-oracle-v2-pilot
          fetch-depth: 0

      - name: Prepare repaired integration workflow
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/repair_e8_integration.py
          python /tmp/repair_e8_integration.py
          git diff -- .github/workflows/e8_v2_integrate.yml > repair.log

      - name: Upload repaired workflow
        uses: actions/upload-artifact@v4
        with:
          name: e8-v2-repaired-workflow-${{ github.run_id }}
          path: |
            .github/workflows/e8_v2_integrate.yml
            repair.log
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
