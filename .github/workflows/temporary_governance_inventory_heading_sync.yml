name: Temporary governance inventory heading sync

on:
  push:
    branches:
      - maintenance/gov-rule-inventory-heading-sync-01

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: maintenance/gov-rule-inventory-heading-sync-01
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check pyyaml pytest

      - name: Synchronize inventory heading references
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/governance_rule_inventory.yaml')
          text = path.read_text(encoding='utf-8')
          old = 'heading: ChatGPT patch-delivery protocol'
          new = 'heading: Emergency offline patch-delivery fallback'
          count = text.count(old)
          if count != 9:
              raise SystemExit(f'expected 9 legacy heading references, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Run governance acceptance checks
        run: |
          python scripts/validate_governance_rule_inventory.py --repo-root .
          python scripts/validate_governance_pipeline_stage_status.py --repo-root .
          python scripts/handoff_authority.py verify --repo-root .
          git diff --check

      - name: Publish maintenance commit and remove bootstrap workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_governance_inventory_heading_sync.yml
          git add docs/governance_rule_inventory.yaml
          git commit -m 'Synchronize governance inventory with emergency fallback heading'
          git push origin HEAD:maintenance/gov-rule-inventory-heading-sync-01
