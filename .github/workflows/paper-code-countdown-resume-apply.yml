name: Paper Code Countdown Resume Apply

on:
  pull_request:
    types: [synchronize]
    paths:
      - ".github/workflows/paper-code-countdown-resume-apply.yml"

permissions:
  contents: write

concurrency:
  group: paper-code-countdown-resume-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Apply bounded resume implementation
        env:
          PATCH_SHA256: a734828c4fcdeea0615f2c4ee083f7ab9d3ff67a5fcad434190aceb882b7f1c4
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/countdown-resume.patch.gz.b64" <<'EOF'
           EOF
          base64 -d "$RUNNER_TEMP/countdown-resume.patch.gz.b64" | gzip -d > "$RUNNER_TEMP/countdown-resume.patch"
          echo "${PATCH_SHA256}  $RUNNER_TEMP/countdown-resume.patch" | sha256sum -c -
          git apply --check "$RUNNER_TEMP/countdown-resume.patch"
          git apply "$RUNNER_TEMP/countdown-resume.patch"

          expected=$(cat <<'EOF'
          paper_code/README.md
          paper_code/src/drpo_reference/cli.py
          paper_code/src/drpo_reference/experiments/countdown.py
          paper_code/tests/test_cli.py
          paper_code/tests/test_common.py
          EOF
          )
          actual=$(git diff --name-only | sort)
          if [ "$actual" != "$expected" ]; then
            printf 'unexpected implementation scope\nexpected:\n%s\nactual:\n%s\n' "$expected" "$actual" >&2
            exit 1
          fi
          git diff --check

      - name: Validate resume implementation before push
        run: |
          set -euo pipefail
          python -m pip install -q -e 'paper_code[test]' ruff
          python -m compileall -q paper_code/src paper_code/tests
          python -m pytest -q paper_code/tests/test_common.py
          python -m pytest -q paper_code/tests/test_cli.py
          python -m ruff check --line-length 100 paper_code/src paper_code/tests
          python -m ruff format --check --line-length 100 paper_code/src paper_code/tests
          python -m drpo_reference countdown --help | grep -F -- '--resume'

      - name: Commit implementation and self-delete
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/paper-code-countdown-resume-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            paper_code/README.md \
            paper_code/src/drpo_reference/cli.py \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_cli.py \
            paper_code/tests/test_common.py
          git add -u .github/workflows/paper-code-countdown-resume-apply.yml
          git commit -m "PAPER-CODE-VALIDATION-01 implement Countdown resume"
          git push origin "HEAD:${HEAD_REF}"
