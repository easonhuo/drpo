name: Paper Code Countdown Resume Apply

on:
  pull_request:
    types: [synchronize]
    paths:
      - ".github/workflows/paper-code-countdown-resume-apply.yml"

permissions:
  contents: write

concurrency:
  group: paper-code-countdown-resume-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Apply bounded resume implementation
        run: |
          set -euo pipefail
          parts=(.github/paper-code-countdown-resume/part-0{0..5})
          cat "${parts[@]}" > "$RUNNER_TEMP/countdown-resume.patch.gz.b64"
          echo "112a901e75159c1078d666daaa35c66d63046257d86c880f6a401898e1af78c0  $RUNNER_TEMP/countdown-resume.patch.gz.b64" | sha256sum -c -
          base64 -d "$RUNNER_TEMP/countdown-resume.patch.gz.b64" | gzip -d > "$RUNNER_TEMP/countdown-resume.patch"
          echo "a734828c4fcdeea0615f2c4ee083f7ab9d3ff67a5fcad434190aceb882b7f1c4  $RUNNER_TEMP/countdown-resume.patch" | sha256sum -c -
          git apply --check "$RUNNER_TEMP/countdown-resume.patch"
          git apply "$RUNNER_TEMP/countdown-resume.patch"

          expected=$(cat <<'EOF'
          paper_code/README.md
          paper_code/src/drpo_reference/cli.py
          paper_code/src/drpo_reference/experiments/countdown.py
          paper_code/tests/test_cli.py
          paper_code/tests/test_common.py
          EOF
          )
          actual=$(git diff --name-only | sort)
          if [ "$actual" != "$expected" ]; then
            printf 'unexpected implementation scope\nexpected:\n%s\nactual:\n%s\n' "$expected" "$actual" >&2
            exit 1
          fi
          git diff --check

      - name: Validate resume implementation before push
        id: validation
        continue-on-error: true
        working-directory: paper_code
        run: |
          set +e
          log="$GITHUB_WORKSPACE/countdown-resume-validation.log"
          : > "$log"

          run_phase() {
            phase="$1"
            shift
            printf '\n===== %s =====\n' "$phase" | tee -a "$log"
            "$@" >> "$log" 2>&1
            status=$?
            cat "$log"
            if [ "$status" -ne 0 ]; then
              printf '\nFAILED_PHASE=%s\nEXIT_CODE=%s\n' "$phase" "$status" | tee -a "$log"
              echo "failed_phase=$phase" >> "$GITHUB_OUTPUT"
              echo "exit_code=$status" >> "$GITHUB_OUTPUT"
              exit "$status"
            fi
          }

          run_phase install python -m pip install -q -e '.[test]' ruff
          run_phase compile python -m compileall -q src tests
          run_phase test_common python -m pytest -q tests/test_common.py
          run_phase test_cli python -m pytest -q tests/test_cli.py
          run_phase ruff_check python -m ruff check --line-length 100 src tests
          run_phase ruff_format python -m ruff format --check --line-length 100 src tests

          printf '\n===== countdown_help =====\n' | tee -a "$log"
          python -m drpo_reference countdown --help >> "$log" 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            grep -F -- '--resume' "$log"
            status=$?
          fi
          cat "$log"
          if [ "$status" -ne 0 ]; then
            printf '\nFAILED_PHASE=countdown_help\nEXIT_CODE=%s\n' "$status" | tee -a "$log"
            echo "failed_phase=countdown_help" >> "$GITHUB_OUTPUT"
            echo "exit_code=$status" >> "$GITHUB_OUTPUT"
            exit "$status"
          fi
          echo "failed_phase=none" >> "$GITHUB_OUTPUT"
          echo "exit_code=0" >> "$GITHUB_OUTPUT"

      - name: Upload resume validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: countdown-resume-validation-${{ github.event.pull_request.head.sha }}
          path: countdown-resume-validation.log
          if-no-files-found: error
          retention-days: 14

      - name: Fail on resume validation mismatch
        if: steps.validation.outcome == 'failure'
        run: |
          echo "failed phase: ${{ steps.validation.outputs.failed_phase }}"
          echo "exit code: ${{ steps.validation.outputs.exit_code }}"
          exit 1

      - name: Commit implementation and self-delete
        if: steps.validation.outcome == 'success'
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/paper-code-countdown-resume-apply.yml
          rm -rf .github/paper-code-countdown-resume
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            paper_code/README.md \
            paper_code/src/drpo_reference/cli.py \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_cli.py \
            paper_code/tests/test_common.py
          git add -u \
            .github/workflows/paper-code-countdown-resume-apply.yml \
            .github/paper-code-countdown-resume
          git commit -m "PAPER-CODE-VALIDATION-01 implement Countdown resume"
          git push origin "HEAD:${HEAD_REF}"
