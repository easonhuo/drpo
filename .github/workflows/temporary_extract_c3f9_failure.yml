name: Temporary extract c3f9 failure

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_extract_c3f9_failure.yml

permissions:
  actions: read
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Extract failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh run view 29733109677 --repo easonhuo/drpo --log-failed > /tmp/log.txt 2>&1 || true
          {
            grep -Ein 'ERROR|Error|FAILED|failed|Traceback|Process completed|target introduced|new_failures|baseline|mismatch|missing' /tmp/log.txt | tail -n 180 || true
            echo '--- tail ---'
            tail -n 140 /tmp/log.txt
          } > docs/experiments/E8_C3F9_FAILURE_TAIL.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_extract_c3f9_failure.yml
          git add docs/experiments/E8_C3F9_FAILURE_TAIL.txt
          git commit -m 'Extract c3f9 reciprocal finalizer failure'
          git push origin HEAD:diag/e8-upgrade-log-20260720
