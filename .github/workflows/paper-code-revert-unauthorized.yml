name: PAPER-CODE-REFERENCE-01 Revert Unauthorized Development

on:
  push:
    branches:
      - dev/paper-code-reference-01
    paths:
      - ".github/workflows/paper-code-revert-unauthorized.yml"

permissions:
  contents: write

concurrency:
  group: paper-code-reference-01-revert
  cancel-in-progress: false

jobs:
  revert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_CLEAN_HEAD: 987069546398d9535b76fa58cfcc1e3a3b169fe0
      EXPECTED_PARENT: 83a1efabe10f87f83ecd1abc897e113425c235f4
      CANONICAL_BRANCH: dev/paper-code-reference-01
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Restore last clean paper-code tree and retain authorized single-branch lock
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          test "$(git rev-parse HEAD^)" = "$EXPECTED_PARENT"
          git cat-file -e "${TARGET_CLEAN_HEAD}^{commit}"

          mkdir -p "$RUNNER_TEMP/paper-code-authorized"
          cp .github/workflows/paper-code-single-branch-gate.yml \
            "$RUNNER_TEMP/paper-code-authorized/paper-code-single-branch-gate.yml"
          cp docs/paper_code_reference/CURRENT_STATUS.md \
            "$RUNNER_TEMP/paper-code-authorized/CURRENT_STATUS.md"

          git read-tree --reset -u "$TARGET_CLEAN_HEAD"

          mkdir -p .github/workflows docs/paper_code_reference
          cp "$RUNNER_TEMP/paper-code-authorized/paper-code-single-branch-gate.yml" \
            .github/workflows/paper-code-single-branch-gate.yml
          cp "$RUNNER_TEMP/paper-code-authorized/CURRENT_STATUS.md" \
            docs/paper_code_reference/CURRENT_STATUS.md

          # The one-shot workflow and every unauthorized post-target path must now be absent.
          test ! -e .github/workflows/paper-code-revert-unauthorized.yml
          test ! -e .github/workflows/paper-code-countdown-resume-apply.yml
          test ! -e .github/paper-code-countdown-resume
          test ! -e docs/paper_code_reference/COUNTDOWN_RESUME_CONTRACT.md
          test ! -e docs/paper_code_reference/INTEGRATION_FRESHNESS_AUDIT_20260720.md
          test ! -e docs/paper_code_reference/INTEGRATION_EXECUTION_DELTA_20260720.md
          test ! -e docs/paper_code_reference/POST_INTEGRATION_VALIDATION_RESULT_20260720.md

          # Apart from the explicitly authorized branch lock, the resulting tree must
          # be byte-identical to the last clean paper-code head.
          git diff --exit-code "$TARGET_CLEAN_HEAD" -- . \
            ':(exclude).github/workflows/paper-code-single-branch-gate.yml' \
            ':(exclude)docs/paper_code_reference/CURRENT_STATUS.md'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "PAPER-CODE-REFERENCE-01 revert unauthorized post-987 development"

          expected=$(printf '%s\n' \
            .github/workflows/paper-code-single-branch-gate.yml \
            docs/paper_code_reference/CURRENT_STATUS.md | sort)
          actual=$(git diff --name-only "$TARGET_CLEAN_HEAD" HEAD | sort)
          test "$actual" = "$expected"

          git push origin "HEAD:${CANONICAL_BRANCH}"
