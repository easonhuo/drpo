name: Import final writing release

on:
  push:
    branches:
      - dev/paper-writing-final-release-20260715

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify source patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/final-paper-patch/part-* > /tmp/final-main.patch.gz
          echo '3a8811280109e832d188fe0a10e09ca871d1a8dc2e38c28ae60eba45d7454912  /tmp/final-main.patch.gz' | sha256sum --check --strict
          gzip -dc /tmp/final-main.patch.gz > /tmp/final-main.patch
          git apply --check /tmp/final-main.patch
          git apply /tmp/final-main.patch
          echo '6f11a60b16d84c7b518f64f411ec70e14d8254b261f6e2ba4047276b83be3015  paper/overleaf/main_replacement.tex' | sha256sum --check --strict

      - name: Install LaTeX toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            latexmk \
            poppler-utils \
            texlive-bibtex-extra \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-pictures

      - name: Build labeled taper figure
        shell: bash
        run: |
          set -euo pipefail
          cd paper/overleaf/figures
          pdflatex -interaction=nonstopmode -halt-on-error fig_6_4_2_drpo_label.tex
          test -s fig_6_4_2_drpo_label.pdf
          rm -f fig_6_4_2_drpo_label.aux fig_6_4_2_drpo_label.log

      - name: Compile and validate manuscript
        shell: bash
        run: |
          set -euo pipefail
          cd paper/overleaf
          latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex
          test -s main.pdf
          test "$(pdfinfo main.pdf | awk '/^Pages:/ {print $2}')" = '40'
          if grep -Eqi \
            'Undefined control sequence|LaTeX Error|Citation .* undefined|Reference .* undefined|There were undefined references|There were undefined citations|multiply defined|Fatal error' \
            main.log; then
            echo 'Unresolved LaTeX diagnostic detected' >&2
            exit 1
          fi
          sha256sum main.pdf
          latexmk -c main.tex

      - name: Deposit release and remove temporary importer
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p paper/releases
          cp paper/overleaf/main.pdf \
            paper/releases/DRPO_REWRITTEN_DRAFT_20260715.pdf
          cmp -s \
            paper/overleaf/main.pdf \
            paper/releases/DRPO_REWRITTEN_DRAFT_20260715.pdf
          rm -rf .github/final-paper-patch
          rm -f .github/workflows/import-final-writing-release.yml

      - name: Commit final source and PDFs
        shell: bash
        env:
          HEAD_BRANCH: dev/paper-writing-final-release-20260715
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Update manuscript to final writing release'
          git push origin "HEAD:${HEAD_BRANCH}"
