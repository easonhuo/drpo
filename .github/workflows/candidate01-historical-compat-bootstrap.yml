name: Candidate01 historical compatibility bootstrap

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: candidate01-historical-compat-bootstrap
  cancel-in-progress: false

jobs:
  build-and-push:
    if: github.head_ref == 'exec/candidate01-historical-compat-bootstrap-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build exact Candidate 01 compatibility head
        shell: bash
        env:
          PATCH_GZ_B64: 
          EXPECTED_MAIN: 85b0a68d77ed085a7f6e67771fb0f7672c43da09
          EXPECTED_CANDIDATE: b00a8108e192f1451550b43925a8dff95ca64fba
          EXPECTED_DESIGN: c57248e71763c4266d8ad4e9497f92732ec836f0
        run: |
          set -euo pipefail
          git config user.name 'DRPO Compatibility Builder'
          git config user.email 'drpo-compat@local.invalid'
          git fetch origin main dev/candidate01-c1-evidence-adapter-impl-01 dev/gov-replayab-control-plane-split-design-01
          test "$(git rev-parse origin/main)" = "$EXPECTED_MAIN"
          test "$(git rev-parse origin/dev/candidate01-c1-evidence-adapter-impl-01)" = "$EXPECTED_CANDIDATE"
          test "$(git rev-parse origin/dev/gov-replayab-control-plane-split-design-01)" = "$EXPECTED_DESIGN"
          git checkout -B candidate-build origin/dev/candidate01-c1-evidence-adapter-impl-01
          git merge --no-edit origin/main
          mkdir -p docs/development_workflow_optimization/benchmarks
          git show origin/dev/gov-replayab-control-plane-split-design-01:docs/development_workflow_optimization/benchmarks/HISTORICAL_REPLAY_COMPATIBILITY_DESIGN.md > docs/development_workflow_optimization/benchmarks/HISTORICAL_REPLAY_COMPATIBILITY_DESIGN.md
          git add docs/development_workflow_optimization/benchmarks/HISTORICAL_REPLAY_COMPATIBILITY_DESIGN.md
          git commit -m 'Document historical replay compatibility boundary'
          printf '%s' "$PATCH_GZ_B64" | base64 -d | gzip -d > /tmp/compat.patch
          git apply --check /tmp/compat.patch
          git apply /tmp/compat.patch
          git add scripts/run_workflow_replay.py tests/test_workflow_replay_execute.py
          git commit -m 'Separate historical replay data and control planes'
          python -m pip install -e '.[dev]'
          python -m py_compile scripts/run_workflow_replay.py tests/test_workflow_replay_execute.py
          python -m pytest tests/test_workflow_replay_execute.py -q
          python -m ruff check scripts/run_workflow_replay.py tests/test_workflow_replay_execute.py
          test -z "$(git status --porcelain=v1)"
          git push origin HEAD:refs/heads/dev/candidate01-c1-evidence-adapter-impl-01
