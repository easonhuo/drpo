name: Temporary E8 reciprocal validation-order repair

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_validation_order_repair.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
      - name: Repair validation order
        run: python tools/temporary_fix_reciprocal_validation_order.py
      - name: Publish repair
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_e8_reciprocal_validation_order_repair.yml
          git rm tools/temporary_fix_reciprocal_validation_order.py
          git add src/drpo/countdown_e8_alpha1_highc_scan_common.py
          git diff --check --cached
          git commit -m 'Preserve legacy E8 validation diagnostics'
          git push origin HEAD:dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
