name: Candidate01 historical PR124 Arm-A

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: candidate01-historical-pr124-arm-a
  cancel-in-progress: false

jobs:
  historical-arm-a:
    if: github.event_name != 'pull_request' || github.head_ref == 'exec/candidate01-historical-pr114-arm-a-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      TOOLCHAIN: 19c75edeb6530faf9faed713fef1633379b28672
      HISTORICAL_BASE: b65882993eaf674390989bb9082be2b79f1f1e44
      SOURCE_SHA: 48c40034c2445c11b36f0cba6e22fb2042a1b457
      PACKET: tests/fixtures/workflow_replay/candidate01_c1/c01_pr124_historical_arm_a_packet.yaml
      OUTPUT: /tmp/replayab-pr124-historical-arm-a
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Freeze exact adapter toolchain
        run: git worktree add --detach /tmp/replayab-toolchain "$TOOLCHAIN"

      - name: Run historical PR124 Arm A only
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          from types import SimpleNamespace

          import yaml

          source_repo = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          toolchain_root = Path("/tmp/replayab-toolchain").resolve()
          sys.path[:0] = [str(toolchain_root / "src"), str(toolchain_root / "scripts")]

          from dev_integration_write_path import load_json, sha256, write_json
          import run_workflow_replay as replay

          toolchain = os.environ["TOOLCHAIN"]
          base = os.environ["HISTORICAL_BASE"]
          source_sha = os.environ["SOURCE_SHA"]
          packet = source_repo / os.environ["PACKET"]
          output = Path(os.environ["OUTPUT"])
          output.mkdir()

          payload = yaml.safe_load(packet.read_text(encoding="utf-8"))
          expected_paths = tuple(sorted(
              item.get("destination_path") or item["source_path"]
              for item in payload["implementation"]["operations"]
          ))
          contract = SimpleNamespace(
              base=SimpleNamespace(
                  historical_task={
                      "base_sha": base,
                      "frozen_implementation_sha": source_sha,
                  },
                  benchmark={
                      "toolchain_sha": toolchain,
                      "expected_changed_paths": expected_paths,
                  },
              ),
              sha256="pr124-historical-arm-a-control-plane-split",
          )
          checkout = replay._clone(source_repo, output, payload["source"], contract)
          before = replay._commit_workspace(output / "source.git", base)
          identity = SimpleNamespace(
              run_id="c" * 64,
              arm="A",
              case_id="C01-PR124-HISTORICAL-ARM-A",
              pair_id="arm-a-validation",
              order_position=0,
          )
          journal = replay.Journal(
              output / "events.jsonl",
              identity,
              contract.sha256,
              before,
              checkout.workspace,
              control_plane=checkout.control_plane,
              historical_base_sha=base,
              toolchain_sha=toolchain,
          )
          summary = {
              "schema_version": 1,
              "claim_id": "GOV-DEV-WORKFLOW-OPTIMIZATION-BENCHMARK-01",
              "case_id": identity.case_id,
              "candidate_invoked": False,
              "toolchain_sha": toolchain,
              "historical_base_sha": base,
              "source_sha": source_sha,
              "packet_sha256": sha256(packet),
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID"),
              "execution_sha": os.environ.get("GITHUB_SHA"),
              "terminal_state": "INTERRUPTED",
          }
          summary_path = output / "ARM_A_SUMMARY.json"
          try:
              completed = replay._explicit(
                  checkout.workspace,
                  packet,
                  output / "preparations",
                  output / "transactions",
                  sys.executable,
                  journal,
              )
              transaction = Path(completed.transaction_dir)
              ready = load_json(transaction / "READY_COMMIT.json", "ready")
              normalization = load_json(
                  transaction / "NORMALIZATION_REPORT.json", "normalization"
              )
              gate = load_json(transaction / "GATE_REPORT.json", "gate")
              paths = tuple(sorted(ready["changed_paths"]))
              replay._assert_historical_result(
                  transaction / "integration-repo",
                  completed.ready_commit_sha,
                  base,
                  paths,
                  expected_paths,
              )
              modes = replay._modes(
                  transaction / "integration-repo",
                  completed.ready_commit_sha,
                  paths,
              )
              after = replay._workspace(transaction / "integration-repo")
              timing = journal.finish(
                  "READY",
                  after,
                  len(journal.commands)
                  + len({item.split(":", 1)[0] for item in journal.placements}),
              )
              gate_results = {
                  item["label"]: "PASS" if item["passed"] else "FAIL"
                  for item in gate["outcomes"]
              }
              summary.update({
                  "terminal_state": "READY",
                  "ready_commit_sha": completed.ready_commit_sha,
                  "tree_sha": ready["tree_sha"],
                  "parent_sha": ready["parent_sha"],
                  "changed_paths": paths,
                  "file_modes": modes,
                  "authority_result": (
                      "PASS"
                      if ready["authority_verify"]["status"] == "PASS"
                      else "FAIL"
                  ),
                  "gate_results": gate_results,
                  "normalization_registration_mode": normalization["registration_mode"],
                  "control_plane_mode": "frozen_toolchain_override",
                  "workspace_before_sha256": before,
                  "workspace_after_sha256": after,
                  "timing": timing,
              })
              assert summary["parent_sha"] == base
              assert summary["authority_result"] == "PASS"
              assert gate_results and all(v == "PASS" for v in gate_results.values())
              assert paths == expected_paths
          except BaseException as error:
              if not journal.handle.closed:
                  journal.finish("BLOCKED", before, len(journal.commands))
              summary.update({
                  "terminal_state": "BLOCKED",
                  "exception_type": type(error).__name__,
                  "exception_message": str(error),
              })
              write_json(summary_path, summary)
              raise
          finally:
              write_json(summary_path, summary)
          print(json.dumps(summary, sort_keys=True))
          PY

      - name: Package evidence and diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          STAGE=/tmp/replayab-pr124-historical-arm-a-evidence
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          if [ -d "$OUTPUT" ]; then
            find "$OUTPUT" -maxdepth 8 -type f \( -name '*.json' -o -name '*.jsonl' -o -name '*.yaml' -o -name '*.log' -o -name '*.txt' \) -print0 | while IFS= read -r -d '' file; do
              relative="${file#${OUTPUT}/}"
              mkdir -p "$STAGE/$(dirname "$relative")"
              cp "$file" "$STAGE/$relative"
            done
          fi
          cp "$GITHUB_WORKSPACE/$PACKET" "$STAGE/"
          tar -C /tmp -czf "$GITHUB_WORKSPACE/replayab-pr124-historical-arm-a.tar.gz" replayab-pr124-historical-arm-a-evidence

      - name: Upload historical Arm-A evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replayab-pr124-historical-arm-a-${{ github.run_id }}
          path: replayab-pr124-historical-arm-a.tar.gz
          if-no-files-found: error
          retention-days: 14
