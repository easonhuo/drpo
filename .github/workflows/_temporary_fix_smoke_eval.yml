name: Temporary Fix PPO Smoke Evaluation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-smoke-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Make 20k smoke evaluate at its terminal step once
        run: |
          set -euo pipefail
          if git log -1 --pretty=%B | grep -q '\[auto-fix-smoke-eval\]'; then
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path

          path = Path('src/drpo/e7_ppo_stability_smoke.py')
          text = path.read_text()
          marker = 'def _select_smoke_branches(branches: Iterable[base.Branch]) -> list[base.Branch]:\n'
          helper = '''def _smoke_trainer_template(run_spec: Mapping[str, Any]) -> list[str]:
              argv = [str(value) for value in run_spec["trainer_argv_template"]]
              positions = [index for index, token in enumerate(argv) if token == "--eval_interval"]
              if len(positions) != 1 or positions[0] + 1 >= len(argv):
                  raise SmokeGateError(
                      "smoke trainer template must contain exactly one --eval_interval"
                  )
              current = argv[positions[0] + 1]
              if current != "50000":
                  raise SmokeGateError(
                      f"canonical smoke source eval interval changed: {current} != 50000"
                  )
              argv[positions[0] + 1] = str(SMOKE_STEPS)
              return argv


'''
          if 'def _smoke_trainer_template(' not in text:
              if marker not in text:
                  raise SystemExit('smoke branch-selection marker missing')
              text = text.replace(marker, helper + marker, 1)
          old = '''                    trainer_argv_template=[
                        str(value) for value in run_spec["trainer_argv_template"]
                    ],
'''
          new = '''                    trainer_argv_template=_smoke_trainer_template(run_spec),
'''
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('smoke trainer-template call site missing')
          path.write_text(text)
          PY
          if ! git diff --quiet -- src/drpo/e7_ppo_stability_smoke.py; then
            git config user.name "DRPO PR Sync"
            git config user.email "drpo-pr-sync@users.noreply.github.com"
            git add src/drpo/e7_ppo_stability_smoke.py
            git commit -m "EXT-H-E7-PPO-STABILITY-01 evaluate smoke at 20k terminal [auto-fix-smoke-eval]"
            git push origin HEAD:${GITHUB_HEAD_REF}
          fi
