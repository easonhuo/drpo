name: Approve Large Code Change

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Open pull-request number
        required: true
        type: string
      expected_head_sha:
        description: Exact 40-character PR head SHA reviewed by the human approver
        required: true
        type: string
      approval_reason:
        description: Brief human reason for accepting the large or structural Python change
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ inputs.pr_number }}
      EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
      APPROVAL_REASON: ${{ inputs.approval_reason }}
      BUDGET_STATUS_CONTEXT: drpo/code-change-budget
    steps:
      - name: Check out trusted default-branch gate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and verify the reviewed PR identity
        run: |
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" > "$RUNNER_TEMP/pr.json"
          actual_state="$(jq -r '.state' "$RUNNER_TEMP/pr.json")"
          actual_head="$(jq -r '.head.sha' "$RUNNER_TEMP/pr.json")"
          base_sha="$(jq -r '.base.sha' "$RUNNER_TEMP/pr.json")"
          if [[ "$actual_state" != "open" ]]; then
            echo "PR #$PR_NUMBER is not open" >&2
            exit 2
          fi
          if [[ ! "$EXPECTED_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_head_sha must be a full lowercase 40-character SHA" >&2
            exit 2
          fi
          if [[ "$actual_head" != "$EXPECTED_HEAD_SHA" ]]; then
            echo "PR head moved: expected $EXPECTED_HEAD_SHA, found $actual_head" >&2
            exit 2
          fi
          echo "BASE_SHA=$base_sha" >> "$GITHUB_ENV"
          echo "HEAD_SHA=$actual_head" >> "$GITHUB_ENV"
          jq -r '.body // ""' "$RUNNER_TEMP/pr.json" > "$RUNNER_TEMP/pr-body.txt"
          git fetch --no-tags origin "$base_sha" "$actual_head"

      - name: Revalidate rationale before recording human approval
        run: |
          python scripts/validate_code_change_budget.py \
            --repo-root . \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --pr-body-file "$RUNNER_TEMP/pr-body.txt" \
            --report "$RUNNER_TEMP/code-change-budget.json" \
            --human-approved

          decision="$(jq -r '.decision' "$RUNNER_TEMP/code-change-budget.json")"
          approval_context="$(jq -r '.expected_human_approval_context // ""' "$RUNNER_TEMP/code-change-budget.json")"
          if [[ "$decision" != "PASS_HUMAN_APPROVED" || -z "$approval_context" ]]; then
            echo "Manual approval is valid only for a structurally complete large-change request" >&2
            cat "$RUNNER_TEMP/code-change-budget.json" >&2
            exit 3
          fi
          echo "APPROVAL_CONTEXT=$approval_context" >> "$GITHUB_ENV"

      - name: Bind approval to exact head and exact justification
        run: |
          target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          short_reason="${APPROVAL_REASON:0:72}"
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state=success \
            -f context="$APPROVAL_CONTEXT" \
            -f description="Approved by $GITHUB_ACTOR: $short_reason" \
            -f target_url="$target_url"
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state=success \
            -f context="$BUDGET_STATUS_CONTEXT" \
            -f description="PASS: exact-head human approval by $GITHUB_ACTOR" \
            -f target_url="$target_url"

          {
            echo "### Human code-change approval recorded"
            echo
            echo "- PR: #$PR_NUMBER"
            echo "- Head: \`$HEAD_SHA\`"
            echo "- Approver: \`$GITHUB_ACTOR\`"
            echo "- Approval context: \`$APPROVAL_CONTEXT\`"
            echo "- Reason: $APPROVAL_REASON"
            echo
            echo '```json'
            cat "$RUNNER_TEMP/code-change-budget.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
