name: Temporary E8 reciprocal closure diagnostic

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_closure_diagnostic.yml

permissions:
  actions: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Report concise bootstrap failure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_JOB_ID: '88281833758'
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" > /tmp/job.log
          matches="$(grep -nEi 'ERROR|Traceback|mismatch|forbid|invalid|failed|requires|exact_base|registry' /tmp/job.log | tail -n 35 || true)"
          tail_text="$(tail -n 45 /tmp/job.log)"
          body="Concise diagnostic for job $TARGET_JOB_ID:\n\nMatches:\n\`\`\`text\n$matches\n\`\`\`\n\nFinal lines:\n\`\`\`text\n$tail_text\n\`\`\`"
          gh api "repos/$GITHUB_REPOSITORY/issues/174/comments" -f body="$body" >/dev/null
