name: Temporary E8 reciprocal closure diagnostic

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_closure_diagnostic.yml

permissions:
  actions: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Report bootstrap failure log tail
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_JOB_ID: '88281833758'
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$TARGET_JOB_ID/logs" > /tmp/job.log
          tail_text="$(tail -n 120 /tmp/job.log | sed 's/`/\x27/g')"
          body="Diagnostic log tail for job $TARGET_JOB_ID:\n\n\`\`\`text\n$tail_text\n\`\`\`"
          gh api "repos/$GITHUB_REPOSITORY/issues/174/comments" -f body="$body" >/dev/null
