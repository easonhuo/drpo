name: Temporary E8 reciprocal closure diagnostic

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_closure_diagnostic.yml

permissions:
  actions: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: 3b0b5c13254abdbcf0a351927032de9b063bab64
      TARGET_WORKFLOW: Temporary E8 reciprocal closure bootstrap v3
      COMMENT_ID: '5019218115'
    steps:
      - name: Report v3 result and exact error
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          runs="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$TARGET_SHA&per_page=100")"
          run_id="$(jq -r --arg name "$TARGET_WORKFLOW" '.workflow_runs[] | select(.name == $name) | .id' <<<"$runs" | head -n1)"
          if [[ -z "$run_id" ]]; then
            body="No v3 closure run found for $TARGET_SHA."
          else
            run="$(jq -r --argjson id "$run_id" '.workflow_runs[] | select(.id == $id)' <<<"$runs")"
            status="$(jq -r '.status' <<<"$run")"
            conclusion="$(jq -r '.conclusion // "null"' <<<"$run")"
            jobs="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100")"
            job_id="$(jq -r '.jobs[] | select(.conclusion == "failure") | .id' <<<"$jobs" | head -n1)"
            if [[ -n "$job_id" ]]; then
              gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$job_id/logs" > /tmp/job.log
              matches="$(grep -nEi 'ERROR|Traceback|mismatch|forbid|invalid|failed|requires|exact_base|registry|authority' /tmp/job.log | tail -n 30 || true)"
              tail_text="$(tail -n 35 /tmp/job.log)"
              body="v3 run $run_id: status=$status conclusion=$conclusion; failed job=$job_id.\n\nMatches:\n\`\`\`text\n$matches\n\`\`\`\n\nFinal lines:\n\`\`\`text\n$tail_text\n\`\`\`"
            else
              summary="$(jq -r '.jobs[] | "- " + .name + ": " + .status + "/" + (.conclusion // "null")' <<<"$jobs")"
              body="v3 run $run_id: status=$status conclusion=$conclusion.\n\n$summary"
            fi
          fi
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" -f body="$body" >/dev/null
