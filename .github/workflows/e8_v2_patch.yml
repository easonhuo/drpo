name: Patch E8 V2 integration workflow

on:
  push:
    branches: [integration/e8-oracle-v2-pilot]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/e8-oracle-v2-pilot
          fetch-depth: 0

      - name: Commit normalized handoff before authority verification
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/e8_v2_integrate.yml')
          text = path.read_text()

          if '      - name: Commit normalized handoff\n' not in text:
              marker = '      - name: Upload integration diagnostics\n'
              if marker not in text:
                  raise SystemExit('upload-diagnostics marker not found')
              commit_step = '''      - name: Commit normalized handoff
        shell: bash
        run: |
          set -euo pipefail
          git add docs/handoff.md docs/handoff_deltas/$UPDATE_ID/MATERIALIZATION_REPORT.json docs/handoff_shadow/stage4/minimal/generated
          git diff --cached --check
          git commit -m 'Materialize E8 v2 pilot registration on current main'

'''
              text = text.replace(marker, commit_step + marker, 1)

          old_final = '''      - name: Commit normalization and push ready branch
        shell: bash
        run: |
          set -euo pipefail
          git add docs/handoff.md docs/handoff_deltas/$UPDATE_ID/MATERIALIZATION_REPORT.json docs/handoff_shadow/stage4/minimal/generated
          git diff --cached --check
          git commit -m 'Materialize E8 v2 pilot registration on current main'
          test "$(git rev-parse origin/main)" = "$BASE_SHA"
          git push origin "$OUT_BRANCH"
'''
          new_final = '''      - name: Push ready branch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "$BASE_SHA"
          git push origin "$OUT_BRANCH"
'''
          if old_final in text:
              text = text.replace(old_final, new_final, 1)
          elif '      - name: Push ready branch\n' not in text:
              raise SystemExit('final push block not found')

          path.write_text(text)
          PY

          if git diff --quiet; then
            exit 0
          fi
          git config user.name drpo-integration-bot
          git config user.email drpo-integration-bot@users.noreply.github.com
          git add .github/workflows/e8_v2_integrate.yml
          git commit -m 'Commit E8 materialization before authority verification'
          git push origin HEAD:integration/e8-oracle-v2-pilot
