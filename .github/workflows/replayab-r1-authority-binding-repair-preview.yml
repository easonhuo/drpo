name: ReplayAB R1 authority-binding repair preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: replayab-r1-authority-binding-repair-preview
  cancel-in-progress: false

jobs:
  preview-repair:
    if: github.event_name != 'pull_request' || github.head_ref == 'exec/replayab-r1-authority-binding-repair-preview-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      BASE_SHA: dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3
      OLD_DIGEST: 5f02130bc08513540e694fc1b1abf1d8437f9fa697f92535c49a795dcd9de179
      NEW_DIGEST: ae7f23134285b5314647bd1068bc3fa1f3935deccdd24536eb8183cb57e11494
      OUT: /tmp/replayab-r1-authority-binding-repair-preview
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Generate mechanically repaired fixtures
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$OUT"
          mkdir -p "$OUT/modified_files"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          import yaml

          root = Path.cwd()
          old = os.environ['OLD_DIGEST']
          new = os.environ['NEW_DIGEST']
          expected_contract = hashlib.sha256(
              (root / 'docs/development_workflow_optimization/R1_IMPLEMENTATION_CONTRACT.md').read_bytes()
          ).hexdigest()
          if expected_contract != new:
              raise SystemExit(
                  f'actual contract digest {expected_contract} does not equal approved replacement {new}'
              )

          direct_paths = [
              'tests/fixtures/workflow_replay/r1/ready/manifest.yaml',
              'tests/fixtures/workflow_replay/r1/failure/manifest.yaml',
              'tests/fixtures/workflow_replay/r1/ready/run-a.json',
              'tests/fixtures/workflow_replay/r1/ready/run-b.json',
              'tests/fixtures/workflow_replay/r1/failure/run-a.json',
              'tests/fixtures/workflow_replay/r1/failure/run-b.json',
              'tests/fixtures/workflow_replay/candidate01_c1/c01_code_only_contract.yaml',
              'tests/fixtures/workflow_replay/candidate01_c1/c06_stale_main_contract.yaml',
          ]
          for relative in direct_paths:
              path = root / relative
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{relative}: expected exactly one old digest, found {count}')
              path.write_text(text.replace(old, new), encoding='utf-8')

          def canonical_sha256(value):
              raw = json.dumps(value, sort_keys=True, separators=(',', ':')).encode()
              return hashlib.sha256(raw).hexdigest()

          contract_digests = {}
          for case in ('ready', 'failure'):
              manifest_path = root / f'tests/fixtures/workflow_replay/r1/{case}/manifest.yaml'
              manifest = yaml.safe_load(manifest_path.read_text(encoding='utf-8'))
              contract_sha = canonical_sha256(manifest)
              contract_digests[case] = contract_sha
              for arm in ('a', 'b'):
                  run_path = root / f'tests/fixtures/workflow_replay/r1/{case}/run-{arm}.json'
                  run = json.loads(run_path.read_text(encoding='utf-8'))
                  if run['identities']['evidence_schema_sha256'] != new:
                      raise SystemExit(f'{run_path}: evidence schema replacement did not apply')
                  run['case_contract_sha256'] = contract_sha
                  run_path.write_text(
                      json.dumps(run, indent=2, sort_keys=True) + '\n', encoding='utf-8'
                  )

          repair_doc = root / 'docs/development_workflow_optimization/replayab_r1_calibration/R1_AUTHORITY_BINDING_REPAIR.md'
          repair_doc.write_text(
              '# ReplayAB R1 Authority-Binding Repair\n\n'
              'Claim: `GOV-DEV-WORKFLOW-OPTIMIZATION-BENCHMARK-01`  \n'
              'Calibration: `REPLAYAB-R1-C1-CALIBRATION-01`  \n'
              f'Base: `main@{os.environ["BASE_SHA"]}`  \n'
              'Scientific impact: none\n\n'
              '## Authorization and diagnosis\n\n'
              'The user authorized this narrow repair on 2026-07-20 after formal calibration '
              'reported 10/10 behavioral verdict agreement, zero covered unsafe passes, zero '
              'covered false rejections, and a passing runtime guardrail, while blocking closure '
              'because the frozen fixtures contained an orphaned evidence-schema digest.\n\n'
              f'The incorrect digest was `{old}`. Historical provenance diagnostic run '
              '`29719811214` found no repository object matching that digest. The implementation '
              f'contract has the stable SHA-256 `{new}`.\n\n'
              '## Repair boundary\n\n'
              '- Replace only the orphaned evidence-schema digest in the two R1 manifests, four '
              'R1 run artifacts, and two Candidate 01 C1 contracts.\n'
              '- Recompute only the two derived R1 case-contract digests and synchronize the four '
              'run artifacts that bind them.\n'
              '- Do not change the calibration inventory, expected verdicts, test behavior, '
              'thresholds, production code, Candidate 01 implementation, V1, Stage 5 authority, '
              'handoff, registry, scientific code, or default route.\n'
              '- Preserve the original failed calibration and diagnostic artifacts.\n\n'
              '## Validation gate\n\n'
              'The repaired fixtures must pass the complete frozen R1 calibration module, focused '
              'Candidate 01 replay tests, Ruff, full repository pytest, and repository governance '
              'checks before merge. Passing authorizes R1 closure review only; it does not start R2.\n',
              encoding='utf-8',
          )

          report = {
              'schema_version': 1,
              'claim_id': 'GOV-DEV-WORKFLOW-OPTIMIZATION-BENCHMARK-01',
              'base_sha': os.environ['BASE_SHA'],
              'old_digest': old,
              'new_digest': new,
              'actual_contract_sha256': expected_contract,
              'derived_case_contract_sha256': contract_digests,
              'modified_paths': sorted(direct_paths + [repair_doc.relative_to(root).as_posix()]),
              'behavior_or_threshold_change': False,
          }
          out = Path(os.environ['OUT'])
          (out / 'REPAIR_REPORT.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
          git add -N docs/development_workflow_optimization/replayab_r1_calibration/R1_AUTHORITY_BINDING_REPAIR.md
          git diff --check
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path
          report = json.loads((Path(os.environ['OUT']) / 'REPAIR_REPORT.json').read_text())
          changed = sorted(subprocess.run(
              ['git', 'diff', '--name-only', os.environ['BASE_SHA'], '--'],
              check=True, text=True, capture_output=True,
          ).stdout.splitlines())
          execution_path = '.github/workflows/replayab-r1-authority-binding-repair-preview.yml'
          expected = sorted(report['modified_paths'] + [execution_path])
          if changed != expected:
              raise SystemExit(f'preview scope mismatch: changed={changed}, expected={expected}')
          PY

      - name: Run frozen R1 and Candidate 01 focused tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_workflow_replay_r1.py \
            tests/test_workflow_replay_execute.py \
            tests/test_workflow_replay_orchestrate.py 2>&1 | tee "$OUT/focused_pytest.log"

      - name: Run Ruff
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check . 2>&1 | tee "$OUT/ruff.log"

      - name: Build repair patch and complete files
        shell: bash
        run: |
          set -euo pipefail
          git diff --binary "$BASE_SHA" -- \
            docs/development_workflow_optimization/replayab_r1_calibration/R1_AUTHORITY_BINDING_REPAIR.md \
            tests/fixtures/workflow_replay/r1/ready/manifest.yaml \
            tests/fixtures/workflow_replay/r1/failure/manifest.yaml \
            tests/fixtures/workflow_replay/r1/ready/run-a.json \
            tests/fixtures/workflow_replay/r1/ready/run-b.json \
            tests/fixtures/workflow_replay/r1/failure/run-a.json \
            tests/fixtures/workflow_replay/r1/failure/run-b.json \
            tests/fixtures/workflow_replay/candidate01_c1/c01_code_only_contract.yaml \
            tests/fixtures/workflow_replay/candidate01_c1/c06_stale_main_contract.yaml \
            > "$OUT/update.patch"
          python - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path
          root = Path.cwd()
          out = Path(os.environ['OUT'])
          report = json.loads((out / 'REPAIR_REPORT.json').read_text())
          for relative in report['modified_paths']:
              source = root / relative
              target = out / 'modified_files' / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)
          (out / 'BASE_COMMIT.txt').write_text(os.environ['BASE_SHA'] + '\n', encoding='utf-8')
          PY
          find "$OUT" -type f -printf '%P %s bytes\n' | sort > "$OUT/ARTIFACT_INVENTORY.txt"

      - name: Upload repair preview
        uses: actions/upload-artifact@v4
        with:
          name: replayab-r1-authority-binding-repair-preview-${{ github.run_id }}
          path: /tmp/replayab-r1-authority-binding-repair-preview
          if-no-files-found: error
          retention-days: 30
