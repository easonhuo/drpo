name: ReplayAB R1 formal calibration

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: replayab-r1-formal-calibration
  cancel-in-progress: false

jobs:
  calibrate-r1:
    if: github.event_name != 'pull_request' || github.head_ref == 'exec/replayab-r1-calibration-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      FROZEN_TOOLCHAIN: dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3
      OUT: /tmp/replayab-r1-formal-calibration
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify execution-only scope
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess
          expected = {
              '.github/workflows/replayab-r1-formal-calibration.yml',
              'docs/development_workflow_optimization/replayab_r1_calibration/R1_FORMAL_EXECUTION_PLAN.md',
          }
          changed = set(
              subprocess.run(
                  ['git', 'diff', '--name-only', 'dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3...HEAD'],
                  check=True,
                  text=True,
                  capture_output=True,
              ).stdout.splitlines()
          )
          if changed != expected:
              raise SystemExit(f'execution branch scope mismatch: {sorted(changed)}')
          PY
          git diff --check "$FROZEN_TOOLCHAIN"...HEAD
          git worktree add --detach /tmp/replayab-r1-toolchain "$FROZEN_TOOLCHAIN"
          test "$(git -C /tmp/replayab-r1-toolchain rev-parse HEAD)" = "$FROZEN_TOOLCHAIN"
          test -z "$(git -C /tmp/replayab-r1-toolchain status --porcelain=v1)"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install exact-toolchain development dependencies
        run: python -m pip install -e '/tmp/replayab-r1-toolchain[dev]'

      - name: Run all frozen R1 calibration tests
        shell: bash
        run: |
          set -uo pipefail
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cd /tmp/replayab-r1-toolchain
          python --version > "$OUT/environment.txt" 2>&1
          git rev-parse HEAD >> "$OUT/environment.txt"
          git status --porcelain=v1 >> "$OUT/environment.txt"
          uname -a >> "$OUT/environment.txt"
          set +e
          python -m pytest -q tests/test_workflow_replay_r1.py \
            --junitxml="$OUT/junit.xml" 2>&1 | tee "$OUT/pytest.log"
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > "$OUT/pytest_exit_code.txt"
          exit 0

      - name: Build structured calibration report
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/replayab-r1-toolchain
          python - <<'PY'
          import hashlib
          import json
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = Path('/tmp/replayab-r1-toolchain')
          out = Path(os.environ['OUT'])
          junit = ET.parse(out / 'junit.xml').getroot()
          testcases = {}
          for node in junit.iter('testcase'):
              name = node.attrib.get('name', '')
              failed = node.find('failure') is not None or node.find('error') is not None
              skipped = node.find('skipped') is not None
              testcases[name] = {
                  'status': 'SKIP' if skipped else ('FAIL' if failed else 'PASS'),
                  'seconds': float(node.attrib.get('time', '0') or 0),
              }

          mapping = {
              'R1-CAL-READY-EXACT': 'test_real_ready_and_failure_boundary_artifacts_match_frozen_verdicts',
              'R1-CAL-FAILURE-BOUNDARY': 'test_real_ready_and_failure_boundary_artifacts_match_frozen_verdicts',
              'R1-CAL-ONE-ARM-HASH-MISMATCH': 'test_one_arm_hash_mismatch_is_rejected',
              'R1-CAL-BOTH-SAME-WRONG': 'test_both_arms_same_wrong_are_rejected',
              'R1-CAL-WRONG-MODE': 'test_wrong_file_mode_is_rejected_even_when_pair_peer_is_correct',
              'R1-CAL-INTERRUPTED': 'test_interrupted_run_is_retained_but_cannot_compare_or_release',
              'R1-CAL-PARTIAL-MUTATION': 'test_failure_boundary_with_workspace_mutation_is_invalid',
              'R1-CAL-EVIDENCE-DIGEST-MISMATCH': 'test_digest_identity_and_journal_tampering_fail_closed',
              'R1-CAL-ORDER-BALANCE': 'test_schedule_is_exactly_a_b_then_b_a_and_is_deterministic',
              'R1-CAL-TIMING-BINDING-MISMATCH': 'test_timing_must_be_bound_to_exact_run_and_evidence_identities',
          }
          case_results = {}
          for case_id, test_name in mapping.items():
              case_results[case_id] = {
                  'test': test_name,
                  **testcases.get(test_name, {'status': 'MISSING', 'seconds': 0.0}),
              }

          authority_tests = [
              'test_calibration_authority_was_frozen_before_behavior_results',
              'test_frozen_authority_digests_match_actual_files_and_source_blobs',
          ]
          authority = {
              name: testcases.get(name, {'status': 'MISSING', 'seconds': 0.0})
              for name in authority_tests
          }
          runtime_name = 'test_r1_loading_and_reporting_runtime_guardrail'
          runtime = testcases.get(runtime_name, {'status': 'MISSING', 'seconds': 0.0})
          agreement = sum(item['status'] == 'PASS' for item in case_results.values())
          all_cases_pass = agreement == len(case_results)
          authority_pass = all(item['status'] == 'PASS' for item in authority.values())
          runtime_pass = runtime['status'] == 'PASS'
          pytest_exit = int((out / 'pytest_exit_code.txt').read_text().strip())
          closure_ready = all_cases_pass and authority_pass and runtime_pass and pytest_exit == 0

          unsafe_cases = {
              'R1-CAL-ONE-ARM-HASH-MISMATCH',
              'R1-CAL-BOTH-SAME-WRONG',
              'R1-CAL-WRONG-MODE',
              'R1-CAL-INTERRUPTED',
              'R1-CAL-PARTIAL-MUTATION',
              'R1-CAL-EVIDENCE-DIGEST-MISMATCH',
          }
          correct_cases = {'R1-CAL-READY-EXACT', 'R1-CAL-FAILURE-BOUNDARY'}
          unsafe_pass_count = 0 if all(case_results[c]['status'] == 'PASS' for c in unsafe_cases) else None
          false_rejection_count = 0 if all(case_results[c]['status'] == 'PASS' for c in correct_cases) else None

          authority_files = [
              'docs/development_workflow_optimization/replayab_r1_calibration/INVENTORY.yaml',
              'docs/development_workflow_optimization/replayab_r1_calibration/EXPECTED_VERDICTS.yaml',
              'docs/development_workflow_optimization/R1_IMPLEMENTATION_CONTRACT.md',
              'tests/test_workflow_replay_r1.py',
              'src/drpo/workflow_replay/evidence.py',
          ]
          digests = {
              path: hashlib.sha256((root / path).read_bytes()).hexdigest()
              for path in authority_files
          }
          suites = list(junit.iter('testsuite'))
          totals = {
              key: sum(int(item.attrib.get(key, '0') or 0) for item in suites)
              for key in ('tests', 'failures', 'errors', 'skipped')
          }
          report = {
              'schema_version': 1,
              'claim_id': 'GOV-DEV-WORKFLOW-OPTIMIZATION-BENCHMARK-01',
              'calibration_id': 'REPLAYAB-R1-C1-CALIBRATION-01',
              'toolchain_sha': os.environ['FROZEN_TOOLCHAIN'],
              'workflow_run_id': os.environ.get('GITHUB_RUN_ID'),
              'execution_ref_sha': os.environ.get('GITHUB_SHA'),
              'pytest_exit_code': pytest_exit,
              'junit_totals': totals,
              'case_results': case_results,
              'verdict_agreement': {'passed': agreement, 'total': len(case_results)},
              'covered_unsafe_pass_count': unsafe_pass_count,
              'covered_false_rejection_count': false_rejection_count,
              'authority_checks': authority,
              'runtime_guardrail': runtime,
              'authority_file_sha256': digests,
              'live_anchor_runs': {
                  'failure_boundary_c06': 29693652154,
                  'ready_candidate01_ab': 29693991085,
              },
              'state': 'READY_FOR_R1_CLOSURE_REVIEW' if closure_ready else 'BLOCKED',
              'limitations': [
                  'Calibration covers the frozen deterministic R1 matrix only.',
                  'Zero covered errors are not a universal error-rate estimate.',
                  'This report does not close R1, start R2, or adopt Candidate 01 by default.',
              ],
          }
          (out / 'R1_CALIBRATION_REPORT.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )

          rows = [
              '# ReplayAB R1 Calibration Execution Report',
              '',
              f"- Toolchain: `{report['toolchain_sha']}`",
              f"- State: **{report['state']}**",
              f"- Verdict agreement: **{agreement}/{len(case_results)}**",
              f"- Covered unsafe-pass count: `{unsafe_pass_count}`",
              f"- Covered false-rejection count: `{false_rejection_count}`",
              f"- Pytest exit code: `{pytest_exit}`",
              '',
              '| Case | Status | Test |',
              '|---|---|---|',
          ]
          for case_id, item in case_results.items():
              rows.append(f"| `{case_id}` | {item['status']} | `{item['test']}` |")
          rows.extend([
              '',
              'This is an execution report for closure review, not an automatic closure or R2 authorization.',
          ])
          (out / 'R1_CALIBRATION_REPORT.md').write_text('\n'.join(rows) + '\n', encoding='utf-8')
          PY
          cp docs/development_workflow_optimization/replayab_r1_calibration/INVENTORY.yaml "$OUT/"
          cp docs/development_workflow_optimization/replayab_r1_calibration/EXPECTED_VERDICTS.yaml "$OUT/"
          cp docs/development_workflow_optimization/R1_IMPLEMENTATION_CONTRACT.md "$OUT/"
          find "$OUT" -maxdepth 1 -type f -printf '%f %s bytes\n' | sort > "$OUT/ARTIFACT_INVENTORY.txt"

      - name: Upload R1 calibration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replayab-r1-formal-calibration-${{ github.run_id }}
          path: /tmp/replayab-r1-formal-calibration
          if-no-files-found: error
          retention-days: 30

      - name: Enforce calibration result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('/tmp/replayab-r1-formal-calibration/R1_CALIBRATION_REPORT.json').read_text())
          if report['state'] != 'READY_FOR_R1_CLOSURE_REVIEW':
              raise SystemExit(json.dumps(report, sort_keys=True))
          print(json.dumps(report, sort_keys=True))
          PY
