name: Temporary Apply Registry

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Insert registered experiment once
        run: |
          python scripts/_temporary_insert_e7_ppo_registry.py
          if ! git diff --quiet -- experiments/registry.yaml; then
            git config user.name "DRPO PR Sync"
            git config user.email "drpo-pr-sync@users.noreply.github.com"
            git add experiments/registry.yaml
            git commit -m "EXT-H-E7-PPO-STABILITY-01 register execution state [auto-sync-registry]"
            git push origin HEAD:${GITHUB_HEAD_REF}
          fi
