name: Bootstrap manuscript review hash synchronization

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  synchronize:
    if: github.head_ref == 'fix/r2-health-manuscript-template-resolution-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bind review to updated generic release validator
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/manuscript/reviews/PAPER-PIPELINE-V2-DOMAIN-AGNOSTIC-05.json')
          text = path.read_text(encoding='utf-8')
          old = 'ece20336ff04a7f655514a24584f53e0adc7a7524b1403902d9708c4d6c56ee8'
          new = 'eaf531bbcad7025a82ddcb51b99fa2c15fb621690c90d981822197db710e6673'
          if text.count(old) != 1:
              raise SystemExit('review hash binding drift')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest pyyaml ruff

      - name: Verify manuscript review binding
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_full_manuscript_compiler.py \
            tests/test_manuscript_guidance_review.py \
            -q
          python -m ruff check \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py \
            tests/test_manuscript_guidance_review.py
          python -m compileall -q \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py \
            tests/test_manuscript_guidance_review.py

      - name: Publish clean candidate
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/bootstrap-manuscript-review-hash.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize manuscript review with release validator'
          git push origin "HEAD:${HEAD_BRANCH}"
