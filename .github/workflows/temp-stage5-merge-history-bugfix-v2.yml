name: TEMP Stage5 merge-history bugfix v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/stage5-merge-integrated-delta-history'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/stage5-merge-integrated-delta-history
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply maintenance fix and validate
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml pytest ruff
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import textwrap
          from pathlib import Path

          import yaml

          script_path = Path('scripts/handoff_authority.py')
          ledger_path = Path('docs/governance_pipeline_stage_status.yaml')
          test_path = Path('tests/test_handoff_authority_merge_history.py')
          auth_id = 'GOV-STAGE5-MERGE-INTEGRATED-DELTA-HISTORY-BUGFIX-2026-07-14'
          auth_path = Path('docs/governance_stage_authorizations') / f'{auth_id}.yaml'

          text = script_path.read_text(encoding='utf-8')
          helper_marker = '\n\ndef _discover_v3_deltas('
          helper = textwrap.dedent('''

          def _path_exists_at_commit(repo_root: Path, commit: str, relative: str) -> bool:
              return _git(
                  repo_root,
                  "cat-file",
                  "-e",
                  f"{commit}:{relative}",
                  check=False,
              ).returncode == 0


          def _first_parent_integration_commit(
              repo_root: Path,
              *,
              positions: dict[str, int],
              first_add: str,
              relative: str,
          ) -> str:
              """Map a side-branch delta addition to its first-parent merge integration."""

              ordered = sorted(positions, key=positions.__getitem__)
              for commit in ordered:
                  if _git(
                      repo_root,
                      "merge-base",
                      "--is-ancestor",
                      first_add,
                      commit,
                      check=False,
                  ).returncode != 0:
                      continue
                  if not _path_exists_at_commit(repo_root, commit, relative):
                      continue
                  first_parent = _git_text(repo_root, "rev-parse", f"{commit}^1")
                  if _path_exists_at_commit(repo_root, first_parent, relative):
                      continue
                  return commit
              raise HandoffAuthorityError(
                  "authoritative delta was not integrated on the first-parent history: "
                  + relative
              )
          ''')
          if text.count(helper_marker) != 1:
              raise SystemExit('discover marker changed')
          text = text.replace(helper_marker, helper + helper_marker, 1)

          old_block = '''        first_add = adds[0]
                  if first_add not in positions:
                      raise HandoffAuthorityError(f"authoritative delta was not added after activation: {relative}")
          '''.replace('          ', '')
          # Keep the source indentation exactly; the dedented literal above represents 8/12 spaces.
          if text.count(old_block) != 1:
              old_block = (
                  '        first_add = adds[0]\n'
                  '        if first_add not in positions:\n'
                  '            raise HandoffAuthorityError('
                  'f"authoritative delta was not added after activation: {relative}")\n'
              )
          new_block = (
              '        first_add = adds[0]\n'
              '        if first_add in positions:\n'
              '            integration_commit = first_add\n'
              '        else:\n'
              '            integration_commit = _first_parent_integration_commit(\n'
              '                repo_root,\n'
              '                positions=positions,\n'
              '                first_add=first_add,\n'
              '                relative=relative,\n'
              '            )\n'
          )
          if text.count(old_block) != 1:
              raise SystemExit('delta integration block changed')
          text = text.replace(old_block, new_block, 1)
          old_append = '        records.append((first_add, path, payload))'
          new_append = '        records.append((integration_commit, path, payload))'
          if text.count(old_append) != 1:
              raise SystemExit('delta ordering append changed')
          text = text.replace(old_append, new_append, 1)
          script_path.write_text(text, encoding='utf-8')

          test_path.write_text(textwrap.dedent('''
          from __future__ import annotations

          import subprocess
          import sys
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          sys.path.insert(0, str(ROOT / "scripts"))

          import handoff_authority as authority  # noqa: E402


          def _git(repo: Path, *args: str) -> str:
              completed = subprocess.run(
                  ["git", "-C", str(repo), *args],
                  check=True,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )
              return completed.stdout.strip()


          def _commit(repo: Path, message: str) -> str:
              _git(repo, "add", "-A")
              _git(repo, "commit", "-m", message)
              return _git(repo, "rev-parse", "HEAD")


          def test_side_branch_delta_maps_to_first_parent_merge_commit(tmp_path: Path) -> None:
              repo = tmp_path / "repo"
              repo.mkdir()
              _git(repo, "init", "-b", "main")
              _git(repo, "config", "user.name", "Test")
              _git(repo, "config", "user.email", "test@example.com")
              (repo / "baseline.txt").write_text("base\\n", encoding="utf-8")
              activation = _commit(repo, "activation")

              _git(repo, "switch", "-c", "feature")
              relative = "docs/handoff_deltas/EXAMPLE/HANDOFF_DELTA.yaml"
              delta = repo / relative
              delta.parent.mkdir(parents=True)
              delta.write_text("schema_version: 3\\n", encoding="utf-8")
              first_add = _commit(repo, "add delta")

              _git(repo, "switch", "main")
              (repo / "main.txt").write_text("main\\n", encoding="utf-8")
              _commit(repo, "main work")
              _git(repo, "merge", "--no-ff", "feature", "-m", "merge feature")
              head = _git(repo, "rev-parse", "HEAD")

              positions = authority._first_parent_positions(repo, activation, head)
              assert first_add not in positions
              assert authority._first_parent_integration_commit(
                  repo,
                  positions=positions,
                  first_add=first_add,
                  relative=relative,
              ) == head
          '''), encoding='utf-8')

          script_hash = hashlib.sha256(script_path.read_bytes()).hexdigest()
          authorization = {
              'schema_version': 1,
              'authorization_id': auth_id,
              'kind': 'maintenance',
              'change_class': 'bugfix',
              'claim_id': 'GOV-STAGE5-MERGE-INTEGRATED-DELTA-HISTORY-BUGFIX-01',
              'approval_record': 'user_approved_2026_07_14_register_and_merge_e7_squared_exp_result_after_merge_history_false_rejection_was_observed',
              'base_commit': '9c49824558b1eb7f697f299b246a135ff35a2017',
              'stage_ids': ['stage_5'],
              'authorized_stage_statuses': {'stage_5': 'closed_maintenance_only'},
              'authorized_file_hashes': {'scripts/handoff_authority.py': script_hash},
              'scope': [
                  'accept_immutable_schema_v3_deltas_integrated_from_a_github_pr_side_branch',
                  'map_the_unique_side_branch_add_to_the_first_parent_merge_integration_commit_for_replay_order',
                  'preserve_existing_delta_and_materialization_report_immutability_checks',
                  'add_a_focused_synthetic_git_history_regression_test',
                  'update_only_the_exact_stage_5_hash_binding',
              ],
              'excluded_scope': [
                  'change_schema_v3_shapes_or_registry_authority',
                  'allow_direct_handoff_edits_or_multiple_authoritative_deltas_per_update',
                  'modify_scientific_code_configuration_results_or_claims',
              ],
              'rollback_plan': [
                  'revert_the_integration_mapper_test_authorization_and_stage_ledger_hash_as_one_maintenance_change',
                  'preserve_all_existing_handoff_delta_and_result_history',
              ],
              'remaining_uncertainties': [
                  'octopus_merges_are_not_used_by_the_current_github_pr_route_and_are_not_generalized',
              ],
          }
          auth_path.write_text(
              yaml.safe_dump(authorization, sort_keys=False, allow_unicode=True),
              encoding='utf-8',
          )

          ledger = ledger_path.read_text(encoding='utf-8')
          old_binding = (
              '    - path: scripts/handoff_authority.py\n'
              '      sha256: a6532ba4c1bb9c4af24d79f027267de518c3832b347dba47e8319dee7a3ebe2c\n'
              '      authorized_by: GOV-STAGE5-CLOSURE-2026-07-03'
          )
          new_binding = (
              '    - path: scripts/handoff_authority.py\n'
              f'      sha256: {script_hash}\n'
              f'      authorized_by: {auth_id}'
          )
          if ledger.count(old_binding) != 1:
              raise SystemExit('stage 5 authority binding changed')
          ledger_path.write_text(ledger.replace(old_binding, new_binding, 1), encoding='utf-8')
          PY

          git add \
            scripts/handoff_authority.py \
            tests/test_handoff_authority_merge_history.py \
            docs/governance_pipeline_stage_status.yaml \
            docs/governance_stage_authorizations/GOV-STAGE5-MERGE-INTEGRATED-DELTA-HISTORY-BUGFIX-2026-07-14.yaml
          git commit -m 'Fix Stage 5 merged-delta history validation'

          python -m pytest -q \
            tests/test_handoff_authority_merge_history.py \
            tests/test_governance_pipeline_stage_status.py
          python -m ruff check scripts/handoff_authority.py tests/test_handoff_authority_merge_history.py
          python scripts/handoff_authority.py verify --repo-root . --json
          python scripts/validate_governance_pipeline_stage_status.py --repo-root . --json

          rm -f \
            .github/workflows/temp-stage5-merge-history-bugfix.yml \
            .github/workflows/temp-stage5-merge-history-bugfix-pr.yml \
            .github/workflows/temp-stage5-merge-history-bugfix-v2.yml \
            docs/STAGE5_MERGE_HISTORY_BUGFIX_FAILURE.log
          git add -A \
            .github/workflows/temp-stage5-merge-history-bugfix.yml \
            .github/workflows/temp-stage5-merge-history-bugfix-pr.yml \
            .github/workflows/temp-stage5-merge-history-bugfix-v2.yml \
            docs/STAGE5_MERGE_HISTORY_BUGFIX_FAILURE.log
          git commit -m 'Remove temporary Stage 5 bugfix workflows'
          test -z "$(git status --porcelain=v1)"
          git push origin HEAD:fix/stage5-merge-integrated-delta-history
