name: Temporary E8 reciprocal finalizer state probe

on:
  push:
    branches:
      - diag/e8-reciprocal-finalizer-48a3e49
    paths:
      - .github/workflows/temporary_e8_reciprocal_status_probe.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-reciprocal-finalizer-48a3e49
      - name: Record finalizer state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=8a198f055dd47cb2bee9ff6c0dbc8998288a9209&per_page=100' > /tmp/runs.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/runs.json').read_text())
          rows = [row for row in payload['workflow_runs'] if row['name'] == 'Temporary E8 reciprocal current-main finalize']
          if not rows:
              raise SystemExit('finalizer run not found')
          row = rows[0]
          Path('docs/experiments/TEMP_RECIPROCAL_FINALIZER_STATUS_2.txt').write_text(
              f"run_id={row['id']}\nstatus={row['status']}\nconclusion={row['conclusion']}\n",
              encoding='utf-8',
          )
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/experiments/TEMP_RECIPROCAL_FINALIZER_STATUS_2.txt
          git commit -m 'Record reciprocal finalizer state after repair'
          git push origin HEAD:diag/e8-reciprocal-finalizer-48a3e49
