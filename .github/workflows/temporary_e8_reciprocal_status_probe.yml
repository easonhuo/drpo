name: Temporary current-main pytest extractor

on:
  push:
    branches:
      - diag/e8-reciprocal-finalizer-48a3e49
    paths:
      - .github/workflows/temporary_e8_reciprocal_status_probe.yml

permissions:
  actions: read
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-reciprocal-finalizer-48a3e49
      - name: Extract current-main pytest baseline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh run view 29731547757 --repo easonhuo/drpo --log > /tmp/baseline_run.log 2>&1 || true
          {
            echo 'run_id=29731547757'
            grep -E 'FAILED |ERROR |short test summary|failed,|passed,' /tmp/baseline_run.log | tail -n 220 || true
            echo '--- tail ---'
            tail -n 120 /tmp/baseline_run.log
          } > docs/experiments/TEMP_CURRENT_MAIN_PYTEST_BASELINE.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/experiments/TEMP_CURRENT_MAIN_PYTEST_BASELINE.txt
          git commit -m 'Extract current-main pytest baseline'
          git push origin HEAD:diag/e8-reciprocal-finalizer-48a3e49
