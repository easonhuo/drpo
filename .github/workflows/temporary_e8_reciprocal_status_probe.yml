name: Temporary E8 repair failure extractor

on:
  push:
    branches:
      - diag/e8-reciprocal-finalizer-48a3e49
    paths:
      - .github/workflows/temporary_e8_reciprocal_status_probe.yml

permissions:
  actions: read
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-reciprocal-finalizer-48a3e49
      - name: Extract fixed-run failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh run view 29730483338 --repo easonhuo/drpo --log-failed > /tmp/repair_failed.log 2>&1 || true
          {
            echo 'run_id=29730483338'
            grep -Ein 'ERROR|Error|FAILED|failed|Traceback|Process completed|fatal|rejected|nothing to commit' /tmp/repair_failed.log | tail -n 120 || true
            echo '--- tail ---'
            tail -n 80 /tmp/repair_failed.log
          } > docs/experiments/TEMP_RECIPROCAL_REPAIR_FAILURE.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/experiments/TEMP_RECIPROCAL_REPAIR_FAILURE.txt
          git commit -m 'Extract reciprocal repair failure'
          git push origin HEAD:diag/e8-reciprocal-finalizer-48a3e49
