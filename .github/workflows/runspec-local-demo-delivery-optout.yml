name: RunSpec local demo delivery opt-out repair

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'maintenance/runspec-local-demo-delivery-optout-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: maintenance/runspec-local-demo-delivery-optout-01
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify repair ancestry and scope
        run: |
          git merge-base --is-ancestor cfe43571cd8c6d0909c61d36c4f6e4d07c2d2362 HEAD
          test "$(git diff --name-only cfe43571cd8c6d0909c61d36c4f6e4d07c2d2362 HEAD | sort)" = ".github/workflows/runspec-local-demo-delivery-optout.yml"

      - name: Apply narrow test repairs
        run: |
          python - <<'PY'
          from pathlib import Path

          runspec_path = Path('tests/test_agent_runspec.py')
          lines = runspec_path.read_text(encoding='utf-8').splitlines(keepends=True)
          matches = [
              i
              for i in range(len(lines) - 2)
              if lines[i] == '            "forbid_cross_lane": True,\n'
              and lines[i + 1] == '        },\n'
              and lines[i + 2] == '        "outputs": {\n'
          ]
          if len(matches) != 1:
              raise SystemExit(f'expected one local-demo policy tail, found {len(matches)}')
          lines.insert(matches[0] + 1, '            "formal_evidence_allowed": False,\n')
          runspec_path.write_text(''.join(lines), encoding='utf-8')

          claude_path = Path('tests/test_claude_runspec_workspace.py')
          text = claude_path.read_text(encoding='utf-8')
          old = '    assert "create `COMPLETED.json`" in local_instructions\n'
          new = '    assert "create `COMPLETED.json`" in " ".join(local_instructions.split())\n'
          if text.count(old) != 1:
              raise SystemExit(f'expected one wrapped-instruction assertion, found {text.count(old)}')
          claude_path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/runspec-local-demo-delivery-optout.yml

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff pyyaml

      - name: Run focused regressions
        run: |
          python -m pytest \
            tests/test_agent_runspec.py::test_validate_claim_and_run_lane_packages_only_allowed_artifacts \
            tests/test_claude_runspec_workspace.py::test_configure_is_idempotent_and_installs_strict_hook \
            -q

      - name: Run full repository tests
        run: |
          python -m pytest -q

      - name: Run changed-file quality gates
        run: |
          python -m ruff check tests/test_agent_runspec.py tests/test_claude_runspec_workspace.py
          git diff --check
          test "$(git diff --name-only | sort)" = $'tests/test_agent_runspec.py\ntests/test_claude_runspec_workspace.py'

      - name: Commit repaired tests
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          test "$(git diff --cached --name-only | sort)" = $'.github/workflows/runspec-local-demo-delivery-optout.yml\ntests/test_agent_runspec.py\ntests/test_claude_runspec_workspace.py'
          git commit -m 'Repair stale local executor test fixtures'
          git push origin HEAD:maintenance/runspec-local-demo-delivery-optout-01
