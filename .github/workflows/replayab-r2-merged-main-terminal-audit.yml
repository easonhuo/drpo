name: ReplayAB R2 merged-main terminal audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'exec/replayab-r2-merged-main-terminal-audit-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: b18aea9186d7e3ccc5d43b456719cafc23761e03
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lock exact merged main
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "b18aea9186d7e3ccc5d43b456719cafc23761e03"
          test -z "$(git status --porcelain)"
          git rev-parse HEAD > /tmp/audited-main.txt

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff pyyaml

      - name: Capture terminal checks
        shell: bash
        run: |
          set +e
          python -m pytest -q --junitxml=/tmp/full.xml > /tmp/full.log 2>&1
          echo $? > /tmp/full.exit
          python -m ruff check . > /tmp/ruff.log 2>&1
          echo $? > /tmp/ruff.exit
          python -m compileall -q src scripts tests > /tmp/compile.log 2>&1
          echo $? > /tmp/compile.exit
          python scripts/handoff_authority.py verify --repo-root . --json > /tmp/handoff.json 2>/tmp/handoff.err
          echo $? > /tmp/handoff.exit
          python scripts/validate_formal_execution_channel.py --repo-root . > /tmp/formal.log 2>&1
          echo $? > /tmp/formal.exit
          python -m pytest tests/test_governance_rule_inventory.py -q > /tmp/inventory.log 2>&1
          echo $? > /tmp/inventory.exit
          python scripts/validate_governance_pipeline_stage_status.py --repo-root . > /tmp/stage.log 2>&1
          echo $? > /tmp/stage.exit
          python -m pytest \
            tests/test_workflow_replay_model.py \
            tests/test_workflow_replay_execute.py \
            tests/test_workflow_replay_compare.py \
            tests/test_workflow_replay_r1.py \
            -q --junitxml=/tmp/focused.xml > /tmp/focused.log 2>&1
          echo $? > /tmp/focused.exit
          python -m pytest tests/test_workflow_replay_r1.py -k 'r2_' \
            -q --junitxml=/tmp/r2.xml > /tmp/r2.log 2>&1
          echo $? > /tmp/r2.exit
          python -m pytest tests/test_workflow_replay_r1.py -k 'not r2_' \
            -q --junitxml=/tmp/r1.xml > /tmp/r1.log 2>&1
          echo $? > /tmp/r1.exit
          exit 0

      - name: Build terminal report
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          checks = [
              'full', 'ruff', 'compile', 'handoff', 'formal', 'inventory',
              'stage', 'focused', 'r2', 'r1',
          ]
          exits = {
              name: int(Path(f'/tmp/{name}.exit').read_text().strip())
              for name in checks
          }

          def junit(path: str) -> dict[str, int]:
              root = ET.parse(path).getroot()
              suites = [root] if root.tag == 'testsuite' else list(root)
              return {
                  key: sum(int(node.attrib.get(key, 0)) for node in suites)
                  for key in ('tests', 'failures', 'errors', 'skipped')
              }

          report = {
              'schema_version': 1,
              'work_id': 'REPLAYAB-R2-SEMANTIC-ACCEPTANCE-01',
              'claim': 'GOV-DEV-WORKFLOW-OPTIMIZATION-BENCHMARK-01',
              'audited_main_sha': Path('/tmp/audited-main.txt').read_text().strip(),
              'merged_prs': [207, 208, 209, 211, 213],
              'merge_commits': [
                  'a4366fb51d377625f66ae0ed05f27b001f0c67a6',
                  '77cf88cef9e0cf17298b128a7ad6184730eca287',
                  '2cb3fad70fc37bab40451fdd2562d40b1a6ed861',
                  'dc09ad1589290c46004418b5e3493dc468096677',
                  'b18aea9186d7e3ccc5d43b456719cafc23761e03',
              ],
              'exit_codes': exits,
              'junit': {
                  'full': junit('/tmp/full.xml'),
                  'focused': junit('/tmp/focused.xml'),
                  'r2': junit('/tmp/r2.xml'),
                  'r1_non_regression': junit('/tmp/r1.xml'),
              },
              'status': 'PASS' if all(code == 0 for code in exits.values()) else 'FAIL',
              'closure_review_permitted': all(code == 0 for code in exits.values()),
              'r2_closed': False,
              'scientific_impact': 'none',
          }
          Path('/tmp/REPLAYAB_R2_MERGED_MAIN_TERMINAL_AUDIT.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n'
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: replayab-r2-merged-main-terminal-audit-${{ github.run_id }}
          path: |
            /tmp/REPLAYAB_R2_MERGED_MAIN_TERMINAL_AUDIT.json
            /tmp/audited-main.txt
            /tmp/*.xml
            /tmp/*.log
            /tmp/*.json
            /tmp/*.err
            /tmp/*.exit

      - name: Enforce terminal result
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('/tmp/REPLAYAB_R2_MERGED_MAIN_TERMINAL_AUDIT.json'))
          assert report['status'] == 'PASS', report
          assert report['audited_main_sha'] == 'b18aea9186d7e3ccc5d43b456719cafc23761e03'
          assert report['junit']['full']['failures'] == 0
          assert report['junit']['full']['errors'] == 0
          assert report['junit']['r2']['failures'] == 0
          assert report['junit']['r1_non_regression']['failures'] == 0
          assert report['closure_review_permitted'] is True
          assert report['r2_closed'] is False
          PY
