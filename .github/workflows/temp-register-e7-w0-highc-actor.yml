name: TEMP register E7 w0 high-c actor

on:
  push:
    branches:
      - dev/e7-w0-highc-actor-ablation
    paths:
      - .github/workflows/temp-register-e7-w0-highc-actor.yml

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e7-w0-highc-actor-ablation
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install authority dependency
        run: python -m pip install --quiet pyyaml
      - name: Author and materialize registration
        shell: bash
        run: |
          set -euo pipefail
          BASE=cca4aadc4a23d5a141cb83192676c32372cdabc2
          BRANCH=dev/e7-w0-highc-actor-ablation
          WORKFLOW=.github/workflows/temp-register-e7-w0-highc-actor.yml
          UPDATE_ID=EXT-H-E7-W0-HIGHC-ACTOR-REGISTRATION-2026-07-13
          DELTA_DIR=docs/handoff_deltas/${UPDATE_ID}

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch --no-tags origin dev/e7-ppo-w0-grid-pilot
          git merge-base --is-ancestor "${BASE}" HEAD

          python - <<'PY'
          from __future__ import annotations

          import subprocess
          import sys
          from pathlib import Path

          import yaml

          sys.path.insert(0, "scripts")
          import handoff_delta_shadow as shadow

          BASE = "cca4aadc4a23d5a141cb83192676c32372cdabc2"
          UPDATE_ID = "EXT-H-E7-W0-HIGHC-ACTOR-REGISTRATION-2026-07-13"
          EXPERIMENT_ID = "EXT-H-E7-W0-HIGHC-ACTOR-01"
          DELTA_PATH = Path("docs/handoff_deltas") / UPDATE_ID / "HANDOFF_DELTA.yaml"
          REGISTRY_PATH = Path("experiments/registry.yaml")
          HANDOFF_PATH = Path("docs/handoff.md")
          DOC_PATH = Path("docs/experiments/EXT-H-E7-W0-HIGHC-ACTOR-01.md")

          def git_show(commit: str, path: Path) -> str:
              return subprocess.check_output(
                  ["git", "show", f"{commit}:{path.as_posix()}"],
                  text=True,
              )

          base_registry = git_show(BASE, REGISTRY_PATH)
          base_handoff = git_show(BASE, HANDOFF_PATH)
          current_registry = REGISTRY_PATH.read_text(encoding="utf-8")
          current_handoff = HANDOFF_PATH.read_text(encoding="utf-8")
          if current_registry != base_registry:
              raise SystemExit("registry changed after stacked base before registration")
          if current_handoff != base_handoff:
              raise SystemExit("handoff changed after stacked base before registration")
          if EXPERIMENT_ID in current_registry or EXPERIMENT_ID in current_handoff:
              raise SystemExit("experiment is already registered")

          entity = r'''- id: EXT-H-E7-W0-HIGHC-ACTOR-01
            environment: EXT-H
            name: e7_direct_w0_one_high_c_actor_update_ablation_pilot
            status: pilot
            result_status: not_run
            predecessor: EXT-H-E7-PPO-W0-EXP-GRID-01
            registration_base_commit: cca4aadc4a23d5a141cb83192676c32372cdabc2
            claim: >-
              On the same three E7 external-validity tasks, test whether direct
              w(0)=1 approaches the Positive-only endpoint when the exponential
              coefficient is extended to c={2,3,4,6,8,12}, and screen whether
              the Hopper finite-horizon failure pattern differs between the
              historical canonical A2C actor update and PPO clipping.
            role: external_validity_high_c_and_actor_update_screening
            execution_class: pilot
            code_entrypoint: src/drpo/e7_w0_highc_actor.py
            bootstrap_entrypoint: src/drpo/e7_w0_highc_actor_bootstrap.py
            aggregation_entrypoint: src/drpo/e7_w0_highc_actor_aggregate.py
            geometry_diagnostics_entrypoint: src/drpo/e7_w0_geometry_diagnostics.py
            runtime_selection_entrypoint: src/drpo/e7_w0_highc_runtime_autotune.py
            operator_entrypoint: scripts/run_e7_w0_highc_actor_auto.py
            one_click_entrypoint: scripts/run_e7_w0_highc_actor_auto_one_click.sh
            resume_entrypoint: scripts/run_e7_w0_highc_actor_resume_one_click.sh
            liveness_entrypoint: scripts/run_e7_w0_highc_actor_liveness_one_click.sh
            config_path: configs/e7_w0_highc_actor_ablation_v1.json
            protocol_document: docs/experiments/EXT-H-E7-W0-HIGHC-ACTOR-01.md
            runspec_templates:
            - runspecs/templates/E7_W0_HIGHC_ACTOR_LIVENESS_20260713_01.yaml
            - runspecs/templates/E7_W0_HIGHC_ACTOR_PILOT_20260713_01.yaml
            parameterization:
              distance: detached_RMS_standardized_action_distance
              reference_distance: 2.0
              formula: w(d)=w(0)*exp(-c*(d/2))
              exponential_weight_at_zero: 1.0
              positive_only_weight_at_zero: 0.0
              legacy_scale_experiment_facing: false
            grid:
              positive_only_anchor: true
              exp_coefficients: [2.0, 3.0, 4.0, 6.0, 8.0, 12.0]
              actor_update_modes: [a2c, ppo_clip]
              controls_per_actor_mode: 7
            protocol:
              datasets:
              - hopper-medium-expert-v2
              - walker2d-medium-v2
              - walker2d-medium-replay-v2
              development_seeds: [200, 201]
              held_out_seeds: [204, 205, 206, 207]
              optimizer_steps_per_branch: 500000
              evaluation_interval_steps: 50000
              evaluation_episodes: 10
              expected_branches: 84
              shared_batch_size: 256
              shared_learning_rate: 0.0003
              ppo_clip_epsilon: 0.2
              ppo_updates_per_old_policy: 4
              ppo_auxiliary_tricks_enabled: false
            actor_update_comparison:
              shared_components:
              - canonical_source_fingerprint
              - actor_and_critic_architecture
              - critic_target_and_expectile_loss
              - advantage_definition_and_full_batch_normalization
              - optimizer_batch_and_learning_rate
              - dataset_and_evaluation_protocol
              intended_difference: actor_update_rule_only
              a2c: canonical_one_step_signed_actor_update
              ppo_clip: clipped_ratio_surrogate_with_old_policy_refresh_every_4_updates
              causal_claim_allowed: false
            geometry_diagnostics:
              interval_updates: 1000
              sampled_values_per_update: 16
              negative_distance_quantiles: [p10, p25, p50, p75, p90, p99]
              negative_weight_quantiles: [p10, p25, p50, p75, p90, p99]
              exact_weight_thresholds: [0.5, 0.1, 0.05, 0.01]
              advantage_weighted_effective_negative_mass: true
              extra_actor_or_critic_forward_pass: false
              objective_changed_by_observer: false
            execution:
              state: registered_ready_for_real_data_liveness
              development_branch: dev/e7-w0-highc-actor-ablation
              stacked_on_branch: dev/e7-ppo-w0-grid-pilot
              draft_pull_request: 52
              implementation_commit: d23e0f82d350fdecfddcb69efc1f1af63150a0b6
              reviewed_head_before_registration: 927974b3c690a1e6b59c6c0137b47f1a53f339dd
              server_start_reported: false
              result_available: false
              runtime_selection: automatic_cpu_memory_and_bounded_throughput
              runtime_selection_changes_scientific_matrix: false
            terminal_audit:
              required: true
              separates:
              - task_performance_degradation_or_collapse
              - support_or_variance_boundary_event
              - nan_inf_numerical_failure
              - best_checkpoint_from_terminal_checkpoint
            interpretation_limits:
            - screening_pilot_not_formal_evidence
            - fixed_500k_endpoint_is_not_convergence_or_steady_state
            - two_development_seeds_are_not_confirmatory_seeds
            - no_universal_ppo_or_a2c_superiority_claim
            - paired_actor_update_difference_is_not_controlled_causal_identification
            - no_dataset_specific_parameter_cherry_picking
            - hopper_and_walker_are_external_validity_only
            - does_not_replace_cu1_or_du1_controlled_identification
            formal_evidence_allowed: false

          '''
          marker = "development_experiment_registrations:\n"
          if current_registry.count(marker) != 1:
              raise SystemExit("registry insertion marker is not unique")
          registry_after = current_registry.replace(marker, entity + marker, 1)
          yaml.safe_load(registry_after)
          REGISTRY_PATH.write_text(registry_after, encoding="utf-8")

          block = (
              "- **Hopper/Walker E7 direct-`w(0)=1` high-`c` × actor-update follow-up "
              "（`EXT-H-E7-W0-HIGHC-ACTOR-01`）：**登记为 `not_run` 的 development "
              "screening pilot，是 `EXT-H-E7-PPO-W0-EXP-GRID-01` 的非破坏性 successor；"
              "前序 186-branch 结果与失败记录完整保留。本实验固定公开参数化 `u=d/2`、"
              "`w(d)=w(0)exp(-cu)`，只比较 Positive-only 与 `w(0)=1, "
              "c={2,3,4,6,8,12}`，并在 historical canonical A2C 与 PPO clip 两种 actor "
              "update 下成对执行。三项任务为 `hopper-medium-expert-v2`、"
              "`walker2d-medium-v2`、`walker2d-medium-replay-v2`，development seeds "
              "仅 `200,201`，共 84 个 500k branches；held-out seeds `204--207` 禁止使用。"
              "网络、critic、advantage、优化器、batch、学习率、数据与评估协议保持一致；"
              "PPO 继续固定 clip `0.2` 和 old-policy cadence `4`。两种 actor update 均记录"
              "负样本 standardized distance、实际 `w(d)`、阈值占比与 advantage-weighted "
              "effective negative mass，诊断不得改变 objective。该 external-validity pilot "
              "只回答有限步高衰减恢复与 actor-update 敏感性，不得升级为因果识别、收敛、"
              "稳态或 PPO/A2C 普遍排名；任务性能退化/崩溃、support/variance boundary 与 "
              "NaN/Inf 必须分开终态审计，也不得按数据集事后选择不同 `c` 冒充统一方法。"
          )
          operations = [
              {
                  "operation_id": "append-e7-w0-highc-actor-pilot",
                  "op": "append_to_section",
                  "heading_path": [
                      "0. 研究与执行原则（每次新会话首先阅读）",
                      "0.1 当前执行门禁",
                  ],
                  "block_id": "e7-w0-highc-actor-screening-pilot",
                  "content": block,
              }
          ]
          rendered = shadow.render(base_handoff, operations)
          shadow.verify_history_preservation(base_handoff, rendered.text, operations)

          delta = {
              "schema_version": 3,
              "update_id": UPDATE_ID,
              "mode": "authoritative",
              "base": {
                  "commit": BASE,
                  "handoff_sha256": shadow.sha256_text(base_handoff),
                  "registry_sha256": shadow.sha256_text(base_registry),
              },
              "renderer_version": 1,
              "operations": operations,
              "registry": {
                  "mode": "expected_after",
                  "exact_base_after_sha256": shadow.sha256_text(registry_after),
                  "changes": [
                      {
                          "change_id": "add-e7-w0-highc-actor-pilot",
                          "kind": "add_entity",
                          "entity_id": EXPERIMENT_ID,
                          "evidence": [
                              "experiments/registry.yaml",
                              DELTA_PATH.as_posix(),
                              "docs/experiments/EXT-H-E7-W0-HIGHC-ACTOR-01.md",
                              "docs/scopes/EXT-H-E7-W0-HIGHC-ACTOR-01.md",
                              "configs/e7_w0_highc_actor_ablation_v1.json",
                              "src/drpo/e7_w0_highc_actor.py",
                              "src/drpo/e7_w0_highc_actor_bootstrap.py",
                              "src/drpo/e7_w0_highc_actor_aggregate.py",
                              "src/drpo/e7_w0_geometry_diagnostics.py",
                              "src/drpo/e7_w0_highc_runtime_autotune.py",
                              "scripts/run_e7_w0_highc_actor_auto.py",
                              "scripts/run_e7_w0_highc_actor_auto_one_click.sh",
                              "tests/test_e7_w0_highc_actor.py",
                              "tests/test_e7_w0_geometry_diagnostics.py",
                              "tests/test_e7_w0_highc_runspecs.py",
                          ],
                      }
                  ],
              },
              "expected": {
                  "exact_base_candidate_sha256": shadow.sha256_text(rendered.text),
              },
          }
          DELTA_PATH.parent.mkdir(parents=True, exist_ok=False)
          DELTA_PATH.write_text(
              yaml.safe_dump(delta, sort_keys=False, allow_unicode=True),
              encoding="utf-8",
          )

          doc = DOC_PATH.read_text(encoding="utf-8")
          old = "- registration: pending schema-v3 authority update after code review;"
          new = (
              "- registration: schema-v3 authority update `"
              + UPDATE_ID
              + "` materialized on the Draft PR branch;"
          )
          if doc.count(old) != 1:
              raise SystemExit("protocol registration status line changed")
          DOC_PATH.write_text(doc.replace(old, new, 1), encoding="utf-8")
          PY

          git add experiments/registry.yaml "${DELTA_DIR}/HANDOFF_DELTA.yaml" docs/experiments/EXT-H-E7-W0-HIGHC-ACTOR-01.md
          git commit -m 'Register EXT-H-E7-W0-HIGHC-ACTOR-01'
          SOURCE_PATCH_COMMIT="$(git rev-parse HEAD)"

          rm -rf ../trusted-authority
          git worktree add --detach ../trusted-authority "${BASE}"
          python ../trusted-authority/scripts/handoff_authority.py normalize \
            --repo-root . \
            --trusted-repo-root ../trusted-authority \
            --current-before "${BASE}" \
            --source-base "${BASE}" \
            --source-patch-commit "${SOURCE_PATCH_COMMIT}" \
            --json | tee /tmp/e7-highc-normalize.json

          git add \
            docs/handoff.md \
            "${DELTA_DIR}/MATERIALIZATION_REPORT.json" \
            docs/handoff_shadow/stage4/minimal/generated
          git commit --amend --no-edit

          rm "${WORKFLOW}"
          git add -u "${WORKFLOW}"
          git commit -m 'Remove temporary E7 high-c registration workflow'

          python scripts/handoff_authority.py verify --repo-root . --json
          python scripts/validate_governance_pipeline_stage_status.py --repo-root . --json
          git status --porcelain=v1
          test -z "$(git status --porcelain=v1)"
          git push origin "HEAD:${BRANCH}"
