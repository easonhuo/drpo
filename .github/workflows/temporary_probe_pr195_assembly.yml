name: Temporary probe PR195 assembly

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_probe_pr195_assembly.yml

permissions:
  actions: read
  contents: write

jobs:
  probe:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Query assembly status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=16165db2c5ea30c768afb97ef791c4fd377b77d7&per_page=100' | jq -r '.workflow_runs[] | [.id,.name,.status,(.conclusion // "null")] | @tsv' > docs/experiments/E8_PR195_ASSEMBLY_STATUS.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_probe_pr195_assembly.yml
          git add docs/experiments/E8_PR195_ASSEMBLY_STATUS.txt
          git commit -m 'Record PR195 evidence assembly status'
          git push origin HEAD:diag/e8-upgrade-log-20260720
