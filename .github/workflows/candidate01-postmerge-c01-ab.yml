name: Candidate01 post-merge C01 A-B

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: candidate01-postmerge-c01-ab
  cancel-in-progress: false

jobs:
  replay-c01-ab:
    if: github.event_name != 'pull_request' || github.head_ref == 'exec/candidate01-postmerge-ab-c01-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      TOOLCHAIN: dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3
      SOURCE_RECORD: b99cc1b567de12b3b9ea17f7c3daf53ed29cc829
      OUTPUT: /tmp/replayab-c01-postmerge-ab
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Freeze merged toolchain and reconstructed inputs
        shell: bash
        run: |
          set -euo pipefail
          git worktree add --detach /tmp/replayab-toolchain "$TOOLCHAIN"
          git show "$SOURCE_RECORD:tests/fixtures/workflow_replay/candidate01_c1/c01_current_main_ready_packet.yaml" > /tmp/c01-postmerge-packet.yaml
          git show "$SOURCE_RECORD:tests/fixtures/workflow_replay/candidate01_c1/c01_current_main_ready_contract.yaml" > /tmp/c01-postmerge-contract-source.yaml
          python - <<'PY'
          from pathlib import Path
          import yaml
          source = Path('/tmp/c01-postmerge-contract-source.yaml')
          target = Path('/tmp/c01-postmerge-contract.yaml')
          payload = yaml.safe_load(source.read_text(encoding='utf-8'))
          payload['benchmark']['toolchain_sha'] = 'dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3'
          payload['historical_task']['historical_real_time_evidence'].append(
              'merged-toolchain:dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3'
          )
          target.write_text(yaml.safe_dump(payload, sort_keys=False), encoding='utf-8')
          PY
          test "$(sha256sum /tmp/c01-postmerge-packet.yaml | awk '{print $1}')" = a035620cd1ff85698d72b7fcdfbb082d221acd497286a66980e88d2ae554cdfd
      - name: Run opposite-order READY A-B
        shell: bash
        run: |
          set -euo pipefail
          python /tmp/replayab-toolchain/scripts/run_workflow_replay.py real-pair \
            --contract /tmp/c01-postmerge-contract.yaml \
            --case-packet /tmp/c01-postmerge-packet.yaml \
            --source-repo "$GITHUB_WORKSPACE" \
            --output-root "$OUTPUT" \
            --json | tee /tmp/c01-postmerge-ab-result.json
      - name: Package compact evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          STAGE=/tmp/replayab-c01-postmerge-ab-evidence
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          if [ -d "$OUTPUT" ]; then
            find "$OUTPUT" -type f \
              \( -name '*.json' -o -name '*.jsonl' -o -name '*.yaml' -o -name '*.log' -o -name '*.txt' \) \
              ! -path '*/workspace/*' \
              ! -path '*/control-plane/*' \
              ! -path '*/source.git/*' \
              ! -path '*/integration-repo/*' \
              -print0 | while IFS= read -r -d '' file; do
                relative="${file#${OUTPUT}/}"
                mkdir -p "$STAGE/$(dirname "$relative")"
                cp "$file" "$STAGE/$relative"
              done
          fi
          cp /tmp/c01-postmerge-contract.yaml "$STAGE/"
          cp /tmp/c01-postmerge-packet.yaml "$STAGE/"
          if [ -f /tmp/c01-postmerge-ab-result.json ]; then
            cp /tmp/c01-postmerge-ab-result.json "$STAGE/"
          fi
          tar -C /tmp -czf "$GITHUB_WORKSPACE/replayab-c01-postmerge-ab.tar.gz" replayab-c01-postmerge-ab-evidence
      - name: Upload A-B evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replayab-c01-postmerge-ab-${{ github.run_id }}
          path: replayab-c01-postmerge-ab.tar.gz
          if-no-files-found: error
          retention-days: 14
