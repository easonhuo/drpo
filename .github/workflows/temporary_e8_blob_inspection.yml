name: Temporary E8 closure blob inspection

on:
  push:
    branches:
      - dev/e8-completed-backlog-closure-01
    paths:
      - .github/workflows/temporary_e8_blob_inspection.yml

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-completed-backlog-closure-01
          fetch-depth: 0
      - name: Inspect historical blob
        run: python tools/temporary_inspect_e8_blob.py
      - name: Publish inspection and remove temporary files
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_e8_blob_inspection.yml
          git rm tools/temporary_inspect_e8_blob.py
          git add docs/experiments/E8_HISTORICAL_CLOSURE_BLOB_INSPECTION.md
          git commit -m 'Inspect historical E8 closure blob'
          git push origin HEAD:dev/e8-completed-backlog-closure-01
