name: Temporary extract c967 repair log

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_extract_c967_repair_log.yml

permissions:
  actions: read
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Extract repair log tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/experiments
          gh run view 29733755607 --repo easonhuo/drpo --log-failed > /tmp/log.txt 2>&1 || true
          tail -n 80 /tmp/log.txt > docs/experiments/E8_C967_REPAIR_LOG_TAIL.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_extract_c967_repair_log.yml
          git add docs/experiments/E8_C967_REPAIR_LOG_TAIL.txt
          git commit -m 'Extract c967 repair log tail'
          git push origin HEAD:diag/e8-upgrade-log-20260720
