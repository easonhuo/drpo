name: PAPER-CODE-VALIDATION-01 Countdown Final Apply

on:
  push:
    branches:
      - dev/paper-code-reference-01

permissions:
  contents: write

concurrency:
  group: paper-code-countdown-final-apply
  cancel-in-progress: false

jobs:
  apply-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/paper-code-reference-01
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Verify and apply accepted patch
        run: |
          set -euo pipefail
          patch_file='docs/paper_code_reference/COUNTDOWN_FINAL_ACCEPTANCE.patch'
          test -s "$patch_file"
          grep -Fq 'def _release_model(model: Any) -> None:' \
            paper_code/src/drpo_reference/experiments/countdown.py
          git apply --check "$patch_file"
          git apply "$patch_file"
          test "$(git hash-object paper_code/src/drpo_reference/experiments/countdown.py)" = \
            '8ae3de42273424e36c5bb4965c21fa55e99d62a3'
          test "$(git hash-object paper_code/tests/test_common.py)" = \
            '04efdcc17a473134e1cb4864be832ab997e1a2c1'

      - name: Run accepted validation suite
        run: |
          set -euo pipefail
          python -m pip install -q -e 'paper_code[test]' ruff
          python -m compileall -q paper_code/src paper_code/tests
          python -m pytest -q \
            paper_code/tests/test_aggregate.py \
            paper_code/tests/test_common.py \
            paper_code/tests/test_controls.py \
            paper_code/tests/test_events.py
          python -m pytest -q paper_code/tests/test_cli.py
          python -m pytest -q paper_code/tests/test_cu1_suite.py
          python -m pytest -q paper_code/tests/test_du1_cli.py
          python -m pytest -q paper_code/tests/test_du1_public.py
          python -m ruff check --line-length 100 paper_code/src paper_code/tests
          python -m ruff format --check --line-length 100 paper_code/src paper_code/tests
          python -m drpo_reference --help >/dev/null
          python -m drpo_reference cu1 --help >/dev/null
          python -m drpo_reference du1 --help >/dev/null
          python -m drpo_reference hopper --help >/dev/null
          python -m drpo_reference d4rl --help >/dev/null
          python -m drpo_reference countdown --help >/dev/null

      - name: Commit repaired after-image and remove transaction files
        run: |
          set -euo pipefail
          rm -f \
            docs/paper_code_reference/COUNTDOWN_FINAL_ACCEPTANCE.patch \
            .github/workflows/paper-code-countdown-final-apply.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'PAPER-CODE-VALIDATION-01 apply Countdown repair and boundary audit'
          git push origin HEAD:dev/paper-code-reference-01

# contents-api-trigger-v1
