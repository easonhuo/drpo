name: Bootstrap R1 R2 canonical reference fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'exec/replayab-r1-r2-discrimination-audit-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/replayab-r1-r2-discrimination-01
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Repair canonical reference construction
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_workflow_replay_r1_r2_discrimination.py')
          text = path.read_text(encoding='utf-8')

          old = '''def _r1_contract(
              case: dict[str, Any], family: dict[str, Any], evaluator_sha256: str
          ):
              canonical = case["arms"][case["canonical_arm"]]
          '''
          new = '''def _canonical_reference(
              inventory: dict[str, Any], family_id: str
          ) -> dict[str, Any]:
              controls = [
                  item
                  for item in inventory["cases"]
                  if item["family"] == family_id
                  and item["pair_class"] == "identical_correct"
              ]
              assert len(controls) == 1
              control = controls[0]
              return control["arms"][control["canonical_arm"]]


          def _r1_contract(
              case: dict[str, Any],
              family: dict[str, Any],
              canonical: dict[str, Any],
              evaluator_sha256: str,
          ):
          '''
          if text.count(old) != 1:
              raise SystemExit('r1 contract block drift')
          text = text.replace(old, new)

          old = '''def _r1_judgment(case: dict[str, Any], family: dict[str, Any], evaluator_sha256: str):
              contract = _r1_contract(case, family, evaluator_sha256)
          '''
          new = '''def _r1_judgment(
              case: dict[str, Any],
              family: dict[str, Any],
              inventory: dict[str, Any],
              evaluator_sha256: str,
          ):
              canonical = _canonical_reference(inventory, case["family"])
              contract = _r1_contract(case, family, canonical, evaluator_sha256)
          '''
          if text.count(old) != 1:
              raise SystemExit('r1 judgment block drift')
          text = text.replace(old, new)

          old = '''        r1_report, r1_acceptance = _r1_judgment(case, family, evaluator_sha256)
          '''
          new = '''        r1_report, r1_acceptance = _r1_judgment(
                      case, family, inventory, evaluator_sha256
                  )
          '''
          if text.count(old) != 1:
              raise SystemExit('r1 execution call drift')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff pyyaml

      - name: Verify repair
        run: |
          python -m pytest tests/test_workflow_replay_r1_r2_discrimination.py -q
          python -m ruff check tests/test_workflow_replay_r1_r2_discrimination.py
          python -m compileall -q tests/test_workflow_replay_r1_r2_discrimination.py

      - name: Publish repair
        env:
          TARGET_BRANCH: dev/replayab-r1-r2-discrimination-01
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/test_workflow_replay_r1_r2_discrimination.py
          git commit -m 'Fix R1 canonical reference in discrimination benchmark'
          git push origin "HEAD:${TARGET_BRANCH}"
