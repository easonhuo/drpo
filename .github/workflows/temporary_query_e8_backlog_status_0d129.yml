name: Temporary query E8 backlog status 0d129

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_query_e8_backlog_status_0d129.yml

permissions:
  actions: read
  contents: write

jobs:
  query:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Query status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=0d129b37f574598f0e4101f2c6f00c8f1e1c7467&per_page=100' | jq -r '.workflow_runs[] | [.id,.name,.event,.status,(.conclusion // "null")] | @tsv' > docs/experiments/E8_BACKLOG_STATUS_0D129.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_query_e8_backlog_status_0d129.yml
          git add docs/experiments/E8_BACKLOG_STATUS_0D129.txt
          git commit -m 'Record E8 backlog finalizer status at 0d129'
          git push origin HEAD:diag/e8-upgrade-log-20260720
