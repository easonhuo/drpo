name: Temporary Hopper replay stability validation

on:
  push:
    branches:
      - dev/ext-h-e7-hopper-replay-stab-hps-01
    paths:
      - '.github/workflows/tmp-test-e7-hr-stab.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Validate exact Hopper replay stability runner
        run: bash scripts/test_e7_hopper_replay_stability_hps.sh
      - name: Deposit validation receipt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/e7_hr_stab_validation
          printf '{"status":"PASS","command":"bash scripts/test_e7_hopper_replay_stability_hps.sh","runner_blob":"f6958d3658e82cbcde623cc0d5b354b7fdb1b4c6"}\n' > .tmp/e7_hr_stab_validation/PASS.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp/e7_hr_stab_validation/PASS.json
          git commit -m "Record Hopper replay stability validation"
          git push origin HEAD:dev/ext-h-e7-hopper-replay-stab-hps-01
