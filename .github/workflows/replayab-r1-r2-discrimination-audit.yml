name: ReplayAB R1 versus R2 discrimination audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'exec/replayab-r1-r2-discrimination-audit-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 1e2fb015d7b7655ea2eb8893c11e0ab68d752445
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff pyyaml

      - name: Capture frozen discrimination benchmark
        shell: bash
        run: |
          set +e
          python -m pytest tests/test_workflow_replay_r1_r2_discrimination.py -vv > /tmp/benchmark.log 2>&1
          echo $? > /tmp/benchmark.exit
          python - <<'PY' >> /tmp/benchmark.log 2>&1
          import importlib.util
          import json
          from pathlib import Path

          path = Path('tests/test_workflow_replay_r1_r2_discrimination.py')
          spec = importlib.util.spec_from_file_location('r1r2_discrimination', path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          rows, comparison = module.execute_benchmark()
          print('\n=== DEBUG_ROWS ===')
          print(json.dumps(rows, indent=2, sort_keys=True))
          print('\n=== DEBUG_COMPARISON ===')
          print(json.dumps(comparison, indent=2, sort_keys=True))
          PY
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: replayab-r1-r2-discrimination-debug-${{ github.run_id }}
          path: |
            /tmp/benchmark.log
            /tmp/benchmark.exit

      - name: Enforce frozen discrimination benchmark
        run: test "$(cat /tmp/benchmark.exit)" = 0

      - name: Run closed R1 and R2 calibration suite
        run: python -m pytest tests/test_workflow_replay_r1.py -q

      - name: Run focused ReplayAB regression
        run: |
          python -m pytest \
            tests/test_workflow_replay_model.py \
            tests/test_workflow_replay_execute.py \
            tests/test_workflow_replay_compare.py \
            tests/test_workflow_replay_r1.py \
            tests/test_workflow_replay_r1_r2_discrimination.py \
            -q

      - name: Run changed-file Ruff and compilation
        run: |
          python -m ruff check tests/test_workflow_replay_r1_r2_discrimination.py
          python -m compileall -q tests/test_workflow_replay_r1_r2_discrimination.py
