name: ReplayAB R1 versus R2 discrimination terminal audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'exec/replayab-r1-r2-discrimination-audit-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bb83fa5d8aaa38649112caa55dc115cfc1a18ff8
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify immutable benchmark scope
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only b18aea9186d7e3ccc5d43b456719cafc23761e03..HEAD | sort > /tmp/changed-paths.txt
          python - <<'PY'
          from pathlib import Path

          root = 'docs/development_workflow_optimization/benchmarks/REPLAYAB_R1_R2_DISCRIMINATION_01'
          expected = {
              f'{root}/BENCHMARK_PROTOCOL.md',
              f'{root}/CASE_INVENTORY.yaml',
              f'{root}/EXPECTED_VERDICTS.yaml',
              f'{root}/PRE_EXECUTION_IMPLEMENTATION_AMENDMENT.md',
              f'{root}/RAW_RESULTS.jsonl',
              f'{root}/PAIRED_COMPARISON.json',
              f'{root}/DECISION.md',
              'tests/test_workflow_replay_r1_r2_discrimination.py',
          }
          actual = set(Path('/tmp/changed-paths.txt').read_text().splitlines())
          if actual != expected:
              raise SystemExit(
                  f'changed-path mismatch\nmissing={sorted(expected-actual)}\n'
                  f'extra={sorted(actual-expected)}'
              )
          PY
          git rev-parse HEAD > /tmp/audit-head.txt

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest ruff pyyaml

      - name: Capture all terminal checks
        shell: bash
        run: |
          set +e
          python -m pytest tests/test_workflow_replay_r1_r2_discrimination.py \
            -q --junitxml=/tmp/benchmark.xml > /tmp/benchmark.log 2>&1
          echo $? > /tmp/benchmark.exit
          python -m pytest tests/test_workflow_replay_r1.py \
            -q --junitxml=/tmp/r1.xml > /tmp/r1.log 2>&1
          echo $? > /tmp/r1.exit
          python -m pytest \
            tests/test_workflow_replay_model.py \
            tests/test_workflow_replay_execute.py \
            tests/test_workflow_replay_compare.py \
            tests/test_workflow_replay_r1.py \
            tests/test_workflow_replay_r1_r2_discrimination.py \
            -q --junitxml=/tmp/focused.xml > /tmp/focused.log 2>&1
          echo $? > /tmp/focused.exit
          python -m pytest -q --junitxml=/tmp/full.xml > /tmp/full.log 2>&1
          echo $? > /tmp/full.exit
          python -m ruff check . > /tmp/ruff.log 2>&1
          echo $? > /tmp/ruff.exit
          python -m compileall -q src scripts tests > /tmp/compile.log 2>&1
          echo $? > /tmp/compile.exit
          python scripts/handoff_authority.py verify --repo-root . --json \
            > /tmp/handoff.json 2>/tmp/handoff.err
          echo $? > /tmp/handoff.exit
          python scripts/validate_formal_execution_channel.py --repo-root . \
            > /tmp/formal.log 2>&1
          echo $? > /tmp/formal.exit
          python -m pytest tests/test_governance_rule_inventory.py -q \
            > /tmp/inventory.log 2>&1
          echo $? > /tmp/inventory.exit
          python scripts/validate_governance_pipeline_stage_status.py --repo-root . \
            > /tmp/stage.log 2>&1
          echo $? > /tmp/stage.exit
          exit 0

      - name: Build terminal report
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          checks = [
              'benchmark', 'r1', 'focused', 'full', 'ruff', 'compile',
              'handoff', 'formal', 'inventory', 'stage',
          ]
          exits = {
              name: int(Path(f'/tmp/{name}.exit').read_text().strip())
              for name in checks
          }

          def junit(path: str) -> dict[str, int]:
              root = ET.parse(path).getroot()
              nodes = [root] if root.tag == 'testsuite' else list(root)
              return {
                  key: sum(int(node.attrib.get(key, 0)) for node in nodes)
                  for key in ('tests', 'failures', 'errors', 'skipped')
              }

          comparison = json.loads(Path(
              'docs/development_workflow_optimization/benchmarks/'
              'REPLAYAB_R1_R2_DISCRIMINATION_01/PAIRED_COMPARISON.json'
          ).read_text())
          report = {
              'schema_version': 1,
              'work_id': 'REPLAYAB-R1-R2-DISCRIMINATION-01',
              'parent_claim': 'GOV-DEV-WORKFLOW-OPTIMIZATION-BENCHMARK-01',
              'base_main_sha': 'b18aea9186d7e3ccc5d43b456719cafc23761e03',
              'audited_head_sha': Path('/tmp/audit-head.txt').read_text().strip(),
              'changed_paths': Path('/tmp/changed-paths.txt').read_text().splitlines(),
              'exit_codes': exits,
              'junit': {
                  'benchmark': junit('/tmp/benchmark.xml'),
                  'r1_terminal_non_regression': junit('/tmp/r1.xml'),
                  'focused_replayab': junit('/tmp/focused.xml'),
                  'full_repository': junit('/tmp/full.xml'),
              },
              'controlled_metrics': {
                  'r1': comparison['r1'],
                  'r2': comparison['r2'],
                  'deltas': comparison['deltas'],
                  'judge_gate_pass': comparison['judge_gate_pass'],
              },
              'status': 'PASS' if all(code == 0 for code in exits.values()) else 'FAIL',
              'decision': (
                  'PASS_CONTROLLED_ADVANTAGE'
                  if all(code == 0 for code in exits.values())
                  and comparison['judge_gate_pass']
                  else 'FAIL_OR_BLOCKED'
              ),
              'evidence_grade': 'C2_controlled_discrimination',
              'merge_authorized': False,
              'r2_closure_changed': False,
              'scientific_impact': 'none',
              'unsupported_claims': comparison['unsupported_claims'],
          }
          Path('/tmp/R1_R2_DISCRIMINATION_TERMINAL_AUDIT.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n'
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: replayab-r1-r2-discrimination-terminal-audit-${{ github.run_id }}
          path: |
            /tmp/R1_R2_DISCRIMINATION_TERMINAL_AUDIT.json
            /tmp/changed-paths.txt
            /tmp/audit-head.txt
            /tmp/*.xml
            /tmp/*.log
            /tmp/*.json
            /tmp/*.err
            /tmp/*.exit

      - name: Enforce terminal result
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('/tmp/R1_R2_DISCRIMINATION_TERMINAL_AUDIT.json'))
          assert report['status'] == 'PASS', report
          assert report['decision'] == 'PASS_CONTROLLED_ADVANTAGE'
          assert report['controlled_metrics']['judge_gate_pass'] is True
          assert report['controlled_metrics']['r2']['incorrect_arm_far'] == 0.0
          assert report['junit']['full_repository']['failures'] == 0
          assert report['junit']['full_repository']['errors'] == 0
          assert report['merge_authorized'] is False
          assert report['r2_closure_changed'] is False
          PY
