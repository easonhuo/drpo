name: Temporary Apply PPO Probe Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-probe-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Apply validated probe-termination patch once
        run: |
          set -euo pipefail
          if grep -q 'def _probe_trainer_template' src/drpo/e7_ppo_runtime_autotune.py; then
            exit 0
          fi
          git apply --check tmp/e7_ppo_probe_fix.patch
          git apply tmp/e7_ppo_probe_fix.patch
          git config user.name "DRPO PR Sync"
          git config user.email "drpo-pr-sync@users.noreply.github.com"
          git add src/drpo/e7_ppo_runtime_autotune.py tests/test_e7_ppo_stability_execution_flow.py
          git commit -m "EXT-H-E7-PPO-STABILITY-01 make capacity probes terminate cleanly [auto-probe-fix]"
          git push origin HEAD:${GITHUB_HEAD_REF}
