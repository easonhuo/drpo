name: Bootstrap R2 health manuscript template resolution

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/r2-health-manuscript-template-resolution-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Materialize narrow validator changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/manuscript_release_pipeline.py')
          text = path.read_text(encoding='utf-8')
          edits = [
              (
                  'class ReleaseBuildError(RuntimeError):\n'
                  '    pass\n\n\n'
                  'def read_yaml(path: Path) -> dict[str, Any]:\n',
                  'class ReleaseBuildError(RuntimeError):\n'
                  '    pass\n\n\n'
                  '_TEX_INCLUDE_RE = re.compile(r"\\\\(?:input|include)\\{([^{}]+)\\}")\n\n\n'
                  'def read_yaml(path: Path) -> dict[str, Any]:\n',
              ),
              (
                  'def build_assets(root: Path, manifest: dict[str, Any]) -> None:\n',
                  '''def resolve_active_template_source(
    main_path: Path, template_root: Path
) -> str:
    """Collect literal TeX source reachable from the configured entrypoint.

    Repository entrypoints may be thin wrappers around a replacement source.
    Follow only existing literal ``\\input`` and ``\\include`` targets that stay
    inside the configured template root. Macro paths, missing optional inputs,
    cycles, and paths outside the root are ignored.
    """

    root = template_root.resolve()
    if not main_path.is_file():
        raise ReleaseBuildError(
            f"configured main TeX file is missing: {main_path}"
        )
    visited: set[Path] = set()
    chunks: list[str] = []

    def visit(path: Path) -> None:
        resolved = path.resolve()
        try:
            resolved.relative_to(root)
        except ValueError:
            return
        if resolved in visited or not resolved.is_file():
            return
        visited.add(resolved)
        source = resolved.read_text(encoding="utf-8")
        chunks.append(source)
        for raw_target in _TEX_INCLUDE_RE.findall(source):
            target = raw_target.strip()
            if not target or "\\\\" in target or "#" in target:
                continue
            candidate = resolved.parent / target
            if not candidate.suffix:
                candidate = candidate.with_suffix(".tex")
            visit(candidate)

    visit(main_path)
    return "\\n".join(chunks)


def build_assets(root: Path, manifest: dict[str, Any]) -> None:
''',
              ),
              (
                  '    main_path = root / template["main_tex"]\n'
                  '    main = main_path.read_text(encoding="utf-8")\n'
                  '    if int(template.get("columns", 1)) == 2 and "\\\\twocolumn" not in main:\n'
                  '        raise ReleaseBuildError("configured two-column template is not active")\n'
                  '    family = str(template.get("family", "")).strip()\n'
                  '    if family and family not in main:\n'
                  '        raise ReleaseBuildError("configured template family is not active")\n',
                  '    main_path = root / template["main_tex"]\n'
                  '    active_source = resolve_active_template_source(main_path, overleaf)\n'
                  '    if (\n'
                  '        int(template.get("columns", 1)) == 2\n'
                  '        and "\\\\twocolumn" not in active_source\n'
                  '    ):\n'
                  '        raise ReleaseBuildError("configured two-column template is not active")\n'
                  '    family = str(template.get("family", "")).strip()\n'
                  '    if family and family not in active_source:\n'
                  '        raise ReleaseBuildError("configured template family is not active")\n',
              ),
          ]
          for old, new in edits:
              if text.count(old) != 1:
                  raise SystemExit(f'manuscript validator replacement drift: {old!r}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')

          path = Path('tests/test_full_manuscript_compiler.py')
          text = path.read_text(encoding='utf-8')
          old = (
              '    main = (ROOT / "paper/overleaf/main.tex").read_text()\n'
              '    assert "\\\\twocolumn" in main\n'
              '    assert "icml2026" in main\n'
          )
          new = (
              '    release = load_module()._release_module()\n'
              '    template = cfg["paper_template"]\n'
              '    active_source = release.resolve_active_template_source(\n'
              '        ROOT / template["main_tex"],\n'
              '        ROOT / template["root"],\n'
              '    )\n'
              '    assert "\\\\twocolumn" in active_source\n'
              '    assert "icml2026" in active_source\n'
          )
          if text.count(old) != 1:
              raise SystemExit('full manuscript compiler assertion drift')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest pyyaml ruff

      - name: Run focused manuscript regression
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/test_full_manuscript_compiler.py -q
          python -m ruff check \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py
          python -m compileall -q \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py

      - name: Publish clean candidate commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f maintenance.patch
          rm .github/workflows/bootstrap-r2-health-manuscript-template-resolution.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Resolve wrapper TeX entrypoints for template validation'
          git push origin "HEAD:${HEAD_BRANCH}"
