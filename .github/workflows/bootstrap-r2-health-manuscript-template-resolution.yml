name: Bootstrap R2 health manuscript template resolution

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/r2-health-manuscript-template-resolution-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve all active bibliography files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/manuscript_release_pipeline.py')
          text = path.read_text(encoding='utf-8')
          old = '\n'.join([
              '    bib_path = root / template["bibliography"]',
              '    bib = bib_path.read_text(encoding="utf-8")',
              '    keys = set(re.findall(r"@[A-Za-z]+\\s*\\{\\s*([^,]+),", bib))',
          ]) + '\n'
          new = '\n'.join([
              '    bib_paths = [(root / template["bibliography"]).resolve()]',
              '    bibliography_root = overleaf.resolve()',
              '    for group in re.findall(r"\\\\bibliography\\{([^}]+)\\}", active_source):',
              '        for raw_name in group.split(","):',
              '            name = raw_name.strip()',
              '            if not name or "\\\\" in name or "#" in name:',
              '                continue',
              '            candidate = (overleaf / name).resolve()',
              '            if candidate.suffix != ".bib":',
              '                candidate = candidate.with_suffix(".bib")',
              '            try:',
              '                candidate.relative_to(bibliography_root)',
              '            except ValueError as exc:',
              '                raise ReleaseBuildError(',
              '                    f"bibliography escapes template root: {name}"',
              '                ) from exc',
              '            if candidate not in bib_paths:',
              '                bib_paths.append(candidate)',
              '    bib_chunks: list[str] = []',
              '    for bib_path in bib_paths:',
              '        if not bib_path.is_file():',
              '            raise ReleaseBuildError(f"missing bibliography file: {bib_path}")',
              '        bib_chunks.append(bib_path.read_text(encoding="utf-8"))',
              '    bib = "\\n".join(bib_chunks)',
              '    keys = set(re.findall(r"@[A-Za-z]+\\s*\\{\\s*([^,]+),", bib))',
          ]) + '\n'
          if text.count(old) != 1:
              raise SystemExit('bibliography validation block drift')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest pyyaml ruff

      - name: Run focused manuscript regression
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/test_full_manuscript_compiler.py -q
          python -m ruff check \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py
          python -m compileall -q \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py

      - name: Publish clean candidate commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f maintenance.patch
          rm .github/workflows/bootstrap-r2-health-manuscript-template-resolution.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Resolve wrapper TeX entrypoints for template validation'
          git push origin "HEAD:${HEAD_BRANCH}"
