name: Bootstrap R2 health manuscript template resolution

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/r2-health-manuscript-template-resolution-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply narrow maintenance patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check maintenance.patch
          git apply maintenance.patch

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest pyyaml ruff

      - name: Run focused manuscript regression
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/test_full_manuscript_compiler.py -q
          python -m ruff check \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py
          python -m compileall -q \
            scripts/manuscript_release_pipeline.py \
            tests/test_full_manuscript_compiler.py

      - name: Publish clean candidate commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm maintenance.patch
          rm .github/workflows/bootstrap-r2-health-manuscript-template-resolution.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Resolve wrapper TeX entrypoints for template validation'
          git push origin "HEAD:${HEAD_BRANCH}"
