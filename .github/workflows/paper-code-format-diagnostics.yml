name: Paper Code Format Diagnostics

on:
  pull_request:
    types: [synchronize]
    paths:
      - "paper_code/**"
      - ".github/workflows/paper-code-format-diagnostics.yml"

permissions:
  contents: read

concurrency:
  group: paper-code-format-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: python -m pip install -q ruff

      - name: Capture Ruff format diff
        id: format_check
        continue-on-error: true
        run: |
          set +e
          python -m ruff format --check --diff --line-length 100 \
            paper_code/src paper_code/tests \
            > paper-code-format-diff.log 2>&1
          status=$?
          cat paper-code-format-diff.log
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload format diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-code-format-diagnostics-${{ github.event.pull_request.head.sha }}
          path: paper-code-format-diff.log
          if-no-files-found: error
          retention-days: 14

      - name: Fail on format mismatch
        if: steps.format_check.outcome == 'failure'
        run: exit 1
