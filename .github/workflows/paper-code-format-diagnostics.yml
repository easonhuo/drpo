name: Paper Code Format Cleanup

on:
  pull_request:
    types: [synchronize]
    paths:
      - "paper_code/**"
      - ".github/workflows/paper-code-format-diagnostics.yml"

permissions:
  contents: write

concurrency:
  group: paper-code-format-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Apply bounded Ruff formatting
        run: |
          set -euo pipefail
          python -m pip install -q ruff
          python -m ruff format --line-length 100 paper_code/src paper_code/tests
          python -m ruff format --check --line-length 100 paper_code/src paper_code/tests
          python -m ruff check --line-length 100 paper_code/src paper_code/tests
          python -m compileall -q paper_code/src paper_code/tests
          git diff --check

          python - <<'PY'
          import subprocess

          changed = subprocess.check_output(
              ["git", "diff", "--name-only"],
              text=True,
          ).splitlines()
          if not changed:
              raise SystemExit("expected Ruff formatting changes, found none")
          invalid = [
              path
              for path in changed
              if not path.endswith(".py")
              or not path.startswith(("paper_code/src/", "paper_code/tests/"))
          ]
          if invalid:
              raise SystemExit(f"format cleanup escaped allowed scope: {invalid}")
          print(f"Ruff formatted {len(changed)} bounded Python files")
          PY

      - name: Commit formatting and self-delete
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/paper-code-format-diagnostics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paper_code/src paper_code/tests
          git add -u .github/workflows/paper-code-format-diagnostics.yml
          git commit -m "PAPER-CODE-VALIDATION-01 apply bounded Ruff formatting"
          git push origin "HEAD:${HEAD_REF}"
