name: Apply E8 AsymRE dev patch

on:
  push:
    branches:
      - dev/e8-asymre-deltav-scan
    paths:
      - dev_patches/e8_asymre_deltav_scan.patch
      - .github/workflows/apply-e8-asymre-dev-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev/e8-asymre-deltav-scan

      - name: Apply and validate exact patch
        run: |
          set -euo pipefail
          git apply --check dev_patches/e8_asymre_deltav_scan.patch
          git apply dev_patches/e8_asymre_deltav_scan.patch
          python -m py_compile \
            src/drpo/countdown_e8_alpha1_highc_scan_common.py \
            src/drpo/countdown_e8_alpha1_c_scan_trainer.py \
            scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto.py \
            tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py

      - name: Commit implementation files
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/drpo/countdown_e8_alpha1_highc_scan_common.py \
            src/drpo/countdown_e8_alpha1_c_scan_trainer.py \
            scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto.py \
            tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py
          git commit -m 'E8 AsymRE: implement delta-v scan'
          git push origin HEAD:dev/e8-asymre-deltav-scan
