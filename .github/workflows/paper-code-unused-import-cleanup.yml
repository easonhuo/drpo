name: Paper Code Unused Import Cleanup

on:
  pull_request:
    types: [synchronize]
    paths:
      - ".github/workflows/paper-code-unused-import-cleanup.yml"

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply exact unused-import cleanup
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("paper_code/src/drpo_reference/continuous/cu1_phase.py"): [
                  ("    EPS,\n", ""),
                  ("    gradient_norm,\n", ""),
              ],
              Path("paper_code/src/drpo_reference/continuous/cu1_taper.py"): [
                  ("import math\n", ""),
              ],
              Path("paper_code/src/drpo_reference/continuous/cu1_training.py"): [
                  ("import math\n", ""),
              ],
          }
          for path, edits in replacements.items():
              text = path.read_text(encoding="utf-8")
              for old, new in edits:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(
                          f"{path}: expected exactly one occurrence of {old!r}, got {count}"
                      )
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
          PY

          python -m py_compile \
            paper_code/src/drpo_reference/continuous/cu1_phase.py \
            paper_code/src/drpo_reference/continuous/cu1_taper.py \
            paper_code/src/drpo_reference/continuous/cu1_training.py

          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            paper_code/src/drpo_reference/continuous/cu1_phase.py \
            paper_code/src/drpo_reference/continuous/cu1_taper.py \
            paper_code/src/drpo_reference/continuous/cu1_training.py | sort)"
          test "$changed" = "$expected"
          git diff --check

      - name: Commit cleanup and self-delete
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm .github/workflows/paper-code-unused-import-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            paper_code/src/drpo_reference/continuous/cu1_phase.py \
            paper_code/src/drpo_reference/continuous/cu1_taper.py \
            paper_code/src/drpo_reference/continuous/cu1_training.py
          git add -u .github/workflows/paper-code-unused-import-cleanup.yml
          git commit -m "PAPER-CODE-VALIDATION-01 remove verified unused imports"
          git push origin "HEAD:${HEAD_REF}"