name: Export E8 Registration Source Bundle

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'dev/e8-continuous-exp-grid-pilot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Build exact Git bundle
        run: |
          git bundle create /tmp/drpo-e8-registration.bundle --all
          git bundle verify /tmp/drpo-e8-registration.bundle
      - uses: actions/upload-artifact@v4
        with:
          name: drpo-e8-registration-source-bundle
          path: /tmp/drpo-e8-registration.bundle
          if-no-files-found: error
          retention-days: 1
