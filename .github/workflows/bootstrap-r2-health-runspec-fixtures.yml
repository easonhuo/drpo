name: Bootstrap R2 health RunSpec fixture fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/r2-health-runspec-fixtures-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Materialize narrow fixture changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          policy_files = [
              Path('tests/test_agent_runspec.py'),
              Path('tests/test_runspec_deferred_registration.py'),
              Path('tests/test_runspec_publish.py'),
              Path('tests/test_runspec_recovery.py'),
          ]
          old = '"policy": {\n            "existing_script_required": True,'
          new = (
              '"policy": {\n'
              '            "formal_evidence_allowed": False,\n'
              '            "existing_script_required": True,'
          )
          for path in policy_files:
              text = path.read_text(encoding='utf-8')
              if text.count(old) < 1:
                  raise SystemExit(f'missing local policy fixture in {path}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          path = Path('tests/test_claude_runspec_workspace.py')
          text = path.read_text(encoding='utf-8')
          old_assertion = '    assert "create `COMPLETED.json`" in local_instructions\n'
          new_assertion = (
              '    assert "`COMPLETED.json`" in local_instructions\n'
              '    assert "success evidence by hand" in local_instructions\n'
          )
          if text.count(old_assertion) != 1:
              raise SystemExit('Claude instruction assertion drift')
          path.write_text(text.replace(old_assertion, new_assertion), encoding='utf-8')
          PY

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest pyyaml ruff

      - name: Run focused RunSpec regression
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_agent_runspec.py \
            tests/test_runspec_deferred_registration.py \
            tests/test_runspec_publish.py \
            tests/test_runspec_recovery.py \
            tests/test_claude_runspec_workspace.py \
            -q
          python -m ruff check \
            tests/test_agent_runspec.py \
            tests/test_runspec_deferred_registration.py \
            tests/test_runspec_publish.py \
            tests/test_runspec_recovery.py \
            tests/test_claude_runspec_workspace.py
          python -m compileall -q \
            tests/test_agent_runspec.py \
            tests/test_runspec_deferred_registration.py \
            tests/test_runspec_publish.py \
            tests/test_runspec_recovery.py \
            tests/test_claude_runspec_workspace.py

      - name: Publish clean candidate commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f maintenance.patch
          rm .github/workflows/bootstrap-r2-health-runspec-fixtures.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Synchronize local RunSpec fixtures with formal delivery gate'
          git push origin "HEAD:${HEAD_BRANCH}"
