name: Temporary E8 history recovery

on:
  push:
    branches:
      - dev/e8-completed-backlog-closure-01
    paths:
      - .github/workflows/temporary_e8_history_recovery.yml

permissions:
  contents: write

jobs:
  recover:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-completed-backlog-closure-01
          fetch-depth: 0
      - name: Inspect historical chunks from Git history
        run: |
          set +e
          python tools/temporary_recover_e8_history.py
          test -f docs/experiments/E8_HISTORICAL_CLOSURE_HISTORY_RECOVERY.json
      - name: Publish inspection and remove temporary files
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_e8_history_recovery.yml
          git rm tools/temporary_recover_e8_history.py
          git add docs/experiments/E8_HISTORICAL_CLOSURE_HISTORY_RECOVERY.json
          git add docs/experiments/E8_COMPLETED_BACKLOG_RECOVERY_AUDIT.md
          git commit -m 'Inspect historical E8 closure chunks'
          git push origin HEAD:dev/e8-completed-backlog-closure-01
