name: Temporary E8 reciprocal closure bootstrap v3

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_reciprocal_closure_bootstrap_v3.yml

permissions:
  contents: write

jobs:
  close:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BRANCH: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
      BASE_SHA: dd46727c1efefd2e6d4cdf6f3b204ec1fc58fca3
      SCIENCE_HEAD: ca177caa459deeddd4a6a599fd19160340001a19
      DELTA_PATH: docs/handoff_deltas/EXT-C-E8-RECIPROCAL-JOINT-PILOT-CLOSURE-2026-07-20/HANDOFF_DELTA.yaml
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bootstrap dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Check bootstrap-only repair boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$(git merge-base "$SCIENCE_HEAD" HEAD)" = "$SCIENCE_HEAD"
          mapfile -t changed < <(git diff --name-only "$SCIENCE_HEAD"...HEAD)
          test "${#changed[@]}" -eq 4
          for path in "${changed[@]}"; do
            case "$path" in
              .github/workflows/temporary_e8_reciprocal_closure_bootstrap.yml|\
              .github/workflows/temporary_e8_reciprocal_closure_bootstrap_v2.yml|\
              .github/workflows/temporary_e8_reciprocal_closure_bootstrap_v3.yml|\
              .github/workflows/temporary_e8_reciprocal_closure_diagnostic.yml) ;;
              *) echo "unexpected repair path: $path" >&2; exit 1 ;;
            esac
          done
          git diff --check "$BASE_SHA"...HEAD

      - name: Author closure with registry insertion under experiments
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import yaml

          source = Path('.github/workflows/temporary_e8_reciprocal_closure_bootstrap.yml')
          payload = yaml.safe_load(source.read_text(encoding='utf-8'))
          steps = payload['jobs']['close']['steps']
          matches = [step['run'] for step in steps if step.get('name') == 'Verify scientific provenance and prepare authored closure']
          if len(matches) != 1:
              raise SystemExit(f'expected one authoring step, found {len(matches)}')
          script = matches[0]

          old_registry_write = 'registry_path.write_text(registry_text.rstrip() + "\\n\\n" + appended, encoding="utf-8")'
          new_registry_write = '''registry_marker = "\\ngovernance_changes:\\n"
          if registry_marker not in registry_text:
              raise SystemExit("registry governance_changes marker not found")
          registry_after_text = registry_text.replace(
              registry_marker,
              "\\n" + appended + "governance_changes:\\n",
              1,
          )
          registry_path.write_text(registry_after_text, encoding="utf-8")'''
          if old_registry_write not in script:
              raise SystemExit('registry write replacement point not found')
          script = script.replace(old_registry_write, new_registry_write, 1)

          needle = 'git config user.email "41898282+github-actions[bot]@users.noreply.github.com"\ngit add experiments/registry.yaml'
          removal = (
              'git config user.email "41898282+github-actions[bot]@users.noreply.github.com"\n'
              'git rm '
              '.github/workflows/temporary_e8_reciprocal_closure_bootstrap.yml '
              '.github/workflows/temporary_e8_reciprocal_closure_bootstrap_v2.yml '
              '.github/workflows/temporary_e8_reciprocal_closure_bootstrap_v3.yml '
              '.github/workflows/temporary_e8_reciprocal_closure_diagnostic.yml\n'
              'git add experiments/registry.yaml'
          )
          if needle not in script:
              raise SystemExit('workflow-removal insertion point not found')
          script = script.replace(needle, removal, 1)

          target = Path('/tmp/e8_reciprocal_author_closure_v3.sh')
          target.write_text(script, encoding='utf-8')
          target.chmod(0o700)
          PY
          /tmp/e8_reciprocal_author_closure_v3.sh
          test -z "$(git ls-files '.github/workflows/temporary_e8_reciprocal_closure*')"

      - name: Trusted normalize and materialize
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_PATCH_COMMIT="$(git rev-parse HEAD)"
          git worktree add --detach /tmp/drpo-trusted-main "$BASE_SHA"
          python /tmp/drpo-trusted-main/scripts/handoff_authority.py validate-delta \
            --repo-root . \
            --delta "$DELTA_PATH" \
            --source-patch-commit "$SOURCE_PATCH_COMMIT" \
            --json
          python /tmp/drpo-trusted-main/scripts/handoff_authority.py normalize \
            --repo-root . \
            --trusted-repo-root /tmp/drpo-trusted-main \
            --current-before "$BASE_SHA" \
            --source-base "$BASE_SHA" \
            --source-patch-commit "$SOURCE_PATCH_COMMIT" \
            --json
          git add docs/handoff.md experiments/registry.yaml docs/handoff_deltas docs/handoff_shadow/stage4/minimal/generated docs/experiments
          git commit --amend --no-edit

      - name: Run closure gates
        shell: bash
        run: |
          set -euo pipefail
          python scripts/handoff_authority.py verify --repo-root . --json
          python -m py_compile \
            src/drpo/countdown_e8_alpha1_highc_scan_common.py \
            src/drpo/countdown_e8_alpha1_highc_scan_runtime.py \
            tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py
          git diff --check "$BASE_SHA"...HEAD
          test -z "$(git status --porcelain)"
          test -z "$(git ls-files '.github/workflows/temporary_e8_reciprocal_closure*')"

      - name: Push atomic closure commit
        shell: bash
        run: git push origin HEAD:"$BRANCH"
