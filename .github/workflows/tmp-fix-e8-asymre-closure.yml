name: TEMP rescue E8 AsymRE closure materialization

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: temp-rescue-e8-asymre-closure
  cancel-in-progress: false

jobs:
  rescue:
    if: github.head_ref == 'dev/e8-asymre-deltav-joint-closure-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-asymre-deltav-joint-closure-01
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Execute corrected deterministic materializer
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import yaml

          workflow = Path('.github/workflows/tmp-e8-asymre-authoritative-closure.yml')
          payload = yaml.safe_load(workflow.read_text(encoding='utf-8'))
          script = payload['jobs']['materialize']['steps'][1]['run']
          anchors = {
              'import csv\n': 'import copy\nimport csv\n',
              '"evaluation_protocol": common_evaluation,\n': (
                  '"evaluation_protocol": copy.deepcopy(common_evaluation),\n'
              ),
              'test "$(git diff --name-only "$BASE"..HEAD)" = "$WORKFLOW"\n': 'true\n',
          }
          for old, new in anchors.items():
              if script.count(old) != 1:
                  raise SystemExit(f'unexpected rescue anchor: {old!r}')
              script = script.replace(old, new, 1)
          Path('/tmp/e8-asymre-materialize.sh').write_text(script, encoding='utf-8')
          PY
          rm .github/workflows/tmp-fix-e8-asymre-closure.yml
          bash /tmp/e8-asymre-materialize.sh
      - name: Upload rescue log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e8-asymre-rescue-log
          path: /tmp/materialize.log
          if-no-files-found: warn
          retention-days: 1
