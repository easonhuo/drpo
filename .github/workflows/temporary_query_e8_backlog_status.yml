name: Temporary query E8 backlog status

on:
  push:
    branches:
      - diag/e8-upgrade-log-20260720
    paths:
      - .github/workflows/temporary_query_e8_backlog_status.yml

permissions:
  actions: read
  contents: write

jobs:
  query:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/e8-upgrade-log-20260720
      - name: Query status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/experiments
          gh api 'repos/easonhuo/drpo/actions/runs?head_sha=4a019fb863b851ef94d43167eff927b5ff633710&per_page=100' | jq -r '.workflow_runs[] | [.id,.name,.event,.status,(.conclusion // "null")] | @tsv' > docs/experiments/E8_BACKLOG_STATUS_4A019F.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_query_e8_backlog_status.yml
          git add docs/experiments/E8_BACKLOG_STATUS_4A019F.txt
          git commit -m 'Record E8 backlog finalizer status'
          git push origin HEAD:diag/e8-upgrade-log-20260720
