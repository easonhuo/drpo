name: PAPER-CODE-VALIDATION-01 Apply Countdown Repair

on:
  push:
    branches: [dev/paper-code-reference-01]
    paths:
      - "docs/paper_code_reference/COUNTDOWN_ACCEPTANCE_TRIGGER.txt"
  pull_request:
    branches: [main]
    types: [synchronize, reopened]
    paths:
      - "docs/paper_code_reference/COUNTDOWN_ACCEPTANCE_TRIGGER.txt"

permissions:
  contents: write

jobs:
  apply-repair:
    if: github.ref_name == 'dev/paper-code-reference-01' || github.event.pull_request.head.ref == 'dev/paper-code-reference-01'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/paper-code-reference-01
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Apply verified patch
        run: |
          set -euo pipefail
          test -s docs/paper_code_reference/COUNTDOWN_ACCEPTANCE_TRIGGER.txt
          test -s docs/paper_code_reference/COUNTDOWN_RELEASE_FIX.patch
          grep -Fq 'def _release_model(model: Any) -> None:' paper_code/src/drpo_reference/experiments/countdown.py
          git apply --check docs/paper_code_reference/COUNTDOWN_RELEASE_FIX.patch
          git apply docs/paper_code_reference/COUNTDOWN_RELEASE_FIX.patch

      - name: Validate repaired files
        run: |
          set -euo pipefail
          python -m pip install -q -e 'paper_code[test]' ruff
          python -m py_compile \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_common.py
          python -m pytest -q \
            paper_code/tests/test_aggregate.py \
            paper_code/tests/test_common.py \
            paper_code/tests/test_controls.py \
            paper_code/tests/test_events.py
          python -m pytest -q \
            paper_code/tests/test_cli.py::test_cli_dispatches_countdown_public_runner
          python -m ruff check --line-length 100 \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_common.py
          python -m ruff format --check --line-length 100 \
            paper_code/src/drpo_reference/experiments/countdown.py \
            paper_code/tests/test_common.py

      - name: Commit and remove transaction files
        run: |
          set -euo pipefail
          rm -f \
            docs/paper_code_reference/COUNTDOWN_ACCEPTANCE_TRIGGER.txt \
            docs/paper_code_reference/COUNTDOWN_RELEASE_FIX.patch \
            .github/workflows/paper-code-countdown-acceptance-transaction.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'PAPER-CODE-VALIDATION-01 apply verified Countdown release repair'
          git push origin HEAD:dev/paper-code-reference-01
