name: Import revised Overleaf project and compiled PDF

on:
  push:
    branches:
      - dev/paper-revised-overleaf-20260715

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and verify uploaded project
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 \
            --output /tmp/drpo-overleaf.zip \
            'https://filebin.net/drpo20260715overleaf/drpo_overleaf_text_only.zip'
          echo 'c9692782f1875d6cc749963f879faccbc42711516cdc643728b482f3fa401623  /tmp/drpo-overleaf.zip' | sha256sum --check --strict
          rm -rf /tmp/drpo-overleaf
          mkdir -p /tmp/drpo-overleaf
          unzip -q /tmp/drpo-overleaf.zip -d /tmp/drpo-overleaf
          required=(
            BUILD.md
            algorithm.sty
            algorithmic.sty
            example_paper.bib
            icml2026.bst
            icml2026.sty
            main.tex
            main_replacement.tex
            missing_references.bib
          )
          for file in "${required[@]}"; do
            test -f "/tmp/drpo-overleaf/${file}"
          done

      - name: Install paper sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p paper/overleaf
          cp -a /tmp/drpo-overleaf/. paper/overleaf/

      - name: Install LaTeX toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            latexmk \
            texlive-bibtex-extra \
            texlive-fonts-recommended \
            texlive-latex-extra

      - name: Compile and validate manuscript
        shell: bash
        run: |
          set -euo pipefail
          cd paper/overleaf
          latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex
          test -s main.pdf
          test "$(pdfinfo main.pdf | awk '/^Pages:/ {print $2}')" = '40'
          if grep -Eqi \
            'Undefined control sequence|LaTeX Error|Citation .* undefined|Reference .* undefined|There were undefined references|There were undefined citations|multiply defined|Fatal error' \
            main.log; then
            echo 'Unresolved LaTeX diagnostic detected' >&2
            exit 1
          fi
          sha256sum main.pdf

      - name: Deposit release PDF
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p paper/releases
          cp paper/overleaf/main.pdf \
            paper/releases/DRPO_REWRITTEN_DRAFT_20260715.pdf
          cmp -s \
            paper/overleaf/main.pdf \
            paper/releases/DRPO_REWRITTEN_DRAFT_20260715.pdf
          rm -f .github/workflows/import-revised-overleaf.yml

      - name: Commit imported project and release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Import revised manuscript and compiled PDF release'
          git push origin HEAD
