name: E8 Continuous EXP Registration Materialize

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: e8-continuous-exp-registration-20260713
  cancel-in-progress: false

jobs:
  materialize:
    if: github.head_ref == 'dev/e8-continuous-exp-grid-pilot'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply verified authoritative registration transaction
        env:
          PATCH_B64: .e8_registration_materialized.patch.gz.b64
          PATCH_SHA256: 4c8b91c3b8efd95176f1d48c2226c28040a140c9e290a1c6cd6a6c2b72fbe967
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml
          git config user.name "drpo-registration-bot"
          git config user.email "drpo-registration-bot@users.noreply.github.com"
          base64 --decode "$PATCH_B64" | gzip --decompress > /tmp/e8-registration.patch
          echo "$PATCH_SHA256  /tmp/e8-registration.patch" | sha256sum --check
          git apply --check /tmp/e8-registration.patch
          git apply /tmp/e8-registration.patch
          rm -f "$PATCH_B64"
          git add -A
          git diff --cached --check
          git commit -m "Register E8 V2 continuous fixed-alpha EXP grid pilot"
          python scripts/handoff_authority.py verify --repo-root . --json
          test -z "$(git status --porcelain)"
          git push origin HEAD:refs/heads/dev/e8-continuous-exp-grid-pilot
