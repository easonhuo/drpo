name: E8 V2 taper integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DEV_SHA: ${{ github.event.pull_request.head.sha }}
      UPDATE_ID: EXT-C-E8-V2-GLOBAL-MILESTONE-AND-TAPER-SWEEP-2026-07-11
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Lock current main and create integration branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main dev/e8-v2-taper-sweep
          base_sha="$(git rev-parse origin/main)"
          test "$(git rev-parse origin/dev/e8-v2-taper-sweep)" = "$DEV_SHA"
          out_branch="integration/e8-v2-taper-ready-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "BASE_SHA=$base_sha" >> "$GITHUB_ENV"
          echo "OUT_BRANCH=$out_branch" >> "$GITHUB_ENV"
          git checkout --detach "$base_sha"
          git checkout -b "$out_branch"
          git config user.name drpo-integration-bot
          git config user.email drpo-integration-bot@users.noreply.github.com

      - name: Import reviewed files and registration generator
        shell: bash
        run: |
          set -euo pipefail
          git checkout "$DEV_SHA" -- \
            configs/countdown_e8_oracle_offline_v2_taper_sweep_0p5b.yaml \
            docs/experiments/E8_V2_TAPER_SWEEP_PROTOCOL.md \
            experiments/results/e8_oracle_offline_v2_global_low_scale_pilot/RESULT_SUMMARY.json \
            scripts/run_countdown_e8_oracle_offline_v2_taper_sweep.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_runtime.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_sweep.py \
            tests/test_countdown_e8_oracle_offline_v2_taper_sweep.py
          git show "$DEV_SHA:scripts/integration/e8_v2_taper_registration.py" \
            > /tmp/e8_v2_taper_registration.py
          python /tmp/e8_v2_taper_registration.py --base "$BASE_SHA" --repo-root .

      - name: Create source commit
        shell: bash
        run: |
          set -euo pipefail
          git add -f \
            configs/countdown_e8_oracle_offline_v2_taper_sweep_0p5b.yaml \
            docs/experiments/E8_V2_TAPER_SWEEP_PROTOCOL.md \
            experiments/results/e8_oracle_offline_v2_global_low_scale_pilot/RESULT_SUMMARY.json \
            scripts/run_countdown_e8_oracle_offline_v2_taper_sweep.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_runtime.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_sweep.py \
            tests/test_countdown_e8_oracle_offline_v2_taper_sweep.py \
            experiments/registry.yaml \
            docs/handoff_deltas/$UPDATE_ID/HANDOFF_DELTA.yaml
          git diff --cached --check
          git commit -m 'Register E8 V2 Global milestone and taper sweep'
          echo "SOURCE_PATCH_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Validate, normalize, and atomically amend
        shell: bash
        run: |
          set -euo pipefail
          python scripts/handoff_authority.py validate-delta \
            --repo-root . \
            --delta docs/handoff_deltas/$UPDATE_ID/HANDOFF_DELTA.yaml \
            --source-patch-commit "$SOURCE_PATCH_SHA" \
            --json > /tmp/validate.log
          cat /tmp/validate.log
          git worktree add --detach /tmp/drpo-trusted-main "$BASE_SHA"
          python scripts/handoff_authority.py normalize \
            --repo-root . \
            --trusted-repo-root /tmp/drpo-trusted-main \
            --current-before "$BASE_SHA" \
            --source-base "$BASE_SHA" \
            --source-patch-commit "$SOURCE_PATCH_SHA" \
            --json > /tmp/normalize.log
          cat /tmp/normalize.log
          git add \
            docs/handoff.md \
            docs/handoff_deltas/$UPDATE_ID/MATERIALIZATION_REPORT.json \
            docs/handoff_shadow/stage4/minimal/generated
          git diff --cached --check
          git commit --amend --no-edit

      - name: Run integration gates
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q \
            scripts/run_countdown_e8_oracle_offline_v2_taper_sweep.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_runtime.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_sweep.py \
            tests/test_countdown_e8_oracle_offline_v2_taper_sweep.py
          ruff check \
            scripts/run_countdown_e8_oracle_offline_v2_taper_sweep.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_runtime.py \
            src/drpo/countdown_e8_oracle_offline_v2_taper_sweep.py \
            tests/test_countdown_e8_oracle_offline_v2_taper_sweep.py
          pytest -q tests/test_countdown_e8_oracle_offline_v2_taper_sweep.py
          python scripts/handoff_authority.py verify --repo-root . --json
          python scripts/validate_governance_pipeline_stage_status.py --repo-root .
          git diff --check
          test -z "$(git status --porcelain)"

      - name: Push ready branch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "$BASE_SHA"
          git push origin "$OUT_BRANCH"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e8-v2-taper-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/validate.log
            /tmp/normalize.log
          if-no-files-found: warn
          retention-days: 7
