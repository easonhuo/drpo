name: Temporary E8 completed backlog finalize

on:
  push:
    branches:
      - dev/e8-completed-backlog-closure-01
    paths:
      - .github/workflows/temporary_e8_completed_backlog_finalize.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-completed-backlog-closure-01
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Finalize six completed E8 pilots on current main
        # Re-triggered after Stage 5 pre-integration history maintenance merged at main@be23ab5441fe9c1536edbf0b5c370a80c1279c7b.
        shell: bash
        run: |
          set +e
          python tools/temporary_finalize_e8_completed_backlog.py 2>&1 | tee /tmp/e8-backlog-finalizer.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            mkdir -p docs/experiments
            tail -n 240 /tmp/e8-backlog-finalizer.log > docs/experiments/E8_BACKLOG_FINALIZER_FAILURE.txt
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add docs/experiments/E8_BACKLOG_FINALIZER_FAILURE.txt
            git commit -m 'Record E8 backlog finalizer failure' || true
            git push origin HEAD:dev/e8-completed-backlog-closure-01 || true
            exit "$rc"
          fi
