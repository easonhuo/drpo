name: Temporary E8 completed backlog finalize

on:
  push:
    branches:
      - dev/e8-completed-backlog-closure-01
    paths:
      - .github/workflows/temporary_e8_completed_backlog_finalize.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-completed-backlog-closure-01
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Finalize six completed E8 pilots on current main
        # PR #174 is now merged; rerun against the resulting current main.
        run: python tools/temporary_finalize_e8_completed_backlog.py
