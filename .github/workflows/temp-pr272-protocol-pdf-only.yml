name: TEMP PR272 protocol compression and PDF-only figures

on:
  push:
    branches:
      - dev/paper-kdd2027-fig1-d4rl9-01

permissions:
  contents: write

jobs:
  apply-and-audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev/paper-kdd2027-fig1-d4rl9-01

      - name: Lock exact PR baseline
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = '69c106968837d1ece07443122019f48666df300c'
          test "$(git rev-parse --abbrev-ref HEAD)" = 'dev/paper-kdd2027-fig1-d4rl9-01'

      - name: Apply only the approved prose replacement and PDF-only output rule
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          old = """For each D4RL dataset, we first fit a canonical value critic and freeze the
          resulting transition-level advantages. We then train Positive-only Gaussian
          reference actors using only positive-advantage transitions, fix their terminal
          checkpoints, and probe negative-advantage transitions without further policy
          updates. Remoteness is measured by policy-relative standardized distance, and
          near/far samples are matched by absolute frozen advantage. Full training,
          matching, gradient-probe, and aggregation details are provided in
          Appendix~\\ref{app:d4rl_gradient_diagnostic}.""".replace("          ", "")

          new = """For D4RL, we evaluate negative-advantage transitions around fixed
          Positive-only Gaussian reference actors. Remoteness is defined by
          policy-relative standardized distance, and near/far transitions are matched
          by absolute frozen learned-critic advantage; no policy update is performed
          during probing. Full critic fitting, actor training, matching, gradient-probe,
          and aggregation details are provided in
          Appendix~\\ref{app:d4rl_gradient_diagnostic}.""".replace("          ", "")

          tex_paths = [
              Path("paper/kdd2027/main.tex"),
              Path("paper/kdd2027/source_locked.tex"),
              Path("paper/overleaf/main_replacement.tex"),
          ]
          for path in tex_paths:
              before = path.read_text(encoding="utf-8")
              if before.count(old) != 1:
                  raise SystemExit(f"{path}: approved source paragraph count != 1")
              if new in before:
                  raise SystemExit(f"{path}: approved replacement already present")
              after = before.replace(old, new, 1)
              if after != before.replace(old, new, 1):
                  raise SystemExit(f"{path}: non-contract prose mutation")
              path.write_text(after, encoding="utf-8")

          plot_path = Path("scripts/figures/plot_figure1_external_gradient.py")
          before = plot_path.read_text(encoding="utf-8")
          old_save = """def save_all(figure, stem: Path) -> None:
              stem.parent.mkdir(parents=True, exist_ok=True)
              for extension in ["pdf", "svg", "png"]:
                  figure.savefig(
                      str(stem) + "." + extension,
                      dpi=320 if extension == "png" else None,
                      bbox_inches="tight",
                      pad_inches=0.03,
                  )
          """.replace("          ", "")
          new_save = """def save_all(figure, stem: Path) -> None:
              stem.parent.mkdir(parents=True, exist_ok=True)
              figure.savefig(
                  str(stem) + ".pdf",
                  bbox_inches="tight",
                  pad_inches=0.03,
              )
          """.replace("          ", "")
          if before.count(old_save) != 1:
              raise SystemExit("plotter: PDF-only replacement source count != 1")
          after = before.replace(old_save, new_save, 1)
          if after != before.replace(old_save, new_save, 1):
              raise SystemExit("plotter: non-contract mutation")
          plot_path.write_text(after, encoding="utf-8")
          PY

          rm -f \
            paper/kdd2027/figures/figure1_external_gradient_d4rl9.png \
            paper/kdd2027/figures/figure1_external_gradient_d4rl9.svg \
            paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.png \
            paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.svg

      - name: Regenerate the two figures as PDF only
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -q numpy pandas matplotlib
          python scripts/figures/plot_figure1_external_gradient.py \
            --d4rl-main results/FIGURE1_EXTERNAL_GRADIENT_D4RL9/main_aggregate.csv \
            --d4rl-panels results/FIGURE1_EXTERNAL_GRADIENT_D4RL9/dataset_plot_data.csv \
            --d4rl-manifest results/FIGURE1_EXTERNAL_GRADIENT_D4RL9/MANIFEST.json \
            --countdown paper/kdd2027/figures/figure1_external_gradient_d4rl9_countdown_deciles.csv \
            --out paper/kdd2027/figures/figure1_external_gradient_d4rl9 \
            --appendix-out paper/kdd2027/figures/fig_app_d4rl9_gradient_panels
          cp paper/kdd2027/figures/figure1_external_gradient_d4rl9.pdf \
            paper/overleaf/figures/figure1_external_gradient_d4rl9.pdf
          cp paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.pdf \
            paper/overleaf/figures/fig_app_d4rl9_gradient_panels.pdf
          python -m py_compile scripts/figures/plot_figure1_external_gradient.py

      - name: Round 1 completeness audit - six independent reviews
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' | tee /tmp/round1.log
          from pathlib import Path

          paths = [
              Path("paper/kdd2027/main.tex"),
              Path("paper/kdd2027/source_locked.tex"),
              Path("paper/overleaf/main_replacement.tex"),
          ]
          texts = [path.read_text(encoding="utf-8") for path in paths]
          new = """For D4RL, we evaluate negative-advantage transitions around fixed
          Positive-only Gaussian reference actors. Remoteness is defined by
          policy-relative standardized distance, and near/far transitions are matched
          by absolute frozen learned-critic advantage; no policy update is performed
          during probing. Full critic fitting, actor training, matching, gradient-probe,
          and aggregation details are provided in
          Appendix~\\ref{app:d4rl_gradient_diagnostic}.""".replace("          ", "")

          assert [text.count(new) for text in texts] == [1, 1, 1]
          print("R1 approved compressed paragraph in all three TeX sources: PASS")
          assert all("no policy update is performed\nduring probing" in text for text in texts)
          print("R2 fixed-actor/no-probe-update meaning retained: PASS")
          assert all("absolute frozen learned-critic advantage" in text for text in texts)
          print("R3 matching-control meaning retained: PASS")
          assert all("Appendix~\\ref{app:d4rl_gradient_diagnostic}" in text for text in texts)
          print("R4 appendix pointer retained: PASS")
          for stem in [
              "paper/kdd2027/figures/figure1_external_gradient_d4rl9",
              "paper/kdd2027/figures/fig_app_d4rl9_gradient_panels",
          ]:
              pdf = Path(stem + ".pdf")
              assert pdf.is_file() and pdf.read_bytes().startswith(b"%PDF-")
              assert not Path(stem + ".png").exists()
              assert not Path(stem + ".svg").exists()
          print("R5 both paper figures are valid PDF-only assets: PASS")
          assert all("figure1_external_gradient_d4rl9.pdf" in text for text in texts)
          assert all("fig_app_d4rl9_gradient_panels.pdf" in text for text in texts)
          assert all("figure1_external_gradient_d4rl9.png" not in text for text in texts)
          assert all("fig_app_d4rl9_gradient_panels.png" not in text for text in texts)
          print("R6 all LaTeX sources reference PDF, never PNG/SVG: PASS")
          PY

      - name: Round 2 scope-purity audit - six independent reviews
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' | tee /tmp/round2.log
          import subprocess
          from pathlib import Path

          baseline = "69c106968837d1ece07443122019f48666df300c"
          tex_paths = [
              Path("paper/kdd2027/main.tex"),
              Path("paper/kdd2027/source_locked.tex"),
              Path("paper/overleaf/main_replacement.tex"),
          ]
          old = """For each D4RL dataset, we first fit a canonical value critic and freeze the
          resulting transition-level advantages. We then train Positive-only Gaussian
          reference actors using only positive-advantage transitions, fix their terminal
          checkpoints, and probe negative-advantage transitions without further policy
          updates. Remoteness is measured by policy-relative standardized distance, and
          near/far samples are matched by absolute frozen advantage. Full training,
          matching, gradient-probe, and aggregation details are provided in
          Appendix~\\ref{app:d4rl_gradient_diagnostic}.""".replace("          ", "")
          new = """For D4RL, we evaluate negative-advantage transitions around fixed
          Positive-only Gaussian reference actors. Remoteness is defined by
          policy-relative standardized distance, and near/far transitions are matched
          by absolute frozen learned-critic advantage; no policy update is performed
          during probing. Full critic fitting, actor training, matching, gradient-probe,
          and aggregation details are provided in
          Appendix~\\ref{app:d4rl_gradient_diagnostic}.""".replace("          ", "")

          for path in tex_paths:
              before = subprocess.check_output(
                  ["git", "show", f"{baseline}:{path.as_posix()}"], text=True
              )
              after = path.read_text(encoding="utf-8")
              assert after == before.replace(old, new, 1)
          print("S1 every TeX after-image equals one exact approved replacement: PASS")

          appendix_anchor = "\\subsection{D4RL Locomotion Gradient-Diagnostic Protocol}"
          for path in tex_paths:
              before = subprocess.check_output(
                  ["git", "show", f"{baseline}:{path.as_posix()}"], text=True
              )
              after = path.read_text(encoding="utf-8")
              assert before.split(appendix_anchor, 1)[1] == after.split(appendix_anchor, 1)[1]
          print("S2 D4RL appendix is byte-for-byte unchanged: PASS")

          section_anchor = "\\subsection{External Diagnostic of Far-Field Repulsion}"
          paragraph_anchor = "Countdown provides an autoregressive discrete setting"
          for path in tex_paths:
              before = subprocess.check_output(
                  ["git", "show", f"{baseline}:{path.as_posix()}"], text=True
              )
              after = path.read_text(encoding="utf-8")
              assert before.split(section_anchor, 1)[0] == after.split(section_anchor, 1)[0]
              assert before.split(paragraph_anchor, 1)[1] == after.split(paragraph_anchor, 1)[1]
          print("S3 manuscript text outside the approved paragraph is unchanged: PASS")

          plot = Path("scripts/figures/plot_figure1_external_gradient.py")
          before = subprocess.check_output(
              ["git", "show", f"{baseline}:{plot.as_posix()}"], text=True
          )
          after = plot.read_text(encoding="utf-8")
          old_save = """def save_all(figure, stem: Path) -> None:
              stem.parent.mkdir(parents=True, exist_ok=True)
              for extension in ["pdf", "svg", "png"]:
                  figure.savefig(
                      str(stem) + "." + extension,
                      dpi=320 if extension == "png" else None,
                      bbox_inches="tight",
                      pad_inches=0.03,
                  )
          """.replace("          ", "")
          new_save = """def save_all(figure, stem: Path) -> None:
              stem.parent.mkdir(parents=True, exist_ok=True)
              figure.savefig(
                  str(stem) + ".pdf",
                  bbox_inches="tight",
                  pad_inches=0.03,
              )
          """.replace("          ", "")
          assert after == before.replace(old_save, new_save, 1)
          print("S4 plotter changed only from multi-format to PDF-only output: PASS")

          expected = {
              "paper/kdd2027/main.tex",
              "paper/kdd2027/source_locked.tex",
              "paper/overleaf/main_replacement.tex",
              "scripts/figures/plot_figure1_external_gradient.py",
              "paper/kdd2027/figures/figure1_external_gradient_d4rl9.pdf",
              "paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.pdf",
              "paper/overleaf/figures/figure1_external_gradient_d4rl9.pdf",
              "paper/overleaf/figures/fig_app_d4rl9_gradient_panels.pdf",
              "paper/kdd2027/figures/figure1_external_gradient_d4rl9.png",
              "paper/kdd2027/figures/figure1_external_gradient_d4rl9.svg",
              "paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.png",
              "paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.svg",
              ".github/workflows/temp-pr272-protocol-pdf-only.yml",
          }
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", baseline], text=True
          ).splitlines())
          assert changed == expected, {
              "missing": sorted(expected - changed),
              "extra": sorted(changed - expected),
          }
          print("S5 exact changed-path set relative to PR baseline: PASS")

          for protected in ["docs/handoff.md", "experiments/registry.yaml"]:
              assert subprocess.run(
                  ["git", "diff", "--quiet", baseline, "--", protected], check=False
              ).returncode == 0
          print("S6 handoff, registry, experiment data, and all other paths unchanged: PASS")
          PY

      - name: Compile with canonical TeX Live 2025
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: 2025
          os: debian
          run: |
            cd paper/kdd2027
            pdflatex --version | tee /tmp/texlive-version.txt
            grep -Fq 'TeX Live 2025' /tmp/texlive-version.txt
            latexmk -C main.tex >/dev/null 2>&1 || true
            latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex
            test -s main.pdf
            if grep -Eqi \
              'Undefined control sequence|LaTeX Error|Citation .* undefined|Reference .* undefined|There were undefined references|There were undefined citations|Fatal error' \
              main.log; then
              exit 1
            fi

      - name: Commit exact audited update and remove transport workflow
        shell: bash
        env:
          HEAD_BRANCH: dev/paper-kdd2027-fig1-d4rl9-01
        run: |
          set -euo pipefail
          rm -f .github/workflows/temp-pr272-protocol-pdf-only.yml
          git add -A
          expected=$(cat <<'EOF'
          paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.pdf
          paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.png
          paper/kdd2027/figures/fig_app_d4rl9_gradient_panels.svg
          paper/kdd2027/figures/figure1_external_gradient_d4rl9.pdf
          paper/kdd2027/figures/figure1_external_gradient_d4rl9.png
          paper/kdd2027/figures/figure1_external_gradient_d4rl9.svg
          paper/kdd2027/main.tex
          paper/kdd2027/source_locked.tex
          paper/overleaf/figures/fig_app_d4rl9_gradient_panels.pdf
          paper/overleaf/figures/figure1_external_gradient_d4rl9.pdf
          paper/overleaf/main_replacement.tex
          scripts/figures/plot_figure1_external_gradient.py
          EOF
          )
          actual=$(git diff --cached --name-only 69c106968837d1ece07443122019f48666df300c | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sed 's/^          //' | sort)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'PAPER-FIG1-D4RL9: compress body protocol and keep PDF-only figures'
          git push origin "HEAD:${HEAD_BRANCH}"
