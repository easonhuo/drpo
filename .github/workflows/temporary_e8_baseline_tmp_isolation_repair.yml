name: Temporary E8 baseline temp isolation repair

on:
  push:
    branches:
      - dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
    paths:
      - .github/workflows/temporary_e8_baseline_tmp_isolation_repair.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
      - name: Isolate baseline and target temporary paths
        run: python tools/temporary_isolate_e8_baseline_tmp.py
      - name: Commit repaired differential gate
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_e8_baseline_tmp_isolation_repair.yml
          git rm tools/temporary_isolate_e8_baseline_tmp.py
          git add .github/workflows/temporary_e8_reciprocal_current_main_finalize.yml
          git diff --check --cached
          git commit -m 'Isolate reciprocal baseline and target temp paths'
          git push origin HEAD:dev/ext-c-e8-reciprocal-q-dense-lambda-curve-32cell-01
