name: Temporary E8 AsymRE dense-boundary apply

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - dev/tmp-e8-asymre-boundary-dense-apply-base

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'dev/e8-asymre-deltav-boundary-dense'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/e8-asymre-deltav-boundary-dense
          fetch-depth: 1
          show-progress: false

      - name: Apply deterministic dense-boundary transformation
        shell: bash
        run: |
          set -uo pipefail
          if [[ ! -f .tmp/e8_asymre_boundary_dense_apply.sh ]]; then
            echo 'deterministic apply script already consumed'
            exit 0
          fi
          actual_blob="$(git hash-object .tmp/e8_asymre_boundary_dense_apply.sh)"
          echo "apply-script blob: ${actual_blob}"
          if [[ "$actual_blob" != 'f1d5d2d2db4564f5c819fc357d7f2960d7de4438' ]]; then
            echo "unexpected apply-script blob ${actual_blob}" > .tmp/e8_apply_failure.log
            exit 1
          fi
          bash .tmp/e8_asymre_boundary_dense_apply.sh > .tmp/e8_apply_failure.log 2>&1
          status=$?
          cat .tmp/e8_apply_failure.log
          if [[ $status -ne 0 ]]; then
            exit $status
          fi
          rm .tmp/e8_apply_failure.log
          rm .tmp/e8_asymre_boundary_dense_apply.sh

      - name: Upload apply failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e8-asymre-boundary-dense-apply-failure
          path: .tmp/e8_apply_failure.log
          if-no-files-found: error
          retention-days: 1

      - name: Install focused-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff

      - name: Focused validation
        run: |
          python -m pytest -q \
            tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py
          ruff check \
            src/drpo/countdown_e8_alpha1_highc_scan_common.py \
            tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py
          python -m py_compile \
            src/drpo/countdown_e8_alpha1_highc_scan_common.py \
            tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py
          git diff --check

      - name: Commit verified dense-boundary files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo 'no changes to commit'
            exit 0
          fi
          git config user.name 'drpo-e8-dense-apply-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'EXT-C-E8: implement AsymRE dense boundary profile'
          git push origin HEAD:dev/e8-asymre-deltav-boundary-dense
