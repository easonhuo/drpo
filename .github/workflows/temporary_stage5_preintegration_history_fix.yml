name: Temporary Stage 5 pre-integration history fix

on:
  push:
    branches:
      - fix/stage5-preintegration-report-history-20260720
    paths:
      - .github/workflows/temporary_stage5_preintegration_history_fix.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/stage5-preintegration-report-history-20260720
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e '.[dev]'
      - name: Apply and verify bounded Stage 5 maintenance patch
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            python tools/temporary_patch_stage5_maintenance_fixture.py
            python tools/temporary_patch_stage5_preintegration_history.py
            python tools/temporary_patch_stage5_focused_regression.py
            python tools/temporary_refresh_stage5_maintenance_hashes.py
            DRPO_STAGE5_MAINTENANCE_CANDIDATE=1 python - <<'PY'
          import runpy
          import tempfile
          from pathlib import Path

          namespace = runpy.run_path(
              "tests/stage5_candidate_integration.py",
              run_name="stage5_candidate",
          )
          with tempfile.TemporaryDirectory(prefix="drpo-stage5-focused-") as directory:
              namespace[
                  "run_preintegration_report_revision_and_postintegration_tamper"
              ](Path(directory))
          print("Stage 5 pre-integration history regression: PASS")
          PY
            python scripts/handoff_authority.py verify --repo-root . --json
            python scripts/validate_governance_pipeline_stage_status.py --repo-root .
            python -m pytest -q tests/test_governance_pipeline_stage_status.py tests/test_governance_rule_inventory.py
            python -m compileall -q scripts tests
            ruff check scripts/handoff_authority.py tests/stage5_candidate_integration.py
          } 2>&1 | tee /tmp/stage5-fix.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            mkdir -p docs/experiments
            tail -n 260 /tmp/stage5-fix.log > docs/experiments/STAGE5_PREINTEGRATION_HISTORY_FIX_FAILURE.txt
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add docs/experiments/STAGE5_PREINTEGRATION_HISTORY_FIX_FAILURE.txt
            git commit -m 'Record Stage 5 history-fix failure' || true
            git push origin HEAD:fix/stage5-preintegration-report-history-20260720 || true
            exit "$rc"
          fi
      - name: Publish clean maintenance branch
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temporary_stage5_preintegration_history_fix.yml
          git rm tools/temporary_patch_stage5_preintegration_history.py
          git rm tools/temporary_patch_stage5_maintenance_fixture.py
          git rm tools/temporary_patch_stage5_focused_regression.py
          git rm tools/temporary_refresh_stage5_maintenance_hashes.py
          rm -f docs/experiments/STAGE5_PREINTEGRATION_HISTORY_FIX_FAILURE.txt
          git add -A
          git diff --check --cached
          test -z "$(git ls-files '.github/workflows/temporary_stage5*' 'tools/temporary_*stage5*')" || {
            echo 'temporary path remains in final tree' >&2
            exit 1
          }
          git commit -m 'Fix Stage 5 pre-integration report history validation'
          git push origin HEAD:fix/stage5-preintegration-report-history-20260720
