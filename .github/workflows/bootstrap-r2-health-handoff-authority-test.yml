name: Bootstrap R2 health handoff authority test fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/r2-health-handoff-authority-test-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply narrow maintenance patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check maintenance.patch
          git apply maintenance.patch

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest pyyaml ruff

      - name: Run focused authority verification
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/test_handoff_authority.py -q
          python scripts/handoff_authority.py verify --repo-root .
          python scripts/validate_governance_pipeline_stage_status.py --repo-root .
          python -m ruff check tests/test_handoff_authority.py
          python -m compileall -q tests/test_handoff_authority.py

      - name: Publish clean candidate commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm maintenance.patch
          rm .github/workflows/bootstrap-r2-health-handoff-authority-test.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Isolate current repository handoff authority integration test'
          git push origin "HEAD:${HEAD_BRANCH}"
