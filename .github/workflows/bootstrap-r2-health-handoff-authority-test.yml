name: Bootstrap R2 health handoff authority test fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/r2-health-handoff-authority-test-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install focused dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e . pytest pyyaml ruff

      - name: Capture focused authority verification
        shell: bash
        run: |
          set +e
          report='docs/handoff_deltas/EXT-C-E8-COMPLETED-BACKLOG-CLOSURE-2026-07-20/MATERIALIZATION_REPORT.json'
          {
            echo 'HEAD:'
            git rev-parse HEAD
            echo 'TOUCHES:'
            git log --format='%H %P %s' -- "$report"
            echo 'ADDITIONS:'
            git log --diff-filter=A --format='%H %P %s' -- "$report"
            echo 'FIRST-PARENT:'
            git rev-list --first-parent --reverse HEAD -- "$report"
          } > /tmp/history.log 2>&1
          echo $? > /tmp/history.exit
          python -m pytest tests/test_handoff_authority.py -q -vv \
            > /tmp/pytest.log 2>&1
          echo $? > /tmp/pytest.exit
          python scripts/handoff_authority.py verify --repo-root . \
            > /tmp/authority.log 2>&1
          echo $? > /tmp/authority.exit
          python scripts/validate_governance_pipeline_stage_status.py --repo-root . \
            > /tmp/governance.log 2>&1
          echo $? > /tmp/governance.exit
          python -m ruff check tests/test_handoff_authority.py \
            > /tmp/ruff.log 2>&1
          echo $? > /tmp/ruff.exit
          python -m compileall -q tests/test_handoff_authority.py \
            > /tmp/compile.log 2>&1
          echo $? > /tmp/compile.exit
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r2-health-handoff-authority-diagnostic-${{ github.run_id }}
          path: |
            /tmp/*.log
            /tmp/*.exit

      - name: Enforce focused authority verification
        shell: bash
        run: |
          set -euo pipefail
          for name in history pytest authority governance ruff compile; do
            echo "=== ${name} ==="
            cat "/tmp/${name}.log"
            test "$(cat "/tmp/${name}.exit")" = "0"
          done

      - name: Publish clean candidate commit
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f maintenance.patch
          rm .github/workflows/bootstrap-r2-health-handoff-authority-test.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Isolate current repository handoff authority integration test'
          git push origin "HEAD:${HEAD_BRANCH}"
