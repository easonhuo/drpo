name: ReplayAB Post-fix C01 Current-main A-B

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: replayab-postfix-c01-current-main-ab
  cancel-in-progress: false

jobs:
  c01-real-pair:
    if: github.event_name != 'pull_request' || github.head_ref == 'exec/candidate01-postfix-c01-pr159-calibration-01'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run C01 opposite-order A-B pairs
        shell: bash
        run: |
          set -euo pipefail
          TOOLCHAIN=2ba5dbf18cf1ce986abe9e8d011cbf72deff1698
          CONTRACT="$GITHUB_WORKSPACE/tests/fixtures/workflow_replay/candidate01_c1/c01_current_main_ready_contract.yaml"
          PACKET="$GITHUB_WORKSPACE/tests/fixtures/workflow_replay/candidate01_c1/c01_current_main_ready_packet.yaml"
          OUTPUT=/tmp/replayab-c01-current-main-ab
          git cat-file -e "${TOOLCHAIN}^{commit}"
          git cat-file -e "dc46ea12af90971c9f3cb4137560d3d71bb308b3^{commit}"
          git worktree add --detach /tmp/replayab-toolchain "$TOOLCHAIN"
          python /tmp/replayab-toolchain/scripts/run_workflow_replay.py real-pair \
            --contract "$CONTRACT" \
            --case-packet "$PACKET" \
            --source-repo "$GITHUB_WORKSPACE" \
            --output-root "$OUTPUT" \
            --backend-id github-actions-ubuntu24-py311-local-git-v1 \
            --json | tee /tmp/replayab-c01-current-main-ab-result.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/replayab-c01-current-main-ab-result.json').read_text())
          assert payload['status'] == 'PASS', payload
          assert payload['case_id'] == 'C01-CURRENT-MAIN-READY', payload
          assert payload['run_count'] == 4, payload
          assert payload['pair_count'] == 2, payload
          assert len(payload['pairs']) == 2, payload
          assert all(pair['equivalent'] is True for pair in payload['pairs']), payload
          PY
          cp /tmp/replayab-c01-current-main-ab-result.json "$OUTPUT/WORKFLOW_RESULT.json"

      - name: Package C01 A-B evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT=/tmp/replayab-c01-current-main-ab
          STAGE=/tmp/replayab-c01-current-main-ab-evidence
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          if [ -d "$OUTPUT" ]; then
            cp -a "$OUTPUT/." "$STAGE/"
          fi
          if [ -f /tmp/replayab-c01-current-main-ab-result.json ]; then
            cp /tmp/replayab-c01-current-main-ab-result.json "$STAGE/WORKFLOW_RESULT_RAW.json"
          fi
          cp "$GITHUB_WORKSPACE/tests/fixtures/workflow_replay/candidate01_c1/c01_current_main_ready_contract.yaml" "$STAGE/"
          cp "$GITHUB_WORKSPACE/tests/fixtures/workflow_replay/candidate01_c1/c01_current_main_ready_packet.yaml" "$STAGE/"
          tar -C /tmp -czf "$GITHUB_WORKSPACE/replayab-postfix-c01-current-main-ab.tar.gz" replayab-c01-current-main-ab-evidence

      - name: Upload C01 A-B evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replayab-postfix-c01-current-main-ab-${{ github.run_id }}
          path: replayab-postfix-c01-current-main-ab.tar.gz
          if-no-files-found: error
          retention-days: 14
