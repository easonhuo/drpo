name: PR Gate Log

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: pr-gate-log-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  log-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_SHA: e3718a346e260d0d3666ba55542565b2907c703f
      EXPECTED_TREE: a77b8ed47302ea8b683181aed98b091d4b62e47f
      TARGET_BRANCH: dev/e8-continuous-exp-four-pilot-result-closure
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Decode and apply reviewed closure patch
        run: |
          set -euo pipefail
          cp tools/tmp_e8_four_result_closure.patch.gz.b64 /tmp/e8.patch.gz.b64
          base64 -d /tmp/e8.patch.gz.b64 | gzip -d > /tmp/e8.patch
          git checkout --detach "$BASE_SHA"
          git apply --check /tmp/e8.patch
          git apply --index /tmp/e8.patch
          echo "actual_tree=$(git write-tree)"

      - name: Verify exact reviewed tree
        run: |
          set -euo pipefail
          test "$(git write-tree)" = "$EXPECTED_TREE"
          git diff --check

      - name: Install dependencies from candidate tree
        run: python -m pip install -e '.[dev]'

      - name: Validate reviewed closure candidate
        run: |
          set -euo pipefail
          python scripts/handoff_authority.py verify --repo-root .
          python scripts/validate_governance_pipeline_stage_status.py --repo-root .
          python scripts/validate_formal_execution_channel.py --repo-root .
          python -m pytest -q \
            tests/test_formal_execution_channel.py \
            tests/test_handoff_authority.py::test_current_repository_authority_phase_verifies \
            tests/test_stage4_context.py::test_current_repository_generated_outputs_are_exact
          sha256sum -c docs/results/E8_CONTINUOUS_EXP_FOUR_PILOT_CLOSURE_CHECKSUMS.sha256

      - name: Commit and publish reviewed dev branch
        run: |
          set -euo pipefail
          git config user.name "OpenAI DRPO Reviewer"
          git config user.email "noreply@openai.com"
          git commit -m "Register four completed E8 continuous-EXP development pilots"
          test "$(git rev-parse HEAD^{tree})" = "$EXPECTED_TREE"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"

      - name: Record publication identity
        run: git ls-remote --heads origin "$TARGET_BRANCH"
