name: PR Gate Log

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-gate-log-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  log-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Tiered test plan (shadow only)
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          python scripts/select_update_tests.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --mode auto \
            --json | tee tiered-test-plan.json
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "### Tiered test plan (shadow only)"
            echo
            echo '```json'
            cat tiered-test-plan.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Python compile
        continue-on-error: true
        run: python -m compileall -q src scripts tools tests

      - name: Shell syntax
        continue-on-error: true
        run: bash -n tools/drpo-update/drpo-update tools/drpo-update/install.sh

      - name: Handoff authority
        continue-on-error: true
        run: python scripts/handoff_authority.py verify --repo-root .

      - name: Formal execution channel
        continue-on-error: true
        run: python scripts/validate_formal_execution_channel.py --repo-root .

      - name: Governance inventory
        continue-on-error: true
        run: python scripts/validate_governance_rule_inventory.py --repo-root .

      - name: Governance stage status
        continue-on-error: true
        run: python scripts/validate_governance_pipeline_stage_status.py --repo-root .

      - name: Replacement C01 Arm-A calibration
        run: |
          set +e
          python -m pytest -q \
            tests/test_workflow_replay_orchestrate.py::test_replacement_c01_arm_a_calibration \
            2>&1 | tee c01-calibration.log
          status=${PIPESTATUS[0]}
          set -e
          mkdir -p c01-calibration-upload
          cp c01-calibration.log c01-calibration-upload/
          if [ -f c01-pr120-calibration.tar.gz ]; then
            cp c01-pr120-calibration.tar.gz c01-calibration-upload/
          fi
          tar -czf c01-pr120-calibration-upload.tar.gz c01-calibration-upload
          exit "$status"

      - name: Upload C01 PR120 calibration evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: candidate01-c01-pr120-calibration-${{ github.run_id }}
          path: c01-pr120-calibration-upload.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Full pytest
        continue-on-error: true
        run: python -m pytest -q

      - name: Ruff
        continue-on-error: true
        run: ruff check .
