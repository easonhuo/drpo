name: PR Gate Log

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: pr-gate-log-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  log-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/e8-oracle-v2-pilot
          fetch-depth: 0

      - name: Repair E8 integration verification order
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/repair_e8_integration.py <<'PATCHPY'
          from pathlib import Path

          path = Path('.github/workflows/e8_v2_integrate.yml')
          text = path.read_text()

          marker = '      - name: Upload integration diagnostics\n'
          commit_step = '''      - name: Commit normalized handoff
        shell: bash
        run: |
          set -euo pipefail
          git add docs/handoff.md docs/handoff_deltas/$UPDATE_ID/MATERIALIZATION_REPORT.json docs/handoff_shadow/stage4/minimal/generated
          git diff --cached --check
          git commit -m 'Materialize E8 v2 pilot registration on current main'

'''
          if '      - name: Commit normalized handoff\n' not in text:
              if marker not in text:
                  raise SystemExit('upload-diagnostics marker not found')
              text = text.replace(marker, commit_step + marker, 1)

          old_final = '''      - name: Commit normalization and push ready branch
        shell: bash
        run: |
          set -euo pipefail
          git add docs/handoff.md docs/handoff_deltas/$UPDATE_ID/MATERIALIZATION_REPORT.json docs/handoff_shadow/stage4/minimal/generated
          git diff --cached --check
          git commit -m 'Materialize E8 v2 pilot registration on current main'
          test "$(git rev-parse origin/main)" = "$BASE_SHA"
          git push origin "$OUT_BRANCH"
'''
          new_final = '''      - name: Push ready branch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse origin/main)" = "$BASE_SHA"
          git push origin "$OUT_BRANCH"
'''
          if old_final in text:
              text = text.replace(old_final, new_final, 1)
          elif '      - name: Push ready branch\n' not in text:
              raise SystemExit('final push block not found')

          path.write_text(text)
          PATCHPY

          python /tmp/repair_e8_integration.py
          if ! git diff --quiet; then
            git config user.name drpo-integration-bot
            git config user.email drpo-integration-bot@users.noreply.github.com
            git add .github/workflows/e8_v2_integrate.yml
            git commit -m 'Commit E8 materialization before authority verification'
            git push origin HEAD:integration/e8-oracle-v2-pilot
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Python compile
        continue-on-error: true
        run: python -m compileall -q src scripts tools tests

      - name: Shell syntax
        continue-on-error: true
        run: bash -n tools/drpo-update/drpo-update tools/drpo-update/install.sh

      - name: Handoff authority
        continue-on-error: true
        run: python scripts/handoff_authority.py verify --repo-root .

      - name: Formal execution channel
        continue-on-error: true
        run: python scripts/validate_formal_execution_channel.py --repo-root .

      - name: Governance inventory
        continue-on-error: true
        run: python scripts/validate_governance_rule_inventory.py --repo-root .

      - name: Governance stage status
        continue-on-error: true
        run: python scripts/validate_governance_pipeline_stage_status.py --repo-root .

      - name: Full pytest
        continue-on-error: true
        run: python -m pytest -q

      - name: Ruff
        continue-on-error: true
        run: ruff check .
