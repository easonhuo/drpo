name: PR Gate Log

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-gate-log-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  log-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Tiered test plan (shadow only)
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          python scripts/select_update_tests.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --mode auto \
            --json | tee tiered-test-plan.json
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "### Tiered test plan (shadow only)"
            echo
            echo '```json'
            cat tiered-test-plan.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Python compile
        continue-on-error: true
        run: python -m compileall -q src scripts tools tests

      - name: Shell syntax
        continue-on-error: true
        run: bash -n tools/drpo-update/drpo-update tools/drpo-update/install.sh

      - name: Handoff authority
        continue-on-error: true
        run: python scripts/handoff_authority.py verify --repo-root .

      - name: Formal execution channel
        continue-on-error: true
        run: python scripts/validate_formal_execution_channel.py --repo-root .

      - name: Governance inventory
        continue-on-error: true
        run: python scripts/validate_governance_rule_inventory.py --repo-root .

      - name: Governance stage status
        continue-on-error: true
        run: python scripts/validate_governance_pipeline_stage_status.py --repo-root .

      - name: Full pytest
        continue-on-error: true
        run: python -m pytest -q

      - name: Ruff
        continue-on-error: true
        run: ruff check .

      - name: Export authority source files for approved one-time registration repair
        uses: actions/upload-artifact@v4
        with:
          name: e8-manual-v1-authority-source
          path: |
            docs/handoff.md
            experiments/registry.yaml
          if-no-files-found: error
          retention-days: 1
