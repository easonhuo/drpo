name: E7 PPO w0 registration once

on:
  push:
    branches:
      - dev/e7-ppo-w0-grid-pilot
    paths:
      - .github/workflows/e7-ppo-w0-register-once.yml

permissions:
  contents: write

concurrency:
  group: e7-ppo-w0-registration-once
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev/e7-ppo-w0-grid-pilot

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install registration dependency
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Author registry mutation and schema-v3 delta
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import sys
          from pathlib import Path

          import yaml

          ROOT = Path.cwd()
          sys.path.insert(0, str(ROOT / "scripts"))
          import handoff_delta_shadow as shadow

          EXPERIMENT_ID = "EXT-H-E7-PPO-W0-EXP-GRID-01"
          UPDATE_ID = "EXT-H-E7-PPO-W0-EXP-GRID-REGISTRATION-2026-07-13"
          BASE_COMMIT = "448936a7d61cb8871457078ef196e371fbce380c"
          IMPLEMENTATION_COMMIT = "d8bb6141092969a7daccb42b87c4f2da6e8371c6"
          EXPECTED_HANDOFF_BEFORE = "a105282a37ea13d9be8fb26f41ec05aa487454f69ffc955aa0c8ee3febaca6fb"
          EXPECTED_REGISTRY_BEFORE = "511380b837c8f6af999c25be510b9ecd5c64dbe89ad0924f1b07784eb5707622"

          handoff_path = ROOT / "docs" / "handoff.md"
          registry_path = ROOT / "experiments" / "registry.yaml"
          handoff_before = handoff_path.read_text(encoding="utf-8")
          registry_before = registry_path.read_text(encoding="utf-8")
          assert shadow.sha256_text(handoff_before) == EXPECTED_HANDOFF_BEFORE
          assert shadow.sha256_text(registry_before) == EXPECTED_REGISTRY_BEFORE
          assert f"- id: {EXPERIMENT_ID}\n" not in registry_before

          entity = {
              "id": EXPERIMENT_ID,
              "environment": "EXT-H",
              "name": "e7_ppo_direct_w0_exponential_grid_screening_pilot",
              "status": "pilot",
              "result_status": "running",
              "predecessor": "EXT-H-E7-PPO-STABILITY-01",
              "registration_base_commit": BASE_COMMIT,
              "claim": (
                  "On three registered E7 external-validity tasks, screen whether the "
                  "direct w(0)-by-c exponential negative-weight field under the frozen PPO "
                  "clipped actor update can preserve useful negative signal while reducing "
                  "finite-horizon instability and seed sensitivity. This is a development "
                  "screening pilot only and cannot establish convergence or a formal method ranking."
              ),
              "role": "external_validity_direct_w0_exponential_screening",
              "execution_class": "pilot",
              "code_entrypoint": "src/drpo/e7_ppo_w0_grid_pilot.py",
              "bootstrap_entrypoint": "src/drpo/e7_ppo_w0_bootstrap.py",
              "aggregation_entrypoint": "src/drpo/e7_ppo_w0_aggregate.py",
              "operator_entrypoint": "scripts/run_e7_ppo_w0_grid_pilot_auto.py",
              "one_click_entrypoint": "scripts/run_e7_ppo_w0_grid_pilot_auto_one_click.sh",
              "resume_entrypoint": "scripts/run_e7_ppo_w0_grid_pilot_resume_one_click.sh",
              "config_path": "configs/e7_ppo_w0_exp_grid_pilot_v1.json",
              "protocol_document": "docs/experiments/EXT-H-E7-PPO-W0-EXP-GRID-01.md",
              "parameterization": {
                  "distance": "detached_RMS_standardized_action_distance",
                  "reference_distance": 2.0,
                  "formula": "w(d)=w(0)*exp(-c*(d/2))",
                  "weight_at_zero_range": [0.0, 1.0],
                  "legacy_scale_experiment_facing": False,
                  "historical_equivalence_anchor": {
                      "weight_at_zero": 0.11,
                      "legacy_canonical_alpha": 0.11,
                      "legacy_negative_scale": 1.0,
                  },
              },
              "grid": {
                  "weight_at_zero_values": [0.0, 0.025, 0.05, 0.11, 0.25, 0.5, 1.0],
                  "exp_coefficients": [0.0, 0.25, 0.5, 1.0, 1.5],
                  "positive_only_deduplicated": True,
                  "unique_parameter_points": 31,
              },
              "protocol": {
                  "datasets": [
                      "hopper-medium-expert-v2",
                      "walker2d-medium-v2",
                      "walker2d-medium-replay-v2",
                  ],
                  "development_seeds": [200, 201],
                  "held_out_seeds": [204, 205, 206, 207],
                  "actor_update_mode": "ppo_clip",
                  "clip_epsilon": 0.2,
                  "updates_per_old_policy": 4,
                  "optimizer_steps_per_branch": 500000,
                  "evaluation_interval_steps": 50000,
                  "evaluation_episodes": 10,
                  "expected_branches": 186,
              },
              "execution": {
                  "state": "running",
                  "development_branch": "dev/e7-ppo-w0-grid-pilot",
                  "draft_pull_request": 48,
                  "implementation_commit": IMPLEMENTATION_COMMIT,
                  "server_start_source": "user_reported_2026-07-13",
                  "result_available": False,
                  "runtime_selection": "automatic_cpu_memory_and_bounded_throughput",
                  "runtime_selection_changes_scientific_matrix": False,
              },
              "terminal_audit": {
                  "required": True,
                  "separates": [
                      "task_performance_degradation_or_collapse",
                      "support_or_variance_boundary_event",
                      "nan_inf_numerical_failure",
                      "best_checkpoint_from_terminal_checkpoint",
                  ],
              },
              "interpretation_limits": [
                  "screening_pilot_not_formal_evidence",
                  "fixed_500k_endpoint_is_not_convergence",
                  "development_seeds_are_not_confirmatory_seeds",
                  "no_method_ranking_before_fresh_seed_confirmation",
                  "do_not_select_dataset_specific_cells_as_one_universal_method",
                  "hopper_and_walker_are_external_validity_only",
                  "does_not_replace_cu1_or_du1_controlled_identification",
              ],
              "formal_evidence_allowed": False,
          }

          entity_text = yaml.safe_dump(
              [entity], sort_keys=False, allow_unicode=True, width=1000
          )
          marker = "\ndevelopment_experiment_registrations:\n"
          if registry_before.count(marker) != 1:
              raise RuntimeError("registry development_experiment_registrations marker is not unique")
          registry_after = registry_before.replace(
              marker, "\n" + entity_text + marker, 1
          )
          registry_path.write_text(registry_after, encoding="utf-8")
          registry_after_sha = shadow.sha256_text(registry_after)

          handoff_content = (
              "- **Hopper/Walker E7 PPO direct-`w(0)` × EXP 网格 pilot（`EXT-H-E7-PPO-W0-EXP-GRID-01`）：**"
              "登记为正在运行的 development screening pilot，是 `EXT-H-E7-PPO-STABILITY-01` 的非破坏性 successor；旧实验协议与历史结果完整保留。"
              "实验公开参数化固定为 `u=d/2`、`w(d)=w(0)exp(-cu)`，不再暴露 `scale` 或 `canonical_alpha`；`w(0)=0.11` 与旧 `alpha=0.11 × scale=1` 仅作为实现等价锚点。"
              "网格为 `w(0)={0,0.025,0.05,0.11,0.25,0.5,1}` 与 `c={0,0.25,0.5,1,1.5}`，`w(0)=0` 去重为 Positive-only，共 31 个参数点；"
              "在 `hopper-medium-expert-v2`、`walker2d-medium-v2`、`walker2d-medium-replay-v2` 和 development seeds `200,201` 上形成 186 个 PPO-only、500k branches。"
              "held-out seeds `204--207` 保持未使用；自动资源探测只决定安全 subprocess 数，不得改变科学矩阵。用户已报告服务器启动，但当前无终态结果，禁止把运行中状态、500k endpoint、smoke/liveness 或 dev-seed 筛选升级为收敛、稳态或正式方法排名。"
              "任务性能退化/崩溃、support/variance boundary 与 NaN/Inf 必须分开审计；最终应寻找跨三任务共同稳健的 `(w(0),c)`，不得按数据集事后挑选不同 cell 冒充统一方法。Hopper/Walker 只承担 external validity，不替代 C-U1/D-U1 受控机制识别。"
          )
          operations = [
              {
                  "operation_id": "append-e7-ppo-w0-exp-grid-running-pilot",
                  "op": "append_to_section",
                  "heading_path": [
                      "0. 研究与执行原则（每次新会话首先阅读）",
                      "0.1 当前执行门禁",
                  ],
                  "block_id": "e7-ppo-w0-exp-grid-running-pilot",
                  "content": handoff_content,
              }
          ]
          rendered = shadow.render(handoff_before, operations)
          shadow.verify_history_preservation(handoff_before, rendered.text, operations)
          handoff_after_sha = shadow.sha256_text(rendered.text)

          delta_dir = ROOT / "docs" / "handoff_deltas" / UPDATE_ID
          delta_dir.mkdir(parents=True, exist_ok=False)
          delta_path = delta_dir / "HANDOFF_DELTA.yaml"
          delta = {
              "schema_version": 3,
              "update_id": UPDATE_ID,
              "mode": "authoritative",
              "base": {
                  "commit": BASE_COMMIT,
                  "handoff_sha256": EXPECTED_HANDOFF_BEFORE,
                  "registry_sha256": EXPECTED_REGISTRY_BEFORE,
              },
              "renderer_version": 1,
              "operations": operations,
              "registry": {
                  "mode": "expected_after",
                  "exact_base_after_sha256": registry_after_sha,
                  "changes": [
                      {
                          "change_id": "add-e7-ppo-w0-exp-grid-pilot",
                          "kind": "add_entity",
                          "entity_id": EXPERIMENT_ID,
                          "evidence": [
                              "experiments/registry.yaml",
                              f"docs/handoff_deltas/{UPDATE_ID}/HANDOFF_DELTA.yaml",
                              "docs/experiments/EXT-H-E7-PPO-W0-EXP-GRID-01.md",
                              "configs/e7_ppo_w0_exp_grid_pilot_v1.json",
                              "src/drpo/e7_ppo_w0_grid_pilot.py",
                              "src/drpo/e7_ppo_w0_bootstrap.py",
                              "src/drpo/e7_ppo_w0_aggregate.py",
                              "src/drpo/e7_ppo_w0_runtime_autotune.py",
                              "scripts/run_e7_ppo_w0_grid_pilot_auto.py",
                              "scripts/run_e7_ppo_w0_grid_pilot_auto_one_click.sh",
                              "tests/test_e7_ppo_w0_grid_pilot.py",
                              "tests/test_e7_ppo_w0_runtime_autotune.py",
                              "tests/test_e7_ppo_w0_failure_audit.py",
                          ],
                      }
                  ],
              },
              "expected": {
                  "exact_base_candidate_sha256": handoff_after_sha,
              },
          }
          delta_path.write_text(
              yaml.safe_dump(delta, sort_keys=False, allow_unicode=True, width=1000),
              encoding="utf-8",
          )
          print(
              {
                  "registry_before": EXPECTED_REGISTRY_BEFORE,
                  "registry_after": registry_after_sha,
                  "handoff_before": EXPECTED_HANDOFF_BEFORE,
                  "handoff_after": handoff_after_sha,
                  "delta": str(delta_path),
              }
          )
          PY

      - name: Commit authored registration intent
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "drpo-registration-bot"
          git config user.email "drpo-registration-bot@users.noreply.github.com"
          git add experiments/registry.yaml docs/handoff_deltas/EXT-H-E7-PPO-W0-EXP-GRID-REGISTRATION-2026-07-13/HANDOFF_DELTA.yaml
          git commit -m "Register EXT-H-E7-PPO-W0-EXP-GRID-01 running pilot"
          echo "SOURCE_PATCH_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Materialize through trusted main authority
        shell: bash
        run: |
          set -euo pipefail
          BASE_COMMIT=448936a7d61cb8871457078ef196e371fbce380c
          TRUSTED=/tmp/drpo-trusted-main-${GITHUB_RUN_ID}
          git worktree add --detach "$TRUSTED" "$BASE_COMMIT"
          python "$TRUSTED/scripts/handoff_authority.py" normalize \
            --repo-root "$GITHUB_WORKSPACE" \
            --trusted-repo-root "$TRUSTED" \
            --current-before "$BASE_COMMIT" \
            --source-base "$BASE_COMMIT" \
            --source-patch-commit "$SOURCE_PATCH_COMMIT" \
            --json
          rm -f .github/workflows/e7-ppo-w0-register-once.yml
          git add -A
          git commit --amend --no-edit
          python scripts/handoff_authority.py verify --repo-root . --json
          git status --short
          test -z "$(git status --porcelain)"

      - name: Push normalized registration commit
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:dev/e7-ppo-w0-grid-pilot
