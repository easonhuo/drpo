name: Temporary current-main E7 P1 P2 closure

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: e7-p1-p2-closure-current-main
  cancel-in-progress: false

jobs:
  materialize:
    if: github.head_ref == 'dev/ext-h-e7-sqexp-gae-p1-p2-result-closure-02'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev/ext-h-e7-sqexp-gae-p1-p2-result-closure-02
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: python -m pip install --quiet -e '.[dev]'
      - name: Recover reviewed closure transaction
        shell: bash
        run: |
          set -euo pipefail
          SOURCE=3f83623b68977c26a4f6a73cfe9b972660652460
          git show "$SOURCE:.github/workflows/e7-p1-p2-result-closure-bootstrap.yml" > /tmp/source.yml
          python - <<'PY'
          from pathlib import Path
          import yaml
          old = '483e93448f25ada23dbd71fe4d237ccff80f8c0c'
          base = '919a8aaad535168345ddfee84cc19ccaf6d9f18d'
          old_branch = 'dev/ext-h-e7-sqexp-gae-p1-p2-result-closure-01'
          new_branch = 'dev/ext-h-e7-sqexp-gae-p1-p2-result-closure-02'
          data = yaml.safe_load(Path('/tmp/source.yml').read_text(encoding='utf-8'))
          steps = data['jobs']['materialize']['steps']
          by_name = {step.get('name'): step.get('run') for step in steps}
          author = by_name['Author source transaction'].replace(old, base)
          author = author.replace(
              'test "$(git rev-parse HEAD^)" = "$BASE"',
              'test "$(git merge-base "$BASE" HEAD)" = "$BASE"',
          )
          needle = '"role":"external_validity_joint_critic_gae_common_scale_screening","registration_state"'
          replacement = '"role":"external_validity_joint_critic_gae_common_scale_screening","execution_class":"pilot","registration_state"'
          if needle not in author:
              raise SystemExit('pilot execution-class injection point missing')
          author = author.replace(needle, replacement, 1)
          normalize = by_name['Trusted normalization and publication'].replace(old, base)
          normalize = normalize.replace(old_branch, new_branch)
          Path('/tmp/e7-author.sh').write_text(author, encoding='utf-8')
          Path('/tmp/e7-normalize.sh').write_text(normalize, encoding='utf-8')
          PY
          bash -n /tmp/e7-author.sh
          bash -n /tmp/e7-normalize.sh
      - name: Execute closure with retained diagnostics
        id: execute
        shell: bash
        run: |
          set +e
          rm -f .github/workflows/e7-p1-p2-closure-current-main.yml
          bash -x /tmp/e7-author.sh > /tmp/author.log 2>&1
          author_exit=$?
          normalize_exit=99
          if [ "$author_exit" -eq 0 ]; then
            export SOURCE_PATCH="$(git rev-parse HEAD)"
            bash -x /tmp/e7-normalize.sh > /tmp/normalize.log 2>&1
            normalize_exit=$?
          else
            printf 'normalize skipped because author failed\n' > /tmp/normalize.log
          fi
          printf '%s\n' "$author_exit" > /tmp/author.exit
          printf '%s\n' "$normalize_exit" > /tmp/normalize.exit
          echo "author_exit=$author_exit" >> "$GITHUB_OUTPUT"
          echo "normalize_exit=$normalize_exit" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e7-p1-p2-closure-diagnostics-${{ github.run_id }}
          path: |
            /tmp/author.log
            /tmp/normalize.log
            /tmp/author.exit
            /tmp/normalize.exit
          if-no-files-found: error
          retention-days: 30
      - name: Enforce closure result
        shell: bash
        run: |
          test "${{ steps.execute.outputs.author_exit }}" = "0"
          test "${{ steps.execute.outputs.normalize_exit }}" = "0"
