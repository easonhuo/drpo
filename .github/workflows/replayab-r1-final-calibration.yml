name: ReplayAB R1 final merged-main calibration

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: replayab-r1-final-calibration
  cancel-in-progress: false

jobs:
  calibrate:
    if: github.event_name != 'pull_request' || github.head_ref == 'exec/r1-final-calibration-20260720'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      TOOLCHAIN: d2f3a7d0e2533d18f649c089caf1c8dc3b446a7c
      OUT: /tmp/replayab-r1-final-calibration
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify execution-only scope
        shell: bash
        run: |
          set -euo pipefail
          test "$(git diff --name-only "$TOOLCHAIN"...HEAD)" = '.github/workflows/replayab-r1-final-calibration.yml'
          git diff --check "$TOOLCHAIN"...HEAD
          git worktree add --detach /tmp/replayab-r1-final-toolchain "$TOOLCHAIN"
          test "$(git -C /tmp/replayab-r1-final-toolchain rev-parse HEAD)" = "$TOOLCHAIN"
          test -z "$(git -C /tmp/replayab-r1-final-toolchain status --porcelain=v1)"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install exact-toolchain dependencies
        run: python -m pip install -e '/tmp/replayab-r1-final-toolchain[dev]'

      - name: Run complete frozen R1 calibration
        shell: bash
        run: |
          set -uo pipefail
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cd /tmp/replayab-r1-final-toolchain
          python --version > "$OUT/environment.txt" 2>&1
          git rev-parse HEAD >> "$OUT/environment.txt"
          git status --porcelain=v1 >> "$OUT/environment.txt"
          set +e
          python -m pytest -q tests/test_workflow_replay_r1.py \
            --junitxml="$OUT/junit.xml" 2>&1 | tee "$OUT/pytest.log"
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > "$OUT/pytest_exit_code.txt"
          exit 0

      - name: Build and enforce terminal audit
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/replayab-r1-final-toolchain
          python - <<'PY'
          import hashlib
          import json
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = Path('/tmp/replayab-r1-final-toolchain')
          out = Path(os.environ['OUT'])
          tests = {}
          for node in ET.parse(out / 'junit.xml').getroot().iter('testcase'):
              failed = node.find('failure') is not None or node.find('error') is not None
              skipped = node.find('skipped') is not None
              tests[node.attrib.get('name', '')] = 'SKIP' if skipped else ('FAIL' if failed else 'PASS')
          mapping = {
              'R1-CAL-READY-EXACT': 'test_real_ready_and_failure_boundary_artifacts_match_frozen_verdicts',
              'R1-CAL-FAILURE-BOUNDARY': 'test_real_ready_and_failure_boundary_artifacts_match_frozen_verdicts',
              'R1-CAL-ONE-ARM-HASH-MISMATCH': 'test_one_arm_hash_mismatch_is_rejected',
              'R1-CAL-BOTH-SAME-WRONG': 'test_both_arms_same_wrong_are_rejected',
              'R1-CAL-WRONG-MODE': 'test_wrong_file_mode_is_rejected_even_when_pair_peer_is_correct',
              'R1-CAL-INTERRUPTED': 'test_interrupted_run_is_retained_but_cannot_compare_or_release',
              'R1-CAL-PARTIAL-MUTATION': 'test_failure_boundary_with_workspace_mutation_is_invalid',
              'R1-CAL-EVIDENCE-DIGEST-MISMATCH': 'test_digest_identity_and_journal_tampering_fail_closed',
              'R1-CAL-ORDER-BALANCE': 'test_schedule_is_exactly_a_b_then_b_a_and_is_deterministic',
              'R1-CAL-TIMING-BINDING-MISMATCH': 'test_timing_must_be_bound_to_exact_run_and_evidence_identities',
          }
          cases = {case: tests.get(name, 'MISSING') for case, name in mapping.items()}
          authority = {
              name: tests.get(name, 'MISSING')
              for name in (
                  'test_calibration_authority_was_frozen_before_behavior_results',
                  'test_frozen_authority_digests_match_actual_files_and_source_blobs',
              )
          }
          runtime = tests.get('test_r1_loading_and_reporting_runtime_guardrail', 'MISSING')
          pytest_exit = int((out / 'pytest_exit_code.txt').read_text().strip())
          contract_sha = hashlib.sha256(
              (root / 'docs/development_workflow_optimization/R1_IMPLEMENTATION_CONTRACT.md').read_bytes()
          ).hexdigest()
          agreement = sum(status == 'PASS' for status in cases.values())
          ready = (
              pytest_exit == 0
              and agreement == 10
              and set(authority.values()) == {'PASS'}
              and runtime == 'PASS'
              and contract_sha == 'ae7f23134285b5314647bd1068bc3fa1f3935deccdd24536eb8183cb57e11494'
          )
          report = {
              'schema_version': 1,
              'claim_id': 'GOV-DEV-WORKFLOW-OPTIMIZATION-BENCHMARK-01',
              'calibration_id': 'REPLAYAB-R1-C1-CALIBRATION-01',
              'toolchain_sha': os.environ['TOOLCHAIN'],
              'workflow_run_id': os.environ.get('GITHUB_RUN_ID'),
              'pytest_exit_code': pytest_exit,
              'case_results': cases,
              'verdict_agreement': {'passed': agreement, 'total': 10},
              'covered_unsafe_pass_count': 0 if agreement == 10 else None,
              'covered_false_rejection_count': 0 if agreement == 10 else None,
              'authority_checks': authority,
              'runtime_guardrail': runtime,
              'implementation_contract_sha256': contract_sha,
              'state': 'R1_FINAL_CALIBRATION_PASS' if ready else 'BLOCKED',
              'live_anchor_runs': {
                  'failure_boundary_c06': 29693652154,
                  'ready_candidate01_ab': 29693991085,
              },
              'limitations': [
                  'This closes only the frozen deterministic R1 calibration evidence gap.',
                  'It does not start R2 or establish Candidate 01 general efficiency.',
              ],
          }
          (out / 'R1_FINAL_CALIBRATION_REPORT.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          if not ready:
              raise SystemExit(json.dumps(report, sort_keys=True))
          print(json.dumps(report, sort_keys=True))
          PY
          cp docs/development_workflow_optimization/replayab_r1_calibration/INVENTORY.yaml "$OUT/"
          cp docs/development_workflow_optimization/replayab_r1_calibration/EXPECTED_VERDICTS.yaml "$OUT/"
          cp docs/development_workflow_optimization/replayab_r1_calibration/R1_AUTHORITY_BINDING_REPAIR.md "$OUT/"
          find "$OUT" -maxdepth 1 -type f -printf '%f %s bytes\n' | sort > "$OUT/ARTIFACT_INVENTORY.txt"

      - name: Upload final R1 calibration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replayab-r1-final-calibration-${{ github.run_id }}
          path: /tmp/replayab-r1-final-calibration
          if-no-files-found: error
          retention-days: 30
