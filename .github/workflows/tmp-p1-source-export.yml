name: Temporary P1 final source export

on:
  pull_request:
    types: [synchronize]
    branches:
      - dev/tmp-ext-h-e7-p1-source-export-base

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'dev/ext-h-e7-bench-joint-gae-p1-full-01'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: p1-final-head-export
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1
          path: |
            .
            !.git/**
            !outputs/**
            !runspec_artifacts/**
