name: Temporary P1 source export

on:
  pull_request:
    branches:
      - dev/tmp-ext-h-e7-p1-source-export-base

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: p1-full-repo-export
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1
          path: |
            .
            !.git/**
            !outputs/**
            !runspec_artifacts/**
