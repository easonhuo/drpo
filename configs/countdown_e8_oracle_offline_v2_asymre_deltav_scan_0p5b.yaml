schema_version: 1
experiment_id: EXT-C-E8-ORACLE-OFFLINE-V2-ASYMRE-DELTAV-SCAN-0.5B-01
result_status: pilot
registration_state: dev_code_first_unregistered
claim: >-
  On the frozen model-independent E8 V2 bank, tune canonical AsymRE's additive
  baseline offset delta_v while holding the branch-balanced signed reward,
  response bank, optimizer, training horizon, and validation protocol fixed.
  Equal total positive and negative branch mass with rewards +1/-1 gives an
  exact zero empirical baseline per prompt, so A=R-delta_v in this controlled
  one-step setting. Run 8 delta_v values on two paired development seeds, for
  exactly 16 cells. This validation-only pilot does not establish formal method
  ranking, convergence, or steady state.
model:
  identity: Qwen2.5-0.5B-Instruct
  initialization: pretrained_base_plus_fresh_lora
  parameterization: lora
bank:
  source_experiment: EXT-C-E8-ORACLE-OFFLINE-BANK-V2-0.5B-01
  use_all_unique_negatives: true
  deduplicate_expression_rule: arena_clean_expression_first_occurrence
  explicit_near_far_training_classes: false
  extreme_selection_forbidden: true
objective:
  formula: A=R-delta_v
  signed_reward: {positive: 1.0, negative: -1.0}
  empirical_baseline: 0.0
  empirical_baseline_reason: branch_balanced_equal_total_mass_per_prompt
  value_network: false
  distance_control: false
  positive_coefficient: 1-delta_v
  negative_repulsion_coefficient: 1+delta_v
remoteness:
  enabled: false
  weight: constant_1_no_distance_control
  detached: true
sweep:
  cartesian_product: false
  parameter_points:
    - {delta_v: -1.0, role: positive_only_boundary}
    - {delta_v: -0.5, role: strong_negative_shift}
    - {delta_v: -0.3, role: paper_grid_negative_0p3}
    - {delta_v: -0.2, role: paper_grid_negative_0p2}
    - {delta_v: -0.1, role: paper_anchor_negative_0p1}
    - {delta_v: -0.05, role: near_zero_negative}
    - {delta_v: 0.0, role: unshifted_signed_objective}
    - {delta_v: 0.1, role: positive_baseline_stress}
  seed_offsets: [4000, 5000]
  unique_parameter_points: 8
  cells: 16
training:
  steps: 1200
  early_stop: false
  eval_every: 100
  pass64_every: 200
  denominator: unique_negative_count_per_prompt
  normalize_by_weight_sum: false
  hidden_negative_scale: false
  gradient_budget_matching: false
execution:
  default_gpus: [0, 1, 2, 3, 4, 5, 6, 7]
  parallel_cells_per_gpu: 2
  expected_full_waves: 1
  runtime_scope: GOV-RUNTIME-E8-GPU-SLOT-HOTFIX-01
  identity_checked_resume: true
  continue_after_cell_failure: true
  autotune:
    enabled: true
    required_free_gpu_memory_gib: 36.0
    required_host_memory_gib_per_gpu: 8.0
    gpu_memory_headroom_fraction: 0.12
    host_memory_headroom_fraction: 0.15
    maximum_gpu_utilization_percent: 20.0
  liveness:
    required_before_full_run: true
    representative_family: asymre
    representative_alpha: 0.9
    representative_c: 0.0
    representative_delta_v: -0.1
    steps: 2
    validation_examples: 8
    scientific_evidence: false
evaluation:
  validation_only_during_tuning: true
  test_access_forbidden: true
  greedy_every: 100
  pass_at_8_every: 100
  pass_at_64_every: 200
  primary_selection_metric: late_window_pass_at_8
  secondary_selection_metric: terminal_pass_at_8
  best_checkpoint_metric_is_supplementary_only: true
  late_window_steps: [800, 900, 1000, 1100, 1200]
reporting:
  distinguish_task_performance: true
  distinguish_support_or_structure_boundary: true
  distinguish_nan_inf_numerical_failure: true
  fixed_horizon_is_not_convergence: true
  method_ranking_claim_allowed: false
  countdown_role: external_validity_only
  compare_terminal_and_late_window: true
exclusions:
  - value_network
  - learned_baseline
  - remoteness_taper
  - current_near_current_far_selection
  - binary_near_far_mixture
  - weight_sum_normalization
  - dynamic_delta_v
  - test_split_access
