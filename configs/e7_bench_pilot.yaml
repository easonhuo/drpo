experiment_id: EXT-H-E7-BENCH-01
protocol_version: 0.2.7-direct-500k-medium-replay
execution_class: pilot_substage
scientific_status: pilot

claim_boundary:
  - This pilot checks implementation, runtime, preliminary paired direction, and method-specific parameter sensitivity.
  - It does not populate the formal nine-task table or establish a method ranking.
  - Pilot outcomes may not change method families, tune per D4RL task, or become formal coefficients without a separate freeze update.

pilot:
  base_config_path: configs/e7_hopper_q2_medium_replay_v2.yaml
  seeds: [200, 201]
  canonical_critic_seed: 200
  datasets:
    - id: hopper-medium-replay-v2
      relative_path: hopper_medium_replay-v2.hdf5
      sha256: e121c5f7c9857a307baa9edc6a2c3b48e85fedb9ac316ecddd0f48ca7ef4e39b
      format: legacy_d4rl_hdf5
      env_id: Hopper-v4
      dataset_family: d4rl_v2
      score_protocol: d4rl_v2_percent
      reference_min_score: -20.272305
      reference_max_score: 3234.3
      formal_cell_eligible: true
      provenance_note: Exact uploaded legacy D4RL hopper-medium-replay-v2 HDF5.
    - id: hopper-medium-expert-v2
      relative_path: hopper_medium_expert-v2.hdf5
      sha256: 9d51ad87f8c905be3880d84c6140bcdb7fbf39a19e046a237f238ba34fec9e26
      format: legacy_d4rl_hdf5
      env_id: Hopper-v4
      dataset_family: d4rl_v2
      score_protocol: d4rl_v2_percent
      reference_min_score: -20.272305
      reference_max_score: 3234.3
      formal_cell_eligible: true
      provenance_note: Exact uploaded legacy D4RL hopper-medium-expert-v2 HDF5.
  budget:
    max_transitions: null
    critic_steps: 100000
    critic_eval_interval: 2000
    shared_positive_warmstart_steps: 0
    method_continuation_steps: 500000
    total_actor_steps_per_method: 500000
    actor_eval_interval: 5000
    rollout_eval_interval: 25000
    rollout_episodes: 5
    final_rollout_episodes: 20
    audit_sample_size: 16384
    early_stop_rule: nan_inf_numerical_failure_only
    fixed_horizon_is_not_convergence: true
    equal_total_actor_horizon_across_methods: true


critic_cache:
  enabled: true
  cache_dir: ~/.cache/drpo/e7_bench/critics
  reuse: true
  store: true
  actor_seed_independent: true
  sweep_config_independent: true
  identity_scope: dataset_plus_critic_seed_plus_critic_budget_plus_data_sha_plus_base_config_plus_network_profile_plus_runner
  excludes:
    - actor_seed
    - method_variant
    - sweep_config_sha256
    - branch_actor_steps
    - rollout_eval_episodes

model_profile:
  source: experiments/e7/reference/recovered_drrl_agents_20260704.py.txt::NETWORK_PRESETS.default
  scope: network_structure_only_no_method_reweighting
  hidden_sizes: [256, 256]
  activation: relu
  init: orthogonal
  init_gain: 1.4142135623730951
  log_std_mode: independent_global_diagonal
  log_std_min: -5.0
  log_std_max: 2.0

methods:
  ids:
    - positive_only
    - signed
    - global_alpha
    - reciprocal_linear
    - reciprocal_quadratic
    - exponential
  global_alpha: 0.75
  reference_distance: 5.0
  near_region_boundary: 5.0
  coefficients:
    reciprocal_linear: 0.4362580032734791
    reciprocal_quadratic: 0.5520268617673281
    exponential: 0.374162511054291
  coefficient_source: C-U1-E4-TAPER-NEAR-RETENTION-01 development seeds 0-4, frozen target average near retention 0.75
  d4rl_retuning_allowed: false
  pilot_parameter_search:
    enabled: true
    scope: pilot_followup_micro_global_strong_reciprocal_high_exp_search_not_formal_retuning
    basis: EXT-H-E7-BENCH-01 low-global/strong-taper pilot showed reciprocal-linear and reciprocal-quadratic enter usable regions at stronger coefficients, exponential remains the most stable family, and global alpha 0.05-0.25 still task-collapses; this follow-up keeps the same pilot budget while probing micro global-alpha and higher taper coefficients.
    per_task_retuning_allowed: false
    variant_count: 23
    variants:
      - id: positive_only
        family: positive_only
      - id: signed
        family: signed
      - id: global_alpha_a0p001
        family: global_alpha
        global_alpha: 0.001
      - id: global_alpha_a0p002
        family: global_alpha
        global_alpha: 0.002
      - id: global_alpha_a0p005
        family: global_alpha
        global_alpha: 0.005
      - id: global_alpha_a0p01
        family: global_alpha
        global_alpha: 0.01
      - id: global_alpha_a0p02
        family: global_alpha
        global_alpha: 0.02
      - id: global_alpha_a0p03
        family: global_alpha
        global_alpha: 0.03
      - id: reciprocal_linear_c40p00
        family: reciprocal_linear
        coefficient: 40.00
      - id: reciprocal_linear_c48p00
        family: reciprocal_linear
        coefficient: 48.00
      - id: reciprocal_linear_c56p00
        family: reciprocal_linear
        coefficient: 56.00
      - id: reciprocal_linear_c64p00
        family: reciprocal_linear
        coefficient: 64.00
      - id: reciprocal_linear_c80p00
        family: reciprocal_linear
        coefficient: 80.00
      - id: reciprocal_quadratic_c32p00
        family: reciprocal_quadratic
        coefficient: 32.00
      - id: reciprocal_quadratic_c40p00
        family: reciprocal_quadratic
        coefficient: 40.00
      - id: reciprocal_quadratic_c48p00
        family: reciprocal_quadratic
        coefficient: 48.00
      - id: reciprocal_quadratic_c56p00
        family: reciprocal_quadratic
        coefficient: 56.00
      - id: reciprocal_quadratic_c64p00
        family: reciprocal_quadratic
        coefficient: 64.00
      - id: exponential_c14p00
        family: exponential
        coefficient: 14.00
      - id: exponential_c16p00
        family: exponential
        coefficient: 16.00
      - id: exponential_c18p00
        family: exponential
        coefficient: 18.00
      - id: exponential_c20p00
        family: exponential
        coefficient: 20.00
      - id: exponential_c24p00
        family: exponential
        coefficient: 24.00

execution:
  scheduler: two_stage_subprocess_worker_pool
  stages:
    - parallel_canonical_critics
    - parallel_direct_from_seed_method_training
  pilot_parallel:
    parallel_unit: dataset_seed_method_variant
    critic_workers: 2
    warmstart_workers: 0
    branch_workers: 92
    critic_cpus_per_worker: 64
    warmstart_cpus_per_worker: 1
    branch_cpus_per_worker: 4
    device_pool: [cpu]
    serial_seed_loop_forbidden: true
    server_capacity_note: >-
      Critic stage uses at most 128 CPU threads, and the 92-way direct-from-seed
      method-variant stage uses 368, leaving 16 CPU threads of headroom on a 384-core server.
  method_branching:
    inside_worker: false
    source_checkpoint: none_direct_from_seed_initialization
    method_variants_continued_in_parallel:
      - positive_only
      - signed
      - global_alpha_a0p001
      - global_alpha_a0p002
      - global_alpha_a0p005
      - global_alpha_a0p01
      - global_alpha_a0p02
      - global_alpha_a0p03
      - reciprocal_linear_c40p00
      - reciprocal_linear_c48p00
      - reciprocal_linear_c56p00
      - reciprocal_linear_c64p00
      - reciprocal_linear_c80p00
      - reciprocal_quadratic_c32p00
      - reciprocal_quadratic_c40p00
      - reciprocal_quadratic_c48p00
      - reciprocal_quadratic_c56p00
      - reciprocal_quadratic_c64p00
      - exponential_c14p00
      - exponential_c16p00
      - exponential_c18p00
      - exponential_c20p00
      - exponential_c24p00
    continuation_steps_each: 500000
    reason: >-
      Remove the shared Positive-only warm-start because it changes the experimental meaning
      into a continuation-from-Positive-only protocol. Every method variant now trains directly
      from the same dataset/seed actor initialization for the same 500k actor horizon.
  resume_granularity: dataset_seed_method_variant
  resume_identity:
    bind_exact_config_sha256: true
    bind_base_config_sha256: true
    bind_runner_version: true
    bind_dataset_sha256: true
    bind_stage_budget: true
    bind_method_variant_and_taper_parameters: true
    mismatched_existing_workdir_policy: fail_closed_require_new_workdir
  shared_output_writes: coordinator_only

formal_parallel_contract:
  protocol_locked: false
  task_count: 9
  parallel_unit: task_seed_method
  scheduler: staged_resource_pool_subprocess_workers
  serial_seed_loop_forbidden: true
  serial_method_loop_forbidden: true
  worker_isolation: one_output_directory_per_task_seed_method
  method_branching: direct_from_seed_parallel_equal_horizon_method_training
  positive_only_is_full_direct_training_branch: true
  resume_granularity: task_seed_method
  resume_identity_must_bind_protocol_and_budget: true
  formal_seeds: pending_registration
  exact_dataset_versions: pending_registration
  base_algorithm: pending_registration
  optimizer_and_full_budget: pending_registration
  launch_allowed: false
