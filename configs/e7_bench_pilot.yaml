execution:
  scheduler: three_stage_subprocess_worker_pool
  stages:
    - parallel_canonical_critics
    - parallel_shared_positive_warmstarts
    - parallel_equal_horizon_method_continuations
  pilot_parallel:
    parallel_unit: dataset_seed_method_variant
    critic_workers: 2
    warmstart_workers: 4
    branch_workers: 88
    critic_cpus_per_worker: 64
    warmstart_cpus_per_worker: 64
    branch_cpus_per_worker: 4
    device_pool: [cpu]
    serial_seed_loop_forbidden: true
    server_capacity_note: >-
      Critic stage uses at most 128 CPU threads, shared warm-start stage 256, and the
      88-way equal-horizon method-variant stage 352, leaving 32 CPU threads of headroom
      on a 384-core server.
  method_branching:
    inside_worker: false
    source_checkpoint: identical_100k_positive_only_warmstart_per_dataset_seed
    method_variants_continued_in_parallel:
      - positive_only
      - signed
      - global_alpha_a0p75
      - global_alpha_a0p50
      - global_alpha_a0p25
      - global_alpha_a0p10
      - global_alpha_a0p05
      - reciprocal_linear_c0p10
      - reciprocal_linear_c0p436258
      - reciprocal_linear_c0p75
      - reciprocal_linear_c1p50
      - reciprocal_linear_c3p00
      - reciprocal_quadratic_c0p10
      - reciprocal_quadratic_c0p552027
      - reciprocal_quadratic_c0p75
      - reciprocal_quadratic_c1p50
      - reciprocal_quadratic_c3p00
      - exponential_c0p10
      - exponential_c0p374163
      - exponential_c0p75
      - exponential_c1p50
      - exponential_c3p00
    continuation_steps_each: 200000
    reason: >-
      Use the 384-core server while giving Positive-only and every negative-control method
      the same 300k total actor horizon instead of comparing a shorter Positive-only run
      against longer method branches.
  resume_granularity: dataset_seed_method_variant
  resume_identity:
    bind_exact_config_sha256: true
    bind_base_config_sha256: true
    bind_runner_version: true
    bind_dataset_sha256: true
    bind_stage_budget: true
    bind_method_variant_and_taper_parameters: true
    mismatched_existing_workdir_policy: fail_closed_require_new_workdir
  shared_output_writes: coordinator_only

formal_parallel_contract:
  protocol_locked: false
  task_count: 9
  parallel_unit: task_seed_method
  scheduler: staged_resource_pool_subprocess_workers
  serial_seed_loop_forbidden: true
  serial_method_loop_forbidden: true
  worker_isolation: one_output_directory_per_task_seed_method
  method_branching: parallel_equal_horizon_continuation_after_identical_positive_only_warmstart
  positive_only_is_full_continuation_branch: true
  resume_granularity: task_seed_method
  resume_identity_must_bind_protocol_and_budget: true
  formal_seeds: pending_registration
  exact_dataset_versions: pending_registration
  base_algorithm: pending_registration
  optimizer_and_full_budget: pending_registration
  launch_allowed: false
