schema_version: 1
experiment_id: EXT-C-E8-ORACLE-OFFLINE-V2-TAPER-SWEEP-0.5B-01
result_status: pilot
claim: >-
  On the frozen model-independent E8 V2 bank, tune the active paper taper
  families under an initialization negative-gradient budget matched to the
  successful Global x1/32 pilot, testing whether remoteness-aware weighting can
  retain useful negative signal while improving terminal stability.
model:
  identity: Qwen2.5-0.5B-Instruct
  initialization: pretrained_base_plus_fresh_lora
  parameterization: lora
bank:
  source_experiment: EXT-C-E8-ORACLE-OFFLINE-BANK-V2-0.5B-01
  current_policy_extrema: true
  near_definition: current_minimum_sequence_surprisal
  far_definition: current_maximum_sequence_surprisal
  near_mix: 0.5
  far_mix: 0.5
remoteness:
  definition: u=sqrt(relu(sequence_surprisal-tau)/scale)
  tau_rule: current_near_median_surprisal_on_frozen_calibration_rows
  scale_rule: current_far_median_minus_current_near_median
  anchor_interpretation: current_near_median_u0_current_far_median_u1
sweep:
  methods:
    - reciprocal_linear
    - reciprocal_quadratic
    - exponential
  rho_values: [0.9, 0.75, 0.6, 0.5, 0.35, 0.25, 0.125, 0.03125]
  seed_offsets: [0, 1000, 2000]
  cells: 72
  global_cells: 0
calibration:
  seed: 2026070804
  reference_global_multiplier: 0.03125
  target: initialization_aggregate_negative_gradient_rms
  remoteness_prompt_rows: 256
  gradient_prompt_rows: 16
  minimum_surprisal_scale: 1.0e-6
  task_metrics_used: false
  test_data_used: false
execution:
  required_gpu_count: 8
  default_gpus: [0, 1, 2, 3, 4, 5, 6, 7]
  parallel_cells_per_gpu: 1
  identity_checked_resume: true
  continue_after_cell_failure: true
evaluation:
  best_and_terminal_use_same_generation_seed: true
  primary_metric: pass_at_8
  report_pass_at_64: true
  report_greedy: true
  report_valid_rate: true
reporting:
  distinguish_task_performance: true
  distinguish_support_or_structure_boundary: true
  distinguish_nan_inf_numerical_failure: true
  fixed_horizon_is_not_convergence: true
  method_ranking_claim_allowed: false
  countdown_role: external_validity_only
exclusions:
  - global_retuning
  - sbrc
  - hybrid
  - low_sft_initialization
  - full_sft_initialization
  - on_policy
  - online_replay
