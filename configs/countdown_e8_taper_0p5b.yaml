schema_version: 1
experiment_id: EXT-C-E8-TAPER-0.5B-01
result_status: pilot
model:
  identity: Qwen2.5-0.5B-Instruct
  memory_mode: bf16
  parameterization: lora
  max_length: 256
  max_new_tokens: 80
dataset:
  generation_seed: 1234
  train_rows: 6000
  validation_rows: 500
  test_rows: 1000
  numbers_per_problem: 4
reference:
  base_greedy_success_gate: 0.15
  base_valid_rate_gate: 0.80
  # Two-stage reference policy gates.  The 0.5B focused pilot may continue
  # once the reusable reference reaches 8% greedy success and 95% valid rate.
  # The historical 15% gate remains the formal-ranking / scale-up unlock gate.
  pilot_greedy_success_gate: 0.08
  pilot_valid_rate_gate: 0.95
  formal_greedy_success_gate: 0.15
  formal_valid_rate_gate: 0.95
  trained_greedy_success_gate: 0.15
  trained_valid_rate_gate: 0.95
  sft_epochs: 6
  sft_min_epochs: 3
  sft_early_stop_patience: 2
  sft_micro_batch: 1
  sft_gradient_accumulation: 32
  sft_learning_rate: 0.0002
  sft_warmup_ratio: 0.03
  sft_max_gradient_norm: 1.0
replay:
  train_prompt_rows: 900
  calibration_prompt_rows: 16
  # Collector-only reserve; the final frozen replay remains exactly 900 + 16.
  train_candidate_prompt_rows: 1800
  calibration_candidate_prompt_rows: 32
  rollouts_per_prompt_per_round: 12
  resample_rounds: 3
  generation_batch_size: 4
  score_batch_size: 16
  temperature: 0.8
  top_p: 0.95
  synthetic_negative_fallback: false
  fixed_negative_count_per_prompt: false
  enforce_training_structure_support: true
calibration:
  development_seed: 9134
  batches: 16
  # v79 active-tail repair: resolve tau from the independent calibration split
  # so initialization calibration cannot collapse to all-zero distance.
  surprisal_threshold_tau: calibration_common_half_median_surprisal
  surprisal_scale_rule: calibration_upper_half_median_minus_lower_half_median
  minimum_surprisal_scale: 1.0e-6
  minimum_active_distance_fraction: 0.25
  nondegenerate_target_max_ratio: 0.995
  minimum_taper_lambda: 1.0e-6
  inherited_reference_method: exponential
  inherited_reference_lambda: 0.7
  relative_l2_tolerance: 0.01
  maximum_lambda: 64.0
  bisection_steps: 24
  shared_negative_scale: positive_aggregate_gradient_l2_over_uncontrolled_negative_aggregate_gradient_l2
  target_budget: inherited_exponential_initialization_gradient_l2
methods:
  - positive_only
  - uncontrolled_negative
  - global_matched
  - reciprocal_linear
  - exponential
  - squared_distance_exponential
confirmation:
  paired_training_seeds: [9234, 10234, 11234]
  paired_evaluation_seed_offset: 700000
training:
  optimizer: AdamW
  optimizer_updates: 1200
  fixed_update_budget: true
  early_stopping_changes_training_horizon: false
  micro_batch: 1
  gradient_accumulation_microbatches: 8
  learning_rate: 0.00005
  weight_decay: 0.01
  warmup_ratio: 0.03
  maximum_gradient_norm: 1.0
  evaluation_every_updates: 100
  selection_metric: greedy_success
  selection_delta: 0.002
  validation_examples: 500
  evaluation_batch_size: 8
  pass_at_k: 8
  log_every_updates: 10
diagnostics:
  prompt_rows: 32
  quantile_bins: 5
  # Reuse the already frozen reference valid-rate floor as a structure boundary.
  valid_structure_boundary_rate: 0.95
  checkpoints: [initial, best, terminal]
  full_parameter_gradient: true
  final_window_evaluations: 3
  # Keep teacher-forced and gradient diagnostics memory bounded on one-GPU LoRA training.
  teacher_forced_batch_size: 1
  gradient_batch_size: 1
artifact:
  checkpoint_binaries: persistent_local_index_only
  retain_per_method: [best, terminal_or_last_finite]
