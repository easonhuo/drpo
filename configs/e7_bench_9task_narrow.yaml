protocol_version: 0.2.8-9task-narrow-grid-direct-300k
execution_class: pilot_substage
scientific_status: pilot
gate: null  # set at runtime via --liveness-gate {A,B}; null/absent = full Gate C

claim_boundary:
  - This 9-task narrow-grid pilot checks implementation, runtime, preliminary paired direction, and method-specific parameter sensitivity across the nine D4RL v2 locomotion medium cells.
  - It does not populate the formal nine-task table or establish a method ranking.
  - Pilot outcomes may not change method families, tune per D4RL task, or become formal coefficients without a separate freeze update.
  - Per user decision (dev log), this pilot follows clean-main direct-from-seed protocol (no shared Positive-only warm-start); spec §3.3 warm-start protocol is not reinstated because main removed it (commit 1193a9a). continuation is reduced to 300000 per spec §3.3 branch_actor_steps.

