schema_version: 1
experiment_id: EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-RECIPROCAL-HIGH-LAMBDA-EXTENSION-0.5B-01
result_status: pilot
registration_state: dev_code_first_unregistered
claim: >-
  Extend the completed manuscript-correct reciprocal shape screen without
  changing its scientific protocol. On the same frozen model-independent E8
  V2 bank and detached coordinate
  x=relu(current_mean_token_surprisal/2-0.125), run Reciprocal-Linear and
  Reciprocal-Quadratic at lambda values 39, 79, 159, and 319 on the same two
  paired development seeds. This 8-point, 16-cell extension tests whether the
  previous right boundary at lambda=19 was still open. Positive-only, Global,
  exponential, and the completed reciprocal lambda<=19 cells are historical
  references and are not rerun. This pilot does not establish formal ranking,
  convergence, or steady state.
model:
