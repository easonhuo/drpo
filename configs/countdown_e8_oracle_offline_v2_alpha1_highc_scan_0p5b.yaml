schema_version: 1
experiment_id: EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-LINEAR-SCAN-0.5B-01
result_status: pilot
registration_state: dev_code_first_unregistered
claim: >-
  On the frozen model-independent E8 V2 bank, test the paper-aligned linear
  surprisal taper w=alpha*exp(-c*u), with u=current_sequence_surprisal/2.
  Fix alpha=1 for taper points, scan 15 c values including the exact c=0
  uncontrolled endpoint, and include Positive-only on the same two development
  seeds. This round localizes the useful c region only; it does not establish a
  formal ranking, convergence, or steady state.
model:
  identity: Qwen2.5-0.5B-Instruct
  initialization: pretrained_base_plus_fresh_lora
  parameterization: lora
bank:
  source_experiment: EXT-C-E8-ORACLE-OFFLINE-BANK-V2-0.5B-01
  use_all_unique_negatives: true
  deduplicate_expression_rule: arena_clean_expression_first_occurrence
  explicit_near_far_training_classes: false
  extreme_selection_forbidden: true
remoteness:
  distance: d=current_sequence_surprisal
  coordinate: u=d/2
  detached: true
  weight: alpha*exp(-c*u)
  reference_distance: 2.0
  recalibrated_during_training: false
  extra_square_forbidden: true
sweep:
  cartesian_product: false
  parameter_points:
    - {alpha: 0.0, c: 0.0, role: positive_only_same_seed_reference}
    - {alpha: 1.0, c: 0.0, role: uncontrolled_negative_endpoint}
    - {alpha: 1.0, c: 0.051293294, role: one_scale_retention_0p95}
    - {alpha: 1.0, c: 0.105360516, role: one_scale_retention_0p90}
    - {alpha: 1.0, c: 0.162518929, role: one_scale_retention_0p85}
    - {alpha: 1.0, c: 0.223143551, role: one_scale_retention_0p80}
    - {alpha: 1.0, c: 0.287682072, role: one_scale_retention_0p75}
    - {alpha: 1.0, c: 0.430782916, role: one_scale_retention_0p65}
    - {alpha: 1.0, c: 0.693147181, role: one_scale_retention_0p50}
    - {alpha: 1.0, c: 0.916290732, role: one_scale_retention_0p40}
    - {alpha: 1.0, c: 1.203972804, role: one_scale_retention_0p30}
    - {alpha: 1.0, c: 1.386294361, role: one_scale_retention_0p25}
    - {alpha: 1.0, c: 1.609437912, role: one_scale_retention_0p20}
    - {alpha: 1.0, c: 1.897119985, role: one_scale_retention_0p15}
    - {alpha: 1.0, c: 2.302585093, role: one_scale_retention_0p10}
    - {alpha: 1.0, c: 2.995732274, role: one_scale_retention_0p05}
  seed_offsets: [4000, 5000]
  unique_parameter_points: 16
  cells: 32
  previous_scan_experiment: EXT-C-E8-ORACLE-OFFLINE-V2-ALPHA1-HIGHC-SCAN-0.5B-01
  positive_only_same_seed_control: true
  historical_positive_only_reference_only: false
training:
  steps: 1200
  early_stop: false
  eval_every: 100
  pass64_every: 200
  denominator: unique_negative_count_per_prompt
  normalize_by_weight_sum: false
  hidden_negative_scale: false
  gradient_budget_matching: false
execution:
  default_gpus: [0, 1, 2, 3, 4, 5, 6, 7]
  parallel_cells_per_gpu: 2
  runtime_scope: GOV-RUNTIME-E8-GPU-SLOT-HOTFIX-01
  identity_checked_resume: true
  continue_after_cell_failure: true
  autotune:
    enabled: true
    required_free_gpu_memory_gib: 36.0
    required_host_memory_gib_per_gpu: 8.0
    gpu_memory_headroom_fraction: 0.12
    host_memory_headroom_fraction: 0.15
    maximum_gpu_utilization_percent: 20.0
  liveness:
    required_before_full_run: true
    representative_alpha: 1.0
    representative_c: 0.693147181
    steps: 2
    validation_examples: 8
    scientific_evidence: false
evaluation:
  validation_only_during_tuning: true
  test_access_forbidden: true
  greedy_every: 100
  pass_at_8_every: 100
  pass_at_64_every: 200
  primary_selection_metric: late_window_pass_at_8
  secondary_selection_metric: terminal_pass_at_8
  best_checkpoint_metric_is_supplementary_only: true
  late_window_steps: [800, 900, 1000, 1100, 1200]
reporting:
  distinguish_task_performance: true
  distinguish_support_or_structure_boundary: true
  distinguish_nan_inf_numerical_failure: true
  fixed_horizon_is_not_convergence: true
  method_ranking_claim_allowed: false
  countdown_role: external_validity_only
  compare_terminal_and_late_window: true
  historical_positive_only_is_unpaired_reference: false
  historical_squared_surprisal_trend_retroactive_invalidation_forbidden: true
exclusions:
  - current_near_current_far_selection
  - binary_near_far_mixture
  - rho_parameterization
  - negative_scale_calibration
  - bank_negative_scale
  - global_gamma
  - gradient_rms_matching
  - weight_sum_normalization
  - dynamic_alpha
  - sbrc
  - hybrid
  - entropy_bonus
  - low_sft_initialization
  - full_sft_initialization
  - on_policy
  - online_replay
  - test_split_access
