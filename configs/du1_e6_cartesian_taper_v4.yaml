claim: In one shared-semantic categorical environment where directional utility and
  learner-relative rarity are an exact 2x2 Cartesian product, test whether useful
  negative signals improve same-distribution held-out-context performance, whether
  rare negative signals create stronger support suppression independently of utility,
  and whether learner-relative surprisal tapering preserves useful negative information
  better than uncontrolled and matched-global controls.
non_claims:
- no_ood_generalization_claim
- no_gaussian_unbounded_gradient_claim_for_categorical_logits
- no_transformer_external_validity
- no_cross_task_method_superiority
- no_predeclared_taper_winner
