claim: Under same-distribution held-out contexts, test whether a large structured
  state-region by action-group support gap creates wrong conditional generalization
  and task-performance collapse, whether controlled local repulsion can improve the
  hidden optimal group, and whether excessive or far negative pressure reverses that
  gain. This is not a state-distribution OOD claim.
