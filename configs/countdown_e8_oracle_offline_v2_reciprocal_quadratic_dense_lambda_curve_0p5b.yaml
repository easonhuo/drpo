claim: >-
  Densify the Reciprocal-Quadratic lambda response curve on the frozen
  model-independent E8 V2 bank and detached coordinate
  x=relu(current_mean_token_surprisal/2-0.125). Run sixteen new lambda values
  spanning the gaps between the completed 19, 39, 79, 159, and 319 anchors and
  extending the right boundary to 1279, using the same two paired development
  seeds. The resulting 32 cells test curve shape, plateau behavior, and right-
  boundary closure. Completed reciprocal cells, Positive-only, Global, and
  exponential anchors are historical references and are not rerun. This pilot
  does not establish significance, convergence, steady state, or formal method
  ranking.
