schema_version: 1
experiment_id: EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-LAMBDA-ROUND1-0.5B-01
result_status: pilot
registration_state: registered_pilot
claim: >-
  Under the paper-aligned linear excess-surprisal taper, locate the development
  lambda region that preserves useful near-field negative feedback while
  attenuating the remote tail. This round is target-driven parameter
  localization, not formal method ranking or a retroactive audit of the
  historical squared-surprisal trend.
model:
  identity: Qwen2.5-0.5B-Instruct
  initialization: pretrained_base_plus_fresh_lora
  parameterization: lora
bank:
  source_experiment: EXT-C-E8-ORACLE-OFFLINE-BANK-V2-0.5B-01
  use_all_unique_negatives: true
  deduplicate_expression_rule: arena_clean_expression_first_occurrence
  explicit_near_far_training_classes: false
  extreme_selection_forbidden: true
remoteness:
  D_definition: negative_mean_completion_token_log_probability
  eos_included_in_completion_mean: true
  normalized_excess: z=relu((D-tau)/scale_c)
  weight: alpha*exp(-lambda*relu((D-tau)/scale_c))
  extra_square_forbidden: true
  detached: true
calibration:
  seed: 2026071601
  prompt_rows: 256
  sampling_source: frozen_pretraining_bank_sample
  training_bank_reuse: true
  tau_rule: frozen_pretraining_bank_sample_median_surprisal
  scale_rule: frozen_pretraining_upper_half_median_minus_lower_half_median
  minimum_surprisal_scale: 1.0e-6
  minimum_active_fraction: 0.25
  task_metrics_used: false
  test_data_used: false
sweep:
  fixed_alpha: 1.0
  lambda_values: [0.105360516, 0.287682072, 0.693147181, 1.386294361, 2.302585093]
  one_scale_unit_tail_retention: [0.90, 0.75, 0.50, 0.25, 0.10]
  seed_offsets: [4000, 5000, 6000]
  unique_parameter_points: 6
  cells: 18
  positive_only_included: true
  global_rerun: false
training:
  steps: 1200
  early_stop: false
  eval_every: 100
  pass64_every: 200
  denominator: unique_negative_count_per_prompt
  normalize_by_weight_sum: false
  hidden_negative_scale: false
  gradient_budget_matching: false
execution:
  default_gpus: [0, 1, 2, 3, 4, 5, 6, 7]
  default_gpu_slots: 2
  parallel_cells_per_gpu: 1
  identity_checked_resume: true
  continue_after_cell_failure: true
  autotune:
    enabled: true
    required_free_gpu_memory_gib: 8.0
    required_host_memory_gib_per_gpu: 4.0
    gpu_memory_headroom_fraction: 0.12
    host_memory_headroom_fraction: 0.15
    maximum_gpu_utilization_percent: 20.0
  liveness:
    required_before_full_run: true
    representative_alpha: 1.0
    representative_lambda: 0.693147181
    steps: 2
    validation_examples: 8
    scientific_evidence: false
evaluation:
  validation_only_during_tuning: true
  test_access_forbidden: true
  greedy_every: 100
  pass_at_8_every: 100
  pass_at_64_every: 200
  primary_checkpoint_metric: pass_at_8
  paired_evaluation_seed_offset: 700000
baseline_reuse:
  positive_only:
    source: experiments/results/e8_oracle_offline_v2_global_low_scale_pilot/RESULT_SUMMARY.json
    affected_by_taper_formula_bug: false
    round1_action: paired_confirmation_included
    historical_best_pass_at_8_mean: 0.12975
    historical_terminal_pass_at_8_mean: 0.14825
  global_x1_over_32:
    source: experiments/results/e8_oracle_offline_v2_global_low_scale_pilot/RESULT_SUMMARY.json
    affected_by_taper_formula_bug: false
    round1_action: reuse_only_no_rerun
    historical_best_pass_at_8_mean: 0.17375
    historical_terminal_pass_at_8_mean: 0.141
reporting:
  distinguish_task_performance: true
  distinguish_support_or_structure_boundary: true
  distinguish_nan_inf_numerical_failure: true
  fixed_horizon_is_not_convergence: true
  method_ranking_claim_allowed: false
  countdown_role: external_validity_only
  historical_trend_retroactive_invalidation_forbidden: true
  large_lambda_endpoint: near_field_only_negative_updates_not_positive_only
exclusions:
  - extra_surprisal_square
  - current_near_current_far_selection
  - binary_near_far_mixture
  - negative_scale_calibration
  - bank_negative_scale
  - global_gamma_rerun
  - gradient_rms_matching
  - weight_sum_normalization
  - dynamic_alpha
  - test_set_hyperparameter_selection
