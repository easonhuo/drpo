experiment_id: EXT-H-E7-FIG1-D4RL9-GRADIENT-COVERAGE-01
runner_version: 1.1.0-e7q2-protocol-preserving
execution_class: pilot
scientific_status: pilot
formal_launch_allowed: false

claim: >-
  Across the nine D4RL-v2 MuJoCo locomotion cells, test whether the implemented
  full-parameter actor-gradient diagnostic increases with policy-relative standardized
  distance for transitions with negative frozen learned-critic advantages, while
  absolute advantage is explicitly matched using the existing E7-Q2 near/far protocol.

claim_boundaries:
  - External-validity coverage only; this does not replace C-U1 controlled mechanism identification.
  - The original E7-Q2 near/far matching and Figure-1 aggregation protocol is preserved rather than redesigned.
  - The run does not compare DRPO, taper, Global alpha, Signed, or other training methods.
  - Per-dataset curves are normalized within dataset and seed and are not pooled on an absolute cross-task scale.
  - Task-performance collapse is not evaluated by this gradient-only diagnostic.
  - Support or variance-boundary events and NaN/Inf numerical failures remain separate audit fields.
  - Static checks, self-tests, preflight, and this pilot status do not constitute a formal multi-seed result.

