protocol:
  critic_role: one_canonical_learned_critic_per_dataset_shared_across_actor_seeds
  actor_checkpoint_role: positive_only_fixed_budget_terminal_actor
  frozen_advantage_definition: r_plus_gamma_v_next_minus_v_standardized_once_on_critic_train_split
  seeds: [100, 101, 102, 103, 104, 105, 106, 107, 108, 109]
  canonical_critic_seed: 100
  train_method_branches: false
  budget:
    max_transitions: null
    critic_steps: 100000
    critic_eval_interval: 2000
    positive_actor_steps: 100000
    positive_actor_eval_interval: 5000
    audit_sample_size: 16384
    early_stop_rule: nan_inf_numerical_failure_only
    fixed_horizon_is_not_convergence: true
  probe:
    population: negative_frozen_advantage_transitions_in_critic_train_episode_split
    distance_coordinate: policy_relative_standardized_pre_squash_distance
    distance_bins: 7
    distance_binning: within_dataset_seed_quantiles
    advantage_bins: 8
    matching_rule: nearest_abs_advantage_targets_shared_across_distance_bins
    relative_advantage_tolerance: 0.05
    gradient_points_per_seed: 64
    minimum_points_per_distance_bin: 4
    save_every_selected_point: true
    full_parameter_gradient_definition: norm_of_gradient_of_negative_advantage_times_log_probability_for_one_transition
    normalization: within_dataset_and_seed_relative_to_lowest_distance_bin_before_across_seed_aggregation

execution:
  coordinator: scripts/run_e7_bench.py figure1-d4rl9
  one_click_entrypoint: scripts/run_e7_figure1_d4rl9.sh
  require_clean_worktree: true
  bind_source_commit_and_runner_sha256: true
  dataset_sha_capture_stage: all_nine_files_before_any_training
  dataset_workers: 3
  cpus_per_worker: 32
  device_pool: [cpu]
  resume_granularity: dataset_seed
  partial_output_without_completion_marker: fail_closed
  existing_identity_mismatch: fail_closed_require_new_workdir

