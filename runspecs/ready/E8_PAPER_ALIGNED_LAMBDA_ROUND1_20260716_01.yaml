    - outputs/e8/paper_aligned_lambda_round1_001/aggregate/*.csv
    - outputs/e8/paper_aligned_lambda_round1_001/methods/*/summary.json
    - outputs/e8/paper_aligned_lambda_round1_001/methods/*/manifest.json
    - outputs/e8/paper_aligned_lambda_round1_001/methods/*/metrics.csv
    - outputs/e8/paper_aligned_lambda_round1_001/methods/*/*_diagnostics.jsonl
    - outputs/e8/paper_aligned_lambda_round1_001/logs/*.log
  exclude:
    - '**/*.pt'
    - '**/*.pth'
    - '**/*.ckpt'
    - '**/*.safetensors'
    - '**/*.bin'
    - '**/checkpoint*'
    - '**/checkpoints/**'
    - '**/model*'
    - '**/optimizer*'
    - '**/wandb/**'
    - outputs/e8/paper_aligned_lambda_round1_001/_liveness/**
  max_package_size_mb: 100
  fail_if_excluded_matched: false
  fail_if_package_too_large: true

