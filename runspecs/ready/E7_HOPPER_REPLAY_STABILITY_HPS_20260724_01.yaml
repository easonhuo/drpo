success_criteria:
  - all grid, branch, manifest, aggregate, and audit identities equal EXT-H-E7-SQEXP-GAE-HOPPER-REPLAY-STAB-HPS-01
  - dataset is exactly hopper-medium-replay-v2
  - Phase A contains exactly 48 fresh branches from c values 0.08 and 0.125, actor LR multipliers 1.0, 0.5, and 0.25, batch sizes 256 and 512, and seeds 200, 202, 203, and 208
  - Phase A ranks all twelve configurations by late median, worst-two late mean, final median, mean best-to-final drop, and the frozen exact-tie rules
  - Phase A selects exactly two unique configurations before Phase B starts
  - Phase B contains exactly ten fresh branches from the two selected configurations and seeds 200, 201, 202, 203, and 208
  - Phase B does not reuse Phase-A trajectories or branch directories
  - held-out seeds 204 through 207 are untouched
  - every branch uses canonical A2C, a jointly updated critic, and trajectory-snapshot GAE lambda 0.95
  - every branch reaches exactly 1000000 optimizer updates with evaluation every 50000 updates and ten evaluation episodes
  - remoteness threshold remains 0, taper lambda remains 1, reference distance remains 2, and only c values 0.08 and 0.125 are used
  - actor optimizer learning rate equals 0.0003 multiplied by the branch actor LR multiplier
  - critic optimizer learning rate remains exactly 0.0003 in every branch
  - batch size is exactly 256 or 512 and the trajectory-snapshot refresh interval uses the branch batch size
  - all seed results, complete evaluation trajectories, and exact optimizer-control records are retained
  - all-five statistics, worst-two late mean, top-three-of-five secondary summary, and selected seed IDs are retained for Phase B
  - failed and low-performing runs are not deleted
  - task-performance degradation, support or variance boundary, rollout failure, and NaN or Inf remain separately reported
  - no task-collapse rate is asserted because no task-performance-collapse threshold is registered
  - fixed one-million-update horizon is not convergence or steady-state evidence
  - combined terminal audit observes exactly 58 branches and passes before result delivery
  - completed text-first evidence is delivered to drpo-results branch ingest/e7

