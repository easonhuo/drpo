purpose: >
  Execute a two-phase, 58-branch Hopper-medium-replay stability hyperparameter
  pilot. Phase A screens two c values, three actor learning-rate multipliers, and
  two batch sizes on four difficult development seeds. Phase B freshly reruns the
  top two Phase-A configurations on five development seeds. Preserve every seed,
  every curve, and branch-level optimizer provenance. This finite-horizon pilot
  does not establish convergence, steady state, task-collapse rates, universal
  superiority, or a formal method ranking.

entrypoint:
  cwd: repo_root
  command: >-
    E7_HR_STAB_GRID=configs/e7_hopper_replay_stability_hps.json
    E7_HR_STAB_WORK_DIR=outputs/e7/hopper_replay_stability_hps_001
    bash scripts/run_e7_hopper_replay_stability_hps.sh run

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    E7_HR_STAB_GRID=configs/e7_hopper_replay_stability_hps.json
    E7_HR_STAB_WORK_DIR=outputs/e7/hopper_replay_stability_hps_001
    bash scripts/run_e7_hopper_replay_stability_hps.sh run
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e7/hopper_replay_stability_hps_001/PLANNED_PHASES.json
    - outputs/e7/hopper_replay_stability_hps_001/phase_a/EXECUTION_PLAN.json
    - outputs/e7/hopper_replay_stability_hps_001/phase_a/RUN_IDENTITY.json
