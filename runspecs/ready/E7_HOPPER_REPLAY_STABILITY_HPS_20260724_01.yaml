    - outputs/e7/hopper_replay_stability_hps_001/phase_a/aggregate/phase_a_selection_manifest.json
    - outputs/e7/hopper_replay_stability_hps_001/phase_b/EXECUTION_PLAN.json
    - outputs/e7/hopper_replay_stability_hps_001/phase_b/RUN_IDENTITY.json
    - outputs/e7/hopper_replay_stability_hps_001/phase_b/branches/**/COMPLETED.json
  backoff_seconds: 60

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: true
  formal_evidence_allowed: false

