  - test_data_used remains false
  - task performance, valid-structure diagnostics, and NaN/Inf failure are separate
  - fixed 1200 steps is not described as convergence, steady state, significance, or ranking
  - completed text-first evidence is delivered to drpo-results ingest/e8

