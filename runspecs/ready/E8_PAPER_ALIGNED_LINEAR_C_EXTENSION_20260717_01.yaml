  - alpha remains 1.0 for every launched cell
  - matrix contains 8 parameter points and 16 cells on seed offsets 4000 and 5000
  - no Positive-only or uncontrolled cell is launched
  - historical Positive-only reference remains bound to predecessor manifest 24635fbb634b23450cdfb560fd7b16a2dc0fe4a6d0586f10e1cf385e58bab333
  - runtime records GPU 0-7, two slots per GPU, and 16 concurrent cells
  - the full sweep requires one 16-slot wave after the smoke gate
