purpose: >
  Run a non-scientific real-data liveness pair for the corrected canonical
  joint actor-critic TD/GAE adapter. The runner uses Hopper medium-expert seed
  200 and squared EXP c=128 for one TD and one GAE branch. Probe length is
  derived as one transition-equivalent replay epoch plus one update so each
  branch must refresh its critic snapshot twice and demonstrate that the
  critic changes during actor training. This is engineering evidence only.

entrypoint:
  command: python scripts/run_e7_sqexp_gae_liveness.py
  cwd: repo_root

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: false
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/sqexp_gae_joint_liveness_001
  summary_file: outputs/e7/sqexp_gae_joint_liveness_001/LIVENESS_SUMMARY.json
  audit_file: outputs/e7/sqexp_gae_joint_liveness_001/LIVENESS_SUMMARY.json

success_criteria:
  - protected implementation paths are unchanged from the pinned commit
  - the full development matrix validates as exactly 96 branches
  - exactly one TD and one GAE liveness branch run on the same dataset and seed
  - both branches use squared EXP c=128 and canonical A2C
  - probe length equals snapshot refresh interval plus one update
  - both branches record at least two critic snapshots
  - both branches observe critic evolution with c_opt.step active
  - no prepared or persistent advantage artifact is used
  - terminal, timeout, and dataset-tail recursion boundaries remain fail-closed
  - task performance, support or variance boundary, and NaN or Inf remain separate
  - held-out seeds 204 through 207 are untouched
  - no scientific aggregation, convergence, steady-state, or ranking claim is produced

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e7/sqexp_gae_joint_liveness_001/LIVENESS_SUMMARY.json
    - outputs/e7/sqexp_gae_joint_liveness_001/branches/**/branch_config.json
