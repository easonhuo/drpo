purpose: >
  Run a non-scientific real-data liveness pair through the existing squared-night
  runner, bootstrap, aggregate, queue, and runtime-autotune path. Hopper
  medium-expert seed 200 and squared EXP c=128 produce one TD and one GAE branch.
  Probe length is derived as one replay-equivalent snapshot interval plus one
  update, so each branch must refresh twice and demonstrate critic evolution.
  This is engineering evidence only.

entrypoint:
  command: >-
    env E7_SQUARED_EXP_LIVENESS_MODE=gae
    E7_SQUARED_EXP_GRID=configs/e7_sqexp_gae_v2.json
    E7_SQUARED_EXP_LIVENESS_WORK_DIR=outputs/e7/sqexp_gae_joint_liveness_001
    bash scripts/run_e7_squared_exp_night_liveness_one_click.sh
  cwd: repo_root

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: false
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/sqexp_gae_joint_liveness_001
  summary_file: outputs/e7/sqexp_gae_joint_liveness_001/aggregate/aggregate_summary.json
  audit_file: outputs/e7/sqexp_gae_joint_liveness_001/aggregate/LIVENESS_AUDIT.json

success_criteria:
  - protected implementation paths are unchanged from the pinned commit
  - the frozen development matrix validates as exactly 96 branches
  - exactly one TD and one GAE liveness branch run on the same dataset and seed
  - both branches use squared EXP c=128 and canonical A2C
  - probe length equals snapshot refresh interval plus one update
  - both branches record at least two critic snapshots
  - both branches observe critic evolution with the existing c_opt.step active
  - TD and GAE record identical critic snapshot hash trajectories
  - the HDF5 physically contains aligned timeouts and next_observations fields
  - no prepared or persistent advantage artifact is used
  - terminal, timeout, and dataset-tail recursion boundaries remain fail-closed
  - task performance, support or variance boundary, and NaN or Inf remain separate
  - held-out seeds 204 through 207 are untouched
  - no scientific aggregation, convergence, steady-state, or ranking claim is produced

