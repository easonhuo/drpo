purpose: >
  Confirm one DRPO exponential taper coefficient from c=1.897119985, 3, 5,
  and 8 using four new paired seed offsets. This is a validation-only
  parameter-confirmation pilot. It does not rerun AsymRE or TOPR, access the
  test split, or establish convergence or a formal cross-method ranking.

entrypoint:
  cwd: repo_root
  command: >-
    E8_ALPHA1_HIGHC_WORK_DIR=outputs/e8/drpo_c_confirmation_001
    E8_ALPHA1_HIGHC_GRID_CONFIG=configs/countdown_e8_oracle_offline_v2_drpo_c_confirmation_0p5b.yaml
    bash scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto_one_click.sh

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    E8_ALPHA1_HIGHC_WORK_DIR=outputs/e8/drpo_c_confirmation_001
    E8_ALPHA1_HIGHC_GRID_CONFIG=configs/countdown_e8_oracle_offline_v2_drpo_c_confirmation_0p5b.yaml
    bash scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e8/drpo_c_confirmation_001/RUNTIME_SELECTION.json
    - outputs/e8/drpo_c_confirmation_001/RUNTIME_SLOTS.json
    - outputs/e8/drpo_c_confirmation_001/SWEEP_STATUS.json
  backoff_seconds: 60

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true

outputs:
  run_dir: outputs/e8/drpo_c_confirmation_001
  summary_file: outputs/e8/drpo_c_confirmation_001/SWEEP_COMPLETE.json
  audit_file: outputs/e8/drpo_c_confirmation_001/aggregate/terminal_audit.json

success_criteria:
  - formula is alpha*exp(-c*u) with u=current_sequence_surprisal/2 and no extra square
  - alpha remains 1.0 for every launched cell
  - matrix contains 4 parameter points and 16 cells
  - paired seed offsets are exactly 17000, 18000, 19000, and 20000 for every coefficient
  - coefficients are exactly 1.897119985, 3.0, 5.0, and 8.0
  - no AsymRE, TOPR, Positive-only, Global, or uncontrolled cell is launched
  - runtime records GPU 0-7, two slots per GPU, and 16 concurrent cells
  - the full sweep requires one 16-slot wave after the liveness gate
  - liveness uses c=5.0 for two steps and is not scientific evidence
  - primary selection metric is seed-level mean Pass@8 over steps 800, 900, 1000, 1100, and 1200
  - the five late-window checkpoints are not counted as independent samples
  - prior seed offsets 4000, 5000, 9000, 10000, 11000, and 12000 do not enter the confirmation aggregate
  - no candidate or seed is changed after new-seed results are observed
  - test_data_used remains false
  - task performance, valid-structure diagnostics, and NaN/Inf failure are separate
  - fixed 1200 steps is not described as convergence, steady state, significance, or formal method ranking
  - completed text-first evidence is delivered to drpo-results ingest/e8

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e8/drpo_c_confirmation_001/*.json
    - outputs/e8/drpo_c_confirmation_001/aggregate/*.json
    - outputs/e8/drpo_c_confirmation_001/aggregate/*.csv
    - outputs/e8/drpo_c_confirmation_001/methods/*/summary.json
    - outputs/e8/drpo_c_confirmation_001/methods/*/manifest.json
    - outputs/e8/drpo_c_confirmation_001/methods/*/metrics.csv
    - outputs/e8/drpo_c_confirmation_001/logs/*.log
  exclude:
    - "**/*.pt"
    - "**/*.pth"
    - "**/*.ckpt"
    - "**/*.safetensors"
    - "**/*.bin"
    - "**/checkpoint*"
    - "**/checkpoints/**"
    - "**/optimizer*"
    - "**/wandb/**"
  max_package_size_mb: 100
  fail_if_excluded_matched: false
  fail_if_package_too_large: true

delivery:
