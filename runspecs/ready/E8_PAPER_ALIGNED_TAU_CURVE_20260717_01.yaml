success_criteria:
  - formula is alpha*exp(-c*max(u-tau,0)) with detached u=current_sequence_surprisal/2
  - tau=0 is exactly equivalent to the completed paper-aligned linear weight
  - matrix contains 4 c anchors, 8 tau values, seed offset 4000, and 32 cells
  - runtime records GPU 0-7, two slots per GPU, and 16 concurrent cells
  - every nonzero tau is present in the cell name and run identity
  - smoke gate passes before the full sweep and is not scientific evidence
  - test_data_used remains false
  - task performance, valid-structure diagnostics, and NaN/Inf failure are separate
  - fixed 1200 steps is not described as convergence or steady state
  - no exact optimum, cross-seed ranking, significance, or OOD claim is made

