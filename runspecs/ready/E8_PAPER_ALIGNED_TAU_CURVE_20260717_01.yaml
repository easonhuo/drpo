  Densely trace four single-seed tau response curves at preselected c anchors.
  Preserve the completed linear-c and c-extension results, reuse the inherited
  trainer and 16-slot scheduler, and treat this as curve-localization pilot
  evidence rather than a method ranking or optimum search.

