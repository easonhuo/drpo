    - tests/test_countdown_e8_oracle_offline_v2_alpha1_highc_scan.py

purpose: >
  Run the frozen Joint Fitted-Reference TOPR candidate on the model-independent E8 V2
  bank using one shared frozen Qwen backbone, a policy LoRA, and a jointly fitted
  branch-balanced reference LoRA. Preserve the two paired development seeds, fixed
  1200-step horizon, structurally disjoint held-out evaluation, late-window and
  terminal reporting, and automatic text-first result delivery. This is not canonical
  frozen-behavior TOPR and does not authorize a formal method ranking.

entrypoint:
  cwd: repo_root
  command: >-
    E8_ALPHA1_HIGHC_WORK_DIR=outputs/e8/joint_fitted_reference_topr_001
    E8_ALPHA1_HIGHC_GRID_CONFIG=configs/countdown_e8_oracle_offline_v2_joint_fitted_reference_topr_0p5b.yaml
    E8_ALPHA1_HIGHC_MAX_DEVICES=2
    bash scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto_one_click.sh

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    E8_ALPHA1_HIGHC_WORK_DIR=outputs/e8/joint_fitted_reference_topr_001
    E8_ALPHA1_HIGHC_GRID_CONFIG=configs/countdown_e8_oracle_offline_v2_joint_fitted_reference_topr_0p5b.yaml
    E8_ALPHA1_HIGHC_MAX_DEVICES=2
    bash scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e8/joint_fitted_reference_topr_001/RUNTIME_SELECTION.json
    - outputs/e8/joint_fitted_reference_topr_001/RUNTIME_SLOTS.json
    - outputs/e8/joint_fitted_reference_topr_001/SWEEP_STATUS.json
    - outputs/e8/joint_fitted_reference_topr_001/SMOKE_GATE.json
  backoff_seconds: 60

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true

outputs:
  run_dir: outputs/e8/joint_fitted_reference_topr_001
  summary_file: outputs/e8/joint_fitted_reference_topr_001/SWEEP_COMPLETE.json
  audit_file: outputs/e8/joint_fitted_reference_topr_001/aggregate/terminal_audit.json

success_criteria:
  - method identity is Joint Fitted-Reference TOPR and is not reported as canonical frozen-behavior TOPR
  - one frozen Qwen backbone carries identically initialized default policy and reference LoRA adapters
  - the reference objective assigns 0.5 positive branch mass and 0.5 total negative branch mass with uniform mass over unique negatives per prompt
  - policy negative weights equal exp(min(sum_logpi-sum_logmu,0)) on full-completion summed log-probability and are detached
  - positive weight remains 1 and no value network, learned baseline, absolute-surprisal taper, near-far selection, or weight-sum normalization is used
  - matrix contains 1 method point and 2 cells on seed offsets 4000 and 5000
  - runtime records GPU 0 and 1 with one slot per GPU and one full wave
  - smoke gate passes before the full sweep and remains non-scientific evidence
  - initial full-sequence ratio maximum absolute value is at most 1e-5
  - both default and reference adapters record finite nonzero gradient and update norms during liveness
  - policy evaluation activates only the default adapter and checkpoint inventory records both adapters
  - reference loss, reference positive and negative log-probability, ratio and weight quantiles, and clipped-at-one fraction are finite and recorded
  - val.jsonl is recorded as a structurally disjoint held-out evaluation split and never enters the training loss
  - separate test.jsonl remains unused
  - both cells are reported using late-window and terminal metrics and best-checkpoint metrics remain supplementary only
  - task performance, valid-expression or structure diagnostics, and NaN/Inf failure are reported separately
  - fixed 1200 steps is not described as convergence, steady state, significance, or formal method ranking
  - completed text-first evidence is delivered to drpo-results ingest/e8

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e8/joint_fitted_reference_topr_001/*.json
    - outputs/e8/joint_fitted_reference_topr_001/aggregate/*.json
    - outputs/e8/joint_fitted_reference_topr_001/aggregate/*.csv
