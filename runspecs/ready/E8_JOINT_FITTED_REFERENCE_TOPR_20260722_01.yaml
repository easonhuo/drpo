    - outputs/e8/joint_fitted_reference_topr_001/methods/*/training_diagnostics.jsonl
    - outputs/e8/joint_fitted_reference_topr_001/logs/*.log
  exclude:
    - "**/*.pt"
    - "**/*.pth"
    - "**/*.ckpt"
    - "**/*.safetensors"
    - "**/*.bin"
    - "**/best_pass8_adapter/**"
    - "**/terminal_adapter/**"
    - "**/last_finite_adapter/**"
    - "**/checkpoint*"
