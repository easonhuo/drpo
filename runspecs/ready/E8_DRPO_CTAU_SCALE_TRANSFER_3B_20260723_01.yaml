success_criteria:
  - model identity is Qwen2.5-3B-Instruct from pretrained base plus fresh LoRA
  - the frozen model-independent E8 V2 bank and structurally disjoint val.jsonl are used
  - the matrix contains exactly four c/tau points A-D and eight cells on seed offsets 4000 and 5000
  - point A is c=1.609437912 and tau=0.125
  - point B is c=1.897119985 and tau=0.25
  - point C is c=2.995732274 and tau=0.125
  - point D is c=4.605170186 and tau=0.75
  - runtime selects exactly GPU 0-3
  - RUNTIME_SLOTS reports one slot per GPU, four GPUs, and four total runtime slots
  - the full eight-cell sweep requires exactly two waves after the smoke gate
  - no scientific variable differs between wave one and wave two
  - the smoke gate passes before the full sweep and is not scientific evidence
  - every cell uses weight exp(-c*max(current_sequence_surprisal/2-tau,0)) with detached alpha=1 weights
  - no c, tau, learning-rate, LoRA, batch, horizon, or evaluation retuning occurs on 3B
  - val.jsonl is recorded as held-out evaluation and never enters training loss
  - separate test.jsonl remains unused
  - every declared point is reported using late-window and terminal metrics
  - validation-selected best checkpoint remains supplementary only
  - task performance, valid-expression or structure diagnostics, and NaN/Inf failure are separate
  - fixed 1200 steps is not described as convergence, steady state, significance, or formal ranking
  - completed text-first evidence is delivered to drpo-results ingest/e8

