purpose: >
  Run the frozen four-point DRPO c/tau scale-transfer pilot on
  Qwen2.5-3B-Instruct using two paired seed offsets. Preserve the model-independent
  E8 V2 bank, optimizer, LoRA setup, 1200-step horizon, held-out evaluation split,
  late-window and terminal reporting, and one-slot-per-GPU resource contract.

