  cwd: repo_root
  command: >-
    PYTHONPATH=src
    python src/drpo/countdown_e8_drpo_ctau_scale_transfer_3b.py run
    --model_path /root/models/Qwen2.5-3B-Instruct
    --work_dir outputs/e8/drpo_ctau_scale_transfer_3b_001
    --bank /root/experiment_output/e8_oracle_bank_v2/data/offline_bank_v2.jsonl
    --val /root/experiment_output/e8_oracle_bank_v2/data/val.jsonl
    --base_config configs/countdown_e8_base_rl_replay_3b.yaml
    --grid_config configs/countdown_e8_drpo_ctau_scale_transfer_3b.yaml
    --gpus 0,1,2,3
    --max-devices 4
    --allow-dev-unregistered

