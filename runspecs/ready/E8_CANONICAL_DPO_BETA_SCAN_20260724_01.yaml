purpose: >-
  Execute the frozen 16-cell canonical sigmoid-DPO beta response pilot on the
  model-independent E8 V2 oracle-offline bank. Pair each oracle completion with
  every first-occurrence unique verifier-wrong completion from the same prompt,
  use an exact frozen copy of the initial policy adapter as the reference, and
  scan eight beta values over two paired development seeds. Use GPU 0 and 1 with
  two concurrent cells per GPU, yielding four full waves after the two-slot
  capacity gate passes. Preserve the fixed 1200-step horizon, prompt-balanced
  loss, structurally disjoint held-out evaluation, no-test-access boundary,
  terminal audit, and automatic text-first delivery. Countdown provides
  external-validity evidence only. This run does not test the DRPO/TOPR
  remoteness mechanism and does not authorize convergence, saturation,
  significance, best-beta, or formal method-ranking claims.

entrypoint:
  cwd: repo_root
  command: >-
    E8_DPO_EXPECTED_COMMIT=cc0ead2be00c89a3c35296b7adc1ddeae8d14759
    E8_DPO_WORK_DIR=outputs/e8/canonical_dpo_beta_scan_001
    E8_DPO_FORMAL_RUN_AUTHORIZED=1
    bash scripts/run_countdown_e8_canonical_dpo_beta_scan.sh full

