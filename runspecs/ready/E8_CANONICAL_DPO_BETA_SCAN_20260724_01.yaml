    E8_DPO_WORK_DIR=outputs/e8/canonical_dpo_beta_scan_001
    E8_DPO_FORMAL_RUN_AUTHORIZED=1
    bash scripts/run_countdown_e8_canonical_dpo_beta_scan.sh run
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e8/canonical_dpo_beta_scan_001/RUNTIME_SELECTION.json
    - outputs/e8/canonical_dpo_beta_scan_001/RUNTIME_SLOTS.json
    - outputs/e8/canonical_dpo_beta_scan_001/SWEEP_STATUS.json
    - outputs/e8/canonical_dpo_beta_scan_001/SMOKE_GATE.json
    - outputs/e8/canonical_dpo_beta_scan_001/CHECKPOINT_RELOAD_GATE.json
  backoff_seconds: 60

