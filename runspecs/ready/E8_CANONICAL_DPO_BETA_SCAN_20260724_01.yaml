  audit_file: outputs/e8/canonical_dpo_beta_scan_001/aggregate/terminal_audit.json

success_criteria:
  - source checkout is clean and the protected implementation paths are unchanged from commit cc0ead2be00c89a3c35296b7adc1ddeae8d14759
  - execution uses only the reviewed fixed-profile DPO entrypoint and does not reactivate generic E8 config-driven execution
  - method identity is canonical sigmoid DPO with an exact frozen initial-policy reference and is not reported as TOPR, DRPO, behavior-policy correction, or remoteness control
  - the model is Qwen2.5-0.5B-Instruct with one shared frozen backbone, a trainable default policy LoRA, and an identically initialized permanently frozen reference LoRA
  - the chosen completion is the oracle and the rejected set contains every first-occurrence unique verifier-wrong completion from the same prompt
  - pair losses are averaged over unique rejected completions within each prompt and then averaged across prompts
  - completion scores are full-completion summed token log probabilities and label smoothing remains zero
  - the loss is mean_prompt(mean_unique_negative(-logsigmoid(beta*((logpi_chosen-logpi_rejected)-(logref_chosen-logref_rejected)))))
  - the frozen beta grid is exactly 0.01, 0.03, 0.05, 0.1, 0.2, 0.3, 0.5, and 1.0
  - paired development seed offsets are exactly 4000 and 5000
  - exactly eight beta points and sixteen unique cells are present
  - runtime records GPU 0 and 1, two slots per GPU, four full waves, and no more than two concurrent cells on either GPU
  - the execution host passes a two-concurrent-cell capacity check before the four-wave schedule is treated as valid
  - every full cell uses exactly 1200 optimizer updates, no early stopping, Greedy and Pass@8 every 100 updates, and Pass@64 every 200 updates
  - no hard-negative mining, near-far selection, extreme selection, distance taper, value network, weight-sum normalization, gradient-budget matching, IPO, hinge loss, robust DPO, or length-normalized DPO is used
  - the beta=0.1 two-step liveness gate passes before the full matrix and remains non-scientific engineering evidence
  - the initial maximum absolute reference-relative pair margin is at most 1e-5
  - the reference adapter receives no gradient, no optimizer update, and no scheduler update
  - the terminal liveness checkpoint inventory contains both default and reference adapters
  - CHECKPOINT_RELOAD_GATE.json records fresh-process loading and finite forward outputs for both adapters
  - policy evaluation activates only the default adapter
  - DPO loss, beta, policy and reference chosen and rejected log probabilities, pair-margin quantiles, preference accuracy, logit-saturation fraction, raw gradient norm, and optimizer update norm are finite and recorded
  - val.jsonl is structurally disjoint held-out evaluation and never enters the training loss
  - separate test.jsonl remains unused
  - every beta point is reported using late-window and terminal metrics and best-checkpoint metrics remain supplementary only
  - task performance, valid-expression or structure diagnostics, and NaN/Inf numerical failure are reported separately
  - fixed 1200 steps is not described as convergence, steady state, saturation, significance, best-beta evidence, or formal method ranking
  - completed text-first evidence is delivered to drpo-results ingest/e8

