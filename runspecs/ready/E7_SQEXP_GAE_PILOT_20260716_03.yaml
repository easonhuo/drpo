purpose: >
  Resume the development screening pilot for behavior-trajectory GAE under the
  existing E7 squared-remoteness actor backbone. The 12 dataset-seed preparation
  artifacts from the failed _02 attempt are reused only after their hashes,
  corrected preparer version, trajectory audit, float64 parity, and float32
  storage checks pass. The adapter resolves the canonical --variant {variant}
  binding only to iqlv_exp_rank, validates then removes the canonical-only
  --eval_max_steps 1000 pair, and checks all remaining source flags against the
  GAE trainer parser before any branch is launched. Prior failed branch and
  top-level run evidence are archived append-only before relaunch. The frozen
  192-branch matrix remains three datasets, development seeds 200-203, TD versus
  GAE(lambda=0.95), A2C versus PPO-K4, and Positive-only plus squared-EXP
  c={64,128,256}. This external-validity pilot cannot establish convergence,
  steady state, universal GAE superiority, universal actor-update superiority,
  controlled causal identification, or OOD generalization.

entrypoint:
  cwd: repo_root
  command: bash scripts/run_e7_sqexp_gae_auto_one_click.sh

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: true
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/sqexp_gae_002
  summary_file: outputs/e7/sqexp_gae_002/RUN_SUMMARY.json
  audit_file: outputs/e7/sqexp_gae_002/aggregate/terminal_audit.json

success_criteria:
  - the canonical source RunSpec resolves --variant {variant} only through injected_template_values.variant=iqlv_exp_rank and records no unresolved variant placeholder
  - any canonical --eval_max_steps flag is exactly 1000 and is absent from every materialized GAE trainer argument vector
  - every remaining source trainer flag is accepted by the checked-in GAE trainer parser before branch launch
  - each prior failed branch attempt is preserved under a monotonically indexed failed_attempts archive before relaunch
  - each prior failed top-level summary and partial aggregate is preserved under a monotonically indexed failed_run_attempts archive before relaunch
  - PREPARE_SUMMARY.json records exactly 12 complete dataset-seed preparation pairs and zero actor updates during preparation
  - every prepared pair has TRAJECTORY_AUDIT.json status PASS with no terminal-timeout overlap and no non-boundary continuity failure
  - every prepared pair records lambda-zero versus one-step-TD maximum absolute error at or below 1e-6
  - every prepared pair records NumPy-float64 versus Torch-float64 GAE maximum absolute error at or below 1e-6
  - every prepared pair records stored_gae_dtype=float32 and stored_gae_matches_float64_reference_cast=true
  - float32 storage quantization is reported separately and is not classified as a NumPy/Torch implementation mismatch
  - every frozen critic checkpoint and prepared advantage archive is bound by SHA-256 in ADVANTAGE_MANIFEST.json
  - EXECUTION_PLAN.json records exactly 192 runnable branches using only development seeds 200 through 203
  - RUN_SUMMARY.json records exactly 192 completed-or-skipped branches and zero failed branches
  - every branch reaches exactly 1000000 actor updates and records the 500000 intermediate score and the 800000-through-1000000 late window
  - every completed branch verifies exact frozen-critic immutability and disjoint actor and critic parameter sets
  - aggregate/gae_vs_td.csv contains paired GAE-minus-TD comparisons without failed-cell imputation
  - aggregate/terminal_audit.json records PASS, zero critic-audit failures, zero failed branches, and held-out seeds untouched
  - task-performance degradation, support or variance boundary events, and NaN/Inf numerical failure are reported separately
  - fixed 1M endpoints are not described as convergence, steady state, or a universal method ranking

