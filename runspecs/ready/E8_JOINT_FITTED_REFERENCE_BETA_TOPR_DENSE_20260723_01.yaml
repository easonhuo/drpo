success_criteria:
  - source checkout is clean and exactly matches implementation commit fd01669b2b9d690433494c7af3bd64710d1dcc27
  - execution uses only the reviewed fixed-profile entrypoint and does not reactivate generic E8 config-driven execution
  - RUNTIME_SLOTS.json records runtime scope GOV-RUNTIME-E8-GPU-SLOT-HOTFIX-01 without changing the scientific matrix or GPU allocation
  - method identity is Joint Fitted-Reference beta-TOPR and is not reported as canonical frozen-behavior TOPR
  - the frozen grid contains beta values 0, 0.01, 0.02, 0.04, 0.08, 0.125, 0.25, and 0.5 on seed offsets 4000 and 5000
  - exactly 8 beta points and 16 cells are present
  - beta 0 is reported as the no-ratio-taper boundary control
  - beta 0.25 and beta 0.5 are reported as rerun historical development anchors, not formal cross-run confirmations
  - one frozen Qwen backbone carries identically initialized default policy and reference LoRA adapters
  - the reference objective assigns 0.5 positive branch mass and 0.5 total negative branch mass with uniform mass over unique negatives per prompt
  - policy negative weights equal exp(beta*min(sum_logpi-sum_logmu,0)) on full-completion summed log-probability and are detached
  - policy and reference learning rates, optimizers, schedulers, and one-to-one update frequency remain unchanged across beta
  - positive weight remains 1 and no value network, learned baseline, absolute-surprisal taper, near-far selection, or weight-sum normalization is used
  - runtime records GPU 0 and 1 with one slot per GPU and eight full waves
  - the beta=0.25 two-step smoke gate passes before the full matrix and remains non-scientific evidence
  - initial full-sequence ratio maximum absolute value is at most 1e-5
  - both default and reference adapters record finite nonzero gradient and update norms during liveness
  - terminal liveness checkpoint inventory contains both default and reference adapters
  - CHECKPOINT_RELOAD_GATE.json records fresh-process loading and finite forward outputs for both adapters
  - policy evaluation activates only the default adapter
  - reference loss, reference positive and negative log-probability, ratio and weight quantiles, clipped-at-one fraction, and beta are finite and recorded
  - val.jsonl is structurally disjoint held-out evaluation and never enters the training loss
  - separate test.jsonl remains unused
  - every beta point is reported using late-window and terminal metrics and best-checkpoint metrics remain supplementary only
  - the pilot localizes a low-beta transition without selecting a best beta or asserting saturation, convergence, significance, or formal method ranking
  - task performance, valid-expression or structure diagnostics, and NaN/Inf failure are reported separately
  - completed text-first evidence is delivered to drpo-results ingest/e8

