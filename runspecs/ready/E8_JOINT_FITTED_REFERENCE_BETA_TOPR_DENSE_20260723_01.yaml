purpose: >-
  Resolve the low-beta transition of Joint Fitted-Reference beta-TOPR on the
  frozen model-independent E8 V2 bank. Run exactly eight beta values over two
  paired development seeds, after a real beta=0.25 dual-adapter CUDA liveness
  gate and fresh-process checkpoint reload verification. Preserve the fixed
  1200-step horizon, held-out evaluation, no-test-access boundary, and automatic
  text-first result delivery. This is not canonical frozen-behavior TOPR and
  does not authorize convergence, saturation, best-beta, significance, or
  formal method-ranking claims.

