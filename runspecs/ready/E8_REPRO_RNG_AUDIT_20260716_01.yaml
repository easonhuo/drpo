purpose: >
  Execute the frozen 12-cell Countdown reproducibility audit that compares the
  historical in-process validation RNG behavior with an evaluation RNG
  save/restore boundary on the same six cells and the same explicit GPU pool.
  This development pilot is validation-only and cannot establish method ranking,
  convergence, steady state, controlled-mechanism identification, or OOD claims.

entrypoint:
  cwd: repo_root
  command: >-
    bash scripts/run_countdown_e8_oracle_offline_v2_repro_rng_audit_one_click.sh
    --model_path /root/models/Qwen2.5-0.5B-Instruct
    --bank /root/experiment_output/e8_oracle_bank_v2/data/offline_bank_v2.jsonl
    --val /root/experiment_output/e8_oracle_bank_v2/data/val.jsonl
    --base_config configs/countdown_e8_base_rl_replay_0p5b.yaml
    --grid_config configs/countdown_e8_oracle_offline_v2_repro_rng_audit_0p5b.yaml
    --work_dir outputs/e8/e8_repro_rng_audit_20260716_01
    --gpus 0,1,2,3,4,5,6,7

