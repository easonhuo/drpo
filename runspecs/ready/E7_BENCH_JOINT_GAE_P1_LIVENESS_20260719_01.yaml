purpose: >
  Run non-scientific real-data liveness for the manuscript-thresholded P1 profile
  through the existing joint actor--critic trajectory-snapshot GAE pipeline.
  Hopper medium-expert seed 200 runs Positive-only, Uncontrolled, and DRPO c=4
  with tau=0, taper lambda=1, and GAE lambda=0.95. The probe length is one
  replay-equivalent snapshot interval plus one update. This is engineering
  evidence only and cannot select a coefficient or support a method ranking.

entrypoint:
  command: >-
    env E7_SQUARED_EXP_LIVENESS_MODE=gae
    E7_SQUARED_EXP_GRID=configs/e7_bench_joint_gae_tuning_p1_c.json
    E7_SQUARED_EXP_LIVENESS_WORK_DIR=outputs/e7/bench_joint_gae_p1_liveness_001
    E7_SQUARED_EXP_LIVENESS_MAX_WORKERS=3
    bash scripts/run_e7_squared_exp_night_liveness_one_click.sh
  cwd: repo_root

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: false
  formal_evidence_allowed: false

