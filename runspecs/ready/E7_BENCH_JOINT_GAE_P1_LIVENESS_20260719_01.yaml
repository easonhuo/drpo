success_criteria:
  - protected implementation paths are unchanged from the pinned commit
  - the P1 development matrix validates as exactly 198 branches
  - liveness filters the matrix to exactly three Hopper medium-expert seed-200 branches
  - the three branches are Positive-only, Uncontrolled, and DRPO c=4
  - every branch uses canonical A2C with trajectory-snapshot GAE lambda 0.95
  - DRPO c=4 uses tau=0, taper lambda=1, and derived exponential slope 0.25
  - probe length equals snapshot refresh interval plus one update
  - every branch records at least two critic snapshots and critic evolution
  - no prepared or persistent advantage artifact is used
  - the HDF5 contains aligned timeouts and next_observations fields
  - terminal, timeout, and dataset-tail recursion boundaries remain fail-closed
  - task performance, support or variance boundary, rollout failure, and NaN or Inf remain separate
  - held-out seeds 204 through 207 are untouched
  - no scientific aggregation, convergence, steady-state, coefficient selection, or ranking claim is produced

