version: 1
run_id: E7_SQEXP_GAE_JOINT_REPRO_20260718_01
lane: e7
priority: 146
created_at: '2026-07-18T00:00:00Z'
experiment_id: EXT-H-E7-SQEXP-GAE-01
repo_commit: b65882993eaf674390989bb9082be2b79f1f1e44

registration:
  mode: deferred
  closure_required: true

provenance:
  commit_policy: protected_paths_unchanged
  protected_paths:
    - configs/e7_sqexp_gae_v2.json
    - docs/scopes/EXT-H-E7-SQEXP-GAE-01.md
    - src/drpo/e7_canonical_injection.py
    - src/drpo/e7_squared_exp_night.py
    - src/drpo/e7_squared_exp_night_bootstrap.py
    - src/drpo/e7_squared_exp_night_aggregate.py
    - src/drpo/e7_squared_exp_night_runtime_autotune.py
    - scripts/run_e7_squared_exp_night_auto.py
    - scripts/run_e7_squared_exp_night_one_click.sh
    - scripts/run_e7_squared_exp_night_resume_one_click.sh
    - tests/test_e7_squared_exp_night.py
    - tests/test_e7_measured_cpu_wrappers.py

purpose: >
  Re-run the complete post-refactor A2C TD/GAE matrix for 1,000,000 optimizer
  updates per branch and compare the resulting BEST, FINAL and 800k--1M LATE
  scores against the archived pre-refactor A2C 96-branch diagnostic. This is the
  required behavioral-equivalence check for the five-file consolidation. The
  two-branch liveness RunSpec is not a substitute for this reproduction run.

entrypoint:
  command: >-
    env E7_SQUARED_EXP_GRID=configs/e7_sqexp_gae_v2.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/sqexp_gae_joint_repro_001
    bash scripts/run_e7_squared_exp_night_one_click.sh
  cwd: repo_root

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  exact_full_matrix_required: true
  scientific_aggregation_allowed: true
  formal_evidence_allowed: false

matrix:
  datasets:
    - hopper-medium-expert-v2
    - walker2d-medium-v2
    - walker2d-medium-replay-v2
  development_seeds: [200, 201, 202, 203]
  held_out_seeds_forbidden: [204, 205, 206, 207]
  actor_update_modes: [a2c]
  advantage_estimators: [td, gae]
  gae_lambda: 0.95
  controls:
    - positive_only
    - squared_exp_c64
    - squared_exp_c128
    - squared_exp_c256
  optimizer_updates_per_branch: 1000000
  evaluation_interval: 50000
  evaluation_episodes: 10
  expected_branches: 96

comparison_reference:
  evidence_class: superseded_frozen_critic_precomputed_advantage_diagnostic
  report: docs/results/E7_SQEXP_GAE_FROZEN_CRITIC_DIAGNOSTIC_2026-07-18.md
  group_summary: experiments/results/e7_sqexp_gae_frozen_critic_diagnostic_20260718/group_summary.csv
  compare_actor_mode: a2c_only
  compare_metrics: [score_at_500k, best, final, late_800k_1m]
  old_group_cells: 24
  old_paired_seed_cells: 96
  note: >-
    The archived package lacks a resolvable repository source commit. Therefore
    score deltas must be reported exactly, but no arbitrary absolute-score
    tolerance may be invented after seeing the new results.

behavioral_acceptance:
  hard_gates:
    - EXECUTION_PLAN.json records exactly 96 unique branches
    - RUN_SUMMARY.json records exactly 96 completed-or-skipped branches and zero failed branches
    - every branch uses canonical A2C and reaches exactly 1000000 optimizer updates
    - every dataset-seed-control has one TD branch and one GAE branch
    - Positive-only and squared EXP c=64,128,256 are present for every dataset, seed and estimator
    - TD and GAE in each pair use identical critic snapshot refresh cadence and identical snapshot hash trajectory
    - every branch records at least two critic snapshots and observed critic evolution
    - the original actor-before-critic update order and expectile critic update remain active
    - no prepared or persistent advantage artifact is used
    - terminal, timeout and dataset-tail semantics pass the registered fail-closed checks
    - held-out seeds 204 through 207 are untouched
    - task-performance collapse, support or variance boundary, and NaN or Inf numerical failure are reported separately
  direction_gates:
    - mean GAE-minus-TD LATE across the 12 A2C dataset-control groups remains positive
    - each of the three datasets has positive mean GAE-minus-TD LATE across its four controls
    - at least 10 of the 12 A2C dataset-control groups retain positive GAE-minus-TD LATE
    - Hopper Positive-only retains positive GAE-minus-TD LATE
  adjudication:
    pass: >-
      All hard gates pass and all direction gates pass. Exact scores may differ,
      but the refactor is accepted as preserving the old experiment's main A2C
      direction.
    investigate_bug: >-
      Any hard gate failure, any dataset-wide sign reversal, non-positive overall
      mean GAE-minus-TD LATE, or fewer than 10 of 12 positive group directions
      triggers code/provenance investigation before accepting the refactor.
    non_claim: >-
      Passing this reproduction does not establish convergence, steady state,
      formal method ranking, universal GAE superiority, or controlled causal
      identification.

outputs:
  run_dir: outputs/e7/sqexp_gae_joint_repro_001
  summary_file: outputs/e7/sqexp_gae_joint_repro_001/RUN_SUMMARY.json
  aggregate_summary: outputs/e7/sqexp_gae_joint_repro_001/aggregate/aggregate_summary.json
  branch_results: outputs/e7/sqexp_gae_joint_repro_001/aggregate/branch_results.csv
  group_summary: outputs/e7/sqexp_gae_joint_repro_001/aggregate/group_summary.csv
  paired_results: outputs/e7/sqexp_gae_joint_repro_001/aggregate/gae_td_paired_results.csv
  comparison_results: outputs/e7/sqexp_gae_joint_repro_001/aggregate/gae_td_comparisons.csv
  audit_file: outputs/e7/sqexp_gae_joint_repro_001/aggregate/terminal_audit.json

success_criteria:
  - LAUNCH_REGISTRATION_STATUS.json records launch provenance without upgrading formal evidence
  - RUNTIME_SELECTION.json records CPU, memory, candidate throughput and selected workers
  - EXECUTION_PLAN.json records exactly 96 runnable branches
  - RUN_SUMMARY.json records exactly 96 completed-or-skipped branches and zero failed branches
  - every branch reaches exactly 1000000 optimizer updates and reports the 500000 intermediate score
  - BEST, FINAL and 800k--1M LATE are aggregated for every dataset-estimator-control group
  - all 48 dataset-estimator-control groups contain seeds 200 through 203
  - all 48 dataset-seed-control TD/GAE pairs pass snapshot-hash matching
  - terminal audit passes before any equivalence conclusion is reported
  - the archived A2C reference is compared without including old PPO branches
  - no fixed 1M endpoint is described as convergence or steady state

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e7/sqexp_gae_joint_repro_001/LAUNCH_REGISTRATION_STATUS.json
    - outputs/e7/sqexp_gae_joint_repro_001/RUNTIME_SELECTION.json
    - outputs/e7/sqexp_gae_joint_repro_001/EXECUTION_PLAN.json
    - outputs/e7/sqexp_gae_joint_repro_001/RUN_IDENTITY.json
    - outputs/e7/sqexp_gae_joint_repro_001/RUN_SUMMARY.json
    - outputs/e7/sqexp_gae_joint_repro_001/GAE_STAGE_STATUS.json
    - outputs/e7/sqexp_gae_joint_repro_001/aggregate/*.json
    - outputs/e7/sqexp_gae_joint_repro_001/aggregate/*.csv
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/BRANCH_IDENTITY.json
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/LAUNCH.json
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/COMPLETED.json
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/FAILED.json
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/branch_config.json
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/branch_manifest.json
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/stdout_stderr.log
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/geometry_diagnostics.jsonl
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/GEOMETRY_DIAGNOSTICS_LATEST.json
    - outputs/e7/sqexp_gae_joint_repro_001/branches/*/trainer_output/*.json
  exclude:
    - '**/*.pt'
    - '**/*.pth'
    - '**/*.ckpt'
    - '**/*.safetensors'
    - '**/*.bin'
    - '**/checkpoint*'
    - '**/checkpoints/**'
    - '**/model*'
    - '**/optimizer*'
    - '**/wandb/**'
    - outputs/e7/sqexp_gae_joint_repro_001/_runtime_resource_probe/**
  max_package_size_mb: 150
  fail_if_excluded_matched: false
  fail_if_package_too_large: true

publish:
  enabled: false
  auto: false

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    env E7_SQUARED_EXP_GRID=configs/e7_sqexp_gae_v2.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/sqexp_gae_joint_repro_001
    bash scripts/run_e7_squared_exp_night_resume_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e7/sqexp_gae_joint_repro_001/LAUNCH_REGISTRATION_STATUS.json
    - outputs/e7/sqexp_gae_joint_repro_001/RUNTIME_SELECTION.json
    - outputs/e7/sqexp_gae_joint_repro_001/RUN_IDENTITY.json
    - outputs/e7/sqexp_gae_joint_repro_001/RUN_SUMMARY.json
  backoff_seconds: 60
