  Run the manuscript-correct Reciprocal-Linear and Reciprocal-Quadratic
  Countdown comparison on the frozen E8 V2 bank. Execute four strengths per
  family on the same two paired development seed offsets, for exactly eight
  method points and sixteen cells. Do not rerun Positive-only, Global, or the
  completed exponential anchor. This code-first pilot remains validation-only
  and cannot establish convergence, steady state, significance, or a formal
  method ranking.

