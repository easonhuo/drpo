version: 1
run_id: E7_EXP_HORIZON_JOINT_RESUME_20260712_01
lane: e7
priority: 110
created_at: "2026-07-12T08:42:00Z"
experiment_id: EXT-H-E7-BENCH-01
repo_commit: 3e528519e3282ac5b6069ff2388c3e40ec2100dc

provenance:
  commit_policy: protected_paths_unchanged
  protected_paths:
    - src/drpo/e7_canonical_exp_horizon_grid.py
    - src/drpo/e7_canonical_sweep.py
    - configs/e7_canonical_exp_horizon_joint_grid_v1.json
    - scripts/run_e7_canonical_exp_horizon_joint.py
    - scripts/run_e7_canonical_exp_horizon_joint_one_click.sh

purpose: >
  Continue the existing EXT-H-E7-BENCH-01 coefficient-horizon pilot in
  outputs/e7/exp_horizon_joint_run_001 after the original RunSpec stopped at the
  non-resumable one-click boundary. Preserve all existing branch evidence, skip
  identity-matched completed branches, and execute only branches that do not have
  a valid COMPLETED.json under the canonical runner's --resume contract.

entrypoint:
  cwd: repo_root
  command: bash scripts/run_e7_canonical_exp_horizon_joint_one_click.sh

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true

outputs:
  run_dir: outputs/e7/exp_horizon_joint_run_001
  summary_file: outputs/e7/exp_horizon_joint_run_001/RUN_SUMMARY.json
  audit_file: outputs/e7/exp_horizon_joint_run_001/RUN_IDENTITY.json

success_criteria:
  - outputs/e7/exp_horizon_joint_run_001/RUN_SUMMARY.json exists
  - outputs/e7/exp_horizon_joint_run_001/RUN_IDENTITY.json exists
  - outputs/e7/exp_horizon_joint_run_001/EXECUTION_PLAN.json records 432 branches and max_workers 60
  - RUN_SUMMARY.json records 432 completed-or-skipped branches and zero failed branches

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e7/exp_horizon_joint_run_001/EXECUTION_PLAN.json
    - outputs/e7/exp_horizon_joint_run_001/RUN_IDENTITY.json
    - outputs/e7/exp_horizon_joint_run_001/RUN_SUMMARY.json
    - outputs/e7/exp_horizon_joint_run_001/branches/*/BRANCH_IDENTITY.json
    - outputs/e7/exp_horizon_joint_run_001/branches/*/LAUNCH.json
    - outputs/e7/exp_horizon_joint_run_001/branches/*/branch_config.json
    - outputs/e7/exp_horizon_joint_run_001/branches/*/branch_manifest.json
    - outputs/e7/exp_horizon_joint_run_001/branches/*/COMPLETED.json
    - outputs/e7/exp_horizon_joint_run_001/branches/*/trainer_output/*.json
  exclude:
    - "**/*.pt"
    - "**/*.pth"
    - "**/*.ckpt"
    - "**/*.safetensors"
    - "**/*.bin"
    - "**/checkpoint*"
    - "**/checkpoints/**"
    - "**/model*"
    - "**/optimizer*"
    - "**/wandb/**"
  max_package_size_mb: 500
  fail_if_excluded_matched: true
  fail_if_package_too_large: true

publish:
  enabled: false
  auto: false
