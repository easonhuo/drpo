    - outputs/e7/squared_exp_night_1m_001/branches/*/ppo_kl_diagnostics.jsonl
    - outputs/e7/squared_exp_night_1m_001/branches/*/PPO_KL_DIAGNOSTICS_LATEST.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/trainer_output/*.json
  exclude:
    - '**/*.pt'
    - '**/*.pth'
    - '**/*.ckpt'
    - '**/*.safetensors'
    - '**/*.bin'
    - '**/checkpoint*'
