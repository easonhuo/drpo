    - outputs/e7/squared_exp_night_1m_001/GAE_STAGE_STATUS.json
    - outputs/e7/squared_exp_night_1m_001/aggregate/*.json
    - outputs/e7/squared_exp_night_1m_001/aggregate/*.csv
    - outputs/e7/squared_exp_night_1m_001/branches/*/BRANCH_IDENTITY.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/LAUNCH.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/COMPLETED.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/FAILED.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/branch_config.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/branch_manifest.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/stdout_stderr.log
    - outputs/e7/squared_exp_night_1m_001/branches/*/geometry_diagnostics.jsonl
    - outputs/e7/squared_exp_night_1m_001/branches/*/GEOMETRY_DIAGNOSTICS_LATEST.json
    - outputs/e7/squared_exp_night_1m_001/branches/*/ppo_diagnostics.jsonl
