lane: e7
priority: 125
created_at: '2026-07-13T08:00:00Z'
experiment_id: EXT-H-E7-PPO-W0-EXP-GRID-01
repo_commit: 6ceba39c1b508d6e669ea800d9b77047067d96f9

provenance:
  commit_policy: protected_paths_unchanged
  protected_paths:
    - configs/e7_ppo_w0_exp_grid_pilot_v1.json
    - src/drpo/e7_ppo_w0_grid_pilot.py
    - src/drpo/e7_ppo_w0_bootstrap.py
    - src/drpo/e7_ppo_w0_runtime_autotune.py
    - scripts/run_e7_ppo_w0_grid_pilot_auto.py

purpose: >
  Run a non-scientific real-data liveness and runtime-selection check for the
  direct-w(0) PPO pilot. The command executes only representative 500-update
  resource probes and the deterministic 186-branch plan; it does not launch the
  scientific branches or enter any result aggregation.

entrypoint:
  command: >-
    python scripts/run_e7_ppo_w0_grid_pilot_auto.py plan
    --contract /root/d4rl2/configs/e7_canonical_contract_9task.json
    --run-spec /root/d4rl2/configs/e7_canonical_9task_full_grid_run_spec_v1.json
    --grid configs/e7_ppo_w0_exp_grid_pilot_v1.json
    --work-dir outputs/e7/ppo_w0_exp_grid_liveness_001
    --max-workers 2
    --probe-steps 500
  cwd: repo_root

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: false
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/ppo_w0_exp_grid_liveness_001
  summary_file: outputs/e7/ppo_w0_exp_grid_liveness_001/RUNTIME_SELECTION.json
  audit_file: outputs/e7/ppo_w0_exp_grid_liveness_001/EXECUTION_PLAN.json

success_criteria:
  - protected implementation paths are unchanged from the pinned commit
  - direct-w(0) grid validates and the plan records exactly 186 branches
  - representative PPO bootstrap completes finite 500-update probes
  - RUNTIME_SELECTION.json records a successful memory and throughput probe
  - no scientific branch directory is completed or aggregated
  - held-out seeds 204 through 207 are untouched

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e7/ppo_w0_exp_grid_liveness_001/RUNTIME_SELECTION.json
    - outputs/e7/ppo_w0_exp_grid_liveness_001/EXECUTION_PLAN.json
    - outputs/e7/ppo_w0_exp_grid_liveness_001/_runtime_resource_probe/**/BENCHMARK_SUMMARY.json
    - outputs/e7/ppo_w0_exp_grid_liveness_001/_runtime_resource_probe/**/stdout_stderr.log
    - outputs/e7/ppo_w0_exp_grid_liveness_001/_runtime_resource_probe/**/branch_config.json
    - outputs/e7/ppo_w0_exp_grid_liveness_001/_runtime_resource_probe/**/branch_manifest.json
  exclude:
    - '**/*.pt'
    - '**/*.pth'
    - '**/*.ckpt'
    - '**/*.safetensors'
    - '**/*.bin'
    - '**/checkpoint*'
    - '**/checkpoints/**'
    - '**/model*'
    - '**/optimizer*'
    - '**/wandb/**'
  max_package_size_mb: 25
  fail_if_excluded_matched: false
  fail_if_package_too_large: true

publish:
  enabled: false
  auto: false

recovery:
  enabled: false
