purpose: >
  Execute the complete 180-branch D4RL-9 joint-critic GAE P3 left-saturation
  screening profile through the standard E7 RunSpec lane. Compare nine exact
  quarter-decade common c values from 0.01 through 0.0001 with an internally
  rerun Positive-only anchor. Characterize the left-tail response shape,
  recovery region, elbow, practical saturation onset, and any candidate
  nonzero overshoot. This run does not select a formal best c and is not formal
  evidence, a convergence result, a steady-state result, or a method ranking.

entrypoint:
  cwd: repo_root
  command: >-
    DRPO_E7_P3_LEFT_SATURATION_FULL_RUN=1
    E7_SQUARED_EXP_MODE=p3_left_saturation
    E7_SQUARED_EXP_GRID=configs/e7_bench_joint_gae_p3_left_saturation.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/bench_joint_gae_p3_left_saturation_full_001
    bash scripts/run_e7_squared_exp_night_one_click.sh

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    DRPO_E7_P3_LEFT_SATURATION_FULL_RUN=1
    E7_SQUARED_EXP_MODE=p3_left_saturation
    E7_SQUARED_EXP_GRID=configs/e7_bench_joint_gae_p3_left_saturation.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/bench_joint_gae_p3_left_saturation_full_001
    bash scripts/run_e7_squared_exp_night_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e7/bench_joint_gae_p3_left_saturation_full_001/RUNTIME_SELECTION.json
    - outputs/e7/bench_joint_gae_p3_left_saturation_full_001/EXECUTION_PLAN.json
    - outputs/e7/bench_joint_gae_p3_left_saturation_full_001/RUN_IDENTITY.json
    - outputs/e7/bench_joint_gae_p3_left_saturation_full_001/branches/**/COMPLETED.json
  backoff_seconds: 60

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: true
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/bench_joint_gae_p3_left_saturation_full_001
  summary_file: outputs/e7/bench_joint_gae_p3_left_saturation_full_001/RUN_SUMMARY.json
  audit_file: outputs/e7/bench_joint_gae_p3_left_saturation_full_001/aggregate/terminal_audit.json

success_criteria:
  - this template is not promoted to runspecs/ready until a digest-bound zero-training weight-distribution report satisfies configs/e7_bench_joint_gae_p3_weight_preflight.json
  - the preflight report uses compatible saved learner-relative distance evidence, records zero training updates, reports overall and environment or tier strata, and does not prune any c point
  - matrix contains exactly 180 branches across nine D4RL-v2 tasks, paired seeds 200 and 201, nine finite c values, and Positive-only
  - c values are exactly 0.01, 0.005623413251903491, 0.0031622776601683794, 0.0017782794100389228, 0.001, 0.0005623413251903491, 0.00031622776601683794, 0.00017782794100389227, and 0.0001
  - historical P2 c 0.015625 is not rerun and P2 or P3 raw scores are never treated as one paired run
  - every branch uses canonical A2C with joint critic updates and trajectory-snapshot GAE lambda 0.95
  - every full branch reaches exactly 1000000 trainer steps
  - tau remains 0, taper lambda remains 1, and reference distance remains 2
  - held-out seeds 204 through 207 are untouched
  - all 180 branch configurations, manifests, completion or failure records, terminal geometry summaries, and trainer summaries are packaged
  - paired deltas versus the internally rerun Positive-only anchor, equal-task-weighted control summaries, log10 c coordinates, task summaries, and environment or tier strata are produced
  - task-performance degradation remains not adjudicated without a registered threshold and support or variance boundaries remain not instrumented in this pilot
  - task performance, support or variance boundary, rollout failure, and NaN or Inf are reported separately
  - selected_control remains null and selection status remains left_saturation_curve_only_no_best_c_selection
  - curve-shape characterization is allowed but best-c, convergence, steady-state, significance, and formal method-ranking claims remain forbidden
  - completed bounded text-first evidence is automatically delivered to drpo-results branch ingest/e7

