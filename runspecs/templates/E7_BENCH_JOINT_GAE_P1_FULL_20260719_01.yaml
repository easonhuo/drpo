version: 1
run_id: E7_BENCH_JOINT_GAE_P1_FULL_20260719_01
lane: e7
priority: 147
created_at: "2026-07-19T13:30:00Z"
experiment_id: EXT-H-E7-SQEXP-GAE-01
repo_commit: ccf027e2c545c67576313ad85c5ff74e19f074d0

registration:
  mode: deferred
  closure_required: true

provenance:
  commit_policy: protected_paths_unchanged
  protected_paths:
    - configs/e7_bench_joint_gae_tuning_p1_c.json
    - docs/scopes/EXT-H-E7-BENCH-01-JOINT-GAE-TUNING.md
    - docs/scopes/EXT-H-E7-BENCH-01-P1-FULL-IMPLEMENTATION.md
    - src/drpo/e7_canonical_injection.py
    - src/drpo/e7_squared_exp_kernel.py
    - src/drpo/e7_squared_exp_night.py
    - src/drpo/e7_squared_exp_night_bootstrap.py
    - src/drpo/e7_squared_exp_night_aggregate.py
    - src/drpo/e7_squared_exp_night_runtime_autotune.py
    - scripts/run_e7_squared_exp_night_auto.py
    - scripts/run_e7_squared_exp_night_one_click.sh
    - scripts/agent/run_claimed_runspec.py
    - scripts/agent/runspec_results_delivery.py
    - scripts/agent/runspec_safety.py
    - scripts/agent/runspec_delivery_policy.py

purpose: >
  Execute the complete 198-branch D4RL-9 joint-critic GAE P1 development
  response-curve screen through the standard E7 RunSpec lane. Package the
  text-first raw and aggregate evidence and automatically deliver it to the
  results-only repository. This run does not select a coefficient and is not
  formal evidence, a convergence result, a steady-state result, or a method
  ranking.

entrypoint:
  cwd: repo_root
  command: >-
    DRPO_E7_P1_FULL_RUN=1
    E7_SQUARED_EXP_MODE=p1
    E7_SQUARED_EXP_GRID=configs/e7_bench_joint_gae_tuning_p1_c.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/bench_joint_gae_p1_full_001
    bash scripts/run_e7_squared_exp_night_one_click.sh

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    DRPO_E7_P1_FULL_RUN=1
    E7_SQUARED_EXP_MODE=p1
    E7_SQUARED_EXP_GRID=configs/e7_bench_joint_gae_tuning_p1_c.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/bench_joint_gae_p1_full_001
    bash scripts/run_e7_squared_exp_night_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e7/bench_joint_gae_p1_full_001/RUNTIME_SELECTION.json
    - outputs/e7/bench_joint_gae_p1_full_001/EXECUTION_PLAN.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/COMPLETED.json
  backoff_seconds: 60

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: true
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/bench_joint_gae_p1_full_001
  summary_file: outputs/e7/bench_joint_gae_p1_full_001/RUN_SUMMARY.json
  audit_file: outputs/e7/bench_joint_gae_p1_full_001/aggregate/terminal_audit.json

success_criteria:
  - matrix contains exactly 198 branches across nine D4RL-v2 tasks, seeds 200 and 201, nine c values, Positive-only, and Uncontrolled
  - every branch uses canonical A2C with joint critic updates and trajectory-snapshot GAE lambda 0.95
  - every full branch reaches exactly 1000000 trainer steps
  - tau remains 0, taper lambda remains 1, reference distance remains 2, and c grid remains 0.25 through 64
  - held-out seeds 204 through 207 are untouched
  - all 198 branch manifests, completion records, diagnostics, and text summaries are packaged
  - paired deltas versus Positive-only, per-task summaries, equal-task-weighted control summaries, and environment/tier strata are produced
  - terminal audit keeps task-performance collapse, support or variance boundary, rollout failure, and NaN or Inf separate
  - selected_control remains null and selection status remains response_curve_only_pending_protocol_freeze
  - fixed one-million-step horizon is not described as convergence or steady state
  - completed text-first evidence is automatically delivered to drpo-results branch ingest/e7

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e7/bench_joint_gae_p1_full_001/*.json
    - outputs/e7/bench_joint_gae_p1_full_001/aggregate/*.json
    - outputs/e7/bench_joint_gae_p1_full_001/aggregate/*.csv
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/branch_config.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/branch_manifest.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/COMPLETED.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/FAILED.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/stdout_stderr.log
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/geometry_diagnostics.jsonl
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/GEOMETRY_DIAGNOSTICS_LATEST.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/trainer_output/*.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/trainer_output/*.csv
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/trainer_output/*.log
  exclude:
    - "**/*.pt"
    - "**/*.pth"
    - "**/*.ckpt"
    - "**/*.safetensors"
    - "**/*.bin"
    - "**/checkpoint*"
    - "**/checkpoints/**"
    - "**/model*"
    - "**/optimizer*"
    - "**/wandb/**"
  max_package_size_mb: 100
  fail_if_excluded_matched: false
  fail_if_package_too_large: true

delivery:
  enabled: true
  auto: true
  mode: results_repo
  repository: easonhuo/drpo-results
  branch: ingest/e7
  export_profile: manifest_text_v1
  max_total_size_mb: 100
  max_file_size_mb: 25

publish:
  enabled: false
  auto: false
