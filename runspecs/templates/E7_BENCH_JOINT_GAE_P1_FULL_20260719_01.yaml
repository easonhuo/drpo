registration:
  mode: deferred
  closure_required: true

provenance:
  commit_policy: protected_paths_unchanged
  protected_paths:
    - configs/e7_bench_joint_gae_tuning_p1_c.json
    - docs/scopes/EXT-H-E7-BENCH-01-JOINT-GAE-TUNING.md
    - docs/scopes/EXT-H-E7-BENCH-01-P1-FULL-IMPLEMENTATION.md
    - src/drpo/e7_canonical_injection.py
    - src/drpo/e7_squared_exp_kernel.py
    - src/drpo/e7_squared_exp_night.py
    - src/drpo/e7_squared_exp_night_bootstrap.py
    - src/drpo/e7_squared_exp_night_aggregate.py
    - src/drpo/e7_squared_exp_night_runtime_autotune.py
    - scripts/run_e7_squared_exp_night_auto.py
    - scripts/run_e7_squared_exp_night_one_click.sh
    - scripts/agent/run_claimed_runspec.py
    - scripts/agent/runspec_results_delivery.py
    - scripts/agent/runspec_safety.py
    - scripts/agent/runspec_delivery_policy.py

purpose: >
  Historical pre-launch P1 full-run identity. This run ID was already claimed and
  blocked before training by an invalid results-repository V1 size declaration;
  it must not be promoted or reused. The specification is retained in a valid,
  auditable form while the replacement uses a new run ID.

entrypoint:
  cwd: repo_root
  command: >-
    DRPO_E7_P1_FULL_RUN=1
    E7_SQUARED_EXP_MODE=p1
    E7_SQUARED_EXP_GRID=configs/e7_bench_joint_gae_tuning_p1_c.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/bench_joint_gae_p1_full_001
    bash scripts/run_e7_squared_exp_night_one_click.sh

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    DRPO_E7_P1_FULL_RUN=1
    E7_SQUARED_EXP_MODE=p1
    E7_SQUARED_EXP_GRID=configs/e7_bench_joint_gae_tuning_p1_c.json
    E7_SQUARED_EXP_WORK_DIR=outputs/e7/bench_joint_gae_p1_full_001
    bash scripts/run_e7_squared_exp_night_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e7/bench_joint_gae_p1_full_001/RUNTIME_SELECTION.json
    - outputs/e7/bench_joint_gae_p1_full_001/EXECUTION_PLAN.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/COMPLETED.json
  backoff_seconds: 60

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: true
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/bench_joint_gae_p1_full_001
  summary_file: outputs/e7/bench_joint_gae_p1_full_001/RUN_SUMMARY.json
  audit_file: outputs/e7/bench_joint_gae_p1_full_001/aggregate/terminal_audit.json

success_criteria:
  - this historical run identity is not promoted or reused after its claim-time validation block
  - no training was started under this run ID
  - the replacement RunSpec preserves the same 198-branch scientific matrix
  - task-performance collapse, support or variance boundary, rollout failure, and NaN or Inf remain separate

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e7/bench_joint_gae_p1_full_001/*.json
    - outputs/e7/bench_joint_gae_p1_full_001/aggregate/*.json
    - outputs/e7/bench_joint_gae_p1_full_001/aggregate/*.csv
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/branch_config.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/branch_manifest.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/COMPLETED.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/FAILED.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/GEOMETRY_DIAGNOSTICS_LATEST.json
    - outputs/e7/bench_joint_gae_p1_full_001/branches/**/trainer_output/*.json
  exclude:
    - "**/*.pt"
    - "**/*.pth"
    - "**/*.ckpt"
    - "**/*.safetensors"
    - "**/*.bin"
    - "**/checkpoint*"
    - "**/checkpoints/**"
    - "**/model*"
    - "**/optimizer*"
    - "**/wandb/**"
  max_package_size_mb: 30
  fail_if_excluded_matched: false
  fail_if_package_too_large: true

delivery:
  enabled: true
  auto: true
  mode: results_repo
  repository: easonhuo/drpo-results
  branch: ingest/e7
  export_profile: manifest_text_v1
  max_total_size_mb: 30
  max_file_size_mb: 10

publish:
  enabled: false
  auto: false
