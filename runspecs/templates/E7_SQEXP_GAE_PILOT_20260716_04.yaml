provenance:
  commit_policy: protected_paths_unchanged
  protected_paths:
    - configs/e7_sqexp_gae_v1.json
    - src/drpo/e7_trajectory_gae.py
    - src/drpo/e7_sqexp_gae_artifacts.py
    - src/drpo/e7_sqexp_gae_protocol.py
    - src/drpo/e7_sqexp_gae_matrix.py
    - src/drpo/e7_sqexp_gae_minimal.py
    - src/drpo/e7_sqexp_gae_audit.py
    - src/drpo/e7_sqexp_gae.py
    - scripts/run_e7_sqexp_gae_one_click.sh

purpose: >
  Execute the 192-branch development screening pilot comparing one-step TD and
  trajectory GAE(lambda=0.95) under the same preserved dataset-seed critic,
  canonical A2C or PPO-K4 actor updates, Positive-only, and manuscript-aligned
  squared EXP with c={64,128,256}. The existing canonical E7 sweep supplies
  planning, parallel execution, resume, run identity, evaluation, checkpoints,
  and branch lifecycle. This run is not formal evidence and the fixed 1M
  endpoint is not convergence or steady state.

entrypoint:
  command: bash scripts/run_e7_sqexp_gae_one_click.sh
  cwd: repo_root

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/sqexp_gae_003
  summary_file: outputs/e7/sqexp_gae_003/RUN_SUMMARY.json
  audit_file: outputs/e7/sqexp_gae_003/TERMINAL_AUDIT.json

success_criteria:
  - EXECUTION_PLAN.json records exactly 192 branches
  - RUN_SUMMARY.json records exactly 192 completed-or-skipped branches and zero failed branches
  - TD and GAE each contribute exactly 96 branches
  - A2C and PPO-K4 each contribute exactly 96 branches
  - every GAE branch recomputes trajectory GAE from one-step TD and ordered terminal/timeout boundaries
  - recomputed GAE agrees with the preserved prepared artifact within the registered tolerance
  - every actor branch loads the preserved shared critic and records identical initial and final critic state hashes
  - canonical trainer, actor optimizer, minibatch sampling, evaluation, checkpoints, geometry diagnostics, and PPO diagnostics remain reused
  - held-out seeds 204 through 207 remain untouched
  - task-performance collapse, support or variance boundary events, and NaN/Inf numerical collapse are reported separately
  - fixed 1M endpoint is not described as convergence, steady state, or a universal method ranking

artifacts:
  package_policy: manifest_only
  include:
    - outputs/e7/sqexp_gae_003/EXECUTION_PLAN.json
    - outputs/e7/sqexp_gae_003/RUN_IDENTITY.json
    - outputs/e7/sqexp_gae_003/RUN_SUMMARY.json
    - outputs/e7/sqexp_gae_003/TERMINAL_AUDIT.json
    - outputs/e7/sqexp_gae_003/branches/*/BRANCH_IDENTITY.json
    - outputs/e7/sqexp_gae_003/branches/*/LAUNCH.json
    - outputs/e7/sqexp_gae_003/branches/*/COMPLETED.json
    - outputs/e7/sqexp_gae_003/branches/*/FAILED.json
    - outputs/e7/sqexp_gae_003/branches/*/branch_config.json
    - outputs/e7/sqexp_gae_003/branches/*/branch_manifest.json
    - outputs/e7/sqexp_gae_003/branches/*/stdout_stderr.log
    - outputs/e7/sqexp_gae_003/branches/*/geometry_diagnostics.jsonl
    - outputs/e7/sqexp_gae_003/branches/*/GEOMETRY_DIAGNOSTICS_LATEST.json
    - outputs/e7/sqexp_gae_003/branches/*/ppo_diagnostics.jsonl
    - outputs/e7/sqexp_gae_003/branches/*/PPO_DIAGNOSTICS_LATEST.json
    - outputs/e7/sqexp_gae_003/branches/*/trainer_output/*.json
  exclude:
    - '**/*.pt'
    - '**/*.pth'
    - '**/*.ckpt'
    - '**/*.safetensors'
    - '**/*.bin'
    - '**/*.npz'
    - '**/checkpoint*'
    - '**/checkpoints/**'
    - '**/model*'
    - '**/optimizer*'
    - '**/wandb/**'
  max_package_size_mb: 150
  fail_if_excluded_matched: false
  fail_if_package_too_large: true

publish:
  enabled: false
  auto: false

recovery:
  enabled: true
  max_attempts: 2
  resume_command: bash scripts/run_e7_sqexp_gae_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e7/sqexp_gae_003/EXECUTION_PLAN.json
    - outputs/e7/sqexp_gae_003/RUN_IDENTITY.json
    - outputs/e7/sqexp_gae_003/RUN_SUMMARY.json
  backoff_seconds: 60
