  Run a non-scientific real-data liveness and automatic-resource check for the
  high-c direct-w(0) A2C/PPO follow-up. The command executes representative
  500-update PPO resource probes and materializes the deterministic 84-branch
  plan; it does not launch or aggregate the scientific branches.

entrypoint:
  command: bash scripts/run_e7_w0_highc_actor_liveness_one_click.sh
  cwd: repo_root

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true
  scientific_aggregation_allowed: false
  formal_evidence_allowed: false

outputs:
  run_dir: outputs/e7/w0_highc_actor_liveness_001
  summary_file: outputs/e7/w0_highc_actor_liveness_001/RUNTIME_SELECTION.json
  audit_file: outputs/e7/w0_highc_actor_liveness_001/EXECUTION_PLAN.json

success_criteria:
  - protected implementation paths are unchanged from the pinned commit
  - the grid validates and the plan records exactly 84 branches
  - the representative PPO bootstrap completes finite 500-update probes
  - geometry diagnostics complete for the representative probe
  - RUNTIME_SELECTION.json records successful memory and throughput probes
  - no scientific branch directory is completed or aggregated
  - held-out seeds 204 through 207 are untouched

