purpose: >
  Run the frozen eight-point AsymRE boundary-dense response curve on two paired
  development seed offsets. Resolve delta_v from -1.0 through -0.5 while
  preserving the E8 V2 bank, objective, optimizer, horizon, held-out evaluation
  split, late-window and terminal reporting, and automatic text-first delivery.

entrypoint:
  cwd: repo_root
  command: >-
    E8_ALPHA1_HIGHC_WORK_DIR=outputs/e8/asymre_deltav_boundary_dense_001
    E8_ALPHA1_HIGHC_GRID_CONFIG=configs/countdown_e8_oracle_offline_v2_asymre_deltav_boundary_dense_0p5b.yaml
    bash scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto_one_click.sh

recovery:
  enabled: true
  max_attempts: 2
  resume_command: >-
    E8_ALPHA1_HIGHC_WORK_DIR=outputs/e8/asymre_deltav_boundary_dense_001
    E8_ALPHA1_HIGHC_GRID_CONFIG=configs/countdown_e8_oracle_offline_v2_asymre_deltav_boundary_dense_0p5b.yaml
    bash scripts/run_countdown_e8_oracle_offline_v2_alpha1_highc_scan_auto_one_click.sh
  retryable_exit_codes: [137, 143]
  checkpoint_globs:
    - outputs/e8/asymre_deltav_boundary_dense_001/RUNTIME_SELECTION.json
    - outputs/e8/asymre_deltav_boundary_dense_001/RUNTIME_SLOTS.json
    - outputs/e8/asymre_deltav_boundary_dense_001/SWEEP_STATUS.json
  backoff_seconds: 60

policy:
  existing_script_required: true
  forbid_new_launcher: true
  forbid_hparam_change: true
  forbid_cross_lane: true

outputs:
  run_dir: outputs/e8/asymre_deltav_boundary_dense_001
  summary_file: outputs/e8/asymre_deltav_boundary_dense_001/SWEEP_COMPLETE.json
  audit_file: outputs/e8/asymre_deltav_boundary_dense_001/aggregate/terminal_audit.json

success_criteria:
  - objective remains A=R-delta_v with signed rewards +1 and -1 and zero empirical baseline
  - no value network, learned baseline, or remoteness taper is used
  - exact delta-v grid is [-1.0, -0.95, -0.9, -0.85, -0.8, -0.7, -0.6, -0.5]
  - matrix contains 8 parameter points and 16 cells on paired seed offsets 4000 and 5000
  - delta_v=-1.0 and delta_v=-0.5 are rerun as internal boundary anchors
  - runtime records GPU 0-7, two slots per GPU, and 16 concurrent cells
  - the full sweep requires one 16-slot wave after the smoke gate
  - the delta_v=-0.9 smoke gate passes before the full sweep and is not scientific evidence
  - val.jsonl is recorded as a structurally disjoint held-out evaluation split and never enters the training loss
  - every declared delta-v point is reported using late-window and terminal metrics
  - an interior-point claim includes paired per-seed differences against delta_v=-1.0
  - validation-selected best checkpoint remains supplementary only
  - separate test.jsonl remains unused without implying absence of held-out evaluation
  - task performance, valid-expression or structure diagnostics, and NaN/Inf failure are separate
  - fixed 1200 steps is not described as convergence, steady state, significance, or formal ranking
  - no taper-superiority or AsymRE-superiority claim is inferred from this pilot alone
  - completed text-first evidence is delivered to drpo-results ingest/e8

