schema_version: 2
issue_id: PAPER-INTRO-EXAMPLE-01
section_id: introduction
paragraph_ids:
  - INTRO-P02
problem: >-
  Describe the user-reported problem without proposing a downstream-only patch.
change_control:
  kind: alignment_repair
  reported_layer: blueprint
  outline_change_authorized: false
  authorization_evidence: >-
    The user confirmed that the canonical outline paragraph is correct; the blueprint
    must be repaired to match it.
checks:
  - layer: outline
    status: pass
    evidence: >-
      The approved outline paragraph has the correct responsibility and order.
  - layer: blueprint
    status: fail
    evidence: >-
      The blueprint does not faithfully derive from the approved outline paragraph.
  - layer: prose
    status: blocked
    evidence: >-
      Prose cannot be reviewed until the blueprint is repaired.
resolution:
  state: planned
  required_layers:
    - blueprint
    - prose
  changed_layers: []
