- rule_id: GOV-AGENT-HARDENING-004
  title: Main artifact ZIPs are first built as candidates, internally verified, and atomically published only
  severity: mandatory
  scope: formal_experiment_and_code_delivery
  source:
    source_id: AGENTS-FORMAL-HARDENING
    item_index: 4
    kind: top_level_list_item
    excerpt: Main artifact ZIPs are first built as candidates, internally verified, and atomically published only after checksum,
      safe-path, base-commit, and `git apply --check` validation succeeds. The apply check must use an isolated index loaded
      from the immutable base commit, not the caller's possibly staged index.
