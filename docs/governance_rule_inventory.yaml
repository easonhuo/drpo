      or Git bundle containing the expected commit object. For code modification and `drpo-update` pre-delivery testing, an
      official GitHub archive pinned to the full SHA may be promoted to a verified source capsule only after safe extraction,
      archive SHA-256 recording, complete-tree inventory, file-mode preservation, and a second independent extraction/apply/test
      pass. An unpinned branch ZIP, user-created ZIP without immutable provenance, web snippets, parsed pages, copied files,
      or a hand-built partial repository are not valid bases. Archive-only capsule mode does not automatically satisfy a formal
      experiment launch unless the supervisor explicitly validates that capsule mode.
