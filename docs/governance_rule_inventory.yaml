- rule_id: GOV-AGENT-HARDENING-032
  title: If authoritative `main` changes between freshness checkpoints or no longer matches the selected base
  severity: mandatory
  scope: formal_experiment_and_code_delivery
  source:
    source_id: AGENTS-FORMAL-HARDENING
    item_index: 32
    kind: top_level_list_item
    excerpt: If authoritative `main` changes between freshness checkpoints or no longer matches the selected base, stop before
      execution or delivery, refresh/rebase to the new SHA, reread `AGENTS.md`, handoff Section 0, and the registry, then
      rerun `git apply --check`, the patch application, `TEST_COMMANDS.sh`, and ZIP verification. Do not deliver a package
      known to be stale and do not wait for the user to notice the new commit.
