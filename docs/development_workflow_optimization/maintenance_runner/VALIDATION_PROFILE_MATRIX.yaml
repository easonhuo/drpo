schema_version: 1
claim_id: GOV-DRPO-MAINTENANCE-RUNNER-REPLAYAB-01
status: stage0_frozen_command_contract
source_main: ad9bda80796dcf5c48976f5d64ffd79a006c70d5
command_authority:
  pr_workflow: .github/workflows/pr-gate-log.yml
  impact_map: tools/drpo-update/test_impact_map.json
rules:
  task_packet_may_supply_commands: false
  task_packet_may_supply_environment: false
  exact_head_required: true
  all_nonzero_results_block: true
  no_unplanned_retry: true
  github_queue_time_is_operational_context_only: true
profiles:
  generic_small_update:
    intended_paths:
    - non_authoritative_docs
    - configs
    - runspecs
    - existing_small_code_and_tests
    prepublication_controlled_checkout:
    - argv: [python, scripts/select_update_tests.py, --base, "{base_sha}", --head, "{candidate_sha}", --mode, auto, --json]
      role: record_repository_owned_impact_plan
    - argv: [python, -m, compileall, -q, src, scripts, tools, tests]
      role: repository_compile
    - argv: [python, scripts/handoff_authority.py, verify, --repo-root, .]
      role: code_only_authority_no_op
    - argv: [python, scripts/validate_formal_execution_channel.py, --repo-root, .]
      role: formal_channel_validation
    - argv: [python, scripts/validate_governance_rule_inventory.py, --repo-root, .]
      role: governance_inventory
    - argv: [python, scripts/validate_governance_pipeline_stage_status.py, --repo-root, .]
      role: governance_stage
    - argv: [python, -m, pytest, -q]
      role: full_pytest
    - argv: [ruff, check, .]
      role: full_ruff
    exact_head_observation:
    - workflow_name: PR Gate Log
      required_conclusion: success
    - workflow_name: Evidence Locator Gate
      required_conclusion: success_or_path_scoped_not_applicable
    focused_tests: inventory_bound
  e7_small_update:
    inherits: generic_small_update
    path_family:
    - configs/e7*.json
    - runspecs/ready/E7_*.yaml
    - runspecs/templates/E7_*.yaml
    - src/drpo/e7*.py
    - scripts/run_e7*.py
    - tests/test_e7*.py
    focused_tests: inventory_bound
    scientific_invariants:
    - experiment_and_profile_identity
    - datasets_and_order
    - seeds_and_held_out_exclusions
    - controls_anchors_and_expected_branch_count
    - runspec_consistency
    - no_training_or_result_status_change
  e8_small_update:
    inherits: generic_small_update
    path_family:
    - configs/countdown_e8*.yaml
    - runspecs/ready/E8_*.yaml
    - runspecs/templates/E8_*.yaml
    - src/drpo/countdown_e8*.py
    - scripts/run_countdown_e8*.py
    - tests/test_countdown_e8*.py
    focused_tests: inventory_bound
    scientific_invariants:
    - experiment_and_profile_identity
    - bank_corpus_and_initialization_identity
    - seeds_offsets_and_test_split_exclusion
    - parameter_grid_controls_and_expected_cell_count
    - runspec_consistency
    - no_training_or_result_status_change
  replayab_m0_measurement_adapter:
    intended_paths:
    - scripts/run_workflow_replay.py
    - tests/test_workflow_replay_execute.py
    - tests/test_workflow_replay_compare.py
    - tests/test_workflow_replay_model.py
    - tests/test_workflow_replay_orchestrate.py
    - tests/fixtures/workflow_replay/m0_atomic/**
    focused_commands:
    - argv: [python, -m, compileall, -q, scripts/run_workflow_replay.py, src/drpo/workflow_replay, tests/test_workflow_replay_execute.py, tests/test_workflow_replay_compare.py, tests/test_workflow_replay_model.py, tests/test_workflow_replay_orchestrate.py]
    - argv: [python, -m, pytest, -q, tests/test_workflow_replay_execute.py, tests/test_workflow_replay_compare.py, tests/test_workflow_replay_model.py, tests/test_workflow_replay_orchestrate.py]
    - argv: [ruff, check, scripts/run_workflow_replay.py, src/drpo/workflow_replay, tests/test_workflow_replay_execute.py, tests/test_workflow_replay_compare.py, tests/test_workflow_replay_model.py, tests/test_workflow_replay_orchestrate.py]
    exact_head_inherits: generic_small_update
case_binding:
  rule: >-
    Each success case must list its exact focused pytest targets in CASE_INVENTORY.yaml.
    A focused command supplements but never replaces the full exact-head PR Gate Log.
  unknown_or_unmapped_path: full_profile_only
