  status: current_limited
  statement_summary: Under bounded-advantage, pre-boundary learnable-log-scale assumptions, reciprocal-quadratic weighting
    bounds the quadratic far-field influence at a generally nonzero constant, while o(d^-2) tails such as higher-order reciprocal
    polynomials or exponentials make that influence vanish; this does not imply a universal reward winner.
  module_ids:
