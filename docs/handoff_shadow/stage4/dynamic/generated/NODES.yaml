        Exponential 是当前最强候选。** 不可写成 steady-state winner、universal winner、Distance 必然优于 Global alpha、跨任务优越或 OOD generalization。
      sha256: c2e32f78e27037a235a1d6ee5824fe6a050368ba50f3879940f5a4909b532dc9
