- node_id: claim:SCI-E4-TAPER-INFLUENCE-TAIL-01
  node_type: claim
  lifecycle_status: accepted
  title: Under bounded-advantage, pre-boundary learnable-log-scale assumptions, reciprocal-quadratic weighting bounds the
    quadratic far-field influence at a generally nonzero constant, while o(d^-2) tails such as higher-order reciprocal polynomials
    or exponentials make that influence vanish; this does not imply a universal reward winner.
  module_ids:
  - continuous_e1_e4
  - theory_methods_related_work
  provenance:
    kind: bootstrap_claim_inventory
    source_anchor:
      file: docs/handoff.md
      heading_id: H0037
      text: 所以 Quadratic 的严格作用是把远场影响从无界增长压成一般非零的有界常数。它是 learnable-log-scale 二次分支的最低充分多项式有界阶，同时在近场满足 `1-w_quad(d)=O(d^2)`，比
        reciprocal-linear 的一阶近场损失更平坦。
      occurrence_in_section: 1
      sha256: 2fe7b47d84950ea43d44768e7295f00b996f1c983e6c0b10b567e113881651fa
  attributes:
    claim_id: SCI-E4-TAPER-INFLUENCE-TAIL-01
    domain_status: current_limited
