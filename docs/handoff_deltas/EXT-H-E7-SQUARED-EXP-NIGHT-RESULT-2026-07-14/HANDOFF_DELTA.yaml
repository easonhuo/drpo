  content: '- **Hopper/Walker squared-remoteness EXP × PPO reference-lifecycle 1M
    screening （`EXT-H-E7-SQUARED-EXP-NIGHT-01`）：**已完成 126/126 个 1M development branches，terminal
    audit `PASS`，失败与 NaN/Inf 均为 0，held-out seeds `204--207` 未使用。实验使用论文一致的 `w(d)=w(0)exp[-c(d/2)^2]`，比较
    A2C、固定 K4 PPO 与 `K_max=16 + analytic KL(old||new)>0.01` 触发刷新。KL-refresh 相对固定 K4
    在 21 个配对 cell 中赢 16 个，800k--1M late mean 平均差 `+3.79`，在 `c={2,4,8}` 的 9 个 cell
    中赢 7 个且平均差 `+5.52`，因此登记为正向的有限步均值信号；但 KL 路径平均 seed SD 为 `7.03`，高于 K4 的 `5.87`，不得宣称普遍更稳定。KL
    频繁触发使实际 old-policy reference 平均仅维持约 `3.93` 次更新，因此结果支持自适应刷新时机可能有益，不支持固定长 K 必然更优。Stage
    C GAE 启动 0 个 branch，因 ordered trajectory 与 terminal/truncation contract 尚未验证而保持
    blocked。本结果仅为 Hopper/Walker 两 development seeds 的 external-validity screening；固定
    1M 不等于收敛或稳态，也不替代 C-U1/D-U1 受控机制证据。运行报告的本地 commit `fbafb44c...` 当时未存在于 GitHub；仓库入库复现其唯一已知
    plumbing 修复（trainer variant 改为 `iqlv_exp_rank`），因此状态保持 `pilot`，不得升级为 formal evidence。'
