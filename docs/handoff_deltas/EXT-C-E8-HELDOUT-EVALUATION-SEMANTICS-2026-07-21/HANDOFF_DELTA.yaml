  block_id: e8-heldout-evaluation-semantics-2026-07-21
  content: "- **Countdown E8 evaluation-semantics clarification (authoritative override):** For the completed EXP, Linear,\
    \ Tau, and Reciprocal coefficient-response pilots, the file named `val.jsonl` is a structurally disjoint held-out evaluation\
    \ split: canonical structure families and `(numbers, target)` problem keys do not overlap the training bank, and evaluation\
    \ rows never enter the training loss or optimizer update.\n\n  Paper-facing evidence reports every declared coefficient\
    \ point using the fixed late-window Pass@8 summary and the fixed terminal Pass@8 horizon. A saved `best_pass8_adapter`\
    \ is supplementary diagnostic/local-recovery evidence only and must not replace the late-window or terminal response curve.\n\
    \n  Historical statements such as `test_split_used: false`, `test_data_used: false`, or `test split unused` refer only\
    \ to the separately materialized `test.jsonl`. They do not imply absence of held-out evaluation and do not, by themselves,\
    \ require the existing curves to be rerun. Because later high-c, high-lambda, and dense reciprocal ranges were expanded\
    \ after earlier held-out curves were inspected, the combined line is described as **staged held-out evaluation response\
    \ curves**, not an untouched one-shot confirmatory test. No result status, significance, convergence, steady-state, formal\
    \ method-ranking, OOD, cross-task/model, or universal-superiority claim is upgraded.\n\n  Historical EXP evaluator RNG\
    \ contamination remains a separate provenance limitation. Task performance, support/valid-structure boundary events, and\
    \ NaN/Inf numerical failures remain separately reported. Durable clarification records are `docs/experiments/E8_HELDOUT_EVALUATION_SEMANTICS.md`,\
    \ `docs/experiments/E8_COMPLETED_BACKLOG_CLOSURE.md`, and `docs/experiments/E8_RECIPROCAL_JOINT_CLOSURE.md`."
