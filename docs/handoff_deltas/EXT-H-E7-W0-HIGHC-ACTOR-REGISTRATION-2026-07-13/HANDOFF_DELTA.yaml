  block_id: e7-w0-highc-actor-screening-pilot
  content: '- **Hopper/Walker E7 direct-`w(0)=1` high-`c` × actor-update follow-up
    （`EXT-H-E7-W0-HIGHC-ACTOR-01`）：**登记为 `not_run` 的 development screening pilot，是
    `EXT-H-E7-PPO-W0-EXP-GRID-01` 的非破坏性 successor；前序 186-branch 结果与失败记录完整保留。本实验固定公开参数化
    `u=d/2`、`w(d)=w(0)exp(-cu)`，只比较 Positive-only 与 `w(0)=1, c={2,3,4,6,8,12}`，并在
    historical canonical A2C 与 PPO clip 两种 actor update 下成对执行。三项任务为 `hopper-medium-expert-v2`、`walker2d-medium-v2`、`walker2d-medium-replay-v2`，development
    seeds 仅 `200,201`，共 84 个 500k branches；held-out seeds `204--207` 禁止使用。网络、critic、advantage、优化器、batch、学习率、数据与评估协议保持一致；PPO
    继续固定 clip `0.2` 和 old-policy cadence `4`。两种 actor update 均记录负样本 standardized distance、实际
    `w(d)`、阈值占比与 advantage-weighted effective negative mass，诊断不得改变 objective。该 external-validity
    pilot 只回答有限步高衰减恢复与 actor-update 敏感性，不得升级为因果识别、收敛、稳态或 PPO/A2C 普遍排名；任务性能退化/崩溃、support/variance
    boundary 与 NaN/Inf 必须分开终态审计，也不得按数据集事后选择不同 `c` 冒充统一方法。'
