  block_id: v55-du1-e6-semantic-gap-result-closure
  content: '

    > **v55 增量登记：`D-U1-E6-SEMANTIC-GAP-LONGRUN-01` 正式结果、终态审计与仓库闭环（不删除 v54 及更早内容）**

    >

    > - 冻结协议在科学运行 commit `0907c3c0e76fc836c2bf2b752abf554c17f79f22` 上完成 `100/100` method-seed runs；正式 seeds 为 `150--169`，sandbox
    seeds `900--909` 未进入正式聚合。raw-complete 包 SHA-256 为 `65630159ef85c665a3a0ac0eba5cbf751ecb77a929f267423f7a6d9a8e5c4fbf`。

    > - 所有 required outputs 与 terminal audits 均存在且被接受，并完成预注册的 2× horizon 扩展到 32000 steps；但只有 `45/100` runs 达到 formal terminal
    plateau，`55/100` 为 persistent-drift-or-inconclusive。因此科学状态只升级为 **有限训练步数验证（finite-step validated）**，不得形成全 alpha 稳态方法排名。

    > - 三类事件严格分报且均为 0：task-performance collapse `0/100`、support/temperature boundary `0/100`、NaN/Inf numerical failure `0/100`。这不等于全部方法已收敛。

    > - 32k 时 Positive-only reward 为 `0.741309`；`alpha=0.25` 与 `alpha=0.50` 分别为 `0.766269` 和 `0.765975`，相对 Positive-only 的
    paired mean gains 为 `+0.024960` 与 `+0.024666`，均为 `20/20` seeds 胜出。

    > - `alpha=1.0` 相对 Positive-only 的差距从 4k 的 `+0.003943` 转为 8k/16k/24k/32k 的 `-0.013741/-0.039167/-0.053227/-0.061085`，自
    8k 起均为 `0/20` 胜出；`alpha=0.75` 到 32k 为 `-0.001978`、9 胜 11 负且 0/20 plateau，属于有限 horizon 反转与持续漂移证据，不是稳态排名。

    > - 该结果支持：Positive-only 存在有限 horizon overall-reward ceiling、适度保留负梯度可改善同分布 held-out-context reward、完全不抑制的原始负梯度会产生随 horizon
    扩大的任务退化。它不支持 universal alpha optimum、跨任务方法优越性或 categorical policy 的 Gaussian 二次远场律。

    > - 训练/测试 contexts 仍独立采样自同一分布；只能称 **same-distribution held-out-context generalization / structured state-action support
    gap**，不得称 state-distribution OOD generalization。

    > - 用户上传的 raw-complete ZIP 是不可变实验/恢复证据，不是 repository update；`drpo-update` 在 `package_extract` 阶段拒绝它是预期行为。仓库只纳入 compact
    summaries、terminal audit、provenance 与 artifact index，33.6 MB trajectory 保持 persistent-local 索引。

    > - `D-U1-E6-TAPER-01` 的 semantic-gap successor delivery blocker 已满足并移除，但 semantic remoteness coordinate、paired protocol、新
    untouched seeds 与独立 formal runner 仍未冻结/实现；其状态继续是 **not_run + not_implemented + review-required/blocked**，不得自动启动。

    > - 本仓库闭环更新基于 `main` commit `fa225510e3e3e4616f36d8f586611aa6af79bf6e`；未重跑正式实验，也未修改冻结变量、seeds、阈值或训练协议。

    '
