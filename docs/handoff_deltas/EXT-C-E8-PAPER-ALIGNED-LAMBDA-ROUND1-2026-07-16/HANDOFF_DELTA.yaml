  block_id: e8-paper-aligned-lambda-round1-target-driven-registration
  content: '- **E8 paper-aligned lambda Round 1（`EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-LAMBDA-ROUND1-0.5B-01`）：**已登记但未运行。Countdown
    离散 remoteness 锁定为当前 learner 对 completion 的 mean-token surprisal（prompt/padding 排除，EOS 纳入）；唯一主公式为 `D=-mean_token_logp`、`z=relu((D-tau)/scale_c)`、`w=alpha*exp(-lambda*z)`，禁止再次平方
    surprisal。Round 1 固定 `alpha=1`，用冻结的 pre-training bank sample 无任务指标校准 `tau` 与 `scale_c`，扫描 5 个 `lambda`（单尺度单位 tail retention
    为 0.90/0.75/0.50/0.25/0.10），连同 Positive-only 共 6 个点、3 个 paired development seeds、18 cells；Global 仅复用既有未受公式错误影响的结果，不在本轮重跑。大
    `lambda` 极限是保留近场、移除远场的 near-field-only negative training，不是 Positive-only。历史 squared-surprisal sweep 的非单调趋势登记为 `locked_directional_evidence`；successor
    若未复现，只能报告为 paper-aligned protocol 下未确认或 non-transfer，不得追溯性表述为“此前趋势全部错误”，除非独立审计证明原证据本身存在损坏、泄漏或 evaluator 缺陷。执行顺序锁定为公式/校准/liveness
    → lambda 定位 → 边界扩展或局部细化 → 条件触发的窄 alpha 检查 → tau 敏感性 → fresh-seed confirmation；默认运行资源为自动选择 2 个合格 GPU slot、每卡 1 个进程，slot 数只影响墙钟调度且不改变科学矩阵；test data 禁止用于调参，固定 1200 steps 不等于收敛/稳态，任务性能、valid-structure/support
    boundary 与 NaN/Inf 分开报告。详细机制与方案见 `docs/experiment_governance/TARGET_DRIVEN_EXPERIMENT_MECHANISM.md` 和 `docs/experiments/E8_PAPER_ALIGNED_LAMBDA_TUNING_PROTOCOL.md`。'
