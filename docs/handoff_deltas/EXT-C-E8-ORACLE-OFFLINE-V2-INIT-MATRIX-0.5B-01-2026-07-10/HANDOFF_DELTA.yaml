  block_id: e8-oracle-offline-v2-init-matrix-0p5b-gate
  content: >-
    - **Countdown E8 oracle-offline v2 init-matrix 0.5B pilot:** 登记
      `EXT-C-E8-ORACLE-OFFLINE-V2-INIT-MATRIX-0.5B-01`，作为
      `EXT-C-E8-ORACLE-OFFLINE-BANK-V2-0.5B-01` 模型无关 corpus 的 v2 downstream
      successor。它在冻结 v2 corpus/bank 上运行初始化级别 × 训练条件矩阵：base /
      low-SFT / full-SFT 三个初始化，共用一套 offline-training protocol（来自
      `countdown_e8_base_rl_replay_0p5b.yaml` 的 offline_training/evaluation/negative_calibration），不改
      seeds、数据规模、阈值或训练步数。唯一训练 cell 恰好 8 个（base 5、low-SFT 2、full-SFT 1），加
      B0/C0 两个 eval-only 与 A1/A2 两个 alias（A1→base_positive_only、
      A2→base_bank_global_matched_x1p0，不重训）。两套 calibration 按初始化隔离：base calibration
      （reference_adapter=None）只用于 base 负样本 cell，low-SFT calibration（reference_adapter=v2 SFT
      epoch_1）只用于 B2；禁止 B2 复用 base calibration 或旧 pilot_run_7 calibration。动态 near/far 选择保持不变：固定
      bank + 每步当前模型 length-normalized surprisal、argmin=近、argmax=远、stop-gradient 选完后只对两条
      completion 做 train-mode forward。on-policy/replay 不进入本实验（它们不读 v2 offline negative bank），仍属
      `EXT-C-E8-BASE-RL-REPLAY-0.5B-01`。本轮只做代码/测试注册与必要最小 smoke，不启动完整 8-cell 训练；smoke/static 不构成科学结果或方法排名，Countdown 不替代
      D-U1/C-U1 受控因果识别。
