  block_id: v76-rules-phase2-backlog
  content: '> **v76 增量登记：低成本常驻规则、Phase 2 backlog 与更新包交付硬约束（不删除 v75 及更早内容）**

    >

    > - 本版只登记工程/协作规则和 pipeline 二期规划，不运行实验，不修改任何实验状态、冻结变量、seeds、阈值、训练 horizon、终态门禁或科研结论。

    > - DRPO 论文图、实验图、paper figure、plot、chart、panel、visualization、`画图`、`图片`、`生成图` 默认解释为代码绘图任务，优先使用 Python/Matplotlib/LaTeX/PGF/SVG/repository
    scripts；不得仅因出现图片相关词汇就调用 image generation。只有用户明确要求 AI 生图、艺术插图、照片编辑或风格迁移时，才允许使用 image generation；不确定时先问。

    > - 在线轮询规则作为跨项目执行语义登记：用户说“轮询/在线轮询/盯着跑/一直等到结果/跑完再汇报/不要停/别报初步结果/等终态再说”等表达时，表示同一轮内阻塞式工具检查到成功、失败、卡死、用户停止或工具/会话限制；后台运行不等于在线轮询，用户下次问一次再查一次也不等于在线轮询，final
    之后不得声称仍在持续监控。

    > - DRPO 更新包交付硬规则：默认必须交付 canonical bundle-backed package；patch-only runnable package 不再作为正常交付格式。即使生成包时拿到最新 `main`，也不能假设用户应用前
    `main` 不会被其他提交推进。除非用户明确要求临时 exact-base patch-only 立即应用，否则不得交付 patch-only runnable 包；无法生成并验证 bundle-backed 包时，只能交付方案、非运行
    diff 草案或要求最新 Git bundle/diagnostic。

    > - Pipeline Phase 2 backlog 正式记录：最大挑战是 handoff 拆分/模块化与上下文装配；需要维护 implemented、shadow-only、partial、paused、reverted、future
    backlog 等状态分类。`.drpoupdate` macOS 双击入口暂停并归入二期，只能在未来作为 old CLI 薄壳 wrapper 重新评估，且不得修改 `drpo-update` 核心语义、base mismatch、stale-package
    recovery 或 bundle-backed integration。

    '
