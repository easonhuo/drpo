  block_id: v74-du1-e6-rev4-formal-freeze
  content: '> **v74 增量登记：D-U1 E6 revision-3 开发校准闭环与 revision-4 正式协议冻结（不删除 v73 及更早内容）**

    >

    > - 实验 ID 继续为 `D-U1-E6-CARTESIAN-TAPER-01`。revision 2 的 observed common/rare 副本虽然实现概率笛卡尔积，但 rare 副本被压低时可能由同 reward 的 common
    副本代偿，且固定几何 utility 标签可能在策略移动后失效；因此旧环境只保留为工程历史，不再承担正式方法比较。

    > - revision 3 新增 16 个 evaluation-only hidden high-reward rare actions，使共享 rarity support 收缩真实降低 hidden-optimal probability
    与 expected reward；同时在训练全过程用当前 expected-reward derivative sign 审计 useful/unhelpful 标签。环境失效、任务性能崩溃、支持边界和 NaN/Inf 必须分别报告。

    > - development seeds `0--4` 完成用户批准的 120-run 校准：6 方法 × 5 seeds × `alpha∈{0.25,0.5}` × `anchor∈{0.25,0.1}` × `rho=0.25`，每
    run 8000 steps。该证据身份仅为 **pilot / development calibration**，不得作为正式方法排名；formal seeds `200--219` 未访问。

    > - 参数选择规则在方法排名之外预先固定为“已执行候选中负压力最强、同时通过环境有效性、support、数值与终态门禁的点”。据此冻结 `negative_alpha=0.5`、`rarity_logit_anchor_coefficient=0.25`、`reference_rare_retention=0.25`。`anchor=0.1`
    在 `alpha=0.5` 下令 All-negative 5/5 触发 support boundary，因此被稳定性门禁排除。选择规则不以 Exp 是否第一为条件。

    > - Quartic 的历史代码与开发结果保留，但因缺少独立实验职责，自 revision 4 起退出 active formal matrix。正式方法为 Positive-only、All-negative、Global matched、Reciprocal-linear、Reciprocal-quadratic、Exponential-quadratic；不得预设
    Exp 或任何方法胜出。

    > - revision 4 正式协议冻结为 20 个 held-out seeds `200--219` × 6 方法 × 8000 steps，共 120 runs；数据几何、优化器、阈值、双终态窗口、seed blocks 与方法公式不得在正式启动后调整。结果仍为
    `not_run`，只有 guarded formal run、终态审计、持久打包与 commit 绑定完成后才能升级证据状态。'
