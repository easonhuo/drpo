  content: '- **Hopper E7 PPO stability pilot（`EXT-H-E7-PPO-STABILITY-01`）：**仅在 canonical E7 网络、critic、advantage、EXP remoteness/normalize、优化器、数据与 1M 预算不变时，将 actor surrogate 改为 PPO clip（`epsilon=0.2`、每个 old-policy snapshot 4 次 optimizer updates）。当前状态为 **implemented + real-data smoke ready + full pilot blocked + not_run**。先用 `walker2d-medium-v2 / seed 200 / EXP c=1.5` 跑 20k matched A2C/PPO smoke，检查 ratio block、正负 clip fraction、old-policy refresh、raw gradient/update norm 与 NaN/Inf；smoke 不进入科学聚合。通过并经 reviewer 接受后，才允许把 96-branch pilot RunSpec 从 template 提升到 ready。完整 pilot 固定 3 tasks、development seeds `200--203`、Positive-only 与 EXP `c=0.5/1.0/1.5`、A2C/PPO、全部 1M；held-out seeds `204--207` 保持 untouched。启动前使用短时并发候选网格，在安全 CPU/内存上限内按 aggregate completed updates/s 选择达到实测峰值 97% 的最小 worker 数；该选择属于 runtime provenance，不改变科学矩阵，也不构成连续全局最优并行度证明。固定 1M 不是 convergence；任务性能退化、support/variance boundary 与 NaN/Inf 继续分开报告。'
