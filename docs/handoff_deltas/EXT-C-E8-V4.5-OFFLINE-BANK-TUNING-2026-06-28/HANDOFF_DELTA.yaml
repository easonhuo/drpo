  op: append_to_section
  heading_path:
  - 3. 连续统一环境 C-U1 的详细设计
  - 3.9 E6--E8 方法迁移与规模验证路线（v42 锁定）
  block_id: v59-e8-offline-tuning-route
  content: 9. **v59 E8 内部路线覆盖：** V4.4 fixed-bank 之后先运行 V4.5 validation-only α×λ 调参，检验当前 dynamic 方法是否只是控制强度偏保守。只有调参仍不能产生稳定收益时，才进入另行登记的
    online off-policy successor；不得用 test 反复挑选参数，也不得把 V4.5 变成无界 HPO。
- operation_id: append-v59-e8-offline-tuning-execution-order
  op: append_to_section
  heading_path:
