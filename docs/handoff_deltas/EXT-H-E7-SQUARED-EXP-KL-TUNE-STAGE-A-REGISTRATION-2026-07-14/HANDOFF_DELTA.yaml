  content: '- **Squared-EXP KL threshold Stage A (`EXT-H-E7-SQUARED-EXP-KL-TUNE-01`):**
    registered as a 150-branch Hopper/Walker development screening pilot pinned to
    implementation commit `2d4d295022c75b0c2cde283d2d9c3402779c5764`. It compares
    Positive-only and `c={4,8,16,32}` under fixed K4, fixed K16, and adaptive `K_max=16`
    analytic-KL thresholds `0.003`, `0.01`, and `0.03`, with PPO epsilon `0.2`, one-step
    TD, 1M updates, and development seeds `200,201`. Held-out seeds `204--207`, GAE,
    and Stage B remain forbidden. Code-first clean-checkout launch is allowed and
    registration does not block the pilot. Current result status is `not_run`; no
    convergence, steady-state, stability, universal ranking, OOD, or causal claim
    is authorized.'
