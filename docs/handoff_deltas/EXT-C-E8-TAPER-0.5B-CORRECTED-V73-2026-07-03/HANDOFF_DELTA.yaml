    detached weighting、paired sampler 身份校验和终态审计，当前为 **implemented + ready + not_run**。只允许先运行登记的 0.5B pilot；不得将 smoke/static
    test 写成科学结果，也不得预设 Exp、Global 或任何 taper 获胜。'
