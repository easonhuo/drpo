  block_id: v62-e8-online-offpolicy-route
  content: 10. **v62 E8 内部路线覆盖：** V4.5 已完成其“alpha/lambda 是否未调到位”的职责后，不再扩大 frozen-bank HPO。V4.6 用全新 paired seeds 执行 frozen/online × positive/dynamic
    2×2；只有 online negative 相对 online Positive-only 的 paired 增量与 refresh×negative interaction 才能支持“动态负样本有额外价值”。若 online 两个 cells 都提高但彼此持平，收益归因于数据刷新；若
    online dynamic 仍不占优，不得继续用 bank staleness 解释。
- operation_id: append-v62-countdown-online-offpolicy-execution-order
  op: append_to_section
  heading_path:
  - 6. 接下来唯一执行顺序
  block_id: v62-countdown-online-offpolicy-execution-order
  content: 18. **v62 Countdown 执行覆盖：** formal 主顺序继续由 v56/v58/v61 控制；`EXT-H-E7-Q2` 优先级不变。V4.6 允许作为独立 guarded pilot 执行，顺序固定为 predecessor/input hash
    audit -> 四 cell paired training -> 全部训练结束后 test evaluation -> 2×2 paired effect/interaction -> terminal audit -> canonical artifact delivery。任何
    online phase 都必须保留 collector manifest、round JSONL、fresh/stale mix 与实际 selected-bank diagnostics；smoke 或单 seed 不得称实验结果。
