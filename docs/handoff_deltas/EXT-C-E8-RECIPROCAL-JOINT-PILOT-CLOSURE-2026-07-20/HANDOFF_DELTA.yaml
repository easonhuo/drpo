  block_id: e8-reciprocal-joint-pilot-closure-2026-07-20
  content: '- **Countdown reciprocal shape-ablation joint pilot closure:** `EXT-C-E8-ORACLE-OFFLINE-V2-PAPER-ALIGNED-RECIPROCAL-SHAPE-SCREEN-0.5B-01`,
    `...RECIPROCAL-HIGH-LAMBDA-EXTENSION...`, and `...RECIPROCAL-QUADRATIC-DENSE-LAMBDA-CURVE...` are now registered as one
    linked external-validity evidence chain. The three runs completed 16/16, 16/16, and 32/32 cells respectively (64/64 jointly),
    all terminal audits passed, NaN/Inf failures were 0, and the test split was not used.


    Under the frozen current-surprisal coordinate, paired development seeds, 1200-step budget, and validation-only protocol,
    Reciprocal-Linear and Reciprocal-Quadratic move from under-suppression into a broad plateau as lambda increases, but do
    not reach the sustained matched exponential anchor behavior. This supports tail-decay shape rather than simple global
    strength alone as an important control factor in this Countdown setting. The evidence remains pilot-only: it does not
    establish significance, convergence, steady state, formal support recovery, or a formal/cross-task method ranking.


    Provenance is resolved by direct commit identity for the high-lambda run and by registered RunSpec snapshot plus protected-source
    SHA-256 equivalence for the two non-resolvable local run commits. The durable audit is `docs/experiments/E8_RECIPROCAL_JOINT_PROVENANCE_AUDIT.json`;
    results are bound to `drpo-results` commits `8d04768273315ff6ab1bcbade9cbf5705952259a`, `eca0eb0365f5660e0a49dff5d39c9bb5f5df0cdf`,
    and `69a81c6db3bdd90ed640d54eb5687870d2dba220`.


    Scientific exploration on this reciprocal lambda line is closed: no fourth scan or further right-boundary expansion is
    required. The user-approved manual V1 fallback was used because the ordinary fastpath permits one experiment entity per
    transaction while this closure atomically registers three linked entities; the one-time remote bootstrap workflow is deleted
    after trusted normalization and gates.'
