  block_id: e8-v2-fixed-alpha-continuous-exp-grid-ready
  content: '- **Countdown E8 V2 fixed-alpha continuous EXP pilot:** 登记 `EXT-C-E8-ORACLE-OFFLINE-V2-CONTINUOUS-EXP-GRID-0.5B-01`，状态为
    `implemented_ready_not_run`。训练对每个 prompt 的全部去重负样本使用固定 `alpha * exp(-c * u^2)`
    权重，其中 `u=-stopgrad(sequence mean log-prob)/2`；不再使用 current-near/current-far 极值选择、0.5/0.5
    二元混合、`negative_scale`、初始化梯度预算匹配或按权重和归一化。本轮联合扫描 31 个 `(alpha,c)` 点和 2 个新 development
    seeds，共 62 cells，固定 1200 步且只用 validation 调参；当前 runtime 不接受 test split。GPU autotune
    只选择活动设备槽，并在完整 sweep 前执行 2-step 真实 liveness。此前 72-cell budget-matched taper sweep
    作为历史 pilot 保留，不得用于回答本轮固定 alpha 问题。本登记仅是 Countdown 外部有效性调参 pilot，不构成机制识别、正式方法排名、收敛、稳态或
    OOD 泛化结论。'
