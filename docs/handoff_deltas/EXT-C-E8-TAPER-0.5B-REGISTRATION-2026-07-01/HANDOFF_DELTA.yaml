  - DRPO / SNA2C 远场负梯度动力学研究主文档 v67（Countdown 0.5B 机制探索关闭与 E8-TAPER 登记版）
  block_id: v67-countdown-0p5b-mechanism-close-e8-taper
  content: '> **v67 增量登记：关闭 Countdown 0.5B 机制探索职责并登记 `EXT-C-E8-TAPER-0.5B-01`（不删除 v66 及更早内容）**

    >

    > **历史标题保留：v66（E4-TAPER Budget-Match 正式结果闭环版）。**

    >

    > - **职责关闭而非结果升级。** Countdown/Qwen 0.5B 的机制探索阶段在当前范围内关闭；这一决定只表示现有外部证据已经足以承担 Transformer 共享参数下的机制迁移说明，不把任何 smoke、单 seed、有限步
    pilot 或正在运行的 V4.6 自动升级为正式多 seed 结果。C-U1/D-U1 继续承担受控因果识别与 ground truth，Countdown 不替代内部机制实验。

    > - **关闭范围。** 现有证据支持以下范围受限观察：learner-relative surprisal 较高的错误 completion 往往具有更大的 raw negative influence 与共享参数 collateral
    effect；固定 near/far completion 会随 learner 更新而 stale；current-policy remoteness control 可以显著削弱当前远端影响；uncontrolled negative
    可能造成任务性能和 valid/support 退化而不必伴随 NaN/Inf。Near/Far 仅是端点诊断工具，不是最终算法对负样本的天然二分类。

    > - **禁止过度解释。** 本关闭决定不声明某个连续函数普适最优，不声明 Online Dynamic 已稳定超过 Positive-only，不把 0.5B 结果外推为 3B/7B 规模结论，也不把 task-performance
    degradation、support/structure boundary 与 NaN/Inf numerical failure 混为一类。

    > - **V4.6 保持独立。** `EXT-C-E8-V4.6-ONLINE-OFFPOLICY-REPLAY` 继续作为 online refresh × negative update 的独立 2×2 效果 pilot，保留其既有状态和
    provenance；其结果无论是否超过 Positive-only，都不得反向改写已经完成的内部机制结论，也不作为本次机制职责关闭的必要门禁。

    > - **新增实验。** 登记 `EXT-C-E8-TAPER-0.5B-01`，只比较同一公共 negative replay、同一 0.5B reference adapter、同一 optimizer/update budget
    下，不同连续 surprisal taper 如何分配负梯度预算，以及它们是否带来任务收益或稳定性差异。该实验是外部方法 pilot，不是新的基础机制实验；当前状态为 **not_run + not_implemented + blocked**，在
    runner、公共 replay、校准输出和终态审计全部实现并冻结前禁止启动。

    > - **公共 replay 与连续距离。** 固定 reference collector 对相同 Countdown prompts 生成候选，保留全部格式合法、数字使用正确、verifier 判错且 prompt 内唯一的 completion，形成
    sample-level replay pool；不再要求每个 prompt 恰好具有 2、4 或 16 个负样本。训练先均匀采样 prompt，再从该 prompt 的候选池采样 completion，避免候选丰富 prompt 获得更大权重。每次更新由当前
    learner 重新计算 `d_theta=max(0,-log pi_theta(x|s)-tau)`，不得沿用永久 near/far 标签。

    > - **冻结方法组。** 主比较固定为 Positive-only、Uncontrolled negative、Global matched、Reciprocal-linear、Exponential 和 Squared-distance
    exponential。不得预设 Exp、Squared-Exp 或 Global 必然更优；Reciprocal-quadratic 若后续需要，只能作为单独登记的附录候选，不能在看到 confirmation/test 后追加。

    > - **公平校准。** 在独立 calibration split 与 development seed `9134` 上，将 Global 与各 taper 的初始化 raw negative-gradient L2 匹配到同一冻结目标预算；校准完成后冻结全部系数。paired
    confirmation seeds 固定为 `9234/10234/11234`，test split 只在训练和方法选择全部完成后访问，禁止依据 confirmation/test 继续调函数或系数。

    > - **指标与终态。** 同时报告 greedy verifier success、pass@8、valid rate、best 与 terminal checkpoint；按当前 surprisal 分位桶报告 raw/weighted
    negative-gradient norm、实际权重、positive-negative cosine、correct-completion collateral effect 及各桶预算贡献。任务效果退化、valid/support/entropy
    boundary 和 NaN/Inf 必须分开审计；不得只用 best checkpoint 宣称胜出。

    > - **解释规则。** 若选择性 taper 超过 Positive-only 且 terminal 不反转、valid/support 不恶化，则支持 0.5B 上的额外负信号价值；若只优于 Uncontrolled/Global
    而不超过 Positive-only，则只支持远场伤害控制；若方法接近，则按简单性与理论尾部性质冻结 3B 候选；若全部负梯度方法更差，则关闭 0.5B 方法收益路线，不继续无界 HPO。

    > - **规模路线。** `EXT-C-E8-SCALE-01` 的方法 shortlist 由本实验冻结；3B 主模型与 7B frozen confirmation 仍是独立规模验证，当前不因 0.5B 机制职责关闭而自动解锁。'
