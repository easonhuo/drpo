problem: The publication-quality pipeline mixed reusable rhetorical and evidence checks with paper-specific terminology, sentence roles, figures, captions, proofs, and release defaults. That coupling could make future generated prose imitate the current manuscript instead of deriving high-quality content from each project's own outline, evidence, and blueprint.
change_control:
  kind: infrastructure_migration
  reported_layer: prose
  outline_change_authorized: false
  authorization_evidence: The user explicitly required a general-purpose paper-generation pipeline and authorized removing business-specific rules while preserving publication quality.
checks:
- layer: outline
  status: pass
  evidence: The registered outline remains the project-specific scientific contract and does not need semantic revision for this infrastructure change.
- layer: blueprint
  status: pass
  evidence: The registered blueprint content remains valid project input; project roles only need to be interpreted through a separate project contract.
- layer: prose
  status: fail
  evidence: The downstream generation and release path could inherit paper-specific rules from core code, so future prose was not guaranteed to be domain independent.
resolution:
  state: completed
  required_layers:
  - prose
  changed_layers:
  - prose
allowed_additional_paragraph_ids: []
scientific_status_change: none
outputs:
- docs/manuscript/generic_publication_quality_profile.yaml
- docs/manuscript/projects/drpo_profile.yaml
- scripts/manuscript_publication_pipeline.py
- scripts/manuscript_release_pipeline.py
- scripts/projects/drpo/build_manuscript_assets.py
- tests/fixtures/generic_manuscript/graph.yaml
- tests/test_manuscript_release_pipeline.py
constraints:
- No experiment status, seed, threshold, convergence rule, method ranking, or scientific conclusion is changed.
- Reference manuscripts are quality rubrics only and cannot supply project wording, entities, claims, theorem sequence, or experimental narrative.
- The generic core must contain no registered project business terms.
- The existing project and an unrelated distributed-sensor fixture must both pass the same quality engine.
