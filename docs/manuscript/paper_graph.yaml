      instruction: Define positive and negative advantage components.
      anchors:
      - A^+
      - A^-
    - role: influence_factorization
      instruction: Factor negative per-sample magnitude into severity and score geometry.
      anchors:
      - severity
      - score geometry
    - role: aggregation
      instruction: Name frequency and directional coherence as aggregate factors.
      anchors:
      - frequency
      - directional coherence
    - role: boundary
      instruction: Clarify that the field is not assumed to be the exact on-policy policy gradient.
      anchors:
      - not assumed
      - on-policy
    citation_refs:
    - sutton1999policy
    - levine2020offline
    theorem_or_equation_refs:
    - eq:signed-field
    - eq:sign-split
    - eq:influence-factorization
    appendix_bindings: []
    allowed_conclusions:
    - fixed labels isolate actor-score dynamics
    - negative influence has separable severity and geometry factors
    forbidden_conclusions:
    - the setup represents every actor--critic algorithm globally
    - critic error is necessary for the mechanism
    reviewer_objection: Freezing the update distribution and advantage could be mistaken for a claim about all of RL.
    objection_response: State it as an actor-step mechanism analysis and separate extensions with evolving critics or ratios.
    word_budget:
    - 190
    - 340
  prose: 'We analyze the actor-side dynamics generated by repeatedly reusing signed feedback from a historical update distribution. Let $\nu$ denote a distribution over state--action pairs, representing an offline dataset, a replay buffer, or trajectories collected by earlier or stale policies, and let $\widehat A(s,a)$ be the advantage-like coefficient supplied to the actor. During one actor step, both $\nu$ and $\widehat A$ are treated as fixed with respect to $\theta$. The resulting empirical actor field and discrete update are

    \begin{equation}

    \begin{aligned}

    \mathbf F(\theta)

    &=\mathbb E_{(s,a)\sim\nu}\!\left[\widehat A(s,a)\nabla_\theta\log\pi_\theta(a\mid s)\right],\\

    \theta_{t+1}&=\theta_t+\eta\mathbf F(\theta_t).

    \end{aligned}

    \label{eq:signed-field}

    \end{equation}

    This field is not assumed to equal the exact on-policy policy gradient, because $\nu$ need not match the current state--action distribution~\cite{sutton1999policy,levine2020offline}. Define the positive and negative components

    \begin{equation}

    \widehat A^+=\max(\widehat A,0),\qquad \widehat A^-=\max(-\widehat A,0),

    \label{eq:sign-split}

    \end{equation}

    so that $\mathbf F$ decomposes into attraction from $\widehat A^+$ and repulsion from $\widehat A^-$. For one negative sample, the update magnitude factorizes as

    \begin{equation}

    \left\|\widehat A^-\nabla_\theta\log\pi_\theta(a\mid s)\right\|_2

    =\widehat A^-\left\|\nabla_\theta\log\pi_\theta(a\mid s)\right\|_2.

    \label{eq:influence-factorization}

    \end{equation}

    The first factor measures disadvantage severity; the second is learner-relative score geometry. At the aggregate level, sample frequency and directional coherence further determine whether these contributions cancel or reinforce. Freezing $\nu$ and $\widehat A$ is therefore a mechanism-isolation device: it asks what the actor score alone can do under historical reuse, without claiming that critic error, importance ratios, or jointly evolving actor--critic dynamics are absent in full algorithms.'
