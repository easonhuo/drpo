  prose: 'Offline reinforcement learning contains several distinct failure channels, and far-field signed actor dynamics is only one of them. Conservative Q-learning controls value extrapolation by assigning pessimistic values to unsupported actions~\cite{kumar2020conservative}. Implicit Q-learning avoids querying out-of-distribution actions during value improvement and then fits an actor to supported high-value behavior~\cite{kostrikov2021offline}. Behavior-constrained and proximal approaches instead keep the learned policy close to the data or a behavior reference~\cite{fujimoto2019off,wang2020critic,zhuang2023behavior}. Data selection adds another axis by changing which transitions participate in learning. DRPO focuses on the signed actor field after an advantage-like signal has been supplied: it asks how negative actor updates change as historical actions become remote, and how to preserve their local information without allowing their far-field contribution to dominate. This actor-side
