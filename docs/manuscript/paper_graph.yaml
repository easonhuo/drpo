  prose: 'Historical reuse converts the static score relation into opposite positive and negative feedback loops. Fix a historical action $a$, write $D(u)=-\log\pi_u(a)$ and $R(u)=\|\nabla_uD(u)\|_2^2$, and consider the repeated update

    \begin{equation}

    u_{t+1}=u_t-\eta\widehat A\nabla_uD(u_t).

    \label{eq:reuse-update}

    \end{equation}

    The action and its signed coefficient remain fixed over the reuse window; only the learner coordinates change.

    \begin{theorem}[Self-attenuation and self-amplification under reuse]

    \label{thm:reuse}

    Assume that $D$ is differentiable and convex along the update path. If $\widehat A<0$, then every negative reuse step satisfies

    \begin{equation}

    D_{t+1}\ge D_t+\eta|\widehat A|R_t,

    \qquad R_{t+1}\ge R_t.

    \end{equation}

    If $\widehat A>0$, $\nabla D$ is $L$-Lipschitz, and $0<\eta\widehat A\le1/L$, then positive reuse satisfies

    \begin{equation}

    D_{t+1}\le D_t-\tfrac{\eta\widehat A}{2}R_t,

    \qquad R_{t+1}\le R_t.

    \end{equation}

    \end{theorem}

    The first pair of inequalities says that negative reuse makes the fixed historical action more remote and cannot weaken its subsequent score response. The second pair gives the complementary positive mechanism: sufficiently small positive reuse makes the successful action more compatible with the learner and attenuates its response. Convexity holds for fixed-covariance Gaussian mean coordinates and categorical logits, and for regular exponential families in natural coordinates because $\nabla^2D$ is a covariance matrix. Combining this theorem with Proposition~\ref{prop:score-remoteness} yields unbounded Gaussian mean-score amplification but bounded, persistent categorical suppression. The result does not determine the aggregate policy trajectory: positive samples regain attractive force as the learner moves, and updates from different samples may cancel. Appendix~\ref{app:proof-reuse} proves the inequalities and the score monotonicity. We therefore turn from the single-sample loop to
    the aggregate balance of positive and negative historical updates.'
