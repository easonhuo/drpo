  prose: The empirical program follows the same decomposition as the theory. First, we ask whether far-field or rare negative updates become disproportionately influential in realistic policy learning. Second, using matched quality--distance and quality--rarity controls, we test whether remoteness independently changes negative influence and whether targeted far-field interventions interrupt drift or boundary events. Third, we test the predicted sequence from the Positive-only platform through stable extrapolation to persistent drift or instability, and compare selective attenuation with global and budget-matched controls. Fourth, we evaluate whether the resulting control improves external tasks. C-U1 and D-U1 provide controlled continuous and categorical identification; Hopper/D4RL and Countdown provide external validity and do not replace those controlled mechanisms. Every dynamics claim is terminal-audited, and task-performance collapse, support or variance-boundary events, and NaN/Inf
    numerical failure are reported separately. We contribute a layered theory of repeated repulsion, matched causal identification of learner-relative remoteness, DRPO control of the far-field negative term, and an evidence chain that keeps mechanism claims distinct from external task claims.
