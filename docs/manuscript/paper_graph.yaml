- id: APP-DRO-P01
  section: app-dro
  order: 1
  title: Optimistic-DRO Quality Selection and Its Distinct Role
  claim: The Optimistic-DRO subdistribution problem yields a quality-based hard-selection solution; this result is part of the current manuscript but is mathematically distinct from learner-relative remoteness tapering.
  reader_question: What does the Optimistic-DRO result establish in the current paper, and what does it not establish?
  role: Integrate the valid distributional-selection derivation into the current manuscript while keeping quality selection mathematically distinct from learner-relative remoteness tapering.
  evidence:
  - closed-form density-ratio-constrained subdistribution solution
  - explicit separation of quality and remoteness axes
  must_include:
  - quality-based uncertainty set
  - top-quality hard-selection solution
  - current-paper integration
  - no implication that hard quality filtering equals exponential distance tapering
  must_avoid:
  - split-manuscript chronology
  - claim that quality hard filtering derives exponential remoteness tapering
  evidence_status: available
  blueprint:
    topic_sentence: Optimistic distributional selection and learner-relative remoteness control answer different questions within the same DRPO manuscript.
    moves:
    - state the density-ratio-constrained quality-selection problem
    - state its hard-selection solution
    - explain the exact scope of that result
    - separate it from the remoteness envelope used in the main actor update
    evidence_use:
    - provide the self-contained optimization and solution statement
    - cross-reference the main matched badness--distance experiments
    transition: The correction ledger records how this and other retained results differ from superseded claims.
  prose: 'Let $P$ denote the empirical data distribution and let $R(s,a)$ be the registered quality signal. The Optimistic-DRO selection problem is

    \begin{equation}

    \begin{aligned}

    \max_Q\quad &\mathbb E_Q[R(s,a)]\\

    \text{s.t.}\quad &Q\ll P,\qquad 0\le \frac{dQ}{dP}\le \frac{1}{\kappa},\\

    &\int dQ=1.

    \end{aligned}

    \label{eq:optimistic-dro}

    \end{equation}

    Its optimum allocates the maximum admissible density to the highest-quality region of $P$, with boundary mass only when needed to satisfy normalization. For a continuous reward distribution this is the top-$\kappa$ hard-selection solution. This result establishes a principled quality-selection operator inside the current DRPO manuscript. It does not identify policy remoteness with low quality and does not derive the exponential envelope in Eq.~\eqref{eq:exp-weight}. Quality selection controls which data are emphasized; remoteness tapering controls how a negative sample''s influence changes as the learner moves. The source-isolation experiments keep quality fixed precisely so that the second effect can be identified independently.'
- id: APP-CORR-P01
  section: app-corrections
  order: 1
  title: Additional Theoretical and Reporting Clarifications
  kind: paragraph
  claim: The manuscript consistently uses corrected Gaussian scale dynamics, the Jacobian of the actual signed field, held-out-context terminology for C-U1, and separate reporting of task, boundary, and numerical failures.
  reader_question: Which technical conventions must remain consistent across the main text and appendix?
  role: Collect the technical conventions that prevent contradictory statements across theory, experiments, and reporting.
  must_include: &id073
  - Gaussian mean repulsion with location-dependent scale dynamics
  - actual signed-field Jacobian rather than expected Fisher as the stability object
  - held-out-context or unseen-state generalization for C-U1
  - separate task collapse, policy-family boundary, and NaN/Inf fields
  - terminal audit before convergence or long-run language
  must_avoid:
  - historical chronology
  - defensive discussion of manuscript versions
  evidence: &id074
  - corrected Gaussian derivation
  - registered reporting protocol
  - terminal-audit governance
  evidence_status: available
  blueprint:
    topic_sentence: The manuscript consistently uses corrected Gaussian scale dynamics, the Jacobian of the actual signed field, held-out-context terminology for C-U1, and separate reporting of task, boundary, and numerical failures.
    moves: *id073
    evidence_use: *id074
    transition: ''
  prose: The manuscript uses the following technical conventions throughout. Far-field negative Gaussian updates combine mean repulsion with location-dependent scale dynamics and commonly support contraction; they do not universally expand both mean and variance. The expected Fisher matrix describes policy geometry but does not by itself determine stability of a fixed off-policy signed field; local stability is evaluated with the Jacobian of the actual aggregate field. C-U1 test states are independently sampled from the same state distribution and are described as held-out-context or unseen-state generalization, not OOD generalization. Task-performance collapse, support or variance boundaries, and NaN/Inf numerical failure are reported separately. Finally, finite-horizon evidence is not relabeled as convergence or long-run validation without the registered terminal audit.
