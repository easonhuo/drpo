  prose: 'Theorem~\ref{thm:equilibrium} shows that negative dominance admits no finite stable equilibrium, but it does not determine how runaway appears in a particular policy family. Gaussian and categorical policies share the aggregate instability while differing sharply in gradient amplitude and boundary behavior. The distinction is structural.

    \begin{theorem}[Unbounded Gaussian and bounded-score categorical runaway]

    \label{thm:family-runaway}

    Assume $p<q$ and let $r=q-p>0$. For a fixed-covariance Gaussian policy, define $\mu^\dagger=(q\mu_--p\mu_+)/r$. The aggregate mean field is

    \begin{equation}

    \mathbf F_\mu(\mu)=r\Sigma^{-1}(\mu-\mu^\dagger).

    \label{eq:gaussian-runaway}

    \end{equation}

    Unless initialized exactly at $\mu^\dagger$, continuous and discrete trajectories satisfy $\|\mu\|_2\to\infty$, and for every fixed historical action $a$, $\|\nabla_\mu\log\pi_\mu(a)\|_2\to\infty$. For a categorical policy with gauge-fixed logits, every nonstationary aggregate trajectory leaves each compact subset of logit space and has a subsequence approaching the simplex boundary, while

    \begin{equation}

    \|\nabla_z\log\pi_z(a)\|_2^2=\|e_a-\pi_z\|_2^2\le2.

    \label{eq:categorical-bound}

    \end{equation}

    \end{theorem}

    In the Gaussian case, $\mu^\dagger$ is a repelling point and the positive-definite matrix $r\Sigma^{-1}$ expands every nonzero displacement. Increasing separation from any fixed action then converts directly into gradient-amplitude runaway. In the categorical case, fixing the additive-logit gauge reveals strictly convex ascent away from any finite stationary point. The logits become unbounded and probabilities approach the simplex boundary, but each direct-logit score remains less than or equal to $\sqrt{2}$. Categorical degeneration is therefore support suppression, not Gaussian-style gradient explosion. This bounded-score distinction also prevents us from interpreting a probability-boundary event as evidence of floating-point overflow or an unbounded Euclidean token gradient. A learned Gaussian covariance can further amplify standardized distance when support contracts, but covariance learning is not required for the fixed-covariance mean result. Neither theorem branch alone establishes
    task-performance collapse or NaN/Inf numerical failure; those events require separate empirical tests. Appendix~\ref{app:proof-family-runaway} provides both derivations, with additional Gaussian and categorical details in Appendices~\ref{app:gaussian} and~\ref{app:categorical}. These distinctions lead directly to the predictions below.'
