  prose: 'The preceding results imply a falsifiable phase sequence rather than a generic prediction that negative updates are bad. Positive-only training should reach a finite platform determined by the observed positive target. Under Theorem~\ref{thm:equilibrium}, moderate negative influence should produce stable extrapolation to a second finite platform when the signed moment remains feasible. Increasing negative mass or moving its moment outward should bring the policy toward a support, variance, or probability boundary; after equilibrium loss, Theorems~\ref{thm:reuse}--\ref{thm:family-runaway} predict persistent drift or a non-vanishing terminal residual rather than a genuine stationary state. The causal prediction is selective: if the far-field component transmits the instability, removing or capping the far path should rescue a finite terminal regime, whereas removing only near-field negatives should not. Global scaling and budget-matched transfers then test whether total magnitude
