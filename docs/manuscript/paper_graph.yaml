- id: APP-PROOF-P01
  section: app-proof
  order: 1
  title: Proof of Theorem 1
  kind: paragraph
  claim: The equilibrium theorem follows from the diffeomorphism between natural and mean parameters in a regular minimal exponential family.
  reader_question: What are the exact existence, uniqueness, boundary, and stability arguments?
  role: Provide the full proof outside the main narrative.
  must_include: &id043
  - derive aggregate field
  - interior mean-space existence
  - boundary divergence
  - Jacobian
  must_avoid: []
  evidence: &id044
  - standard exponential-family properties
  evidence_status: available
  blueprint:
    topic_sentence: The equilibrium theorem follows from the diffeomorphism between natural and mean parameters in a regular minimal exponential family.
    moves: *id043
    evidence_use: *id044
    transition: ''
  prose: For a regular minimal exponential family, $\nabla\psi$ maps the natural-parameter space diffeomorphically onto the interior of the mean-parameter space. Setting~\eqref{eq:aggregate-field} to zero with $p>q$ gives~\eqref{eq:signed-target}. If $\mathbf m^\star$ is interior, uniqueness follows from strict convexity of $\psi$. The displacement identity follows by subtracting $\mathbf m_+$ from~\eqref{eq:signed-target}. If $\mathbf m^\star$ approaches the boundary, no finite natural parameter realizes it; if it lies outside the closure, no policy in the family realizes the target. Differentiating~\eqref{eq:aggregate-field} gives $J_F=-(p-q)\nabla^2\psi$, which is negative definite at an interior point because the Hessian is the positive-definite covariance of the sufficient statistic. The discrete update is locally stable for step sizes whose transition matrix has spectral radius below one.
- id: APP-GAUSS-P01
  section: app-gaussian
  order: 1
  title: Corrected Gaussian Mean and Variance Dynamics
  kind: paragraph
  claim: Far-field negative advantages repel the mean and tend to contract variance when standardized distance exceeds one.
  reader_question: What corrects the earlier mean-and-variance expansion account?
  role: Record the exact score signs and joint equilibrium condition.
  must_include: &id045
  - mean score
  - log-standard-deviation score
  - four sign/location quadrants
  - joint equilibrium
  must_avoid: []
  evidence: &id046
  - analytic Gaussian score
  evidence_status: available
  blueprint:
    topic_sentence: Far-field negative advantages repel the mean and tend to contract variance when standardized distance exceeds one.
    moves: *id045
    evidence_use: *id046
    transition: ''
  prose: 'For a scalar Gaussian with $\xi=\log\sigma$ and $z=(a-\mu)/\sigma$,

    \begin{equation}

    \partial_\mu\log\pi=\frac{a-\mu}{\sigma^2},\qquad

    \partial_\xi\log\pi=z^2-1.

    \end{equation}

    A negative advantage reverses both score directions. It always pushes the mean away from the action, but its effect on scale depends on $|z|$: a near negative action with $|z|<1$ increases $\sigma$, whereas a far negative action with $|z|>1$ decreases $\sigma$. Positive updates have the opposite signs. A full Gaussian terminal state must satisfy both mean and variance equations; a stationary mean with continuing covariance movement is not a complete policy equilibrium.'
- id: APP-CAT-P01
  section: app-categorical
  order: 1
  title: Categorical Log-Odds and Boundary Behavior
  kind: paragraph
  claim: Repeated negative updates produce persistent log-odds decay even though the direct-logit score norm is bounded.
  reader_question: Why is categorical instability not an unbounded Euclidean gradient explosion?
  role: Derive the probability-boundary mechanism accurately.
  must_include: &id047
  - softmax score bound
  - log-odds update
  - probability decay
  - shared-parameter caveat
  must_avoid: []
  evidence: &id048
