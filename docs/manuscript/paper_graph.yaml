  prose: Off-policy learning has long controlled mismatch between the behavior distribution and the current policy. Importance correction, PPO-style clipping, and trust regions limit the effect of samples collected by another policy~\cite{schulman2017proximal}. Replay-based algorithms and maximum-entropy off-policy control likewise manage repeated data reuse while the learner evolves~\cite{haarnoja2018soft}. Offline-RL analyses make the same mismatch explicit when no new interaction is available~\cite{levine2020offline,fu2020d4rl}. Low action probability or high surprisal can therefore serve as a useful learner-relative warning signal. These approaches establish that mismatch and rarity matter; our distinction concerns how they arise. We treat remoteness not only as a static property used to choose a weight, but as an endogenous state variable that a negative update increases and subsequent reuse feeds back into the next update. We then connect that per-sample process to aggregate equilibria
