  prose: 'Quality-aware policy fitting already provides several ways to use or suppress suboptimal behavior. Advantage-weighted regression, implicit value learning, critic-regularized regression, and proximal behavior objectives emphasize actions estimated to be better while reducing the impact of lower-quality data~\cite{peng2019advantage,kostrikov2021offline,wang2020critic,zhuang2023behavior}. Positive-only and hard-filtering variants take the conservative endpoint and remove selected negative updates altogether. At the same time, failed or suboptimal behavior can remain informative: it can suppress competing bad modes, sharpen a decision boundary, or release probability mass for alternatives represented by the model. The established picture is therefore not that negative feedback is simply noise, but that it combines information value with optimization risk. What remains under-characterized is the temporal relation to the current learner. A fixed negative action can begin as relevant
