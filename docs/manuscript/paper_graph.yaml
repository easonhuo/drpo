- id: ABSTRACT-P01
  section: abstract
  order: 1
  title: Paper Summary
  kind: paragraph
  claim: Negative feedback is useful for policy improvement, but historical negative actions can become far-field and exert excessive influence; DRPO controls that transition.
  reader_question: What is the problem, missing link, theory, method, evidence, and implication in one compact sequence?
  role: Summarize the full paper without fixed-advantage scope language, split-manuscript framing, or unverified numerical claims.
  must_include: &id001
  - Negative feedback as a resource
  - badness--distance isolation
  - stable extrapolation to equilibrium loss
  - DRPO attenuation of the far-field component
  - controlled and external evidence
  must_avoid:
  - split-manuscript framing
  - finished external numbers before formal closure
  evidence: &id002
  - Theorem 1
  - source-isolation protocols
  - targeted interventions
  - external tasks marked TBD until formal closure
  evidence_status: available
  blueprint:
    topic_sentence: Negative feedback is useful for policy improvement, but historical negative actions can become far-field and exert excessive influence; DRPO controls that transition.
    moves: *id001
    evidence_use: *id002
    transition: ''
  prose: 'Negative feedback is a central resource in policy optimization: it suppresses known bad behavior and can move a policy beyond the solution obtained from positive examples alone. Yet the same feedback can become destructive when historical negative actions remain in offline data, replay, or stale trajectories after the learner has moved away from them. We identify the missing mechanism by separating sample badness from learner-relative distance or rarity, showing that policy remoteness independently amplifies negative influence. We then develop Repulsive Dynamics, which characterizes a transition from the Positive-only target, through stable extrapolation, to a feasibility boundary and the loss of a finite equilibrium. Based on this analysis, Distributionally Robust Policy Optimization (DRPO) reweights the aggregate negative term with a policy-relative exponential envelope, retaining useful local repulsion while suppressing its far-field tail. Controlled continuous and categorical
    environments isolate the source and causal transmission of the effect; registered Hopper/D4RL and Countdown experiments are reserved for external validation under learned critics and shared-parameter sequence policies, with formal results remaining TBD until terminal audit. The resulting framework tests a general principle: policy optimization should control far-field negative influence rather than remove negative feedback as a whole.'
- id: INTRO-P01
  section: introduction
  order: 1
  title: Negative Feedback as a Policy-Improvement Resource
  kind: paragraph
  claim: 'Negative feedback is not merely noise: balanced against positive attraction, it can suppress bad modes and shift a policy beyond the Positive-only target.'
  reader_question: Why should policy optimization retain negative feedback at all?
  role: Open with the constructive role of failures and establish Positive-only as a stable but limited reference.
  must_include: &id003
  - positive attraction reinforces observed successes
  - negative feedback suppresses known bad modes
  - balanced repulsion can shift the equilibrium beyond observed positive behavior
  - 'central question: preserve benefit without excessive repulsion'
  must_avoid: []
  evidence: &id004
  - Theorem 1 stable-extrapolation regime
  - controlled Positive-only comparison
  evidence_status: available
  blueprint:
    topic_sentence: 'Negative feedback is not merely noise: balanced against positive attraction, it can suppress bad modes and shift a policy beyond the Positive-only target.'
    moves: *id003
    evidence_use: *id004
    transition: Historical reuse explains how initially relevant repulsion becomes excessive.
  prose: Policy optimization learns not only from successful actions but also from actions that should become less likely. Positive updates reinforce observed successes, whereas negative updates suppress known bad modes and shape the boundary between acceptable and unacceptable behavior. This distinction matters because a learner trained only on positive examples is naturally pulled toward the empirical positive target. When negative repulsion is balanced against that attraction, however, the policy can settle beyond the Positive-only target and improve in regions that were not directly demonstrated by the positive data. The central problem is therefore not whether negative feedback should be used, but how to preserve its policy-improvement value without allowing the same repulsion to become dynamically excessive.
- id: INTRO-P02
  section: introduction
  order: 2
  title: Historical Reuse Turns Local Feedback into Persistent Repulsion
  kind: paragraph
  claim: Offline logs, replay, stale actors, and asynchronous trajectories continue to reuse negative actions after the current learner has moved away, turning local feedback into persistent far-field repulsion.
  reader_question: How does useful negative feedback become dangerous in off-policy learning?
  role: Introduce the temporal mechanism shared by offline, replay-based, stale-policy, and asynchronous training.
  must_include: &id005
  - negative actions can initially be locally informative
  - historical reuse persists after policy movement
  - Gaussian scores can grow with standardized distance
  - categorical scores are bounded but suppression persists
  - useful-local to destructive-far-field transition
  must_avoid: []
  evidence: &id006
  - Gaussian score identity
  - categorical log-odds dynamics
  - external occurrence diagnostics
  evidence_status: available
  blueprint:
    topic_sentence: Offline logs, replay, stale actors, and asynchronous trajectories continue to reuse negative actions after the current learner has moved away, turning local feedback into persistent far-field repulsion.
    moves: *id005
    evidence_use: *id006
    transition: The next paragraph identifies the confounding factor that prevents this mechanism from being inferred directly in realistic data.
  prose: The difficulty arises when the data are historical. A negative action may initially lie near the learner and provide relevant local boundary information, but offline logs, replay buffers, stale actors, and asynchronous trajectories can continue to reuse that action after the policy has moved away. Its learner-relative distance or rarity then increases while its negative label continues to generate updates. For Gaussian policies, the score can grow with standardized distance; for categorical policies, the direct-logit score is bounded, yet repeated negative updates continue to reduce the action's log-odds. Historical reuse can therefore transform locally useful feedback into persistent far-field repulsion.
- id: INTRO-P03
  section: introduction
  order: 3
  title: Existing Controls and the Missing Identification Link
  kind: paragraph
  claim: Existing controls regulate sign, scale, ratio, support, staleness, or data quality, but they neither explain the useful-to-destructive transition nor isolate policy remoteness from sample badness.
  reader_question: What do existing methods address, what remains unresolved, and why is strict badness--distance isolation necessary?
  role: Combine prior-method positioning with the decisive identification control instead of replacing one with the other.
  must_include: &id007
  - positive-only, global scaling, clipping, support constraints, low-probability controls, and quality filtering
  - their stabilizing value
  - unresolved transition from useful local repulsion to destructive far-field influence
  - realistic correlation among reward, negative advantage, rarity, and distance
  - matched control holding context, semantics, reward, advantage, count, coefficient, and policy stage fixed
  must_avoid:
  - dropping the existing-method gap
  - claiming distance is the only factor
  evidence: &id008
  - Related-work synthesis
  - C-U1 E1 quality--distance factorization
  - D-U1 common/rare matched analogue
  evidence_status: available
  blueprint:
    topic_sentence: Existing controls regulate sign, scale, ratio, support, staleness, or data quality, but they neither explain the useful-to-destructive transition nor isolate policy remoteness from sample badness.
    moves: *id007
    evidence_use: *id008
    transition: With the confound removed, Repulsive Dynamics can characterize the aggregate transition.
  prose: 'Existing methods already regulate negative updates in several ways: positive-only objectives remove them, global coefficients reduce their scale, clipping limits individual ratios, behavior constraints restrict support movement, low-probability controls target rare events, and quality filtering removes selected data. These mechanisms can improve stability, but they do not explain why the same negative feedback is useful near the learner and destructive after it becomes far field. The question is difficult to answer from ordinary logs because low reward, large negative advantage, rarity, and policy distance are typically correlated. We therefore isolate policy remoteness while matching context, action quality or semantic role, reward, negative-advantage magnitude, sample count, base coefficient, and policy stage. This control makes distance or rarity an independently testable amplifier rather than a proxy for samples that are simply worse.'
- id: INTRO-P04
  section: introduction
  order: 4
  title: Repulsive Dynamics Explains Stable Extrapolation and Equilibrium Loss
  kind: paragraph
  claim: Positive attraction and negative repulsion define a phase sequence from the Positive-only target to stable extrapolation, boundary approach, and loss of finite equilibrium.
  reader_question: What theoretical structure unifies beneficial and harmful negative updates?
  role: Preview Theorem 1 and the continuous--categorical distinction without proof details.
  must_include: &id009
  - Positive-only target
  - moderate negative contribution produces stable extrapolation
  - stronger or more outward contribution moves the signed target toward a feasible boundary
  - finite equilibrium can disappear
  - Gaussian and categorical manifestations differ
  must_avoid: []
  evidence: &id010
  - Theorem 1
  - Gaussian and categorical corollaries
  - E4/E6 phase tests
  evidence_status: available
  blueprint:
    topic_sentence: Positive attraction and negative repulsion define a phase sequence from the Positive-only target to stable extrapolation, boundary approach, and loss of finite equilibrium.
    moves: *id009
    evidence_use: *id010
    transition: The method follows by controlling the same aggregate negative term that drives this phase transition.
  prose: 'Repulsive Dynamics explains the full transition at the level of aggregate policy updates. Positive-only optimization targets the positive moment. A moderate negative contribution shifts the finite equilibrium beyond that target, yielding stable extrapolation. As the negative contribution becomes stronger or more outward, the signed target approaches the feasible boundary of the policy family; beyond that boundary, a finite equilibrium no longer exists. Gaussian and categorical policies share this aggregate phase structure, although they express it differently: Gaussian policies can exhibit distance-amplified scores and coupled mean--support dynamics, whereas categorical policies exhibit bounded but persistent probability suppression toward the simplex boundary.'
- id: INTRO-P05
  section: introduction
  order: 5
  title: DRPO Controls the Destabilizing Far-Field Term
  kind: paragraph
  claim: DRPO reweights the aggregate negative contribution with a policy-relative exponential envelope, retaining local negative feedback while making the weighted far-field gradient vanish under finite-order score growth.
  reader_question: How does the method act on the theoretical failure mechanism?
  role: Present DRPO as the current paper's unified method, not as a sequel or a revision appended to an older paper.
  must_include: &id011
  - distributional reweighting of the empirical actor update
  - exponential distance/surprisal weight
  - direct modification of the Theorem 1 negative term
  - far-field vanishing proposition
  - quality selection and remoteness control are distinct axes
  must_avoid:
  - original formulation versus revised formulation
  - old paper followed by a new algorithm
  - claim that quality hard filtering is mathematically identical to distance tapering
  evidence: &id012
  - method equations
  - Proposition 2
  - controlled method comparisons
  evidence_status: available
  blueprint:
    topic_sentence: DRPO reweights the aggregate negative contribution with a policy-relative exponential envelope, retaining local negative feedback while making the weighted far-field gradient vanish under finite-order score growth.
    moves: *id011
    evidence_use: *id012
    transition: The evidence chain tests occurrence, mechanism, transition, control, and external task effect.
  prose: 'DRPO acts directly on the negative term identified by the theory. It replaces the raw negative contribution with a policy-relative exponential weight, so that nearby negative actions retain substantial influence while increasingly remote actions are attenuated. Under finite-order score growth, the weighted far-field gradient converges to zero. This design is naturally interpreted as distributional control of the empirical actor update: quality-based selection and learner-relative remoteness are distinct axes and are evaluated separately rather than being conflated. The method therefore preserves the local negative feedback responsible for extrapolation while preventing the far-field tail from dominating the aggregate update.'
- id: INTRO-P06
  section: introduction
  order: 6
  title: Evidence Chain and Contributions
  kind: paragraph
  claim: The paper uses an external--controlled--external evidence chain to establish occurrence, identify source and causality, test the phase transition and DRPO control, and close on external task performance.
  reader_question: How are the claims divided across environments and experiments?
  role: End the Introduction with four research questions and four concise contributions.
  must_include: &id013
  - RQ1 external occurrence in Hopper and Countdown
  - RQ2 matched source isolation plus targeted causal intervention
  - RQ3 phase transition, aggregate-term measurement, and controlled method comparison
  - RQ4 external task closure
  - C-U1/D-U1 controlled roles and Hopper/Countdown external roles
  - terminal audit and separate failure events
  must_avoid: []
  evidence: &id014
  - environment responsibility table
  - registered experiments
  - best and terminal metrics
  evidence_status: available
  blueprint:
    topic_sentence: The paper uses an external--controlled--external evidence chain to establish occurrence, identify source and causality, test the phase transition and DRPO control, and close on external task performance.
    moves: *id013
    evidence_use: *id014
    transition: ''
  prose: 'We evaluate this account through four questions. First, do far-field or rare negative updates become disproportionately influential in realistic policy learning? Second, when badness is matched, does policy remoteness independently generate large negative influence and causally transmit into drift or boundary events? Third, does training follow the phase sequence predicted by Theorem~\ref{thm:equilibrium}, and can DRPO preserve useful repulsion while preventing the destructive regime under fair gradient budgets? Fourth, does the resulting control improve external tasks? C-U1 and D-U1 provide controlled continuous and categorical identification, whereas registered Hopper/D4RL and Countdown experiments are assigned the external-validation role and remain TBD until formal terminal audit. The paper contributes a theory of Repulsive Dynamics, matched quality--distance and quality--rarity causal identification, DRPO control of the theorem-level negative term, and a pre-registered external--controlled--external
    evidence chain.


    \begin{figure*}[t]

    \centering

    \includegraphics[width=0.98\textwidth]{figures/generated/fig1_story.pdf}

    \caption{Paper overview. Negative feedback can move a policy beyond the Positive-only target, but historical reuse can turn local feedback into destructive far-field influence. DRPO attenuates that tail. The evidence chain first establishes external occurrence, then performs matched source and causal identification, and finally returns to external task closure. All curves are conceptual; empirical figures are inserted only after formal terminal-audited completion.}

    \label{fig:story}

    \end{figure*}'
- id: RELATED-P01
  section: related
  order: 1
  title: Learning from Negative or Suboptimal Behavior
  kind: paragraph
  claim: Prior work establishes that negative or suboptimal data can be useful, but does not characterize the learner-relative transition from useful local repulsion to destructive far-field influence.
  reader_question: How does the paper differ from positive-only, advantage-weighted, and failure-learning work?
  role: Credit prior evidence for negative-feedback value and position the new transition.
  must_include: &id015
  - positive-only filtering
  - advantage-weighted regression
  - failure learning and negative reinforcement
  - useful information in negative data
  - missing dynamics across learner-relative distance
  must_avoid: []
  evidence: &id016
  - AWR and related actor fitting
  - negative-feedback literature
  evidence_status: available
  blueprint:
    topic_sentence: Prior work establishes that negative or suboptimal data can be useful, but does not characterize the learner-relative transition from useful local repulsion to destructive far-field influence.
    moves: *id015
    evidence_use: *id016
    transition: ''
  prose: 'Advantage-weighted and filtered policy-learning methods use sample quality to emphasize successful behavior or reduce harmful updates~\cite{peng2019advantage,kostrikov2021offline}. Other work on failures and negative reinforcement shows that suppressing known bad behavior can improve decision boundaries, diversity, or long-horizon performance. We build on this evidence rather than treating all negative data as noise. Our focus is the dynamical transition: the same negative action can be informative when it is near the current learner and excessive after repeated off-policy reuse moves it into the far field.'
- id: RELATED-P02
  section: related
  order: 2
  title: Off-Policy, Stale, and Low-Probability Updates
  kind: paragraph
  claim: Clipping, importance correction, stale-policy control, and rare-event regulation address mismatch or scale, while this paper connects repeated learner-relative movement to aggregate repulsion and equilibrium loss.
  reader_question: How does the paper relate to standard off-policy stabilization?
  role: Position the far-field mechanism as complementary to ratio, staleness, and probability controls.
  must_include: &id017
  - PPO-style clipping
  - off-policy correction
  - stale-policy and asynchronous updates
  - low-probability actions or tokens
  - aggregate equilibrium consequence
  must_avoid: []
  evidence: &id018
  - PPO and off-policy references
  - Countdown diagnostics
  evidence_status: available
  blueprint:
    topic_sentence: Clipping, importance correction, stale-policy control, and rare-event regulation address mismatch or scale, while this paper connects repeated learner-relative movement to aggregate repulsion and equilibrium loss.
    moves: *id017
    evidence_use: *id018
    transition: ''
  prose: 'Off-policy algorithms commonly use importance correction, clipping, trust regions, or replay design to control distribution mismatch~\cite{schulman2017proximal,haarnoja2018soft}. Recent analyses of stale or low-probability actions emphasize that rare negative events can dominate updates in shared-parameter policies. Repulsive Dynamics complements these views by following a negative action across repeated reuse: learner-relative remoteness changes its score contribution, the contributions aggregate, and the signed target can move to a policy boundary where a finite equilibrium is lost.'
- id: RELATED-P03
  section: related
  order: 3
  title: Robust Offline Policy Learning
  kind: paragraph
  claim: Offline RL controls value extrapolation, policy support, or data quality; DRPO instead targets the far-field component of signed actor updates while retaining useful local negatives.
  reader_question: How is DRPO positioned against conservative and behavior-regularized offline RL?
  role: Distinguish the actor-dynamics object without dismissing established offline-RL solutions.
  must_include: &id019
  - CQL and pessimism
  - IQL and in-support value learning
  - behavior regularization and TD3+BC-style simplicity
  - data filtering
  - signed actor update as the distinct object
  must_avoid: []
  evidence: &id020
  - CQL/IQL citations
  - external D4RL evaluation
  evidence_status: available
  blueprint:
    topic_sentence: Offline RL controls value extrapolation, policy support, or data quality; DRPO instead targets the far-field component of signed actor updates while retaining useful local negatives.
    moves: *id019
    evidence_use: *id020
    transition: ''
  prose: 'Conservative and implicit offline-RL methods control extrapolation by pessimistic value estimation, in-support dynamic programming, or explicit behavior regularization~\cite{kumar2020conservative,kostrikov2021offline,fujimoto2019off}. These approaches address central offline-RL failures and provide strong external baselines. DRPO studies a different but compatible object: the signed actor update itself. Its purpose is to retain useful local negative feedback while attenuating the learner-relative far-field component that can dominate the policy dynamics.'
- id: SETUP-P01
  section: setup
  order: 1
  title: Signed Actor Update and Influence Factorization
  kind: paragraph
  claim: A negative sample's influence factors into advantage severity and policy-score geometry, while count and directional coherence determine aggregation.
  reader_question: What is the mathematical object shared by theory, method, and experiments?
  role: Define the signed update and isolate badness from geometry.
  must_include: &id021
  - signed empirical actor field
  - positive and negative advantage parts
  - per-sample norm factorization
  - aggregation factors
  must_avoid: []
  evidence: &id022
  - policy-gradient identity
  - per-sample and aggregate diagnostics
  evidence_status: available
  blueprint:
    topic_sentence: A negative sample's influence factors into advantage severity and policy-score geometry, while count and directional coherence determine aggregation.
    moves: *id021
    evidence_use: *id022
    transition: ''
  prose: 'Let $\nu$ denote the empirical update distribution induced by offline data, replay, or stale trajectories. We study the signed actor field

    \begin{equation}

    \mathbf F(\theta)=\mathbb E_{(s,a)\sim\nu}\!\left[\widehat A(s,a)\nabla_\theta\log\pi_\theta(a\mid s)\right].

    \label{eq:signed-field}

    \end{equation}

    Writing $A^+=\max(\widehat A,0)$ and $A^-=\max(-\widehat A,0)$ gives $\mathbf F=\mathbf F^+-\mathbf F^-$. For a negative sample,

    \begin{equation}

    \|g_i^-\|=A_i^-\,\|\nabla_\theta\log\pi_\theta(a_i\mid s_i)\|.

    \label{eq:factorization}

    \end{equation}

    The first factor is sample badness or severity; the second is learner-relative policy geometry. Sample count, directional coherence, and the network Jacobian determine how individual terms aggregate. Equation~\ref{eq:factorization} motivates matching badness while changing only distance or rarity.'
- id: SETUP-P02
  section: setup
  order: 2
  title: Policy-Relative Far Field
  kind: paragraph
  claim: Far field is a dynamic relation between a historical action and the current learner, realized by standardized distance for Gaussian policies and surprisal for categorical policies.
  reader_question: How is remoteness defined across continuous and categorical policies?
  role: Define family-specific remoteness without claiming identical amplification laws.
  must_include: &id023
  - Gaussian standardized or Mahalanobis distance
  - categorical surprisal
  - sequence normalized token/completion NLL
  - dynamic rather than permanent label
  must_avoid: []
  evidence: &id024
  - C-U1 distance coordinate
  - D-U1 rarity coordinate
  - Countdown NLL coordinate
  evidence_status: available
  blueprint:
    topic_sentence: Far field is a dynamic relation between a historical action and the current learner, realized by standardized distance for Gaussian policies and surprisal for categorical policies.
    moves: *id023
    evidence_use: *id024
    transition: ''
  prose: 'We use $r_\theta(s,a)$ as a family-indexed remoteness coordinate. For a Gaussian policy, $r_\theta$ is a registered standardized or Mahalanobis distance (or an equivalent calibrated negative log-density). For a categorical policy, it is action surprisal $-\log\pi_\theta(a\mid s)$; for sequence policies, the registered analogue is normalized token- or completion-level negative log-likelihood. The notation is shared, but the score-growth law is not assumed to be identical across policy families. Crucially, far field is dynamic: a fixed historical action can become remote as the current learner changes.'
- id: THEORY-P01
  section: theory
  order: 1
  title: Per-Sample Far-Field Dynamics
  kind: paragraph
  claim: Gaussian negative updates can amplify with standardized distance, while categorical negative updates remain bounded in direct-logit norm but persistently suppress probability.
  reader_question: What happens to one negative action under repeated updates?
  role: Establish the family-specific local mechanisms before the aggregate theorem.
  must_include: &id025
  - Gaussian mean score identity
  - corrected variance sign depends on standardized location
  - categorical direct-logit score bound
  - log-odds suppression
  must_avoid: []
  evidence: &id026
  - analytic derivations in appendices B and C
  evidence_status: available
  blueprint:
    topic_sentence: Gaussian negative updates can amplify with standardized distance, while categorical negative updates remain bounded in direct-logit norm but persistently suppress probability.
    moves: *id025
    evidence_use: *id026
    transition: ''
  prose: 'For a Gaussian policy with mean $\mu$ and covariance $\Sigma$,

    \begin{equation}

    \nabla_\mu\log\pi(a\mid s)=\Sigma^{-1}(a-\mu),

    \label{eq:gaussian-score}

    \end{equation}

    so the mean-score magnitude grows with standardized distance. When covariance is learned, the variance direction depends on standardized location: the dangerous far-field chain is mean repulsion together with support contraction, not universal expansion of both mean and variance. For categorical logits $z$,

    \begin{equation}

    \nabla_z\log\pi(a\mid s)=e_a-\pi(\cdot\mid s).

    \label{eq:categorical-score}

    \end{equation}

    This direct-logit score is bounded, but repeated negative updates continue to decrease the selected action''s log-odds. The shared phenomenon is persistent movement toward a policy-family boundary, not an identical Euclidean gradient law.'
- id: THEORY-P02
  section: theory
  order: 2
  title: Aggregate Positive--Negative Competition
  kind: paragraph
  claim: For an exponential-family policy, the signed actor field is governed by positive and negative update masses and their sufficient-statistic moments.
  reader_question: How do per-sample effects combine into a tractable equilibrium model?
  role: Define the exact signed objective used by Theorem 1 without paper-wide fixed-advantage disclaimers.
  must_include: &id027
  - regular minimal exponential family
  - positive and negative masses p and q
  - moments m+ and m-
  - signed field formula
  must_avoid: []
  evidence: &id028
  - exponential-family algebra
  evidence_status: available
  blueprint:
    topic_sentence: For an exponential-family policy, the signed actor field is governed by positive and negative update masses and their sufficient-statistic moments.
    moves: *id027
    evidence_use: *id028
    transition: ''
  prose: 'Consider a regular minimal exponential-family policy

    \begin{equation}

    \pi_\eta(a)=h(a)\exp\{\eta^\top T(a)-\psi(\eta)\}.

    \end{equation}

    Let $p,q\ge 0$ denote aggregate positive and negative update mass, and let $\mathbf m_+$ and $\mathbf m_-$ denote their normalized sufficient-statistic moments. The population signed field is

    \begin{equation}

    \mathbf F(\eta)=p\mathbf m_+-q\mathbf m_--(p-q)\nabla\psi(\eta).

    \label{eq:aggregate-field}

    \end{equation}

    These quantities define the aggregate positive--negative competition analyzed by the equilibrium theorem.'
- id: THEORY-P03
  section: theory
  order: 3
  title: 'Theorem 1: Stable Extrapolation and Loss of Finite Equilibrium'
  kind: paragraph
  claim: The aggregate field admits a stable finite equilibrium beyond the Positive-only target when the signed moment remains interior, and loses that equilibrium at or beyond the feasible boundary.
  reader_question: When does negative feedback help, and when does the same force remove a finite equilibrium?
  role: Serve as the theoretical hinge connecting useful negative feedback, phase transition, and the method target.
  must_include: &id029
  - Positive-only limit
  - stable extrapolation formula
  - boundary approach
  - no finite equilibrium
  - local stability statement
  must_avoid: []
  evidence: &id030
  - proof in Appendix A
  - phase tests in E4/E6
  evidence_status: available
  blueprint:
    topic_sentence: The aggregate field admits a stable finite equilibrium beyond the Positive-only target when the signed moment remains interior, and loses that equilibrium at or beyond the feasible boundary.
    moves: *id029
    evidence_use: *id030
    transition: ''
  prose: '\begin{theorem}[Stable extrapolation and loss of finite equilibrium]

    \label{thm:equilibrium}

    Assume $p>q$ in~\eqref{eq:aggregate-field}. Define the signed target

    \begin{equation}

    \mathbf m^\star=\frac{p\mathbf m_+-q\mathbf m_-}{p-q}.

    \label{eq:signed-target}

    \end{equation}

    If $\mathbf m^\star$ lies in the interior of the mean-parameter space, there is a unique finite equilibrium $\eta^\star$ satisfying $\nabla\psi(\eta^\star)=\mathbf m^\star$. Moreover,

    \begin{equation}

    \mathbf m^\star-\mathbf m_+=\frac{q}{p-q}(\mathbf m_+-\mathbf m_-),

    \end{equation}

    so negative repulsion moves the equilibrium beyond the Positive-only target in the direction away from the negative moment. As $\mathbf m^\star$ approaches the feasible boundary, the corresponding natural parameter becomes degenerate or unbounded; if the signed target lies outside the feasible mean-parameter space, no finite equilibrium exists. At an interior equilibrium, $J_F(\eta^\star)=-(p-q)\nabla^2\psi(\eta^\star)$ is negative definite.

    \end{theorem}

    The theorem gives one phase sequence: Positive-only, stable extrapolation, boundary approach, and loss of finite equilibrium. The experiments align this phase classification with separate measurements of task performance, policy-family boundaries, and numerical state.'
- id: THEORY-P04
  section: theory
  order: 4
  title: Testable Predictions
  kind: paragraph
  claim: The theorem predicts distinct observable regimes and a targeted recovery when the far-field component of the aggregate negative term is attenuated.
  reader_question: How is Theorem 1 connected to actual experiments?
  role: Map each mathematical regime to a pre-specified intervention and terminal observable.
  must_include: &id031
  - Positive-only platform
  - controlled negative stable platform
  - boundary event
