- id: ABSTRACT-P01
  section: abstract
  order: 1
  title: Paper Summary
  kind: paragraph
  claim: Negative feedback is useful for policy improvement, but historical negative actions can become far-field and exert excessive influence; DRPO controls that transition.
  reader_question: What is the problem, missing link, theory, method, evidence, and implication in one compact sequence?
  role: Summarize the full paper without fixed-advantage scope language, split-manuscript framing, or unverified numerical claims.
  must_include: &id001
  - Negative feedback as a resource
  - badness--distance isolation
  - stable extrapolation to equilibrium loss
  - DRPO attenuation of the far-field component
  - controlled and external evidence
  must_avoid:
  - split-manuscript framing
  - finished external numbers before formal closure
  evidence: &id002
  - Theorem 1
  - source-isolation protocols
  - targeted interventions
  - external tasks marked TBD until formal closure
  evidence_status: available
  blueprint:
    topic_sentence: Negative feedback is useful for policy improvement, but historical negative actions can become far-field and exert excessive influence; DRPO controls that transition.
    moves: *id001
    evidence_use: *id002
    transition: ''
  prose: 'Negative feedback is a central resource in policy optimization: it suppresses known bad behavior and can move a policy beyond the solution obtained from positive examples alone. Yet the same feedback can become destructive when historical negative actions remain in offline data, replay, or stale trajectories after the learner has moved away from them. We identify the missing mechanism by separating sample badness from learner-relative distance or rarity, showing that policy remoteness independently amplifies negative influence. We then develop Repulsive Dynamics, which characterizes a transition from the Positive-only target, through stable extrapolation, to a feasibility boundary and the loss of a finite equilibrium. Based on this analysis, Distributionally Robust Policy Optimization (DRPO) reweights the aggregate negative term with a policy-relative exponential envelope, retaining useful local repulsion while suppressing its far-field tail. Controlled continuous and categorical
    environments isolate the source and causal transmission of the effect; registered Hopper/D4RL and Countdown experiments are reserved for external validation under learned critics and shared-parameter sequence policies, with formal results remaining TBD until terminal audit. The resulting framework tests a general principle: policy optimization should control far-field negative influence rather than remove negative feedback as a whole.'
- id: INTRO-P01
  section: introduction
  order: 1
  title: Negative Feedback as a Policy-Improvement Resource
  kind: paragraph
  claim: Off-policy policy optimization needs both attraction toward successful behavior and suppression of known failures, but the latter must remain dynamically controlled.
  reader_question: Why is negative feedback a necessary policy-improvement signal rather than disposable noise?
  role: Establish the broad off-policy setting, the complementary roles of positive and negative feedback, and the paper's governing question.
  must_include:
  - off-policy reuse across offline, replay, recommendation, and post-training settings
  - positive attraction toward observed successes
  - negative suppression of known failures and competing modes
  - Positive-only as a stable but potentially limited reference
  - central question of preserving useful negative feedback without excessive repulsion
  must_avoid: []
  evidence: &id003
  - offline-RL and off-policy policy-optimization literature
  - advantage-weighted and critic-regularized actor fitting
  - Theorem 3 stable-extrapolation regime
  evidence_status: available
  blueprint:
    topic_sentence: Historical data are useful precisely because they contain both successful behavior to reinforce and failed behavior to suppress.
    moves:
    - Open with the role of historical data in offline, replay-based, recommendation, and post-training policy optimization.
    - Explain positive attraction toward observed successful actions.
    - Explain why negative feedback suppresses known failures and competing modes.
    - Position Positive-only as stable but potentially limited to the observed positive target.
    - 'State the paper''s central problem: retain useful negative information without allowing repulsion to become excessive.'
    evidence_use: *id003
    transition: The next paragraph explains why historical reuse changes the character of the same negative signal.
    sentence_plan:
    - role: context
      instruction: Open with the role of historical data in offline, replay-based, recommendation, and post-training policy optimization.
      anchors:
      - historical data
      - off-policy
    - role: positive_role
      instruction: Explain positive attraction toward observed successful actions.
      anchors:
      - positive updates
      - successful
    - role: negative_role
      instruction: Explain why negative feedback suppresses known failures and competing modes.
      anchors:
      - negative feedback
      - suppress
    - role: limitation
      instruction: Position Positive-only as stable but potentially limited to the observed positive target.
      anchors:
      - Positive-only
      - empirical positive target
    - role: question
      instruction: 'State the paper''s central problem: retain useful negative information without allowing repulsion to become excessive.'
      anchors:
      - central question
      - excessive repulsion
    citation_refs:
    - levine2020offline
    - fujimoto2019off
    - peng2019advantage
    - wang2020critic
    theorem_or_equation_refs: []
    appendix_bindings: []
    allowed_conclusions:
    - negative feedback can be informative
    - Positive-only is a stable reference with a possible imitation ceiling
    forbidden_conclusions:
    - all negative feedback is harmful
    - Positive-only is universally inferior
    reviewer_objection: The opening could sound as though failures are always useful or that Positive-only is an inadequate baseline by definition.
    objection_response: State complementarity and a conditional limitation, not a universal ranking.
    word_budget:
    - 125
    - 220
  prose: Off-policy policy optimization improves a current policy by reusing behavior collected by earlier, stale, or heterogeneous policies. This paradigm is central to offline reinforcement learning, replay-based control, recommender systems, and model post-training because it reduces the need for fresh interaction and exploits experience accumulated across policy iterations~\cite{levine2020offline,fujimoto2019off}. Historical data contain two complementary signals. Positive updates increase the likelihood of observed successful actions, whereas negative feedback suppresses known failures and competing modes~\cite{peng2019advantage,wang2020critic}. The Positive-only endpoint, which removes every negative update, therefore yields a useful stability reference but can restrict the learner to attraction toward the empirical positive target. Balanced repulsion can instead reshape the decision boundary and move the aggregate equilibrium beyond that target. The central question is not whether
    negative feedback should be kept or discarded wholesale, but how to preserve its policy-improvement value without allowing repeated reuse to turn it into excessive repulsion.
- id: INTRO-P02
  section: introduction
  order: 2
  title: Historical Reuse Turns Local Feedback into Persistent Repulsion
  kind: paragraph
  claim: 'Repeated reuse makes negative influence learner-relative: as the current policy moves away from a fixed historical action, the same label can become persistent or self-amplifying far-field repulsion.'
  reader_question: How can locally informative negative feedback become dynamically dangerous?
  role: Introduce historical reuse as the temporal mechanism and distinguish Gaussian amplification from categorical persistent suppression.
  must_include:
  - fixed historical action reused while learner changes
  - initially local negative information
  - learner-relative remoteness increases after repulsion
  - Gaussian score growth with standardized distance
  - categorical bounded score with persistent support suppression
  - useful-local to destructive-far-field transition
  must_avoid: []
  evidence: &id004
  - Gaussian score identity
  - repeated-reuse theorem
  - categorical log-odds dynamics
  evidence_status: available
  blueprint:
    topic_sentence: The difficulty appears when a fixed negative action is reused after the learner has moved.
    moves:
    - Describe offline logs, replay buffers, stale actors, and asynchronous trajectories as fixed or delayed update sources.
    - Explain that a negative action can initially supply locally relevant boundary information.
    - Show that repulsion increases learner-relative distance while the historical label remains active.
    - State that Gaussian mean scores can grow with standardized distance.
    - State that categorical direct-logit scores are bounded but repeated suppression persists.
    - Name the useful-local to destructive-far-field transition and hand off to prior controls.
    evidence_use: *id004
    transition: Existing methods control several symptoms of this mismatch, but do not isolate the repeated remoteness feedback loop.
    sentence_plan:
    - role: historical_setting
      instruction: Describe offline logs, replay buffers, stale actors, and asynchronous trajectories as fixed or delayed update sources.
      anchors:
      - offline logs
      - replay
    - role: local_value
      instruction: Explain that a negative action can initially supply locally relevant boundary information.
      anchors:
      - locally informative
      - boundary
    - role: reuse_mechanism
      instruction: Show that repulsion increases learner-relative distance while the historical label remains active.
      anchors:
      - learner-relative
      - distance
    - role: gaussian_case
      instruction: State that Gaussian mean scores can grow with standardized distance.
      anchors:
      - Gaussian
      - standardized distance
    - role: categorical_case
      instruction: State that categorical direct-logit scores are bounded but repeated suppression persists.
      anchors:
      - categorical
      - bounded
      - suppression
    - role: transition
      instruction: Name the useful-local to destructive-far-field transition and hand off to prior controls.
      anchors:
      - far-field
      - transition
    citation_refs:
    - schulman2017proximal
    - haarnoja2018soft
    theorem_or_equation_refs: []
    appendix_bindings: []
    allowed_conclusions:
    - historical reuse can change a sample's influence
    - Gaussian and categorical manifestations differ
    forbidden_conclusions:
    - categorical per-sample gradients diverge without bound
    - every off-policy update necessarily collapses
    reviewer_objection: The mechanism might be mistaken for ordinary distribution shift or a one-time large update.
    objection_response: Emphasize the repeated feedback loop and policy-family-specific response laws.
    word_budget:
    - 125
    - 220
  prose: The difficulty appears when negative actions are historical rather than freshly sampled. Offline logs, replay buffers, stale actors, and asynchronous trajectories can keep presenting the same action after the current learner has changed~\cite{schulman2017proximal,haarnoja2018soft}. A negative sample may initially lie near the policy and provide locally informative boundary information. Its update then pushes the learner away, increasing the action's learner-relative distance or surprisal while the stored negative label remains active. In Gaussian policies, the mean score can grow with standardized distance, so subsequent reuse produces progressively larger repulsion. In categorical policies, the direct-logit score is bounded, yet repeated negative updates continue to lower the selected action's log-odds and can drive its probability toward the support boundary. Historical reuse therefore creates a policy-family-dependent transition from useful local feedback to destructive far-field
    influence, rather than merely exposing the learner to one unusually large update.
- id: INTRO-P03
  section: introduction
  order: 3
  title: Existing Controls and the Missing Identification Link
  kind: paragraph
  claim: Existing controls stabilize off-policy learning, but the causal role of learner-relative remoteness remains unidentified when quality, advantage magnitude, rarity, and distance are entangled.
  reader_question: What do existing controls solve, and what identification gap remains?
  role: Acknowledge established stabilization methods, isolate the missing dynamic claim, and motivate matched quality--distance controls.
  must_include:
  - positive-only filtering, global scaling, clipping, support constraints, rarity controls, and quality filtering
  - their established stabilization value
  - lack of a useful-local to destructive-far-field explanation
  - realistic confounding among reward, advantage, rarity, and distance
  - matched controls holding quality and coefficient fixed
  - source and causal interventions as separate responsibilities
  must_avoid:
  - dropping the existing-method gap
  - claiming distance is the only factor
  evidence: &id005
  - related-work synthesis
  - C-U1 E1 source isolation
  - C-U1 E3 targeted intervention
  - D-U1 common/rare analogue
  evidence_status: available
  blueprint:
    topic_sentence: Current stabilization methods show that negative updates require control, but they do not identify why repeated remoteness changes their influence.
    moves:
    - Enumerate positive-only, global scaling, clipping, behavior constraints, rarity-aware control, and quality filtering.
    - Acknowledge that these controls can stabilize learning and should not be dismissed as tricks.
    - Specify the missing explanation of the local-benefit to far-field-harm transition.
    - Explain that quality, negative advantage, rarity, and distance are correlated in ordinary logs.
    - Describe matched controls that hold context, semantics, reward, coefficient, and policy stage fixed.
    - Separate source isolation from causal transmission and lead into the theory.
    evidence_use: *id005
    transition: A theory of repulsive dynamics is needed to connect single-sample remoteness to aggregate equilibria.
    sentence_plan:
    - role: method_landscape
      instruction: Enumerate positive-only, global scaling, clipping, behavior constraints, rarity-aware control, and quality filtering.
      anchors:
      - positive-only
      - clipping
      - quality filtering
    - role: acknowledged_value
      instruction: Acknowledge that these controls can stabilize learning and should not be dismissed as tricks.
      anchors:
      - stabilize
      - controls
    - role: unresolved_gap
      instruction: Specify the missing explanation of the local-benefit to far-field-harm transition.
      anchors:
      - useful local
      - far-field
    - role: confounding
      instruction: Explain that quality, negative advantage, rarity, and distance are correlated in ordinary logs.
      anchors:
      - advantage magnitude
      - rarity
      - distance
    - role: identification
      instruction: Describe matched controls that hold context, semantics, reward, coefficient, and policy stage fixed.
      anchors:
      - matched
      - policy stage
    - role: transition
      instruction: Separate source isolation from causal transmission and lead into the theory.
      anchors:
      - source identification
      - intervention protocol
    citation_refs:
    - schulman2017proximal
    - kumar2020conservative
    - kostrikov2021offline
    - peng2019advantage
    theorem_or_equation_refs: []
    appendix_bindings: []
    allowed_conclusions:
    - prior controls have genuine stabilizing value
    - remoteness requires separate causal identification
    forbidden_conclusions:
    - prior methods ignore off-policy mismatch
    - distance is the only source of instability
    reviewer_objection: The claimed gap could be a relabeling of clipping, rarity weighting, or conservative offline RL.
    objection_response: Define the gap as repeated learner-relative dynamics under matched sample quality and then test source and transmission separately.
    word_budget:
    - 145
    - 250
  prose: Existing methods already regulate negative or off-policy updates in several principled ways. Positive-only objectives remove negative terms; global coefficients and clipping reduce their scale; trust regions and behavior constraints restrict policy movement; rarity-aware rules target low-probability events; and quality filtering removes selected data~\cite{schulman2017proximal,kumar2020conservative,kostrikov2021offline,peng2019advantage}. These controls can improve stability, but they do not by themselves explain why the same negative action can be useful near the learner and destructive in the far field after repeated reuse. The issue is difficult to identify in ordinary logs because low reward, large negative advantage, rarity, and learner-relative distance are typically correlated. We therefore construct matched controls that use matching context and semantic role, holding negative-advantage magnitude, sample count, base coefficient, and policy stage fixed to isolate policy remoteness.
    The source-identification protocol tests whether remoteness independently changes gradient scale; a separate intervention protocol tests whether the resulting far-field influence transmits into drift, support-boundary events, and task-performance collapse. This separation motivates an aggregate theory rather than another static weighting heuristic.
- id: INTRO-P04
  section: introduction
  order: 4
  title: Repulsive Dynamics Explains Stable Extrapolation and Equilibrium Loss
  kind: paragraph
  claim: Repulsive Dynamics unifies stable extrapolation, persistent drift, and instability through the aggregate balance of positive and negative update masses and moments.
  reader_question: What theoretical structure connects beneficial and harmful negative updates?
  role: Preview the static score relation, repeated-reuse asymmetry, aggregate equilibrium theorem, and policy-family manifestations.
  must_include:
  - learner-relative remoteness and score response
  - positive self-attenuation and negative self-amplification
  - positive-dominant stable extrapolation
  - critical persistent drift
  - negative-dominant instability
  - Gaussian unbounded scores versus categorical bounded boundary degeneration
  must_avoid: []
  evidence: &id006
  - Proposition on remoteness and score response
  - reuse theorem
  - aggregate equilibrium theorem
  - policy-family runaway theorem
  evidence_status: available
  blueprint:
    topic_sentence: 'Repulsive Dynamics separates three layers that are often conflated: static score geometry, repeated sample reuse, and aggregate equilibrium.'
    moves:
    - Introduce the three-layer theoretical decomposition.
    - Explain finite stable extrapolation beyond the Positive-only target under positive dominance.
    - Explain boundary approach, persistent drift, and loss of finite stability.
    - Contrast Gaussian unbounded score growth with categorical bounded-gradient boundary degeneration.
    - State that negative feedback is neither uniformly beneficial nor uniformly harmful.
    - Connect the theoretical failure term to the method design.
    evidence_use: *id006
    transition: DRPO is then defined as a control of the far-field contribution in the aggregate negative term.
    sentence_plan:
    - role: theory_object
      instruction: Introduce the three-layer theoretical decomposition.
      anchors:
      - learner-relative remoteness
      - aggregate
    - role: stable_regime
      instruction: Explain finite stable extrapolation beyond the Positive-only target under positive dominance.
      anchors:
      - stable extrapolation
      - Positive-only
    - role: boundary_regime
      instruction: Explain boundary approach, persistent drift, and loss of finite stability.
      anchors:
      - persistent drift
      - finite
    - role: family_difference
      instruction: Contrast Gaussian unbounded score growth with categorical bounded-gradient boundary degeneration.
      anchors:
      - Gaussian
      - categorical
      - bounded
    - role: implication
      instruction: State that negative feedback is neither uniformly beneficial nor uniformly harmful.
      anchors:
      - neither
      - beneficial
      - harmful
    - role: transition
      instruction: Connect the theoretical failure term to the method design.
      anchors:
      - method
      - far-field
    citation_refs: []
    theorem_or_equation_refs: []
    appendix_bindings:
    - app:proof-score-remoteness
    - app:proof-reuse
    - app:proof-theorem-equilibrium
    - app:proof-family-runaway
    allowed_conclusions:
    - moderate aggregate repulsion can produce a finite extrapolated equilibrium
    - policy-family manifestations differ
    forbidden_conclusions:
    - advantage sign alone determines all joint-parameter directions
    - all negative-dominant trajectories produce NaN/Inf
    reviewer_objection: A single equilibrium theorem could hide the distinction between per-sample amplification and aggregate stability.
    objection_response: Preview the static, repeated-reuse, and aggregate results as separate logical layers.
    word_budget:
    - 135
    - 235
  prose: 'Repulsive Dynamics separates three layers that are often conflated. First, learner-relative remoteness determines the score response of a fixed historical action. Second, repeated reuse creates an asymmetry: positive updates make a successful action more compatible with the learner and attenuate its score, whereas negative updates make a rejected action more remote and preserve or amplify its response. Third, positive and negative contributions aggregate into a signed policy field. When positive mass dominates and the signed target remains inside the feasible mean-parameter space, the policy has a finite stable equilibrium beyond the Positive-only target. At the critical balance the field can produce persistent drift, while negative dominance makes any finite stationary point unstable. The terminal manifestation depends on the policy family: Gaussian mean runaway yields unbounded far-field scores, whereas categorical policies approach the simplex boundary with bounded per-sample
    logit scores. Negative feedback is therefore neither uniformly beneficial nor uniformly harmful; its value depends on aggregate balance and learner-relative location.'
- id: INTRO-P05
  section: introduction
  order: 5
  title: DRPO Controls the Destabilizing Far-Field Term
  kind: paragraph
  claim: DRPO preserves informative local negative feedback while attenuating the learner-relative far-field tail that drives the unstable aggregate regime.
  reader_question: How does the method intervene on the mechanism rather than merely discard negative data?
  role: Introduce the method target, local-preservation principle, tail guarantee, and distinction between quality selection and remoteness control.
  must_include:
  - negative-term reweighting in the empirical actor field
