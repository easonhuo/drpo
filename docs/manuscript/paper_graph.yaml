      anchors:
      - quality
      - separate axes
    - role: transition
      instruction: Lead to the layered empirical program without ranking all tapers in advance.
      anchors:
      - empirical
      - ranking
    citation_refs: []
    theorem_or_equation_refs: []
    appendix_bindings:
    - app:proof-far-field
    allowed_conclusions:
    - the exponential envelope has a vanishing-tail guarantee under finite-order score growth
    - local negative feedback is retained
    forbidden_conclusions:
    - the exponential taper is universally optimal
    - distance control must outperform global scaling
    reviewer_objection: The exponential envelope could appear to assume that negative-sample utility decays exponentially.
    objection_response: Ground the choice in domination of finite-order score growth, not in an assumed utility curve.
    word_budget:
    - 120
    - 215
  prose: 'DRPO acts on the mechanism identified by the theory rather than treating every negative sample as toxic. Starting from the signed empirical actor field, it reweights the aggregate negative term by learner-relative distance or surprisal. Nearby negative actions retain substantial weight and can continue to shape local boundaries or suppress competing bad modes. As an action becomes increasingly remote, the weight decays nonlinearly, preventing the far-field tail from dominating the positive attraction. The exponential envelope is chosen for a precise tail property: under finite-order growth of the unweighted score-times-advantage contribution, the weighted contribution vanishes as remoteness increases. This guarantee does not assume that a sample''s utility decays exponentially and does not establish a universal ranking over all tapers. Quality-based selection and learner-relative remoteness control are distinct axes; the experiments evaluate them and global scaling under matched
    conditions rather than presuming that one control must always win.'
