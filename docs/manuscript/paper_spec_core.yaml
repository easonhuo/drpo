    denominator: 20
theorem:
  id: PROP-EXPONENTIAL-FAR-FIELD
  title: Vanishing weighted far-field gradient
  status: analytically_proven
  claim: >
    If the unweighted score-times-advantage norm grows at most polynomially in
    policy-relative remoteness, multiplication by exp(-lambda r), lambda > 0,
    makes the weighted contribution vanish as r tends to infinity.
  forbidden_inference: The proposition does not assume that sample utility decays exponentially.
